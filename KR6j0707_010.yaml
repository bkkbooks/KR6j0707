body:
  text: 明柴紫釋乘時講録新安受法弟子汪益源校梓阿難彼善男子修三摩提至幽隱妄想以為其本冠注此欲明行陰本末先示想盡行現之相也窹𥧌恆一不是無夢唯是窹境𥧌境毫無差謬如孔子之夢兩楹武丁之夢傳說是也前此有第六識在故晝則為想夜則為夢汩亂真性而莫能恆一擾動覺明而莫能虗靜想陰既盡則寤寐諸境恆常如一曾未變易而性覺妙明凝然虗靜曾未擾動如晴明空逈無所有也無前三陰則粗重相滅前塵已空則轉識成智故觀諸世間大地山河猶如明鏡照諸形像心境無交亦無去留但以虗而受以照而應心中了無宿積我執習氣唯一識精元明之真體卓然獨存此想盡之相也生滅根元即行陰也以諸遷流自此生起故曰生滅之根元前三陰未盡則此根元幽隱難見今三陰既盡則三界生死根元從此披露由此披露故見界內十二類生皆從此生亦從此滅也雖未通其各命由緒等者謂見相二分之根本善惡兩途之種子皆在含藏識中若見識陰則十二類生因果罪福元由頭緒莫不了然今想陰已盡雖未洞見識陰各類受命之由緒而既見行陰則各類同生之基已見其端矣猶如野馬者喻行陰擾動幽隱微細難見也熠熠者忽起忽滅如閃爍之光也清擾者對前陰重濁顯其輕清對後陰澄湛顯其擾動也為浮根塵究竟樞冗者謂根塵生滅皆從行陰運轉所謂六轉呼為染淨依此行陰未盡之相也蓋想陰如洪波行陰如細浪識陰如無浪之水故此行陰元無實性但以輕清擾動忽起忽滅為性若此擾動性滅反入元澄不動之體則行陰種習盡而復歸識精元明矣故曰如波瀾滅而化為澄水亦是轉識成智此行陰已盡之相也蓋第八識本是如來藏性惟因行陰生滅不停業運恆遷遂成衆生知見渾濁真性故知行陰盡而衆生濁亦能超脫至此返觀行陰之由元從幽隱妄想以為其本由行陰密移曾無覺悟故曰幽隱阿難當知是得正知至是人墜入二無因論冠注此下明行陰中十種邪論也得正知者謂寤寐恆一無復邪慮矣奢摩他中謂圓定發明中凝則不動搖明則不疑惑正則不邪慮如此用心故前十類天魔不得伺其便也蓋意識用事天魔得以窺其心行伺其間隙毀其正定意識既盡則外魔搆副不著窺瞰不得又安能擾亂哉故下十種皆是自心邪解作孽故生異計也方得精研窮生類本者謂想盡魔歇方得加功用行精研窮究十二類生之根本故能於十二類生根元披露者用心觀察也觀彼幽清圓擾動元者正是觀行陰也對前想陰浮淺重濁故顯此行陰是幽深輕清之相對後識陰湛不搖動故顯此行陰為遍圓擾動之元合而言之謂之遍一切法而遷流不息者也後皆倣此然雖觀察到此猶未知藏識中淨染等微細種子故自生異計墜入無因一者是人見本無因至墮落外道惑菩提性冠注此見遷流無常而計斷滅也是人即想陰已盡之人本無因者觀前際無因也生機全破者謂第六意根分段生機全破而行陰披露也由意根全破六用不行故在定中乘眼根功德徹見過去八萬劫中諸類衆生隨業漂流死此生彼灣環不斷此正同生之基也八萬劫前冥然不見妄計冥無所觀處為自然為造化等殊不知自己見解不能超越而以為一切衆生皆從八萬劫前無因自有由此計度則不知生滅種子猶在藏識中亦不能轉藏識成鏡智故曰亡正遍知坐守於此更不前進認此行陰為自然等道亦不能轉生死為涅槃轉煩惱成菩提故白惑菩提性二者是人見末無因至第一外道立無因論冠注見求無因者觀後際無因也何以故下是據本以推末也於生既見其根者謂於十二類生觀其八萬劫前唯是無因自生也知人生人下詳明皆本無因自然而然也故能轉計名為自然外道今盡此形下正推末無因也猶如我觀八萬劫前本來不見有生類從菩提性起云何八萬劫後更有成菩提事此總是見此同生之基遂執為生類之根本而更不知有各命由緒故也若能努力前進使行盡識現便能別見各命由緒豈肯固執於自然乎當知下顯決定執成邪計也舊說本字合是末字謂八萬劫盡終成斷滅無復因果也餘意准前阿難是三摩中諸善男子至第二外道立圓常論冠注此見遷流不息而計遍常也凝明正心等者同前曰圓擾曰圓常者見行陰生滅相續不斷故計常見行陰遍一切法故計圓合而言之謂之圓常擾動故墜入四遍常論也一者下計心境皆常也由彼未見第八識故不達心境二性是第八識見相二分但得想盡行現乘此見解依此修習遂究心境二性從何而起然見量有限窮之不遠唯見二萬劫前無因自有二萬劫外冥無所見遂計一切衆生於二萬劫內生滅不斷故不計劫外無因為斷滅唯計劫內相續為遍常所以異乎前計二者下計四大皆常也此亦行人乘己見解而窮化元見萬法皆從四大和合而成故計四大種性本來常住殊不知唯識心變起其性本空故依此修習以為常住然見量有限故見四萬劫中衆生雖有生滅而體性恆常此亦計劫內所見以為圓常也三者下計八識皆常也六根即指前六識末那即第七識執受即第八識也此由行人乘己見解窮心意意識本元由處性本常恆然雖兼舉六八唯重第七但為八是七之內所依根六是七之外所依根七居其中故兼舉之本元由處二句唯指行陰為其能恆能審故曰性常恆也依此修習能觀八萬劫中一切衆生死此生彼本性常住殊不知此正是生滅根元而第八識中微細流注猶未望見況常住真性乎四者下計想盡為常也想元即想陰也生理即行陰也更無流止運轉者謂想陰既盡行陰不起現行流注種子猶在識陰中行人既不知此但見想心息滅而妄謂生滅永滅則不生不滅之理自然成就豈知生滅根元正在此中特因微細難見故於生滅因中而妄計常住果也此四種皆計細微生滅為圓滿真常總墮邊見外道者也又三摩中諸善男子至第三外道一分常論冠注此雙計常與無常也自即己身他即衆生國土此由行人於同生基中窮究自他生起之因而不知正定中唯了一切事究竟堅固反依生滅根元計常與無常故成四顛倒見也一者下於自他處計常與無常也觀妙明心遍十方界者舉其觀行也然所觀者正是行陰妄謂妙明真心也湛然以為究竟神我者正明起計也亦由不了行陰為生滅根妄謂心性湛然以為神我言神我者即二十五冥諦中末後諦也從是計我等者由彼計有真我周遍十方凝明不動無生無滅故是常一切衆生在我心中自生自死故是無常二者計三災及不及處為常與無常也此由不觀自心獨觀國土自三禪以下三災所及處計為無常自四禪以上三災所不及處計以為常此對依報觀下對正報觀三者下計自己身心為常與無常也以身粗心細故別觀自心精細微密流轉十方而性無改變故以為常能令自身在於心中生死變壞故為無常四者下觀四陰而計常與無常也觀前三陰已滅故計為無常觀此行陰現在遷流無有休息故計為常由此下結成外論此四種雖皆雙計常與無常而唯執常為實有故但曰一分常論也又三摩中諸善男子至第四外道立有邊論冠注此雙計有邊無邊也分位有四謂三際分位見聞分位彼我分位生滅分位也一者下約三際以計有邊無邊也心計生元流用不息者謂觀生類之根元現在遷流無有休息遂計過者已滅來者未至故為有邊計現在相續曾無間斷故為無邊此以行陰分為三際而觀也二者下約見聞以計有邊無邊也謂觀八萬劫內有衆生可見可聞故計為有邊以其限於八萬之數也觀八萬劫外不見有衆生不聞有衆生故計為無邊以其無數量而不可見聞也前計過未無見無聞處為有邊計現在有見有聞處為無邊皆於此相反足知外道回互倒計曾無定見也三者下約彼我以計有邊無邊也此由行人觀己行陰執為真我故復妄計我能周遍了知自謂於諸法中唯我一人得無邊性而彼一切衆生皆現我性之中然我與自己性中曾不見別有彼衆生之知性遂計彼性不能外於我性故不得無邊性但名有邊性也此正是行陰執我豈知平等真如中本來無有人我之性耶四者下約生滅以計有邊無邊也是人窮行陰空而計半生半滅者由此行陰本無根性前依想陰為根後依識陰為根故今想陰既盡識陰將現則此行陰前半分已隨想滅後半分猶同識生是以行人據自己所見妄計衆生身中亦同自己身中一半屬生一半屬滅又見行陰遍於一切遂判世間所有諸法一半生者為有邊一半滅者為無邊也由此下結成外論此雖雙計有無而惟取有邊為勝性故但曰立有邊論又三摩中諸善男子至不死矯亂遍計虗論冠注此計四種矯亂也前計常與無常邊與無邊但為雙計不為矯亂此計亦生亦滅亦有亦無以至亦有即是亦無亦無之中不是亦有一味矯亂尤其顛倒也於知見中生計度者據彼定中所知所見而倒計也以邪倒故於知見中狂解不決遂矯亂其語也一者下以一生滅行陰分觀八義遂計八種矯亂也變化元即行陰也觀前念後念之遷流不息處計以為變易觀前後之相續不斷處計以為恆常於現前所見處計以為生於過未不見處計以為滅以生為滅之因性以滅為生之因性而生生滅滅無間斷處計以為增以正生者不到滅處以正滅者不到生處而生滅之中有所離處計以為減於念念生處計以為有於念念滅處計以為無以理都觀者謂此八義總觀一行陰也用心別見者謂於一行陰中別生八義也由自無定見故逢問義即以矯亂之語而混答之令彼前人義理不明是非莫決反將舊習言教一併遺失而喪其所守矣二者下計無矯亂也諦觀其心即行陰也互互無處者謂念正生時無滅相念正滅時無生相從此證得一切皆無故逢人問義而唯答諸法皆無也三者下計有矯亂也各各有處者謂念生後必有滅相念滅後必有生相從此證得一切皆有故逢人問義而唯答諸法皆有也是即有也四者下計有無矯亂也有無俱見者謂既見其念念生處又見其念念滅處也其境枝故等者謂所觀之境不定能觀之心亦不定故有問者即答云亦有即是亦無以生者必歸於滅也亦無之中不是亦有以滅者不能更生也舊說執拗而不順於理為矯心無主正為亂今詳第一第四言皆兩可亂意為多而終非順理亦兼於矯也第二第三言惟一偏矯義為多而終非主正同歸於亂故總結一切矯亂無容窮詰也由此下結成外論虗無者謂中無實德故出語矯亂也顛倒性者謂見諦不真反失正定也不死者謂出言不一也遍計虗論者謂彼周遍計度而併無實際也又三摩中諸善男子至死後有相心顛倒論冠注此計後際十六有相也無盡流即行陰遷流相也此由見行陰流相無盡故併前已滅三陰皆計死後有相而生顛倒心也此即外道六十二見中四計也自固身者堅執色身也我即第八識見分而第七識執為內我也色即第八識相分而前七識執為外境也皆由行人不知源委故展轉妄執也一云色是我者此計即色是我也二我含國土云我有色者此計我大色小色在我中也三前緣隨我云色屬我者前緣即目前色相也回復即運用也既云屬我顯是我所非即我矣此計離色是我也四我依行中云我在色者行相續相即是色此計色大我小我在色中也色陰既爾三陰亦然以現在生前有相推未也死後亦有相從此下展轉妄計謂既知四陰是常則知一切染淨諸法無不皆然故計煩惱菩提畢竟無盡而恆有也並驅者即並行於世也各不相觸者即各不相礙也意謂凡聖已定決無革凡成聖轉染為淨之理也由此下結成外論通結五陰正在前四人雖在前四義惟行陰耳又三摩中諸善男子至死後無相心顛倒論冠注此計後際八種無相也此由見前三陰已滅無相而因計行陰終歸無相也形如一身色如四大故知形因色有若色滅則形無所因矣想如意識心如意根故知心因想繫若想滅則心無所繫矣色居受前心居受後有受居中則連綴色心是故無受則色與心無復連綴矣前三陰性既已銷散縱有行陰雖是生理而滅前陰何所寄托亦歸斷滅此則據三陰以推行陰決知斷滅也今觀此身現在尚無陰相可得死後豈有陰相耶現在未來皆無有相四陰共成八種無相此亦據生前以推死後決知無相也從此下又據陰相以推至於涅槃因果一切法相皆歸斷滅也由此下結成外論舊說此與上計敵體相反故變有成無蓋上覩未滅之行陰見其無盡而因計前三并萬法皆當無盡此覩已滅之三陰見其無相而因計行陰并萬法皆當無相也又三摩中諸善男子至死後俱非心顛倒論冠注此計八種俱非也於行存中者見行陰未盡也兼受想滅者見三陰已盡也雙計有無者謂於存處計有於滅處計無也自體相破等者以行陰之現有破前三之已無則知無者元係是有故成非無以前三之已無破行陰之現有則知有者終歸於無故成非有由此墜入死後俱非起顛倒論下釋成自體相破也意謂在已滅三陰中觀未滅行陰雖今現存終同三陰滅而非有也在遷流行陰內觀已滅三陰雖則盡無曾同行陰有而非無也如是於生死二處遍窮四陰遂計八俱非相故隨舉一陰皆言死後雙非也又計諸行等者謂不止四陰俱非即此萬法性同遷流交相破奪無不俱非故曰心發通悟也虗實失措者以無亦非無故不可言虗以有亦非有故不可言實也由此計度等者謂以生存例死後皆是非有非無然死後盡未來際杳冥難測故言有亦不得言無亦不得而皆不可言也以未見八識故不達生死根未轉鏡智故不見菩提性徒自揣摩創成外論非顛倒而何又三摩中諸善男子至死後斷滅心顛倒論冠注此計七處斷滅也舊說見行陰念念滅處名後後無由是妄計設生人天七處後皆斷滅也或計身滅等者由此行人唯見幽隱妄想元非實體而生滅循環不出七際離此七際則不見有行陰之性矣殊不知後有識陰猶是行陰之淵脉而行盡識現便不止見此七際而已七際者四洲六欲初禪二禪三禪四禪四空也身滅即欲界人天欲盡即初禪苦盡即二禪極樂即三禪極捨即四禪及無色四空也現前銷滅者謂三陰既滅行陰亦然也七處皆現斷滅則生理永無豈有未來復生之事乎由此下結成外論總結五陰意同前又三摩中諸善男子至五現涅槃心顛倒論冠注此計五現涅槃也後後有者即行陰念念生處蓋觀行陰念念不斷新新成有故計其有為實果而必不至於無也或者不定之辭欲界統言六欲非指一天也為正轉依者由彼觀見欲界同生基故自謂一切生理盡在斯矣遂妄計為轉生死成涅槃矣觀見圓明即前想陰既盡圓定發明猶如天眼遍觀天光清淨明麗逈出人間之穢濁故生愛慕遂計此境為現涅槃也或以初禪者計離生喜樂地為現涅槃也或以二禪者計定生喜樂地為現涅槃也舊說按前文初禪苦惱不逼二禪憂懸不逼以苦重憂輕序之宜也今云初禪無憂二禪無苦疑譯者誤倒耳或以三禪者計離喜妙樂地為現涅槃也極悅隨者所謂歡喜畢具具大隨順也或以四禪者計捨念清淨地為現涅槃也苦樂兩亡世間苦樂所不能動也不受輪回生滅者三災所不及也此皆迷有漏作無為惑生死為涅槃也此由稍離下界之不安妄計五處為安隱稍離下界之穢濁妄計五處為勝淨耳言究竟者謂計此五處皆是極果也由此下結成外論五現涅槃者謂計此五處皆是現在涅槃現受其樂不待來生故也阿難如是十種禪那狂解至作大覺王清淨標指冠注此結害囑護也舊說前云禪那現境乃天魔候得其便此云禪那狂解乃心魔自起深孽凡見道不真多岐妄見皆即狂解是謂心魔最宜深防也用心交互准前故現斯悟即心生狂解也衆生頑迷等者謂彼心性頑癡而不能正悟知見迷惑而易生狂解故不揣己之修證在何地位輒敢自決創為此論且僭稱聖職成大妄語而墮重獄宜也汝等下正囑護也覺了斯義謂了得邪正分明也無令者禁止之辭自起深孽者謂外魔不擾皆自己心魔為孽也孽者禍之萌亦斬而復生之義保持二句即令未起者勿起已起者令息也真義即真諦第一義逈然超出四句百非之外者也于無上道不遭枝岐者謂此十種在無上正道猶如木之旁枝路之岐徑皆非正本也祈大也謂邪心妄大也蓋遭岐妄大即墮外道得少為足亦墮小乘故囑當機為衆生作大覺王之標指令其直趣極果勿使半途而廢也阿難彼善男子修三摩提至顛倒妄想以為其本冠注此欲示識陰本末先明行盡識現之相也諸世間性即十二類生遷流體性也同分生機即同生基也基顯生之處機明動之始沉細綱紐者謂彼幽隱妄想正是生滅之轄也由前疑明正心工夫徹至而生機綱紐深微結根忽然隳裂矣補特迦羅云數取趣指中有身也生機綱紐既已隳裂則三界諸趣酬償宿業之深脉因感而果應者皆縣遠斷絶矣此行盡之相也夫涅槃性天為五陰所覆沉淪生死昏如長夜故知每一陰盡如雞一鳴此由生死既絶而涅槃性天將大明悟如雞後鳴瞻顧性天亦若東方已有精色但有一陰而明未透徹耳然有行執我六根馳逸行盡我空六根虗靜不復馳逸反動入靜深之又深故曰內內湛明內根虗靜外塵不入故曰入無所入根塵既銷機紐亦破則第八藏識從此披露而十二類生受命元由莫不了然豈如行陰不通各命由緒乎樞穴既破則能觀見生命由緒遷流既息亦能執守生類元本同生機盡亦不復召諸類受生矣于是則斷異生性障證遍行真如親見十方依正二報同識現起而初見性天已有精色非同向前昏沉不辨然發露顯現者猶是幽深祕密之識陰瞻彼性天猶若黎明尚未當午此識陰未破之相也既于群類不召受生而于十方又獲其同若更加功行銷磨六門種子使其或合或開任意成就則六根相鄰皆可融通互用而世界身心如吠琉璃內外明徹圓成性淨明體爍盡幽祕業性此識陰已破之相也蓋如來藏本無生滅及受命由緒但為前七識熏成藏識執受一切染淨種子渾濁真性則隨業牽引諸趣受命至此識陰盡而命濁超矣返觀識陰所由元從罔象虗無顛倒妄想以為其本罔象虗無者謂此恍惚不真乃鏡智中光影非真無為體也阿難當知是善男子至背涅槃城生外道種娑毗迦羅此云黃頭外道冥諦者百論云從冥生覺從覺生我知從我知生五唯量從五唯量生五大從五大生十一根神我為主常覺相處中不敗不壞攝受諸法以冥諦為第一諦中間二十三法從冥諦生神我即受用此二十三法者也冠注此下明識陰中十種異計一墮因所因執生外道種也窮諸行空者謂窮盡行陰矣蓋彼行陰生滅幻相元從境風鼓動識海互相生起今行明泯然消歸識海如浪靜水澄故曰于識還元也幽清常擾之相不能復生故曰已滅生滅也識陰未盡尚有所覆故于寂滅真常之精體妙用猶未圓滿然銷磨六門合開成就則能令己身六根開令了無隔礙矣諸類不召已獲其同則亦與十方諸類覺性自然融通矣此則行陰盡而內外如一上與佛性通融下與凡心㳷合即衆生受命元由諸佛成道根本皆不離我藏識之中故曰能入圓元矣下明于此圓元起法執而生外種也蓋此圓元正是識體若于此識為真所歸處而以此處立真常極果永為依止是妄執能依之心妄立所依之境則墮因所因執而與娑毗迦羅所歸冥諦同一類矣因依也迷佛菩提者謂不悟如來藏性則棄所證之極果也亡失知見者謂不轉大圓鏡體則無能證之正智也是名下結成外種也立所得心成所歸果者謂因地不真果招紆曲也違遠圓通者謂於因地心左矣背涅槃城者謂于果地覺失矣由違背因果故生外道種也後皆倣此阿難又善男子窮諸行空至生大慢天我遍圓種冠注此墮能非能執成我遍圓種也窮諸行空下準前若于所歸句仍躡前文前但計識元為所歸處今復覽識元為自性體而謂盡界衆生皆自我體中流出遂執我能生彼而實不能故曰能非能執由作此解正與摩醯首羅同其種類蓋摩醯者即色界頂魔王天妄計我能現起無邊衆生身其實不能也迷佛菩提亡失知見者同前是名下結成異種也能為心者我能為因心也能事果者我能辦果事也謂造因成果悉是我也違遠圓通背涅槃城同前大慢天即摩醯也以執我能生物是不能謂能故為大慢我遍圓種者由計十二類生自我流出自謂我能周遍我能圓滿也蓋謂三界惟心萬法惟識特顯生與無生不實如幻若計心識為能生法界為所生則我法二執堅如鐵石安得圓通無礙耶又善男子窮諸行空至背涅槃城生倒圓種冠注此墮常非常執生倒圓種也若于所歸句躡前舊說此亦以識元為自身所歸依處故自疑身心及一切法皆從彼中流出遂計生起流出之地為真常無生之體此則在生滅中妄計常住既惑真不生性又迷現生滅法且安然沉迷于中永不開悟是以非常為常故名常非常執既作此解即與計自在天能生一切者同類矣是名下結成異種立因依心者謂以識元為所歸依也成妄計果者謂惑生滅法為常住果也此與上執同一識元而所計則異上計識即是我圓生諸物此計我從識出彼圓生我故名倒圓餘意同前又善男子窮諸行空至背涅槃城生倒知種冠注此墮知無知執生倒知種也所知即所觀識元也知遍圓者謂知識圓元遍諸法性也因知立解者謂因知遍圓而生異解也總是見此識陰本有知覺而一切法由識變起遂立異解妄計草木與人曾無異性既無異性即當情與無情更互輪回故曰草木為人人死還成草木也是則有情無情一併知覺無所簡擇若生此解既以有知為無知以無知為有知則與婆吒霰尼二種外道成一類矣是名下結成異種計圓知心成虗謬果者謂此妄計圓知以為因心則果成虗謬矣倒知者謂以無知為有知也蓋情與無情雖則一體須必識得真心方無寸土況藏識未捨異熟未空於此圓元妄生計度則毫𨤲有差遂判霄壤矣又善男子窮諸行空至背涅槃城生顛化種冠注此墮生無生執生倒化種也蓋識盡六銷方得諸根互用今此縱得六銷猶未亡一故于互用中雖未全妙已得隨順而神通變化莫不從心矣便能于圓化生理中觀見四大之相遂計一切法相皆從四大發生故以火之光明水之清淨風之周流地之成就為真常極果于是求樂愛觀甚至尊崇供事以求證果亦以此四大塵相為發生造作之本元遂立此為常司造化之真宰然妄計能生聖果而實不能生故曰生無生執觀塵即觀地大也成就者謂能成世界萬物也群塵總指四大自謂修因證果不離此四大也迦葉波婆羅門即事火等外道謂作此見解正與此等同類也迷心從物者謂背己真心從彼妄物是以非因求因非果冀果反將妄想所結之物為能生能化之主是名顛倒化理此欲出生死反墮生死亦倒見也又善男子窮諸行空至背涅槃城生斷滅種冠注此墮歸無歸執生斷滅種也圓明者謂前陰俱盡諸有皆空唯見識陰而彼不知猶是罔象虗無妄想反計此圓明中虗無之體為究竟地便欲灰身滅土以永滅空為所依處依此歸休不復進取豈知此境亦屬虗幻非實歸處也若此見解是執無歸為實歸則與非非想及四空天之趣空天衆同其類矣是名下結成異種也圓虗無心成空亡果者謂以虗無妄想為因心以斷滅空亡為果覺也非毀也群化指身土言又善男子窮諸行空至背涅槃城生妄延種冠注此墮貪非貪執生妄延種也圓常亦識陰也由彼見前陰盡滅而識體精明湛不搖動遂計此為圓滿常住也又見此識陰能執受其身令身不毀便欲固身常住同于精圓長生不死此如仙家性命雙修形神俱固之意也由彼不知此身猶若浮漚不可貪著而妄生貪著留為常住如此見解正與阿斯陀求長命者同類矣阿斯陀云無比即古仙也是名下結成異種也執著命元者以識陰為執身受命之元也立固妄因者謂此欲固身常住者正是無始業種未盡而反立此為因心也趣長勞果者謂有身必有勞而反求長壽是所趣之果徒益長勞終非極果也妄延者謂彼不知真常而反依妄身以求延長也又善男子窮諸行空至背涅槃城生天魔種冠注此墮真無真執生天魔種也觀命互通者謂由前陰俱盡觀見各命由緒皆與識陰通同則是一切身命咸以識陰為本元一切塵境悉與命元相連屬若識陰盡則彼我之命元內外之根境亦俱盡誰證真常何為樂境故却留塵勞為身命之所依恐其銷盡則雖有身命亦無依托且行盡識現者圓化隨心得大自在故便于此際自化七珍寶媛諸欲樂境于中恣心縱欲以為妙樂此是妄執業識命元為真常淨樂而實非真淨也此等見解則與吒枳迦羅同一類矣是名下結成異種也發邪思因立熾塵果者謂以邪思縱欲為因心以塵勞熾盛為果覺也吒枳即欲頂自在天能化欲境而自娛樂者又善男子窮諸行空至背涅槃城生纏空種冠注此滯定性聲聞名纏空種也於命明中等者謂于此際究明各命元由便知此識陰能含藏有漏無漏種子故于此中分別決擇則以前是有漏種是粗故依之修因即感世間僞果此是無漏種是精故依之修因即感出世真果粗屬集因僞屬苦果精屬道因真屬滅果遂計此為真修實證唯求速出生死早證涅槃殊不知與清淨因心無上妙道已相背矣此不過見苦斷集證滅修道圖出三界而已苦居此寂滅即便休歇於諸菩薩淨心嚴土之行門不生好樂則未登寶所中滯化城耳定性聲聞即不回心鈍阿羅漢也無聞僧即愚法聲聞未得謂得者下結名異種圓精應心成趣寂果者謂滿其精專求應之因心成其偏趣獨寂之空果也為空所縛故曰纏空又善男子窮諸行空至生覺圓明不化圓種冠注此滯定性辟支名不化圓種也銷六入一門門互用故曰圓融根塵不染故曰清淨照徹命元故曰覺明然正是識精元明尚未轉智亦名為識發研深妙者有二獨覺則觀物變化緣覺則觀十二因緣皆謂開發深妙之悟境即以所悟之境立為涅槃歸休之地不復前進亦是化城終非寶所也諸緣獨倫者即緣覺獨覺之同倫也圓覺㳷心成湛明果者謂此緣覺獨覺皆與識精元明通相㳷合而為其因心故方成湛明之滯果非寶覺明心無上菩提之極果也生覺圓明不化圓種者謂覺到識精元明處便執而不化也阿難如是十種禪那至乘此心開得無上道冠注此結害囑護也中塗成狂前八居多未足生足後二居多然此十種無非執迷惑為因依迷惑為果也皆是識陰下同前所愛先習者謂各有無始熏習偏愛種子今于定中仍各發現故中塗成狂未足生足即以欣取休息妄謂究竟極證此皆墮大妄語中也舊說前七是外道第八是邪魔夫魔與外道既由邪因招感邪福曾未斷惑而享其修禪福盡墮獄無疑若後二種雖屬權乘因果已能斷惑取證但無增進亦無墮落矣汝等下正囑護也存心等者謂存自己大悲之心秉如來二利之道將此輔正辨邪之法門廣傳于末世普令衆生皆了邪正分明也凡見理未徹而分別取著皆為見愛魔也有云前七純是見第八是見愛以留塵勞生勝解故至于二乘界內見愛雖盡而界外法愛猶存則厭有著空惟希自利皆屬妄見分別也綏安也邪緣即前妄見緣僞果也銷滅此緣則自然悟入佛知見地中間更無枝岐曲路矣如是下結前起後以顯諸佛共證此道也此法門總指五陰中辨魔證真之法門也言恆沙如來未有不從破五陰除魔孽而能令正智開發以成無上菩提者此當與首卷所謂一切衆生從無始來生死相續乃至終始地位中間永無諸委曲相一節文照應識陰若盡則汝現前至圓滿菩提歸無所得舊說此諸根互用當指初入住位上根利智者從初住位一超直入等覺後心且前文所謂從是凡夫上歷菩薩六十聖位者在圓教中只有二位一斷前通惑從觀行位一超直入初住中間更不取證二斷後別惑從入初住一超直至等覺中間亦不取證非若別教一位必經多劫漸修漸證直至三秪果滿取證菩提此圓頓法門若上上根知此立地成佛二乘知此亦證無餘也冠注此明初發心時便成正覺也意謂到此識陰盡處正是銷六入一之時則汝現在可以一根作諸根用于中不生取捨即是不生不滅因地心從此一超直入果地修證更無枝岐故曰從互用中能入菩薩金剛乾慧獲此觀門則體用周圓寂照不二現前心境涉入圓明于諸塵相毫無雜染從此圓明心中發化始終諸聖地位如淨琉璃內含寶月如是乃能超越四十四心以至等覺後心不過圓明發化如幻三昧耳從此金剛無間道轉入解脫道故曰入于如來妙莊嚴海即所謂大佛頂旨楞嚴王具足萬行十方如來一門超出妙莊嚴路也既然圓滿菩提則總歸無所得矣言菩提者正覺智也無所得者真如理也以智契理本自如如不從外得也此是過去先佛世尊至於大涅槃心不迷悶冠注此明遵古辨魔以便進修也承前云如我上來所說魔事皆是過去諸佛在楞嚴大定中用始覺正智微細觀察毫無差謬者也然成害固由魔孽致魔實因心垢若汝五陰主人一念不起魔境現前亦能諳識任其詐現勝境汝等清心無著自然不落邪見則陰魔天魔大力鬼神魑魅魍魎皆魄褫魂飛而且逃逝無門安能復生為害耶若初心不生邪見中塗不成狂解則直至無上菩提功德法財無不具足若下劣小乘不生滿足極力前進于大涅槃無不曉了豈終滯化城而徒增迷悶哉諳悉也知也褫喪也若諸末世愚鈍衆生至究竟修進最後垂範冠注此轉令呪護也若上根利智者自能與諸聖位辨析魔事若諸末世鈍根衆生既于禪定不能明悟又缺聞慧不知佛法其心好樂修此大定汝欲令彼不落邪見何由護持應當令彼一心專持佛頂心呪若聞性最劣亦不能誦則寫于禪堂或帶身上則一切諸魔自不能擾夫此呪心非但鈍根修行者當讀誦書寫即汝等輩亦當恭敬此之教法亦非我所說乃十方如來究竟修進非化城之止息也最後垂範非不了之權教也可不欽承敬仰哉前五陰禪那固顯說大佛頂此亦密說大佛頂皆尊勝第一義諦不思議之境界也無問自說五陰魔相竟阿難即從座起聞佛示誨至一切衆生作將來眼冠注此當機復陳三問也憶持無失者謂于世尊所示之法不敢纖毫漏落也一問妄想生起意謂世尊平常唯說此五陰當體全空曾未言及何為根本今每破一陰令觀所由皆指妄想以為根本然雖蒙微細開示尚未知此五陰所以皆本于妄想者何也二問滅除頓漸承上云既謂五陰總屬妄想今欲破除為當一時併盡為復次第漸除耶三問五重界限亦承上云若欲斷除須知各陰淺深如是五陰詣何處為何陰之界限耶惟願如來大慈不倦一一詳示不獨令現前大衆心開目朗抑且兼為末世衆生大發明心廣開道眼也佛告阿難精真妙明至五陰本因同是妄想冠注此總明五陰所以皆本于妄想也精真者純真全體也妙明者寂照妙用也本覺圓淨者謂此全體妙用本來彌滿清淨不待修而後成所謂本然自性天真佛也非留死生等者謂此本覺圓淨中纖塵不立一物弗容即根身器界乃至虗空皆非本覺圓淨心中本有之物悉由妄想之所生起故知五陰根本總一妄想耳生死指根身言塵垢指器界言今就斯真妄根元統而言之始由本覺妙明真精一念隨緣轉成妄想是以發生諸器世界本非實有而誤認為實有者正如演若達多迷己本頭反認鏡中影像以為己頭有何異也既從妄生則妄本無因汝等常于妄想生起法中立為因緣性自謂五陰等法皆從因緣生起夫執因緣者已非正覺況迷因緣者稱為自然言五陰等法天然自有殊不知彼虗空性宛若不可壞者猶是幻妄所生尚非實有所謂空生大覺中如海一漚發況因緣生及自然有皆是衆生妄想分別計度生起者豈有實義哉又不特此汝等果能知其妄法所起之由許說妄法從因緣所生若此妄法本無所起之由而謬說妄法從因緣所生者本非實有矣況並因緣而亦不知者復更離因緣而妄推諸法自然所有可謂迷之迷者也是故我今與汝發明五陰本因同是妄想者不過令汝知妄無因依真而起也汝體先因父母想生至名為堅固第一妄想冠注此顯色陰名堅固妄想也色陰雖兼身器而今就父母與己妄想結成故單指一身也意謂我雖為汝發明五陰本因汝猶不知色陰名堅固妄想耶即汝形體先因父母俱動愛染之想而後有赤白二點雖父母想具而汝之中陰不發愛憎之想決不能流愛為種而父母想中亦無納想為胎以續其命也若汝不信身是妄想所成復舉前喻自能了知如我先言心想酢味懸崖而口中水出足心酸起且懸崖不有酢梅未來汝之形體若非妄想不實通同一類則口水足酸何為空談酢崖而妄出乎觀此足知汝之色身誠妄想結成也言堅固者謂父母染心與己憎愛固結一處而成也即此所說臨高想心至名為虗明第二妄想冠注此顯受陰名虗明妄想也躡前想陰以發起受陰者正表色受皆以想為主宰也蓋色攝前五根受攝前五識想即第六識臨高想心等者謂由受陰居于色想之間曾領納懸崖等境落謝影子在想心中故爾復聞懸崖等語則臨高虗想能令汝形真受酸澀故結示云由受陰故生想陰因想陰故動色體也汝若不悟當觀現對違順二境生損益二受而此二受現能驅馳色心不得休息此所以稱受陰為虗明第二妄想也受有三謂苦樂捨損益即苦樂二受也虗能領納明能了別亦無實體故曰虗明妄想由汝念慮使汝色身至名為融通第三妄想冠注此顯想陰名融通妄想也念慮指想陰即意識也謂意識是一身之主宰故前五根識皆聽其所使汝身若非想陰同類何因緣故隨想心而役使耶即汝目前取種種像皆因心生虗想而後諸根方取便知此身與想陰敵體相應須臾不離是故窹則形開而為想寐則神交而為夢則知心隨境變境隨心起皆是想念搖動妄情耳故稱想陰為融通第三妄想也融通謂此虗想而能融通實質也化理不住運運密移至名為幽隱第四妄想冠注此顯行陰名幽隱妄想也化理不住者謂行陰以變化為性而有遷流之相也運運密移者謂念念變遷密密推移令人不覺也甲長髮生即生相也氣銷容皺即滅相也謂此虗妄行陰能生滅實質且日夜相代乎前而曾無一人能覺悟者足見遷移之密也若此行陰非汝體者云何使汝甲長氣銷若此行陰必真汝體云何日夜代遷曾無覺悟蓋此行陰變遷不停是非莫定故所以為幽隱第四妄想也又汝精明湛不搖處至是五受陰五妄想成五受陰亦曰五取陰由一念迷妄受此取此以自蔽藏也是故若以衆生知見執此五陰為實有即世間法若以二乘知見執此五陰為空寂即出世間法若諸佛菩薩達色即是空空即是色乃至受想行識亦復如是即出世間上上法即第一義諦不思議境界然則離此五陰則五乘教法一無所有矣是知迷之則為凡悟之則為聖所謂一切衆生俱有如來智慧德相但因妄想執著而不能證得耳冠注此顯識陰為微細精想也精明即識精元明湛不搖處謂前七既滅則第八識如無浪之水矣名恆常者謂此精明湛寂處雖名恆常者而實非全體真常于汝一身猶未出六根但性中相知耳若實精真圓體則超出六根不容雜染不受妄習矣何因昔年曾覩奇物歷歲既久憶忘俱無而覆覩前物宛然如故蓋最初領納記憶雖由前六熏習而後持種不失則是第八之功能也是故經歷年久再覩前物而宛然不失者皆由第八精了湛不搖中念念受熏也有何籌算謂不思議熏也下喻明非真言此精明湛寂處尚非真常者猶如急流之水望之若恬然寂靜但流急細微故不見流相非實無流相藏識淵深亦復如是夫此藏識雖是如來藏受熏亦因前四妄想熏起若非前後妄想互為根元而此藏識寧受前四妄想之所熏習乎是故非汝六根互用之時根隔合開之際而六妄種習不盡則此妄想無由得滅何則以第八與前六互相為根真則同真妄亦同妄故六解一亡則諸妄想頓成正覺今汝現在六根于八識中念念受熏互相貫串而生滅種習幾微雖見則知精了湛寂中猶是罔象虗無第五顛倒微細精想也罔象虗無者謂真妄合成似實而虗似有而無也顛倒者迷真執似也微細即陀那細識也精想者言識精元明在眼曰見精等也下結答云此之五陰雖有粗細不同然皆五種妄想所成非有實體若能了妄即真則五陰皆空唯一如來藏性矣上答五陰皆名妄想竟汝今欲知因界淺深至湛入合湛歸識邊際舊說識陰中以有入為湛入乃泯行流而沒歸識海經云性入元澄一澄元習如波瀾滅化為澄水是也以無入為合湛經云內內湛明入無所入是也蓋合字有不動之意即流急不見其流也然此合湛境界分劑雖深猶在識境咸不免于最細四相所遷是知盡湛入而不盡合湛未出乎識陰邊際所謂清光照眼猶似迷家而一切明白法身俱未究竟也即如經云非汝六根互用合開此之妄想無時得滅故知必待識陰盡時始獲圓通究竟也冠注此答前五陰詣何為界之問也因即各陰之妄因界即各陰之邊際也淺深者謂五妄想愈前愈淺愈後愈深也非無相空不顯有相色若離色著空則空亦同色未到即色即空究竟無邊故曰唯色與空是色邊際領納曰觸棄捨曰離若離觸不離離則離亦同觸未到離遠離相究竟無邊故曰唯觸及離是受邊際有念曰記無念曰忘若滅諸念而墮于無念則無亦同有未到念而無念無念而念究竟無邊故曰唯記與忘是想邊際念念成有為生相念念歸無為滅相若捨生趣滅則滅亦是生未到生本無生究竟無邊故曰唯滅與生是行邊際反流曰入全一曰合蓋識體本來澄湛因前陰搖動故成渾濁今前不流逸亦皆澄湛更與識體合而為一然有入有合未到一六兩忘究竟無邊故曰湛入合湛歸識邊際此五陰元重疊生起至知有涅槃不戀三界冠注此答前五陰頓除漸斷之問也重疊生起者謂從細至粗次第生起也蓋由真心一念隨緣而轉為藏識因識有行想受而後有色也今若解除當先從色滅次滅受想行而後滅識也生則自內而外從細至粗滅則由外而內從粗至細也然實際理諦元無五陰而此五陰但從一念妄生若能一念不生前後際斷乘此心開而五重妄想一併銷除有何次第耶但事相門頭現有色心故當研真斷惑次第而盡也此等法門我已為汝綰巾示結而結解次第法喻昭然故當因彼知此何乃忽略于彼而再問于此乎汝應下結勸傳示也將此等者言了達五陰根元總是妄想非性實有此教其自利也傳示等者謂令末世衆生皆達五陰虗妄則自然厭此生死是苦知有涅槃是樂而不復留戀三界矣此勸其利他也已上正宗分竟阿難若復有人遍滿十方至施佛因緣得福多不冠注此下流通分也先世尊舉功令較蓋十方虗空本無邊際用顯滿空七寶亦無量也法界微塵本自無盡用顯塵數諸佛亦無盡也持奉承事者謂以盈空七寶承供諸佛也心無虗度者謂于塵數諸佛一無所遺也是人下令其較量福德也阿難答言虗空無盡至是福云何更有邊際冠注此尊者較定無量也虗空下二句以牒前文言財勝也昔有下舉劣以顯勝以七錢施一佛供財福田俱劣而獲輪王勝報況現前虗空既窮言供財勝也佛土充遍言福田勝也皆施珍寶言財田俱勝也窮劫下決其獲福尚不可心思言議況更求其邊際乎佛告阿難諸佛如來至直成菩提無復魔業冠注此以弘法功勝較施財功劣也佛告下先明佛語真實令其諦信也若復有人者設言有此一人也具四重者即淫殺盜妄皆具也十波羅夷即十惡重罪是極惡因也瞬息即經謂臨墮在即也十方阿鼻極惡果也能以一念弘經者謂此將墮之人但暫時發心曾未長久也此法門指全經所詮者不出楞嚴大定圓通深入之法門也末劫所謂後五百歲聖遠魔強之時未學謂初機難進之人是人罪障即上四重十惡之重報應念銷滅者言應弘經之一念皆得銷滅也變其下不但銷惡業且能轉極苦因成極樂果也夫一念微功即能超地獄生樂者良由一切諸法唯心所現得福下又不唯離苦得樂而且所作功德超越前人以盈空七寶供塵數諸佛之功德其超越之數不但一倍二倍蓋百千萬億倍乃至算數不及也若果一明此經能開如來祕藏則功德法財本來周遍福慧莊嚴隨處充滿始信佛無妄語財施最劣也阿難下明無罪之人能持經持呪功德無量也依我教言下意謂誦經持呪方修聞慧其功德已至佛說不盡況復依佛教誨從聞思修入三摩地乃至上求佛果下化衆生則直至如來無上菩提中間無復魔業委曲留難者其功德豈可思議哉佛說此經已比丘比丘尼至皆大歡喜作禮而去冠注此結衆法喜也此當與序分相為始末皆經家所敘也比丘下先舉四衆一切下廣舉聖凡也聖仙童子即居仙趣而聞佛法希獲聖果者也并初發心大力鬼神者是能具五通力洞無畏回心護法而現住如來座下者也皆大歡喜者謂預聞大法則凡邪偏小之心一併掃除而上求下化之志普得饒益故欣慶無比禮謝而歸也楞嚴講録後序夫代佛說法者即此經所云常住真心妙覺明性重宣奧義使人共曉此如來藏在佛不增在凡不減由此明了循持修證之要路也世之稱法師者誰不登壇據座披衣秉拂四衆圍繞六種成就弟子白法拈椎善信俯首拱侍又誰不鼓瀾翻焰口騁無礙辨才如建瓴瀉水峻坂驟駒使人天喜悅龍神悚聽甚至天花亂墜立石點頭誇法侶之殊緣紀道場之勝蹟然或微旨玄言徹法源底而不便於見聞覺知或條分縷折曲證旁稽而反乖於融通渾一或拘文敷衍數墨循行而遂流於支離浮蔓此奉佛也非代佛也此飾法也非說法也此為經解而非以解經也此以解經集衆而非以解經悟衆也其何益之與有柴紫禪師時公者識達重玄智潛無始鎔精性相醰粹宗乘八識規矩集解緣緣因明演釋皆總括淵微擺脫枝蔓而於楞伽楞嚴二經尤為徹骨徹髓明照佛心脉絡法原者也邇因憩錫虞山彚請新塔直以楞嚴普施廣演不過順佛慈旨代宣妙義於本覺妙明掀性海之波濤如來藏中檠見精之寶鑑格諸說撤其籓滙萬派決其流而其言宣朗簡淨圓明直捷如登天衢覩雲霄如秉膏炬破幽暗一時大衆固以傾心歡悅如摸著面門得未曾有詢知如來一大藏教總此真常妙明種種修習各各悟入詎止是經咸顯此心實此心咸具有是經者而時公口吻直與世尊提獎明誨一模脫出顧不偉然為衆會之慶幸耶夫真妄昭融修悟差別在聽法者之根器而先覺覺後自悟悟他大關說法者之總持慧命自古稱普接三根該通五教惟此經貫串諸經時公蓋常證明之顧以貫串是經之說盡攝聽者之心皆返聞而入於妙覺明性令大衆咸知修證密因次第彼室羅筏城祗桓精舍一會儼然未散而虞山之講堂戶牖明暗色空風清月照水流雲駛灼灼皆是真常發現太覺光明則是時公說法誠可以上報佛恩矣嗟嗟聚頭作相飾智驚愚射透牛皮鑽他故紙說鈴畫餅買櫝還珠往往而是設令瞪瞢於是說也其亦可以恍然于時公之一班矣乎若其三摩奢那弘範嚴淨如霜枝猿鶴月岫松風斯又時公之深修密煉在語言文字外者所未易窺測也居士恆吾汪公瞻依實久解入敏決宜乎發大勇猛精進堅請刊布流通其於楞嚴三昧亦有夙因者歟琴川宛然居士張大受薰沐稽首撰
