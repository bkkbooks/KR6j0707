body:
  text: 明柴紫釋乘時講録新安受法弟子汪益源校梓復次阿難云何六入至本非因緣非自然性此見精當指勝義根若指浮塵根則非於根出之根必無下落且浮根已攝入妄身中居中者謂居浮根之中若謂根塵之中即名識不名根此見精亦不同前見精前屬見分此屬相分若局溺見性必屬見分即名眼識不名眼根所謂愚者難分識與根正在此也若謂前許見精離塵有體今言見精離塵無體似自語相違殊不知前指見分中尚未雜色猶切近於真者此單指相分淨色根且前既喻如第二月亦云見見之時見非是見足知雖云有體亦是托見精以指真性非單指見精離塵有體也當深究之勿得草草耳冠注此徵釋六入即如來藏性也先總徵後別釋入即根也謂六根各能吸入所對塵相故以根為塵所入處如來藏即實相真心如者不動之體來者周遍之用藏者此心能具無量功德法財如寶藏庫妙真如性者謂此如來藏于根根塵塵法爾映現如珠映色本體不變法法皆如是生生不息之理也下明眼根即如來藏性也即彼目睛瞪發勞者兼目者勞同是菩提瞪發勞相者瞪直視也勞因目睛久瞪而發故云瞪發勞相前文譬如淨目見睛空瞪以發勞別見狂華是以妄見狂華為目睛瞪發勞相茲謂豈獨見狂華是目之勞相更兼目睛與勞又同是菩提真心上瞪發勞相所謂見與見緣如虗空華也何見其目是真心之勞相為此見性本無自性但因浮根于明暗二種妄塵相對粘湛發見居于浮根之中吸取塵象名為見性其性若非此二塵則不名見性蓋所以名為見性者因二種妄塵而立若離此二塵名尚不成豈有體乎何見其無體為是見體非明暗來非浮根出不生于空若此見體從明來者暗時無明此見即隨明滅應非見暗若能見暗定非從明而來若從暗來者例此可知若此見精從浮根生者獨有浮根必無明暗二塵然此見精離彼塵相本無自性若從空出往前施能見塵歸後亦當見根又空自能見相與汝見根無相關涉若知見體三處皆無即當知汝眼入本無生滅但虗妄稱相其性非因緣非自然本如來藏妙真如性也阿難譬如有人以兩手指至本非因緣非自然性冠注此明耳入即如來藏性也前久瞪其目而妄見空中狂華乃目之勞相今急塞其耳而妄聞頭中作聲乃耳之勞相意謂豈唯聲是耳之勞相更兼耳根與勞又同是菩提真心上瞪發勞相何見其耳是心上之勞相為此聞性元無自性但因浮根與動靜二種妄塵相對粘湛發聽居于浮根之中吸取二種塵相故名聽聞性其性若非此二塵則不名聞性蓋所以名聞性者因二種塵相而立若離彼動靜二塵名尚不成豈有體乎何見其無體為此聞性于妄塵浮根虗空三處皆無若謂見聞性從靜時生則動時無靜而此聞性即當隨靜境而滅既滅則不應聞動若有聲即聞定非靜時所生若謂此聞性從動時生則靜時無動而此聞性即當隨動而滅既滅則不應聞靜若無聲即覺定非動時所生若謂此聞性從浮根生者獨有浮根必無動靜二塵然此聞體離彼二塵本無自性若謂此聞性從空而出是空有能聞之根自成有性即非無知之空又空若有性自能聞聲與汝耳入無相關涉若知此聞性三處俱無即當知此耳入本無生滅但虗妄稱相其性非因緣非自然本如來藏妙真如性也阿難譬如有人急畜其鼻至本非因緣非自然性冠注此明鼻入即如來藏性也畜縮氣也此以久畜其鼻妄聞鼻中冷觸及通塞等同是鼻中之勞相意謂豈獨冷觸等是鼻中之勞相更兼鼻根與勞又同是菩提真心上勞相何見其鼻根是心上之勞相為此聞性元無自性但因浮根與通塞二種妄塵相對粘湛發聞居于浮根之中吸取二塵名嗅聞性其性若非此二塵則不名聞性蓋所以名聞性者依此二塵而立若離彼二塵名尚不成寧有體乎何見其無體夫此聞性于妄塵浮根虗空三處都無何以故若謂此聞性從通來則塞時無通而此聞性應隨通相同滅既滅則應不知塞能知塞應非從通而來若謂此聞性因塞而有則通時無塞而此聞性應隨塞相同滅既滅則不知通云何發明香臭等觸能聞香應非自塞而來若謂此聞性從浮根生者獨有浮根必無通塞二塵然此聞性離彼二塵本無自體若謂此聞性從空而出則此聞性自當在空回嗅汝鼻且空自有聞性與汝聞根了不相關有是理乎若知此聞性三處都無即當知此鼻入本無生滅但虗妄稱相其性非因緣非自然本如來藏妙真如性也通指有香臭言塞指無香臭言非閉塞之塞以上動靜二相例此通塞者其意自明阿難譬如有人以舌䑛吻至本非因緣非自然性冠注此明舌入即如來藏性也此以舌䑛吻䑛之不已其人若病則因䑛而妄有苦味其人無病微有甜觸由熟䑛而有甜苦之妄塵更由甜苦而顯未䑛時淡性常在斯皆舌甜不已瞪發勞相意謂豈唯甜苦淡觸是舌根之勞即此舌根與勞又同是菩提真心上瞪發勞相何則知味之性元無自性但因浮根與二種妄塵相偶粘湛發知居于浮根之中吸此二塵故名知味性其性若非此二塵即不名知味性蓋所以名知味性者依二種塵相而立若離彼甜苦淡二種妄塵名尚不成豈有體乎何見其無體為此知味性于妄塵浮根虗空三處皆無何以故若謂此知性從甜苦味來遇淡味時甜苦已無而此知性應隨甜苦同滅應不知淡若能知淡元非因甜苦來若謂此知性從淡味出遇甜苦時淡味已無而此知性應隨淡味同亡亦復不知甜苦二相若更知其甜苦則非因淡生若此知性從浮根生者獨有舌根必無甜淡及與苦塵然斯知味之根本無自性若此知性從空而出則彼虗空自能知味非必是汝口知又空自知則與汝舌入有何關涉耶若了此知味之性三處咸無即當知此舌入本無生滅但虗妄稱相其性非因緣自然本如來藏妙真如性也阿難譬如有人以一冷手至本非因緣非自然性冠注此明身入即如來藏性也觸乃身根所對之塵而根塵相對必假合離違順而根塵二法始顯然此獨以二手作身根徒以二手上冷熱之勢互相勝負妄成離合違順而作觸塵總顯是虗妄勞相而已故曰譬如有人以一冷手觸于熱手若冷勢多熱者從冷此是冷勢勝熱勢負若熱功勝冷者成熱此是熱勢勝冷勢負下略結斷云如是以此合覺之觸顯于離知涉勢若成因于勞觸者如是以此四字指定上文覺知二字指定身根猶云合身根之觸塵正合時塵亦不能自顯其塵必待離時之知覺方顯合時之塵相下應補二句云離塵之知顯于合觸意始完蓋非合不顯離非離不顯合必因互顯而離合始見非冷不涉熱非熱不涉冷必以勢交涉若勝負互成則違順始見要用前二句建立合離二相用後二句建立違順二相然合離違順固是身根瞪發勞相而身根與勞又同是菩提真心上瞪發勞相何見其身根是心上之勞相為此知覺元無自性但因浮根與離合違順妄塵相偶粘湛發覺居于浮根之中吸此塵相故名知覺性其性若非離合違順則不名知覺性蓋所以名知覺性者依此四相而立若離彼合離違順名尚不成豈有體乎何見其無體為此知覺于合離違順浮根虗空三處都無何以故若此知覺因合時來者離時非合而此知覺應隨合滅云何知離既能知離定非因合而有違順二相例此可知若此知覺從浮根出者獨有浮根必無合離違順四種妄塵則汝身知離此四相元無自性若此知覺必出于空則空自知覺與汝身入何相關涉耶若了此知覺三處俱無即當知此身入本無生滅俱虗妄稱相其性非因緣非自然本如來藏妙真如性也阿難譬如有人勞倦則眠至本非因緣非自然性冠注此明意入即如來藏性也蓋意入無形但以末那識為根相以生滅二法為塵相是根即執我第七意境即過去前五塵且眠𥧌時第六識不起亦不見有意知根世尊先藉睡窹憶忘等建立其意知根使人易曉也故曰譬如有人意下勞倦則眠正眠時意知根尚未顯然及至睡熟便窹時妄念初起然起不孤起必覽過去五塵相依而起且與斯所覽之塵未必條條有序故得之為憶失之為忘憶忘循環之間未免顛倒錯亂則一剎那間漸覺醒然則于一念中見其初憶若生正憶若住將忘若異忘盡若滅而吸引過去塵相同歸斯生住異滅之中而剎那剎那四相前後不相踰越者乃意知根之相狀也意謂眠窹憶忘固是意入之瞪發勞相然意人與勞又同是菩提真心上之瞪發勞相何見其意入是真心之勞相為此覺知性本自無性但因意知根與生滅二種妄塵相依而粘湛集知居于意根之中吸引撮取其過去五塵名為內塵雖吸內塵亦不與前五根同境蓋前五根緣現前境謂之順流若反緣內塵則謂之逆流且縱反緣亦不及其內塵故但以前五根逆流不及處名覺知性其性若非窹𥧌生滅二種妄塵則不名覺知性蓋所以名覺知性者依二種塵相而立若離彼窹𥧌生滅二塵名尚不成安有其體何見其無體為是覺知性于窹𥧌生滅意根虗空三處俱無何以故若謂此覺知性從窹時來𥧌時非窹即應隨窹滅却其昏然而𥧌者將為誰耶既為窹為𥧌者皆覺知性則非從窹𥧌中來若謂此覺知性必從生時有正滅時非生即應隨生已滅而受滅者誰乎若謂從滅時有正生時非滅即應隨滅已無而知生者又誰乎若謂此覺知性從意知根出殊不知彼意知根亦自無體但因窹𥧌二相現起然窹𥧌亦自無相但隨身形開而名窹隨身形合而名𥧌夫離此窹𥧌二體則意根尚無何況從意根所出之覺知性則同空華畢竟無性矣若謂此覺知性從空生者自是空之知覺與汝意入有何關涉耶是故下結意同前勞倦指意言非指身勞也意知根指如幽室見者與前五浮根並列文中不于根出及若從根出之根皆指前意知根也覺知性亦與前見性聞性等並列前五皆言發見等此獨言集知者謂前五根約相分現行位中言此雖同相分尚近種子位中有粗細之別耳上明六入竟下明十二處即如來藏性也十二六根六塵也處根塵之所在也此獨破六根而不言根但言塵所入處下雖根塵互辨正破在塵亦不言根塵但言根塵之處所即如後文雖根塵識三更互而辨正破在識亦不言識但言識之界限蓋謂根塵識法雖名十八本一圓妙寶覺明性但由凡愚用攀緣心妄生分別定執根在內塵在外識生根塵之中故今但破彼方向處所及與疆界使塵無所入之處根無所緣之處識無分界之處推倒墻塹打成一片則根塵識法無所隔越自得融歸一真法性矣所以不破其法唯破其法之處與疆場也復次阿難云何十二處至本非因緣非自然性冠注此下明十二處即如來藏性也先總徵後別釋雖根塵互破正意在塵但為勢若交蘆相倚而立須更互辨破故世尊先舉根塵二處審究阿難曰汝且觀祗陀林及諸泉池能觀者是見處所觀者是色處汝作云何解為是外色生汝眼中之見而始有能見之處耶抑亦是汝眼中之見生外色相而始有所見之處耶若謂是汝眼根生外色相而始有所見之處者色性屬眼則汝眼根但見空時非有色相而此色性自應同相銷亡色性既銷色相亦無縱有汝見亦無顯發若謂空能顯見殊不知空假色顯色相既無假何物以顯空質非空又不能顯色空色俱無眼根亦無所寄則一切都無蓋計眼生色相者謬矣若謂是外色生汝眼見而始有能見之處者見性屬色則汝觀空之時但見虗空非有色相而此見性即應同色銷亡見性既亡縱有空色若無眼根更假誰者而見之乎蓋計色生眼見者亦謬矣下結歸真性曰是故當知見與色空俱無處所既無處所即色與見本無生滅然此二處虗妄稱相其性非因緣非自然本如來藏妙真如性也阿難汝更聽此祗陀園中至本非因緣非自然性冠注此明聲塵即如來藏性也蓋雖破聲處亦兼耳處更互辨破故審定阿難曰汝更聽此祗陀園中食辨衆集而鼓鐘之聲前後相續汝作云何解是聲赴耳邊來耳往聲處去若謂此鼓鐘之聲來於耳邊如我之身既去室羅筏城乞食而祗陀林中則無有我以我一人不能並赴兩處則知彼一聲必不能遍至衆耳此聲必來阿難耳處目連迦葉應不俱聞何況千二百人一聞其聲齊來食處可見計聲往耳邊者妄矣若謂汝之耳根往彼聲邊去亦以我之身例汝耳根既往擊鼓之處如我歸住祗陀林中鐘聲齊出應不俱聞如室羅城裡則無有我何況象馬等種種音響一齊俱聞可見計耳往聲處者妄矣若耳根聲塵各無來往則應無聞云何有聲皆聞可見計無來往者亦妄矣下結歸真性曰是故當知聽與音聲俱無處所既無處所即聽與聲本無生滅去來然此二處虗妄稱相其性非因緣非自然本如來藏妙真如性也阿難汝又嗅此爐中旃檀至本非因緣非自然性冠注此明香塵即如來藏性也夫欲辨香塵無有出處先指異香以審實阿難曰汝又嗅此爐中旃檀此香若然一銖四十里內同時聞氣汝意云何解此香為從木生鼻生空生耶若謂此香生於汝鼻稱鼻所生當從鼻出汝之鼻根非旃檀木云何鼻中有此香氣且稱鼻聞香當說香自鼻入方謂之聞若謂鼻中出香而說為聞者甚不合義可見計香生於鼻者謬矣若謂此香生於空者能生空性既為恆常則所生香氣亦應常存何藉罏中爇此枯木而後有香耶可見計香生於空者謬矣若謂此香必生於木則此香質因爇成烟使鼻得聞若此鼻聞香合應蒙彼烟氣可說香生於木然其烟騰空曾未及遠四十里內云何已聞可見計香從木生者亦謬矣下結歸真性曰是故當知香鼻與聞俱無處所既無定處即嗅與香本無生滅此二處者但虗妄稱相其性非因緣非自然本如來藏妙真如性也若據法相宗則鼻乃合中取境今云未蒙烟氣已得聞香又為離中之知即此觀之足見佛菩薩說法曾無定相特隨時設教對病發藥若執彼濫此而強此合彼不惟紊亂教源亦且不識時務凡習內典者徒眩辭華而不究實際可乎阿難汝常二時衆中持鉢至本非因緣非自然性冠注此明味塵即如來藏性也蓋欲辨味塵無有定在即就持鉢受食時以詳審阿難故曰汝常二時於衆中持鉢汝舌或遇酥酪醍醐名為上味汝意作云何解此味為復生於空生於舌生於食耶若謂此味生於汝舌汝口秪有一舌只當所生一味其舌既成酥味亦應如酥無有變移若更遇黑石蜜應不推移而亦不知為蜜矣若不變移而獨知酥味則又不名知味豈有舌根而不名知味者哉若謂舌根能變移而知多味者其味亦從舌生則舌須多體云何多味而生於一舌之知乎可見計味生於舌者非也若謂此味獨生於食者味亦不成何則必假能知者方成味性若無舌根食非有識云何得知為甘為苦耶縱爾食能自知其味即同他人知味無干於汝豈復稱汝舌根為嘗味之知乎則計味生於食者又非也若謂此味生於空者汝噉虗空當作何等滋味耶其空必作鹹味既鹹汝舌亦鹹汝面則此界人均同鹹海中魚既常受鹹定不知淡若不識淡亦不覺鹹於此二者必無所知云何名為知味者若無能知味亦不有下結歸真性曰是故當知味舌與嘗俱無處所既無處所即嘗與味本無生滅但於二處虗妄稱相其性非因緣非自然本如來藏妙真如性也黑石蜜舊說即砂糖也阿難汝常晨朝以手摩頭至本非因緣非自然性蓋欲釋斯文當先將能所二字與無知有知等辨得分明判然無惑而後方識其意若就觸一邊說要以塵為能觸根為所觸若就知一邊說要以根為能知塵為所知故名能觸者定屬無知名所觸者定屬有知然所觸者即是能知而能觸者即是所知故云此摩所知誰為能觸若缺一者兩俱不成所謂單根不立獨境不生故各各有已上獨有能觸之塵固不成觸各各有以下單有所觸之根亦不成觸故曰不應虗空與汝成觸一觸所生者反上兩觸也猶云吾手與頭但要成一觸體即知也在有也非無也在能非所指能知所知在所非能指所觸能觸也冠注此明觸塵即如來藏性也凡觸必以根境能所有知無知合離違順相感而後成此獨以一身明觸正顯萬法一體本無能所合離特情塵隔越而妄見有也故世尊審定阿難曰我尋常戒敕弟子一日三度摩頭汝既依法行持而常於晨朝以手摩頭當此摩時則所知者應名能觸汝將誰為能觸其能觸者為在手乎為在頭乎若謂能觸者在手是以手為無知之塵然手與頭惟汝一身既以手作無知則頭亦應無知矣然則獨有能觸之塵尚無所觸之根云何成觸耶若謂能觸者在頭亦是以頭為無知之塵然頭與手惟汝一身既將頭作無知則手亦應無用矣亦獨有能觸之塵必無所觸之根斯總是獨境不生云何成觸耶或轉計曰以手觸頭則手可為能觸頭可為所觸豈非手無知而頭有知乎以頭觸手則頭可為能觸手亦可為所觸豈非頭無知而手有知乎奚所不成耶故斥之曰若汝頭手各各有知又各各無知既有一知即成一身有一無知即為一塵則汝阿難應有二身應成兩觸或反救前失曰雖各各有其頭與手惟成一觸故復斥之曰若頭與手一觸所生則手與頭當為一體若一體者惟有一知是單有所觸之根必無能觸之塵或轉救其失曰還是二體故更斥之曰若二體者縱有二知誰為能觸之塵今在何處蓋即此二知但在能知之根處非在所知之塵處但在所觸之根處非在能觸之塵處總是單根不立云何成觸不應將虗空作能觸之塵與汝身根而成其觸空又非身家之塵也可見到底無觸塵之處塵既無則根亦不有是故下結歸真性同前阿難汝常意中所緣善惡至本非因緣非自然性冠注此明法塵即如來藏性也法塵即前五塵卸落影像分為意根所緣之塵相其根塵必待因依而起故審究阿難曰汝尋常於意根中所緣之塵不是善定是惡若不記別善惡定是無記性夫善惡淨染法也無記昏住法也乃生成之軌則除此三性無法塵可得矣如此法塵為復即汝意根所生為當離意根外別有方向處所耶若謂此法塵即意根者此法則非屬塵既不屬塵必非意根所緣云何名為心緣之處耶若謂此法塵離於意根別有方向所在者其法塵自性果有知覺乎果無知覺乎若果有知則當名心不當名塵豈獨不名塵而已哉若離心別有方所斯塵反異於汝又屬有知則非法塵似非法之意根亦非汝之法塵乃同他人之心量與汝何干若必執言雖別有方所縱非是塵必非他入心量即是汝即是汝之心者云何汝心不與汝合而為一反更與汝離而為二乎有是理哉可見計法塵離意根而有知者妄矣若謂此法塵乃離心而無知者世間無知之物盡屬前五塵而前五塵各對前五根矣此塵既離五塵及虗空外當在何處今於色空都無表示不應人間更有空外而為法塵所止之處乎法塵既無處所則意根亦非所緣根既無所緣之處復從何物而立根之名乎是故下結歸真性準前心皆指意根二者不一也說有兩心者不可從也此下明十八界即如來藏性十八者謂六根六塵六識合成十八數也界者界限也意謂根塵識者唯一真性但由妄生分別故立界限而以能緣者名根之界以所緣者名塵之界以根塵之中能了別者名識之界下正破在識而言及十八界者以為識界若成根塵互顯識界不成根塵互寂所以不破其識但破其界蓋彊界無分則識與根塵不待合而渾一真性矣復次阿難云何十八界至本非因緣非自然性冠注此明六識即如來藏性也先總徵後別釋欲破識界先就其素所解者詰辨阿難曰如汝尋常所明眼根與色為緣而識生其中此識為復因眼所生耶以眼為識之界耶因色所生耶以色為識之界耶若謂此識因眼所生者是單根能生其識然識以了別為性既無色空單有眼根縱生汝識欲將何用可見計眼能生識者妄矣若謂以見根為識之界限汝見又非青黃等色本不可見既無色相可以表示縱有汝識從何物而立識之界耶可見計識界從眼立者妄矣若謂此識因色塵所生者是獨境能生其識然識以了別為性若此識了空無色時是能生之色既滅所生汝識亦應同滅既隨色滅云何識知是空性而非色性耶既識空非色性則色滅而識未嘗滅可見計色能生識者妄矣若謂以色為識之界限者必識與色永不相離可也若色變時汝識亦了其色相遷變則是色遷而識不遷識縱獨在無復對待汝識之界從何法而分立乎或反救前失曰若色變時識亦從色變去自可與色立界故破之曰若從變則識之界相自無誰從色而立界耶若雙計曰色與識俱不變則識之界可從色立殊不知雖俱不變則二體恆在此識既從色生則同無知應不識知虗空所在若不知空處亦不知色處而識之界又從何立可見計識界從色立者妄矣若謂單根獨境不能生識必兼眼色二種方能共生者為是眼色合著生耶離開生耶若謂眼色合為一處其間已無空隙縱有所生之識即當離於中位而識之界相自無若謂眼色離在兩處則縱有所生之識亦當分在兩邊半與眼合半與色合而識之體性雜亂云何成識之界耶兩合則雜亂中離則無位若識界本無則眼與色亦無處所故總結云是故當知汝謂眼色為緣生眼識者三處都無界限然則眼色及與了色之識三處既無界限則知虗妄稱相其性本非因緣非自然乃如來藏妙真如性也阿難又汝所明耳聲為緣至本非因緣非自然性冠注此明耳識即如來藏性也但就其素所明者詰辨阿難曰又汝尋常所明耳根與聲塵為緣而識生其中此識為因耳根所生耶以耳根為識之界限耶因聲塵所生耶以聲塵為識之界限耶若謂此識因耳所生者是單以根為能生殊不知動靜二塵既不現前即勝義根不得成知然則必無所知之塵而能知之根亦無況更謂根能生識而識之形貌從何有耶根識俱無則計聞根生識以聞根為界者皆妄矣若必執言勝義根無形故不可為識之界浮根有形豈不可乎故牒上文云若取耳中聞性既無二塵即此聞性亦無所成云何更取浮根為識之界限豈知浮根雖為耳形雜於身根之色相根既屬身境即觸塵定非聲塵依斯立界名為身識界矣則耳識之界復從誰立耶是計浮根為識界者非也若謂此識生於聲塵者是獨因聲有則與聞根無干豈知無聞根則聲相亦亡能生之聲既無則計識從聲所生者非也若謂識以聲為界者縱許識從聲生更許因聞根而有聲相則根聞聲時應併識而俱聞若不聞識則識與聲尚未分界猶一聲塵而已何識之有若謂聞聲時果聞其識則識亦同聲反成外境識既在外已被耳聞而能知聞識者又是誰耶豈一體而有兩知乎若謂更無有知而知聞識者則汝之身終如草木何以故止有一知已成外境故蓋若知聞識當有二知不知聞識一知也無有是理乎然則計識界從聲立者妄矣既單根不生獨境不出不應聲塵與聞根兩相夾雜而成中界蓋既為夾雜則中位無矣必有中位方分內外今無中界則內外二相復從何界而成乎下結歸云是故當知汝謂耳聲為緣生耳識者三處都無界限即此可知根塵識三皆幻妄稱相其性非因緣非自然本如來藏妙真如性也阿難又汝所明鼻香為緣至本非因緣非自然性冠注此明鼻識即如來藏性也意謂根塵為緣而識生其中則阿難明之久矣故詰之曰此鼻識為復因鼻根所生耶以鼻為識之界耶因香塵所生耶以香塵為識之界耶若謂此識因鼻根生者則汝以何為鼻根為取肉形浮根如雙瓜之相為鼻耶取嗅知勝義根動搖之性為鼻耶若取肉形則肉質乃屬身根非鼻根也能生之根尚無所生之識何有則計浮根生識者非也若謂浮根為識之界限即能知者即身非鼻則所知者即觸非香根既名身必非鼻根塵既名觸即是身塵鼻尚無名云何以鼻為識之界耶計浮根為識之界者非也若取嗅知之性為鼻根者又汝以何為知若以肉形為知則肉之所知元係觸塵所知屬觸非香則能知屬身非鼻若以鼻中之空為知者則空自知肉應無覺然則空應是汝之知汝身非汝之知今日阿難應無所在然則嗅知尚無從何物而生識耶或轉計曰勿論肉知及與空知現能知香豈非知乎斯是以香為知而知自屬香於汝何干或反救前失曰非以香為知但香因知顯若非嗅知則香何所有斯又是香因知生若香臭二氣必生汝鼻則香臭自不生於伊蘭及旃檀木二物不來汝自嗅鼻香耶臭耶若鼻是臭自不能聞臭若鼻是香自不能聞香豈有鼻根而不知香臭乎若鼻能知香臭而二氣又了別之識當於甘蔗等五味都無時汝自嘗舌為甜耶苦耶若謂舌性是苦則汝舌根已成苦味誰來嘗舌若舌不能自嘗又孰為知覺而謂舌成苦味耶既無知覺則舌根尚無計根能生識者不亦謬乎若謂舌性非苦則味自不生於舌既無味塵則舌根亦無云何以根立界乎計識界從舌根立者妄矣若謂此識獨因味生則是不假舌根而味塵中自生了別之識然既因味生識自為味則不能嘗味同於舌根不自嘗舌既不能嘗云何識其是味非味耶不特此也能生之味既有多種所生之識亦應多體若謂識體是一又必因多味而生則是衆味共生一識然則今將五味調和同為一味則此舌識應無分別何以故識體元具衆味鹹識不知鹹味以至辛識不知辛味故分別既無則不名識識既無名是何物而因味生耶豈但味塵不能生識既無識名云何復名舌根及與味塵耶既無根塵則識界又從何物而分立耶不應虗空生汝識心而與識分其界限乎豈唯單根獨境各不能生各不成界即舌味和合亦不能生何則根境雖二既合為一則二性元無豈有空隙以容識生其中而復以根塵立界乎下結歸云是故當知汝謂舌味為緣生舌識者三處皆無界限則知舌味乃與舌識皆幻妄稱相其性非因緣非自然本如來藏妙真如性也舊說和合者衆味共成也俱生者本性不易也變異者炮炙異味也阿難又汝所明身觸為緣至本非因緣非自然性冠注此明身識即如來藏性也意謂身觸為緣生於身識乃阿難所稔明者故就其明處而詰之曰此識為復因身根所生耶以身根為識之界限耶因觸塵所生耶以觸塵為識之界限耶若謂此識因身生者是單有汝身必無合離二種觸塵則雖有能覺觀之身根無所覺觀之境緣縱生身識所識何物耶計根能生識者非也若謂此識因觸生者是獨有塵必無汝身雖有合離二種觸塵使誰知之豈有無身而能知離合者乎計觸能生識者非也若謂此識以根塵為界限殊不知根塵自無界限何則徒物不知觸必待身知而後成觸徒身不能知必待有觸而後成知然則知有身者是知即因觸而知非身自知也知有觸者是觸即因身而觸非觸自觸也既知身即觸則身非有在矣既知觸即身則觸非有在矣蓋身觸二相元無處所識之界限從何物而立耶不惟單根獨境不能生識不得與識為界縱根境相合亦復如是若觸合於身即為身自體性而更不見有塵則外境不成若身離於觸即是虗空等相而更不見有知則內根不成既內外不成中云何立是無根塵併識亦無中不復立內外性空是無識體根塵併銷三皆無體界自何分可見計根塵共生識者妄矣下結歸云是故當知汝謂身觸為緣生身識者三無界限則知身觸及身之識皆幻妄稱相其性非因緣非自然本如來藏妙真如性也阿難又汝所明意法為緣至本非因緣非自然性夫世尊說法不離真俗二諦自五陰至十八界完所重在破因緣自然以明世間諸法咸若空華泡影惟顯真諦如來藏後七大完所重在破和合非和合以明世間諸法不動毫許一一皆如惟顯俗諦如來藏乃至後文離即離非是即非即復顯即真即俗非真非俗以至事事無礙蓋真則總歸一性俗則遍周法界由一性故攝事歸理由周遍故以理融事理事圓通真俗不二則心外無境境外無心觸境興心無非妙性矣豈離根塵而別有如來藏耶斯三科七大真俗渾融之大旨乎冠注此明意識即如來藏性也但就阿難所明者詰之曰此意識者為復因意根所生耶以意根為識之界限耶因法塵所生耶以法塵為識之界耶若謂此識因意根生者於汝意根之中必有所思之法塵而後發明能思之意根無前所思之法塵則意根亦無所生矣既離所緣之法塵則意根尚無形貌可得即使有識亦將何用計意根生識者不亦謬乎若以意根為識之界限者又汝所謂識心者但能了別所謂意根者因以末那為根故能思量亦能了別若謂識心與意根兼以了別為自性而更分能生所生者果為同乎果為異乎若識心同於意根則識心即意根何得云意為能生識為所生若識心異於意根則識乃無知應無所識若無所識即非同類何得云意根之所生若有所識既無法塵所識何物秪應反識乎意根而為識意有是理乎同性不成異性不成識非意生固無疑焉而謂以意為識之界者亦非也若謂此識因法塵生者世間諸法不離五塵此外更無一法可得現今五塵各有相狀歷歷分明以對五根皆非意根所攝若謂汝之意識決定獨依法塵所生於根無干今汝諦觀法塵之狀是何形狀其狀若似色即名色塵不名法塵以至若似觸即名觸塵不名法塵若皆不似則離此色空乃至生滅諸相外無形狀可得或執言此中生滅即是法塵豈非形狀乎殊不知生則是色空諸法之影相生滅則是色空諸法之影相滅離五塵外別無生滅可得所因之法塵自無實狀則因法塵而所生之識復作何狀識之相狀自無何得云因法所生以法立界耶下結歸云是故當知汝謂意法為緣生意識者三無界限則知意法及於意識本無生滅但幻妄稱相其性非因緣非自然本如來藏妙真如性也但以相狀下二句破界限亦無合辨之文正顯意根法塵幻妄極矣又非前五根塵體實相分境可例也阿難白佛言世尊如來常說至中道了義無戲論法此是阿難執世間幻相是因緣和合惟妙覺性非因緣和合認為兩端不達性相不二之旨故世尊將明七大先示性相非和合非不和合義蓋謂和合則性同生滅謂不和合則性相為二所以和與不和而俱非者由其性猶水也相猶氷也如水成氷還成水而已矣冠注此執權濫實復興和合因緣之問也阿難意謂世尊前說精覺妙明非因緣自然和合不和合亦說幻妄稱相及和合妄生和合妄死是言精妙覺明之真性本非和合因緣及與自然陰界入處之幻相定屬因緣和合矣且如來平常所說皆和合因緣義如云一切世間種種變化相皆因四大和合發明豈非言陰界入等皆因緣和合而出現於世耶若彼自然可擯之曰非正教也此因緣和合乃昔日所說之正法云何如來將因緣自然二俱排擯耶斯排擯之義趣歸屬我竟不知前蒙如來開示我等說因緣和合乃世間戲論之名相非第一義諦之真性然則世間名相與第一義諦似各屬一邊殊非中道未出戲論終不了義惟垂哀愍開示衆生中道了義無戲論法也爾時世尊告阿難言至阿難默然承佛聖旨冠注此責阿難迷吝而許示教也言汝先因魔力所制故厭離昔日所聞諸小乘法發心勤求無上菩提是以我今為汝開示第一義諦所以排擯因緣和合者正令汝等捐棄小乘戲論而取中道了義也汝等何故復將世間戲論妄想因緣而自纏繞今觀汝等雖稱多聞徒能厭離不能放捨徒能勤求不能識取譬諸世人徒能說藥其實未識藥性及將真藥示現於前不唯不能分辨真實而且反生凝棄豈不深可憐愍哉蓋汝所問之中道了義無戲論法即大乘實相非小乘權法也然斯實相亦不離四大等諸變化相但迷之終為變幻悟之始證真實故非言詮所及非分別所知唯證相應特因汝等執吝權法吾當為汝方便開導指示於汝然不唯為汝等輩亦令當來修大乘者通達實相阿難默然承受聖旨實相即三如來藏之通號故前云清淨實相此云通達實相者由其遍通三諦故也阿難如汝所言四大和合至如水成氷氷還成水此當以虗空喻明諸大之性火輪喻明諸大之相復以水氷合明性相一體猶如虗空不和諸色者是反言以例上文猶云若說彼大性體不與諸大之相雜和猶如說虗空不與諸色雜和相似有是理乎當知空性與色相有非和合非不和合二義非和合即不變義非不和合即隨緣義不但虗空能具此二義自山河大地以至一色一香皆具此二義有一物不具此二義則心外有剩法真性不周遍矣若以虗空獨喻非和合一義則空性翻成隔礙若不知空性隨處充滿請觀世尊將明七大之大旨首舉虗空為喻向後每大文中皆拈此空互相例明亦將空大安置地水火風之後見識二大之前亦假鑿井以顯堅凝相中空性充滿豈非和合但見出土未見空出豈是和合地大如是其餘不待言矣且曰汝等若不悟彼六大元如來藏性圓滿周遍本不動搖當知無邊不動虗空等觀此足知世尊明以虗空喻如諸大之性且如水成氷氷還成水性色真空性空真色以至性覺真空性空真覺等皆與般若中色即是空空即是色同旨但變其文耳不特此也即云如旋火輪者雖喻幻相真亦在焉喻中唯棒頭一星之火曾未動搖亦無圓輪之相乃兒童手力回旋故妄見輪相其手一歇輪相無矣法中唯一真性曾未輪回亦無諸趣之相乃惑業招感妄見諸趣惑業一盡諸趣自無矣冠注此總明七大之綱領也先牒定阿難前言汝謂世間種種變化之相定屬四大和合發明唯妙覺性非因緣和合者豈知性相不二乎蓋此妙覺性未嘗離彼諸大性但性若太虗空相若旋火輪阿難若謂彼大性體非和合者則不能與諸大之相雜和猶如人謂虗空不和諸色殊不知空性色相本非和合非不和合若言空色非和合者當如兩物並敵各不相容現今色中有空空中有色豈非和合耶若言空色是和合者色相滅時空性隨滅今但色滅空未嘗滅豈是和合耶當知大性亦復如是若謂非和合者固非隨緣現相若謂和合者又非不變真性即當同於諸變化相自始成終從終復始有始終之處從生而至於滅滅而復繼以生有相續之跡以至從生至死以死續生及生而復生死而復死如旋火輪豈有休息之時乎彼諸大性前本無始後何有終從來無生今何有滅本無動搖從何休息凡有始終以至生死者皆幻妄稱相故如火輪然斯性相元非二體性猶水也相猶氷也真性隨無明緣幻成萬相如水凝陰氣而成氷幻相隨根本智融歸一性如氷乘陽氣還成水而水氷本非二物於凝結時妄計和合於銷融時妄計非和合於斯一物妄生分別者不達色即空空即是色故也汝觀地性粗為大地至但有言說都無實義冠注此明地大即如來藏性也意謂汝等不達地性非和合非不和合當以昔日所聞析色明空反覆觀之自可知矣汝觀地大之性粗為大地細為微塵若自微塵漸析漸細以至鄰虗者乃由微塵析至極微雖云極微猶有色邊際相更析此相以作七分則極微殆盡故名鄰虗若更析鄰虗即實空性而非地性矣阿難汝云和合者若此鄰虗析成空已當知虗空仍能出生色相始可名為真和合相汝今問言由和合故出生世間諸變化相者汝且觀此一箇鄰虗塵是用幾個空虗和合而有者不應以鄰虗還合成鄰虗必應以虗空合成鄰虗方可名和合虗空而成色相若不能和合空而成色則知非和合四大之性而成四大之相明矣或曰空雖不能合成鄰虗鄰虗乃能析入虗空豈非合色而成空乎故奪破之曰又鄰虗析入空者但名柝色成空不名合色成空必用幾個色相合成一個虗空方可名和合色相而成虗空若不能和合色而成空則非和合四大之相而成四大之性明矣故申明正義曰若色合時元是合色安能合色而成空若空合時元是合空安能合空而成色若色猶可析入虗空空云何合成色相然汝但知不能合空成色不能合色成空非合性而成相非合相而成性汝元不知如來藏中性色真空性空真色清淨本然周遍法界夫性色者性相不二也若達色相即真性是即色即空故為真空而非頑空矣真空即真性是即空即色故為真色而非妄色矣所謂色即是空空即是色如水成氷氷還成水故雖真性不變而能隨緣現相雖隨緣現相而真妄渾融故曰清淨雖曰清淨亦不離一法即萬法而本具故曰本然雖曰本然亦非局礙乃周匝遍滿無處不有故曰周遍亦不即一法亦不離一法故曰法界由其性體圓融故相用無限是以九法界衆生心有優劣量有大小業有淨染莫不各循本業以發現其依正二報隨分受用寧有限量乎世間無知不達循業發現者惑為因緣及自然性皆是衆生意識分別計度豈知不變隨緣體空成事之至理乎故曰但有言說都無實義阿難火性無我寄於諸緣至但有言說都無實義陽燧者崔豹古今注云以銅為之如鏡之狀照物則影倒向日則火出淮南子曰陽燧火方諸也論衡曰於五月丙午日午時銷鍊五方石圓如鏡中央窪是也婆羅門解見前優樓頻螺此云木瓜𤸇迦葉波此云大龜氏瞿曇此云日種冠注此明火大即如來藏性也言火性本無定體但寓物以成體汝觀城中之人欲炊㸑時手執陽燧日前求火而有火出若謂火性由和合而有者即如現前一千二百五十比丘和合一處雖為和合一衆詰其根本各有身名族姓如舍利弗乃婆羅門之種姓優樓頻螺乃迦葉波之種姓乃至阿難亦瞿曇之種姓即此分開各有身名族姓和合總名一衆雖真和合而各歸其根本則和合之名猶然幻妄若謂此火性因和合有者彼手執鏡及艾對日求火而有火生若詰其根本則此火性為從鏡出乎為從艾與日出乎若謂火性必從日來者自能燒汝手中之艾凡所來處一切林木應皆受焚而今林木如舊是火非從日來明矣若謂火從鏡出者自鏡而出能然於艾鏡何不鎔乎且屈柄左手尚未曾熱豈火性獨寒凉乎寒則於氷無異云何融氷而成水耶能融泮而鏡無熱相者足見非自鏡出也若謂火生於艾者則獨艾可生何藉日鏡光明相接然後火生耶汝又諦觀火之所出鏡因手執日從天來艾生本地即此三物各歸本所而此火性從何所來耶凡謂和合者必衆物雜和一處方名和合今日鏡相遠本非和合不應火光無從自有必從三物已備而後有非不和合然汝但知非和合非不和合猶不知如來藏中性火真空性空真火云云夫性火者性相不二也若了火相即真性是即火即空而非頑空矣真空即真性是即空即火故為真火而非妄火矣所謂火即是空空即是火如水成氷氷還成水故雖真性不變而能隨緣現相雖隨緣現相而真妄渾融故曰清淨雖曰清淨亦非離於一法乃即萬法而本具故曰本然雖曰本然亦非局礙乃周匝遍滿無乎不在故曰周遍雖曰周遍亦不即萬法亦不離萬法故曰法界由其性體圓融故相用無限是以九法界衆生心有優劣量有大小業有淨染莫不各循本業以發起依正二報隨分受用寧有限量乎即此當知世人一處執鏡一處火生遍法界執鏡滿世間火生寧有方所乃循業發現耳世間無知之者惑為因緣及自然性皆是衆生意識分別計度豈知不變隨緣成事體空之至理乎故曰但有言說都無實義紆屈也阿難水性不定流息無恆至但有言說都無實義冠注此明水大即如來藏性也言水性決之則流壅之則息曾無定恆如室羅城中迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥故於望前白月夜月當正午皎如晝時手執方珠用承月中之水此水為復從珠中出耶空中自有耶為從月來耶若謂此水從月來者月乃自天而來令珠水出凡所經林木應皆吐流若衆木吐流何待方珠而後水出若林木無流則水非從月降明矣若謂水從珠出者則此珠中常應流水何待中宵承白月晝而後有水可見水非珠出若謂此水從空生者有空處即當有水空性無邊水應無際然則人及與天皆同滔溺何得世間復有水陸空行之辨汝更審觀月乃自天而升珠因手執水盤乃求水者自設各有所出水從何所流至於此凡言和合者必待衆物相雜一處始成和合今月珠相遠元非和合不應水精無從自有必待敷設陰燧等物而後有水又非不和合然汝但知非和合非不和合尚不知如來藏中性水真空性空真水云云夫性水者性相不二也若達水相即真性是即水即空故為真空非頑空矣真空即真性是即空即水故為真水非幻相矣所謂水即是空空即是水如水成氷氷還成水故雖真性不變而能隨緣現相雖隨緣現相而真妄渾融故曰清淨雖曰清淨亦非離於一法乃即萬法而本具故曰本然雖曰本然亦非局礙乃周匝遍滿無乎不在故曰周遍雖曰周遍亦不即萬法亦不離萬法故曰法界由其性體圓融故相用無限是以九法界衆生心有優劣量有大小業有淨染莫不各循本業以發起依正二報隨分受用寧有限量乎即此當知世人一處執珠一處水出遍法界執珠滿世間水出寧有方所乃循業發現耳世間無知之者惑為因緣及自然性皆是衆生意識分別計度豈知不變隨緣成事體空之至理乎故曰但有言說都無實義迦毗羅此云青色斫迦羅此云鴛鴦亦云輪鉢頭摩云赤蓮花訶薩多未詳陟升也方珠水精珠也阿難風性無體動靜不常至但有言說都無實義冠注此明風大即如來藏性也言風雖以動搖為性其實元無定體亦不常動亦不常靜假一事而觀之則可知矣汝常整衣入衆之時僧伽黎角動及傍人則有微風拂彼傍人之面汝觀此風為復出汝袈裟角乎發於虗空乎生彼人之面乎若謂此風復出汝之袈裟是衣即風汝非披衣反乃披風且風體不住其衣既已為風即應飛搖離於汝體或曰非衣即風但衣中有風者我今於說法會中垂衣之時汝看我衣何處是風若不能見不應衣中更有藏風之地而令人不見乎必無是處若謂此風生於虗空者既空能生風不待整衣汝衣不動時何故無風拂彼人面且空以常住為性風以起滅為性若空為能生風為所生即當常則同常滅則同滅現今空性常住風不常生於風滅時不見空滅體性不協云何相生非特此也若有生滅則是有形之物不名虗空既名虗空則以無實為體何得云風從空出若能出風則成實物可見空決不能生風也若謂此風是彼被拂之人本面自生者則當從彼至此拂汝阿難之面然今此風自汝整衣現拂於彼既風生彼面何為不順拂汝面而倒拂彼面耶故知風決不生彼面也汝今審諦而觀整衣在汝面屬彼人虗空寂然不能參合於流動之性似各有定在其風自何方鼓動來至於此汝謂和合者必物體俱諧始成和合今風性動而起滅無恆空性寂而常住不滅元非和合不應風性無從自有現見整衣空中有風非不和合汝雖聞非和合非不和合宛然不知如來藏中性風真空性空真風云云夫性風者性相不二也若悟風相即真性是即風即空故為真空而非頑空矣真空即真性是即空即風故為真風而非幻相矣所謂風即是空空即是風如水成氷氷還成水故雖真性不變而能隨緣現相雖隨緣現相而真妄渾融故曰清淨雖曰清淨亦非離於一法乃即萬法而本具故曰本然雖曰本然亦非局礙乃周匝遍滿無乎不在故曰周遍亦不即萬法亦不離萬法故曰法界由其體性圓融故相用無限是以九法界衆生心有優劣量有大小業有淨染莫不各循本業以發起依正二報隨分受用寧有限量乎即此當知如汝一人微動服衣有微風出拂彼人面若遍法界被拂是滿國土風生寧有方所乃循業發現耳世間無知之者惑為因緣及自然性皆是衆生意識分別計度豈知不變隨緣成事體空之至理乎故曰但有言說都無實義僧伽黎大衣也袈裟此云壞色衣阿難空性無形因色顯發至但有言說都無實義舊說西域貴賤族分四性如此方四民剎帝利王族也婆羅門淨志亦云淨行以守道居正潔白其操也毗舍商賈也首陀農夫也是為四姓頗羅墮利根也旃陀羅魁膾也此又智愚之族也名義集云旃陀羅云屠者屠殺人畜者也彼土淫殺同賤殺者猶目為惡人國法令其搖鈴執幟警人異路不與良民同行故亦翻嚴幟也冠注此明空大即如來藏性也夫既謂之空性則自無形貌可表必對色相方顯空性今假一事示之餘則可知矣即如室羅筏城去河遙處諸剎利種及四姓人等新立居時鑿井求水出土一尺則於井中見一尺空乃至出土一丈中間還得一丈虗空是出土少則虗空淺出土多則虗空深汝觀此空果因土出耶因鑿出耶乃無因而自生耶若謂此空無因自生者於未鑿土前地中何故無空在未鑿時縱自觀之唯見大地逈未通達之相故知此空決非無因自生也若謂此空既因鑿土而後有是空必因土出者須土出時應見其空先從土出而後入井然土出可見空入何狀若徒見土先出而曾無空入井中者何云空因土出耶或曰唯土自有出入虗空本無出入者是土未出時空元在井則應空土不分本是一體元無異因既為一體應當與土同出今何但見出土未見出空計空因土出者謬矣若謂此空因鑿出而不因土出者即應唯鑿成空何必出土而後成空耶若謂此空不因鑿出者即應唯出其土不當見空云何隨鑿隨見其空耶足見因鑿不因鑿者皆妄計也汝更審其真實於真實處復加詳審觀察鑿從人手隨方運轉土從地中移出各有所指則此虗空因何所出凡言和合者必物用相洽方得合成此鑿有實用空乃虗名故但能鑿地不能鑿空而不相為用本非和合不應虗空無從自出必待鑿土而後見空非不和合下藉空大以融會諸大曰汝若知此虗空非和合非不和合性圓周遍融通無礙在諸大中各各充滿本來常住絶諸動搖即當以此會彼自能了知現前地水火風會通虗空均名五大其名既均其體不二皆得性真圓融周遍無礙悉是如來藏性本無生滅絶諸動搖我為汝以此空大會同四大汝心昏暗動輒迷惑不悟四大之性元是如來藏性非和合非不和合應當審觀空大果有出入乎果無出入乎若悟虗空周遍不動非出非入非不出入即悟四大圓融常住非和合非不和合矣然汝但聞此五大非和不合全不知為如來藏中性覺真空性空真覺云云若例上文當云性空真覺性覺真空變其文而倒其意者蓋前將四大會歸真空妙理已斯復以性覺觀照真空足見認四大為實有但以妄見見空妄分能所故為頑空了四大即真性唯以性覺觀空是即智即理故為真空真空即真性是即理即智故為真覺可見於性覺中一念晦昧而轉為業識執真空為頑空於妄想中一念純真而轉為性覺了頑空為真空所謂迷不知性悟不知空故雖真性不變而能隨緣現相雖隨緣現相而真妄渾融故曰清淨雖曰清淨亦非離於一法即萬法而本具故曰本然雖曰本然亦非局礙乃周匝遍滿無乎不在故曰周遍雖曰周遍亦不即萬法亦不離萬法故曰法界由其性體圓融故相用無限是以九法界衆生心有優劣量有大小業有淨染莫不各循本業以發現依正二報隨分受用寧有限量乎如一井空空生一井十方虗空亦復如是圓滿十方寧有方所乃循業發現耳世間無知之者惑為因緣及自然性皆是衆生意識分別計度豈知不變隨緣成事體空之至理乎故曰但有言說都無實義阿難見覺無知因色空有至但有言說都無實義冠注此明見大總攝六根皆如來藏性也言此見覺若離前境宛若無知必因色空現前方顯有知然所知之前境離能知之見覺亦無分析如汝今者在祗陀林見朝明夕昏乃晝之明暗見白月黑月乃夜之明暗并空色相悉因見覺而分析也即審究之曰見覺復與明暗并太虗空為同一體乎為非一體乎或同或異乎非同非異乎遂徵辨之曰若謂此見復與明暗二相及與虗空元一體者則明暗二體更互相亡暗時無明明時非暗見既與暗一體則明來時暗相必亡見安得而不亡哉見既與明一體則暗來時明相必滅見又安得而不滅哉若見同暗滅何得復見於明若見同明亡何得復見於暗若明暗乖殊而見覺曾無生滅何得成其一體可見非一體也若謂見精與明暗等非一體者不無分辨汝離明暗及與虗空分析見元作何形相現今離於明暗及離虗空則是見精元同龜毛兔角徒名無體若謂見精與明暗虗空三事俱異者則離於三事從何物而立見精耶可見非不一體也若此見精亦同明亦同暗者然明暗相背同明則與暗背同暗則與明背云何或同可見元非或同若此見精亦異明暗亦異虗空者然此見精離於三事元無自體云何或異可見元非或異若謂見精非同三事者現今分空分見本無邊畔云何非同可見計非同者妄矣若謂見精非異三事者現今見明見暗性非遷改則是塵相有殊見體唯一云何非異可見計非異者妄矣辨至於此言思殆息更令阿難細審已更加微細雖微細已更加詳密審至於實諦再加觀察要知明從太陽來暗隨黑月來通屬虗空壅歸大地是明暗空塞各有來所見此四種之見精畢竟因何所出耶凡物能和合者必得衆性如一始成和合現今見覺有知空乃頑虗本非和合然不應見精無從自出必待明暗色空而顯則非不和合下以見精融會六根曰汝若了此見精如是則見聞知覺名六根者悉皆性圓周遍融通無礙於諸大中隨處充滿本來常住絶諸動搖更當以此會彼自能了知無邊不動空相并其地水火風動搖之相會通見大均名六大其名既均其體不二皆得性真圓滿融通周遍無礙悉是如來藏性本無生滅絶諸動搖我今為汝以此見大會同五大汝性沉淪滯溺無高超之智不能悟汝見聞覺知六根本是如來藏性當觀此見聞覺知云云若謂六根定屬生滅離此六根復以何物證常住真性耶若謂六根定同體者何得現有見色聞聲等六處之差別乎若謂六根定異體者於一身中豈有六性乎若謂六根定非生滅現今緣塵則有知離塵則無知寧非生滅乎若謂六根非同非異現是一性云何非同現是六根云何非異若能如是審諦而觀自得離句絶非言思路斷而和合非和合瓦解氷消矣然汝雖得釋此妄執亦不知此六根之性即是如來藏中之真性元為性見蓋見即真性之見明即本覺之明精乃性覺之真精見乃妙明之真見故雖體性不變而能隨緣映物雖能隨緣映物而真妄渾融故曰清淨雖曰清淨亦非離於一法乃即萬法而本具故曰本然雖謂本然亦非局礙乃周匝圓滿無處不然故曰周遍雖曰周遍亦不即萬法亦不離萬法故曰法界由其性體圓通故相用無限是以九法界衆生心有優劣量有大小業有淨染莫不各循本業以發現依正二報隨分受用寧有限量乎如一見根中之見性既能周遍法界則耳根中之聽性鼻根中之嗅性舌根中嘗觸之性身根中覺觸之性意根中覺知之性皆為妙性而德用瑩然虗靈不昧俱與見性周遍法界圓滿十虗寧有方所蓋循業發現而已世間無知下準上此自妄見推至於見精自見精推至於見性若指最初見覺為見性則與離塵無知意相左矣阿難識性無源因於六種至但有言說都無實義十法界依正二報皆自性中之光影只因一念晦昧以妄承妄遂有業果輪回千差萬別是故世尊不得已而說心說性說真說妄說陰處界入說地水火風然名言多種不出真如不變隨緣無明成事體空及第八識見相二分而已是以今經前明三科攝萬相總歸一性次明七大以一性融通萬相令知性相不二真俗渾融更於七大中先將四大會歸於空大使人既知虗空非出非入非不出入本無動搖周遍法界即知四大會未離空必因空而悟四大本無生滅亦無去來周遍法界則是即幻相而即真色即頑空而即真空真空即色真色即空故能即色空而即真覺如是則萬相塵境既真雖有六根絶諸對待而於一切法上不生取捨則是即六根而即真性故謂之性見夫性見乃本覺之妙明所以隨緣映物不被物礙故曰覺精明見根既如是識則亦然遂合六識即如來藏性乃為性識亦能了了一切隨處超然故曰明知既謂明知曾未離乎真覺本明之體寧不謂之真識乎是故遍七大於萬法而萬法本然攝萬法於六根而六根清淨可見三世諸佛於無明中證大菩提轉大法輪一切衆生向真如裡作諸妄業受諸果報然有聖凡之隔越者不過迷悟而已迷之則無量劫淪諸生死悟之則剎那間便證真常故曰隨衆生心應所知量循業發現而已矣已上自五陰至此始結完前色心諸緣乃至妙明真心中所現物一段義冠注此明識大總攝六識即如來藏性也言識以了別為性然性本無源但因六種根塵妄出耳今以眼識驗之餘皆可知汝今遍觀此會聖衆用目循歷周圓而視其能觀之目根也所觀之衆境也雖根境對初念未生時但如鏡中現像無別分析一剎那間生汝眼識而縱有自性分別但對性境不帶名言猶無籌度更兼同時意識則次第標名指相謂此是文殊乃至此是舍利弗汝當審明此識能了知者為生於見根耶為生於聖相耶為生於虗空耶為無所因突然而出耶我今為汝辨之若謂識之了別性生於能見之根中必無明暗色空四種塵相則元無見根能生之根尚無自性從何物以發識乎單根不能生識明矣若謂識之了別性生於所見之相中必不從能見之根生然既無見根則不見有明相亦不見有暗相既無明暗即空色亦無是無見根則塵相亦無矣彼能生之塵相先無自體所生之識從何物以發識哉獨境不能生識明矣若謂識性生於空者則非從見生非從相生然非見則無能辨之根自不能知明暗色空是離根無境矣非相則既滅所緣之境而見聞覺知無所安立是離境無根矣處此非見非相之間空相無表則同龜毛兔角或曰空與明暗色等元係是有何得同無故奪破之曰雖有空在非同有形之物元同於無能生之空既同於無縱發汝識欲何分同耶空不生識明矣若謂識性曾無所因突然而出者何不日中別識明月乎既日中無月必不能發起了月之識則識非無因而生明矣汝更微細詳審要知見精託汝浮根而起塵相推逐前境而顯如色等可以狀而名者乃成有體虗空不可以相而論者乃成無體有無雖殊各有源委如是識緣因何所出耶凡物能和合者必性皆循始成和合識有分別性本動搖見無分別性本澄靜元非和合一根一識既爾其餘根識亦然不應識緣無從自出必假根境而後顯非不和合下以識性融會六種根識曰若能悟此識性非和合非不和合不從根塵識緣而出亦當知彼諸了別識及與見聞覺知六根各各圓滿湛然常住其性皆非從緣所生以此見識二大兼彼空大及與地水火風均名七大其名既均其體不二悉歸真性圓滿融通皆是如來藏性本無生滅我今為汝以此識大會同六大汝心粗浮無有深慧不能悟見聞之六根不能發明了知之六識本如來藏性汝應觀此六處識心為同為異云云若言是同六用差別云何得同若言是異出自一性云何得異若言是空既能了別何得為空若言是有本無形色何得為有若言非同本係一體何得非同若言非異六處皆殊何得非異若言非空離於根塵元無自性何得非空若言非有現能分析塵相何得非有至此則妄想情盡名言性空而和合非和合如湯消氷矣然汝雖聞此元舊不知此六識性即如來藏中之真性元為性識若識即真性之識知亦妙明之知明乃本覺之明識亦真心之識故雖體性不變而能隨緣辨物雖隨緣辨物而真妄渾融故為妙覺湛然雖為妙覺湛然亦非離自局乃周匝遍滿無處不有故為周遍雖曰周遍而於萬法非即非離故曰法界然則心越衆生之心量超衆生之量即十方虗空亦能含吐寧有方所其性體圓融故相用無限遍諸法界不過循業發現而已豈有限量乎世間下結意準上託睛指浮塵根爾時阿難及諸大衆至於如來前說偈讚佛冠注此經家敘當機蒙示開悟之文也意謂阿難於首卷終雖云身心泰然徒知身中有真妄等二性耳既而佛為開示色心諸緣及晦昧為空後乃破妄見指出見精仍託見精以指真性談至見見之時見非是見更除見精直顯真性然尚未示真性之全體大用阿難亦未知其端倪故復破陰界入處歸一真性更以一真性圓融七大斯如來破妄歸真之開示可謂極廣大而盡精微矣阿難承示開悟翻幻身為法身轉妄心為真心而蕩然無復礙及諸大衆不假他力各各自知妙覺湛然遍周法界含吐十虗蓋一向晦昧廣大真心反見空無邊表今則知心遍十方故見十方空如觀掌中之一葉耳一向不知山河大地諸所緣法皆是妙明真心所現之物今則了知一切世間諸所有物皆即菩提妙明元心所現一向徒將此心惑為色身之內今則始知心精不雜周遍圓滿含褁十方反觀父母所生之生滅幻身在真心中猶彼十方空中吹一微塵似有似無若存若亡一向迷真逐妄如棄清澄大海認一浮漚體自為全潮今則既悟法身真心反觀幻身妄心處真心中如湛巨海流一浮漚起滅無從前蒙世尊指示寶明妙性元所圓滿常住心地徒獲此心未敢認為本元心地今則了然自知獲本妙心常住不滅阿難一向多聞未全道力而今始得妙悟法身獲妙真心故禮佛合掌曰得未曾有復於如來前說偈讚佛妙湛總持不動尊首楞嚴王至爍迦羅心無動轉顛倒想不出認物為己迷己為物即分別我法二執即前妄認緣塵分別影事以為心相計四大五陰以為身相及分內分外執因緣自然和合非和合等皆是億劫之妄想習氣今實併銷之矣舊說婆沙論明三阿僧祗劫修六度行百劫種相好因然後獲五分法身又如唯識云地前歷一僧祗初地至七地滿二僧祗八地至等覺是三僧祗然後獲究竟法身今云不歷者彼約漸修此約頓悟修悟之有不同根性之有利鈍教體之有權實且云更除微細惑方登無上覺而坐道場等則但能悟得未經修斷明然可知復何疑焉如是二字阿難自指之言五濁謂劫濁見濁煩惱濁衆生濁命濁也泥洹此云滅度即涅槃也舜若多此云空爍迦羅此云堅固動轉即退轉也冠注此阿難讚佛讚法偈也舊說妙湛讚真諦般若德也總持讚俗諦解脫德也不動讚中諦法身德也又即三而一故曰妙湛即一而三故曰總持非三非一即三即一故曰不動尊者十號之一由證此三號聖中尊此讚佛具三德而證三諦也首楞嚴王讚世尊所示之法即前云名大佛頂首楞嚴王是也亦具三德三諦自七徵八辨以至陰界入處會歸一真法性令人悟得見與見緣并所想相如空華泡影其性真為妙覺明體即法中之妙湛德也自地大以至識大復以一性融通萬相令人悟得性相不二猶若水氷即法中之總持德也更悟七大性圓周遍本不動搖根塵識法俱遍法界含吐十虗即法中之不動德也佛身三德乃所證之理世尊即能證之人法中三德乃所說之法世尊即能說之人蓋此佛法如優曇花世出世間真為希有使我一覩聞則千萬億劫之顛倒妄想如湯消氷故能捨攀緣心獲常住心依陰界入處悟如來藏即地水火風得菩提心而不勞經歷三阿僧劫頓獲平等法身之理然雖洞見法身尚未宛竟欲得實證必須真修故發洪願曰自今已往願求極果必如諸佛之尊願度有情必盡恆沙之衆將此智悲雙運之深心承奉塵塵剎剎諸佛度脫塵塵剎剎衆生是則名為報佛微沙開示之大恩雖有大願非佛證明恐違本願故請佛證明且更發猛厲之誓曰欲度恆沙衆生先入五濁惡世而衆生度盡方入涅槃不唯請佛證明亦乃祈佛加被乞施大雄破其堅固無明施大力其深根惑業施大慈與其究竟之樂施大悲除其二死之苦此乃總求審除塵沙之細惑令我五住究盡二死永亡早登無上覺遍坐菩提場更總發一大誓曰即空性無體容可銷亡我心堅固終無退轉所謂虗空有盡我願無窮也
