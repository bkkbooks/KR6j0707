body:
  text: 明柴紫釋乘時講録新安受法弟子汪益源校梓阿難白佛言世尊至佇佛如來無上開示冠注此更索結元而覬解除也如來下至終不能解牒前第二決定義中云應當詳審煩惱根本此無始來發業潤生乃至若不審觀煩惱根本則不能知虗妄根塵何處顛倒汝觀世間解結之人不知所結云何知解等語從無始際與諸無明俱滅俱生者即領前根中積習虗妄及生住異滅分齊頭數等語如後文云陀那微細識習氣成瀑流正是俱生無明而在生死流中出胎入胎無片時可離者也得善根名出家者謂所得有學小果也猶隔日瘧者謂得果時暫似解脫而入生死欲流時猶然被縛可見結根未除正前云雖得六銷猶未亡一蓋所謂一者即結根也然不特小果即菩薩人亦有隔陰之迷猶如欲潔而偏染好正而反邪皆多生習氣使然也云何是結者謂雖知六根是結而不知何者是結之根元也從何名解者謂結元或不出於俱生無明之外而更不知從何處下手作何法以解之也翹佇者鳥張翼而望哺也阿難望佛開示似之也爾時世尊憐愍阿難至亦汝六根更非他物冠注此諸佛共以上乘頂法授阿難也與前六湛圓明等同旨憐愍有學者正愍其不能亡一也未來衆生去聖愈遠信解愈難也為出世因作將來眼者令其修證有賴信解不迷也摩訶難頂者欲授上乘頂法恐其器小驚疑以預慰之也六種震動解見前凡大聖出世皆有此瑞相非表法也世尊最初從頂門放光次從面門放光灌十方佛頂乃至指端放光者俱顯佛生共有根本智光不出六根而亦超脫六根乃是上乘頂法阿難不能承當而屢經開示以至於此根性將熟有可入之機遂感十方如來亦放頂光共灌釋迦佛頂仍以上乘頂法而僉授之正顯此法乃十方如來一門超出妙莊嚴路但約此光灌彼乃從體起用也約彼光灌此乃攝用歸體也是諸大衆得未曾有者雖謂見希有瑞相亦因根中妙性本同故一覩智光不覺欣慶也阿難蒙世尊指示六亡一存發業潤生積生虗習生住異滅等故能呈說俱生無明而併問所結之元解結之方則是非畢竟不知第知而未切耳是以十方如來異口同音告之曰生死結根唯汝六根更無他物無上菩提亦汝六根更非他物異口同音者以體性是同故妙用不異也生死結根即俱生無明固而不開曰結續而不斷曰根謂根塵六結元從此生故要先知結根然後解結其結若解則根自除故云六解則一亦亡矣無上菩提能證自覺聖智也安樂等所證真如理也總是常樂我淨四德也阿難雖聞如是法音至云何是中更容他物源字指第八識即下偈中一字與陀那識也根塵同源四句舉十八界該七大由塵發知四句攝十八界歸十二處知見立知四句攝十二處歸六根然而淪生死證涅槃只在六根中立知見與不立知見而已故諸佛同言更非他物也冠注此述問釋疑申明結解惟是六根也阿難意謂世尊前言十方如來於十八界一一修行皆得圓滿菩提今何惟是六根而六塵六識俱不與耶故世尊告之曰根之與塵雖則內外不同情塵有隔究其源流同是第八識見相二分由其同源故相偶而逐流則謂之縛不偶而逆流則謂之脫縛與脫無二體性舉根而塵在其中矣所以不與識者以識性虗妄了無實體猶如空華何以故由根塵相偶而生故然根塵亦非實體即此六根亦由六塵而後發知六塵亦因六根而後有相故塵離根固無獨立之自性根離塵亦無獨立之自性是則相見兩法相倚而生如二束盧交倚而立是故由彼覺明有明明覺失彼精明黏妄發光流逸奔境即此知見便是無明根本也不由前塵所起知見明不循根寄根明發由是六根互相為用即此知見便是涅槃根本也然則此六根者惟一無漏真淨本體逈無別法所以結從根中結更非他物能為結元解從根中解更非他物能為解元是故諸佛同言更無他物也此證諸佛之言而釋阿難之疑矣爾時世尊欲重宣此義而說偈言至一路涅槃門梵語阿毗達摩此云無比法梵語薄伽梵具六義謂自在熾盛端嚴名稱吉祥尊貴多義故不翻也解結因次第四句為下六解一亡及選擇圓通二段文張本也冠注此明如來藏中真妄俱遣一亦不立也意謂於真如實性中反觀有為生滅法悉空如幻何以故是仗因托緣而生故豈獨觀有為生滅法如幻即觀無為涅槃法雖無起滅猶然不實亦如空華然則有為無為皆成對待生死涅槃等於空華下釋成上義云所以說妄者欲顯諸真故若堅執其真則真亦同妄故知真如實性中真與非真猶且雙非云何容得能見之六根所見之六塵且相見二法如束蘆然但交倚而立中間實無獨立之自性故曰由塵發知因根有相相見無性同於交蘆然根塵相偶則因而固結根塵不偶則因而解除結則逆涅槃流循生死流故謂之凡解則逆生死流循涅槃流故謂之聖是故從凡入聖唯自六根豈有二路哉汝若不知凡聖同途但觀根塵相倚勢若交蘆其中性體亦非空有何則根塵自性元皆藏識現起非真非妄適言其有則交倚而立其體本空適言其空則互相顯發其用周圓由其空有俱非故曰根塵同源縛脫無二識性虗妄猶如空華夫交中性即根塵之源也若迷此性便是結根謂知見立知即無明本非凡而何若發明此性便是解脫謂知見無見斯即涅槃非聖而何凡聖雖在迷悟而解脫結根要因次第必待六解而後一亡且於次第中更當選擇一圓通根本而後不循外塵奔逸方可入流忘所漸成正覺也然阿難但知根塵同源猶不知源是何物但知交中性而不知以何為性雖知六解一亡又不知一在何處故指示其源及性與一者即是第八識梵語陀那此云執持以執持一切種性故謂此識即如來藏一念受熏轉成藏識遂有一切種子含藏於中其實淵深微細二乘不能知其元等覺未能窮其際故知識體湛不搖動猶如巨海特為熏習氣分轉成七識如瀑流相及與六種根識總是本識所發見相二分六種塵相總是本識所發疏相分是以根塵解脫則本識即真根塵結縛則本識非真故若言其真恐衆生迷妄為真以解為證若言其非真亦恐衆生遺真逐妄向外馳求所以尋常祕藏未曾開演或曰既然是真何得成妄既然成妄何得為真蓋成真成妄唯在取與不取耳若不悟見相二分惟一自心而誤以能見之根緣取所見之境由是從真常非幻境中妄見忽生妄塵頓現遂成幻法所謂緣生如幻者此也若悟見相二分惟一自心對境不生取著即非幻者尚不見有生而能見所見之幻法復自何而立乎所謂無為如空華者此也既到真妄兩忘之處一亦不可得六自何而生真空亦不立藏識從誰起即此便是清淨本然周遍法界故曰是名妙蓮華即此便是一切事究竟堅固七常住果故曰金剛王寶覺由是反觀阿難所問一心三觀皆如幻化矣此則一修一切修一斷一切斷一彈指間立超無學頓入究竟所謂狂性自歇歇即菩提何藉三觀而後修證哉故惟此法門乃世出世法無可比類者足見此六解一亡即是大佛頂首楞嚴王十方如來一門超出妙莊嚴路也於是阿難及諸大衆至施以法音洗滌沉垢冠注此惟領悟生死涅槃唯是六根而解結次第六解一亡尚未明悟故復請示也祗夜此云應頌亦云重頌即頌上長行也伽陀此云諷頌亦略曰偈不因長行但諷美而頌之雜糅者謂二頌錯綜而出也精瑩者謂二頌合明文雖錯綜而義如貫花明徹精透皆指能詮也妙理清徹指所詮也如說真妄不立觀行如幻等則理窮妙極矣心目開明者謂昔日不知陀那微細識故迷却如來藏心不知根塵唯是自心故被塵所障今得心開目朗頓忘能所無復狐疑也嘆未曾有者以如來尋常未開演者今盡開演故也無遮大悲等者謂上所說之法同圓普濟略無毫許遮礙皆自世尊大悲心中稱性淨妙常之理演成真實法句故一聞所說委信無疑矣但於解結因次第六解一亦亡心猶未達故再請開示舒結倫次即解結次第沉垢即微細惑也即時如來於師子座至次第酬佛此名為結冠注此預示綰結倫次者欲知舒解倫次故也蓋為身中六結基於藏識微細難知故取巾設喻令其易曉也然喻中微細不可不知當以寶疊華喻不變真如緝績成巾喻真如隨緣成藏識巾本一條綰成六結喻藏識現起見相二分而二者元是一體若一巾然但見為能緣相為所緣故根境相偶發起識心則名為結若根境不偶識心亦無是於結心解即分散矣涅槃僧此云裡衣僧伽梨此云大衣劫波羅云時分即夜摩天也疊華西天之帛價直無量今天獻尤為貴重可知凡結成皆示問阿難者顯其所結倫次也佛告阿難我初綰巾至第二第三不名為結冠注此復審其倫次也一巾喻藏識巾有兩頭喻藏識所現見相二分綰成六結喻相見因依而結成六根也意謂巾實一條應成一結何得成六故返詰其第二第三不當名結要使阿難答出巾體是一因結成六以顯一是對六而稱六是藉一而名若以巾體論則元是一若以結相論則現是六正見名雖有一六而實非有一六也佛告阿難此寶華巾至畢竟同中生畢竟異冠注此今認定同異而不亂其倫次也意謂巾體雖一既成六結今欲將六為一若何而成此就喻以辨定阿難令其認得分明若知六結現存必不能移其名位只待解除而後名位自泯足知未入圓通時眼根難作耳根用一根難作諸根用務要從一根中下手做工夫只待生滅滅已寂滅現前而後一六銷殞周遍無礙方得圓融法界故曰六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是若謂如來藏性本是一體何得名異若謂根塵隔越不能互用何得名同故究其本性畢竟是同觀其業用畢竟是異而同中異異中同豈可不知哉畢竟同畢竟異即前文非一非六意也佛告阿難汝必嫌此至六解一亡亦復如是冠注此令阿難自悟解結之䇿也言汝心嫌此六結不欲成六而願樂成一用何計䇿方可得成耶阿難謂六結若存則彼此各有名位若以六作一則諍論紛然是非鋒起斷斷乎彼結非此結此結非彼結也若將六結一總解除既無結相彼此何分若無彼此則六既無有對何者而言一即一尚不可得而名之其六相安在哉佛見阿難將有亡一之機故就明處以導之曰欲達六解一亡不過如是而已矣由汝無始心性狂亂至皆即狂勞顛倒華相冠注此明六根生起次第以合喻義也心性者指真心妙性全體大用此合前寶疊華也狂亂者謂真心一念隨緣遂成藏識合前緝績成巾也知見妄發發妄不息者由藏識而現起見分勞見發塵者依見分而復成相分見相既成合前一巾而成六結也下復舉喻以明法如勞目睛喻見分則有狂華喻相分於湛精明無因亂起者猶言湛明真體一念隨緣遂成藏識而勞見發塵即如瞪目成勞而發狂華也下指實法而言一切世間山河大地生死是有為生滅法涅槃是無為不生滅法若以正智觀之總不出見相二分故曰皆即狂勞顛倒華相若順見相而黏湛發妄則入生死流若逆見相而脫黏內伏則入涅槃流正所謂涅槃生死等空華也阿難言此勞同結至若欲除結當於結心冠注此因問解結之方而語其要訣也意謂此勞見發塵之六根固同一巾綰成之六結但不知以何等計䇿方能解除也左右各牽竟不能解者喻執根為實有者不得境空也執境為實有者不得心寂也務要根境兩忘方得返流全一也汝設方便云何解除者須令自悟可也當於結心解即分散者猶如現前根塵不偶則分別識心自不能生現行既滅種習漸銷則陀那細識無所執持無所含藏便是空如來藏矣如云眼色為緣生於眼識設若眼色不為緣則眼識從何而生六既不存一將安寄向後耳根圓通入流亡所及與旋倒聞機返聞自性等皆此一意耳阿難我說佛法從因緣生至諸妄銷亡不真何待冠注此明解除結心即入道之因緣也我說佛法從因緣生者所謂佛種從緣起也復恐當機又以昔日所明世間因緣纏繞故曰非取世間四大三緣和合而生佛法也且我能發明六凡四聖之法於一一法皆知其本因隨所緣出謂六凡四聖之因本於如來藏性如楞伽經云如來藏是善不善因也但隨染緣所出成世間法隨淨緣所出成出世間法也如是乃至最微細者如恆沙界外雨滴皆知其頭數現前松直棘曲鵠白烏玄皆了元由意謂若大若細有情無情莫非因心成體也如來智量一切照了毫無差謬即所許取證決不賺誤是故汝當誠信我語選擇圓根若一門深入其餘五根應拔圓脫根結若除則見分種盡塵相自滅則相分種盡諸妄種習一併銷亡云何不成圓滿妙覺也向後二十四聖各緣一根一塵悟入圓通本因皆是佛法從因緣生也阿難吾今問汝此劫波羅巾至從三摩地得無生忍冠注此明舒解倫次也先以同解同除反詰者令其自悟結有次第而解亦有次第也喻中次第者如以一巾次第綰成六結是也法中次第者如心性狂亂知見妄發勞見發塵是也然不重結邊次第惟重解邊次第何以故要使攝心一處故若於六根一齊做工夫未免分心涉境徒費精神須是擇一圓根向此根中下手設使一根返源其餘五根應圓脫是故阿難悟得六結同體結不同時則解結時亦當次第不可同除而世尊見有可接之機遂導之曰六根解除亦復如是此根初解先得人空者謂一根返源六根解脫之時根塵不偶六識不起遂得人空觀智了知身相本屬四大五陰假合而成破除共相是空其人執矣以但空人執故空性尚局復以雙空觀智了知四大五陰各無體性破除自相既得空性圓明是空其法執矣雖得二空而二空觀相猶在次復空其二空則無明頓破煩惱永忘即達根身器界唯一如來藏心圓照法界曾不見一法有去來生滅之相則親證無生法忍矣所謂結解因次第六解一亦亡也阿難及諸大衆蒙佛開示至退藏密機冀佛冥授冠注此請圓通根本也蒙佛開示如前云根塵既銷云何覺明不成圓妙及遠塵離垢法眼清明云何不成無上知覺乃至俱空不生得無生忍皆是也因此悟得圓自在慧故曰慧覺圓通然雖未實證而心中了然得無疑惑矣身心無礙者因六解一亡而得人空故身無礙解脫法已俱空不生故心無礙雖則如是然猶未達根選擇圓通入流成正覺故特請益也飄零諸趣未入聖流故曰孤積劫門外未栖寶所故曰露何心何慮者自慶出乎望外也預在也天倫者為佛堂弟也如失乳兒忽遇慈母者久失法乳今幸得之也際會道成指初悟因緣法得證初果時也所得密言指前開示也雖蒙開示未見增進聖果故曰還同本悟則與未聞無有差別也惠我祕嚴者再乞祕訣令我精嚴聖果也最後開示者確指今經猶言不得祕訣莫嚴聖果則終是不能成就如來此番開示寧不有負佛恩乎退藏密機者謂禮佛已畢即默默無言且既請祕嚴決非言詞可表故唯冀世尊傍通一線令我默契而已故曰冥授爾時世尊普告衆中至從何方便入三摩地冠注此令二十五聖各陳圓通以冥授阿難之祕要也最初發心者是問發菩提心也十八界者以根攝見大識攝識大塵攝五大前說三科七大皆如來藏性又云十方如來於十八界一一修行皆得圓滿無上菩提又云淪生死證妙常惟是六根者皆未證據故令諸聖各陳所證以顯所說不謬也此二十五聖勿論名位大小法門偏圓皆入大乘圓通曾無優劣不可因名有大小而計其證有淺深也憍陳那五比丘即從座起至如我所證音聲為上冠注此因聲塵悟入圓通也二十五圓通始於聲塵終於耳根者俱就阿難及與此方之機故也鹿苑雞園皆古帝王養畜之地憍陳那此云火器以先世為事火外道故五比丘乃佛最初得度者佛出家時父王乃命家族三人母族二人隨衛後棄佛於此各修異道佛成道日先尋度之故曰觀見如來最初成道也佛為五人三轉四諦而陳那最先悟證故曰於佛音聲悟明四諦阿若多此云解以最先悟解佛即以解名印證也妙音密圓者由聞法音悟入圓通則根塵解散能所不存故曰妙音凡所聲相皆是遮那法音故曰圓音悟者知之迷者不覺故曰密音然一塵悟入根根塵塵俱入圓通矣但因最先從聲入故當以音聲為上耳後皆準此優波尼沙陀即從座起至如我所證色因為上冠注此因色塵悟入圓通也優婆尼沙陀此云色性空亦云近少謂微塵是色之少分也因多貪欲佛令作不淨觀以治之使彼轉貪心而成厭心也色從不淨等者即九想觀也謂觀此身內有三十六物外則九孔惡露常流不淨從生至死終無一淨如種子不淨住處不淨生處不淨究竟不淨等九想者一䏺脹想二青瘀想三壞想四血塗漫想五膿爛想六蟲噉想七散想八骨想九燒想從此九想則白骨化塵而歸於空蓋初以九想與空治彼色相至此則能空所空一併銷除頓悟圓通成無學道古德云知色生時但是空生色滅時但是空滅譬如劃水成文未嘗生滅妙色密圓者謂一切色塵盡是遮那法身可以將一莖草當丈六金身用亦可以將丈六金身當一莖草用色因為上準前香嚴童子即從座起至如我所證香嚴為上冠注此因香塵悟入圓通也諦觀者審實而觀也諸有為相即根塵識法也晏晦謂晏安晦寂也清淨之室謂之清齊香乃有為中法也寂然者無聲相也觀此香氣徒木無火不香故曰非木不同空性恆而不變故曰非空火燒別木則無香氣故曰非烟火也去無所著者根無所去也來無所從者塵無所來也由是根境不偶故得意銷而入無分別也發明無漏者達此香體非因緣等法乃如來藏性也塵氣倐滅者幻相氷釋也妙香密圓者謂凡所氣息皆是法身香光也然悟者證之迷者不識故曰密也香嚴為上準前藥王藥上二法王子至如我所證味因為上冠注此因味塵悟入圓通也五百梵天同行眷屬也嘗藥作醫師敘其宿因也衆味共成曰和合直爾采用曰俱生修煉炮炙曰變異皆指味言也是冷是熱有毒無毒皆指性言也承事如來了知味性明其宿習不忘即能從味塵觀察也舌味熾然故曰非空味無形質如水中鹽味故曰非有身即舌根心即舌識諸味不來則舌與識常自淡然故此味性非即身心而生也舌識不嘗則甘苦等味不能自現故此味性非離舌識而自有也一一分別味因無所從來亦無所去而塵與根非即非離忽爾超脫根塵真常獨露故曰分別味因從是開悟也金剛三昧經云法從分別生還從分別滅滅是諸分別是法非有滅覺明即本覺妙明乃因味塵而開悟也跋陀婆羅并其同伴至如我所證觸因為上冠注此因觸塵悟入圓通也跋陀婆羅此云賢首亦云賢護謂自守護賢德亦守護衆生也開士菩薩別名謂自開悟而復能開悟衆生也先於威音王佛聞法等敘其宿昔從水因悟入也觸是身家塵相蓋以身根與外物相合中間覺其冷暖澀滑謂之觸塵今因浴時身與水合而冷暖澀滑現在其中因而究竟觸相自何而有若謂此觸相因水而有者水應自洗而現此觸相何待洗身而知有觸相水既不洗水則觸不因水有明矣若謂此觸相因覺體而有者於未洗時云何不現且於洗時亦未洗著覺體既不洗體則觸不因體有明矣然則塵無所生根無所寄識心頓滅故曰中間安然得無所有從此悟得幻妄稱相其性本真故在威音時已得妙悟今從佛化又證無學是以一觸發明藏性則觸處無非真體故曰妙觸宣明摩訶迦葉及紫金光至如我所證法因為上冠注此因法塵悟入圓通也摩訶迦葉此云大飲光檢三迦葉也尼等自明以然燈塗佛二種勝因故感歷劫紫金身光祖衣吞日也觀六塵者正觀在法塵蓋由法塵乃前五塵謝落影子故兼言之變壞者謂法塵托意根暫現即無於剎那間念念生滅厭此變壞故修空觀而後想心漸息遂入滅盡定此定能滅意根空法塵定深想滅故能度百千劫如彈指頃今在雞足山入定待彌勒出世是也我以空法者謂以空其法塵悟入妙真如性也頭陀新云杜多此云抖擻謂能抖擻塵勞故也妙法開明銷滅諸漏者謂即法塵而即真性即妄心而即妙明其真妙透露則法法皆真欲有無明一併銷殞矣六塵入圓通竟阿那律陀即從座起至旋見循元斯為第一冠注此因眼根悟入圓通也阿那律陀此云無貧亦云如意是佛堂弟乃白飯王子也過去世以一飯施辟支佛感九十一劫受如意樂舊說增一阿含云佛在給孤園為衆說法那律於中眼睡佛說偈訶云咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字那律於是達曉不眠便失雙目世尊示以樂見照明金剛三昧者令其攝念於眼根中一心樂見專欲照明唯此一念更無他念至於前戈後刃此念莫移天崩地裂此念不動如金剛王寶能破壞一切而一切不能破壞此念久之則不因眼根能觀十方世界足知不是循根之妄見乃妙明真心所發精真明耀故能洞徹十方如觀掌果也由不見色故旋見而不奔逸由無眼根故循元而不循根也因阿難多聞故教以返聞聞自性之工夫遂得金剛三昧而證圓通根本因那律失其雙目故教以樂見照明之工夫亦得金剛三昧而證圓通本根一是返聞於內一是順見於外及其成功同歸藏性所謂聖性無不通逆順皆方便妙哉言乎周利槃特迦即從座起至反息循空斯為第一冠注此因鼻根悟入圓通也槃特迦此云蛇奴亦云繼道以生道邊故即誦帚比丘過去為大法師祕吝佛法不常教人感愚鈍報以宿善故遇佛出家五百比丘同教一偈經九十日不成亦說教誦條帚則得條忘帚得帚忘條為治散亂兼且愚鈍故教令數息攝生不雜餘緣工夫漸熟心漸微細故先從順逆數息出入而後更於一息上窮其生住異滅乃至以此主滅推之諸行則見一念具九十九剎那於一剎那復具九十九生滅如此久之忽然於生滅盡處徹證無生既達生即無生無生即生則心息兩忘豁然無礙而成聖果矣反息循空者謂觀息既久無息可得便循真空妙有也憍梵鉢提即從座起至還味旋知斯為第一冠注此因舌根悟入圓通也憍梵鉢提此云牛呞凡不食亦事虗嚼往昔見老僧無齒而食笑其似牛故世世感生牛舌常如牛呞佛為遮謗賜之數珠令常念佛且教令即於舌根上觀此一味使心住一境純一清淨斷諸雜念便是心地法門久之心滅得入正定復觀知味之知非從舌體所生非從味所有則根塵性空一根超脫諸根亦然故得應念超越世間諸漏悟入妙真如性則內脫身心外遺世界如鳥出籠正所謂想相為塵識情為垢二俱遠離則汝法眼應時清明也還味者脫黏亡所也旋知者內伏入流也畢陵伽婆蹉即從座起至純覺遺身斯為第一冠注此因身根悟入圓通也畢陵伽婆蹉此云餘習宿生為婆羅門故餘習多慢如呼河神為婢子皆習氣也初發心即出家時也數聞不可樂事即聞四諦中苦諦也如三苦八苦等也因而思不可樂事適遇不可樂境亦悟道之機也知痛之知覺痛之覺總是身根謂我正當知此深痛時研究此覺雖能覺痛乃依浮根觸境而起非有實體了此則根塵俱空分別心滅而我本覺清淨體中曾無能覺之知亦無所覺之痛我復微細詳審正痛之時有能覺痛者有痛不能及者我本一身豈有雙覺如是思惟攝其心念循歸清淨覺體未久之間身心無礙忽若虗空習漏俱盡性覺現前是則不染纖塵純一寶覺明性更不見有身相可得矣須菩提即從座起至旋法歸無斯為第一冠注此因意根悟入圓通也須菩提此云解空亦云善解言我曠劫來心得無礙自憶受生如恆沙之多曾無隔陰之迷出胎之晦也即此生初在母胎時即知空寂雖則隨世受生而空理不昧其五蘊身相了不可得豈獨空其正報自母身外乃至十方世界一切依報悉歸空理及至出胎則廣化衆生同證空性此乃人法皆空自他俱利然尚未證真空妙有復蒙如來發明性覺真空性空真覺即得根本正智證真如空理且無能證之智亦無所證之理則空性圓明頓入如來寶明空海同佛知見遂了十法界依正因果皆是大圓鏡智影像而已是則三諦圓融得真解脫矣如我所證諸相入非者非即空也結上我曠劫來下一段意言初得雙空觀智空其依正人法等相也非所非盡者二非即俱空也結上蒙如來下一段意言能非之智及所非之空俱盡無餘即無實無虗也旋法歸無者即旋空有之法及與身器總歸寶明空海所謂本來無一物也意根能攝一切故不曰旋根而曰旋法也性覺指智真空指理空性圓明謂智理一如也五根入圓通竟舍利弗即從座起至光極知見斯為第一冠注此因眼識悟入圓通也舍利弗此云鶖子宿生以來眼識明利言我曠劫來凡見色時纖塵不染雖假眼識其實心見如是受生如恆沙之多生生世世於世出世法及與差別因果諸變化相一覽即過表裡洞徹不勞餘力獲無障礙而我此生亦於中途遇迦葉波兄弟宣說因緣所生法我說即是空亦名為假名亦名中道義便悟世出世法因心成體法無邊際即心無邊際故從佛出家而得見覺明圓則於事理無不融通於一切處不生怖畏且於衆中首稱智慧為佛長子皆為承佛教法轉凡成聖果地頻登法身漸著也心見發光者謂自眼識而發心光也光極知見者謂此一光圓極六根也所謂一根清淨其餘五根應時圓脫矣普賢菩薩即從座起至分別自在斯為第一冠注此因耳識悟入圓通也舊說行彌法界曰普位鄰極聖曰賢紹佛家業故為法王之子菩薩根者圓頓根也普賢行者即十大願王舉一色一香俱周法界是也沙界十方凡修普賢行者皆從立名可謂垂範之極矣凡聞聲雖名耳識其實心聞故能分別衆生所有知見以擇其大根而成就普賢之行且于恆沙界外設有一衆生發心我即分身至于彼處彼雖不見我亦冥中加被摩頂擁護勿令魔擾安慰成就勿令退墮我說本因者雖古佛久證亦有最初本因也心聞發明者謂轉有漏識成無漏智也分別自在者謂分別一切衆生知見而能所雙絶也孫陀羅難陀即從座起至明圓滅漏斯為第一冠注此因鼻識悟入圓通也孫陀羅此云好愛妻名難陀此云艷歡已名連妻彰名檢非牧牛難陀也是佛親弟出家之初愛心不息佛令同拘絺羅注心觀鼻端白以治散亂見鼻息出入如煙者謂初做工夫向粗處觀故觀成此相亦因散亂之人欲氣粗濁故也從此漸觀則根身器界悉成烟相遍成虗淨猶如琉璃及至淨觀發明煙相漸銷鼻端成白以至真光透露則出入諸息無非光明合心與境圓照無遺是則轉煩惱成菩提矣我以銷息息久發明明圓滅漏者化粗濁息成智慧火燒滅欲種故也舊說息由風火而起鼓煩惱濁故其狀如煙昧者不覺唯諦觀者始見也富樓那彌多羅尼子至銷滅諸漏斯為第一冠注此因舌識悟入圓通也我曠劫來敘宿因也辨才無礙即四無礙也苦空二乘權義實相一乘實義如是乃至者謂從一佛以至無量佛也祕密法門者窮盡玄奧也微妙開示者極其善巧而闡發也得無所畏得四無畏也佛以三輪應物無滯身現神通口說正法意緘機緣佛因其才而授以口輪助揚法化也助佛轉輪者謂上輔佛教因師子吼謂下化衆生皆因顯利他之行而成聖果乃化功歸己也降伏魔冤銷滅諸漏心內煩惱等魔因說法而銷殞身外天魔外道因聞法而退藏內外不侵則安然證入圓通矣優波離即從座起至一切通利斯為第一冠注此因身識悟入圓通也優波離此云上首以持律為衆綱紀故亦云近執佛為太子時彼為親近執事臣故貪欲諸漏者謂欲漏有漏無明漏也承佛教戒即受二百五十條聲聞戒也如是乃至下即菩薩戒也舊說行住坐臥律儀各二百五十對三聚成三千復以三千配身口七支成二萬一千復配四分煩惱成八萬四千言三聚者謂攝善法攝律儀攝衆生也四分煩惱謂多貪多嗔多癡及等分也性業者謂所戒之法體性即惡如殺盜淫性元是惡不待制止犯即成業遮業者謂所戒之法體性非惡但能開諸惡門為前方便即因過始治以遮諸惡如酒等是也身心寂滅因持身戒而得身寂因持心戒而得心寂是由戒生定由定發慧而證聖果也為衆綱紀者因名實相孚故令稽察持犯功過也印心者印持戒修身之本心也身得自在者謂持之既純不止無犯且亦無戒可持矣心得通達者亦不止無持無犯而且定慧融通深達實相也身心一切通利者謂從身識悟入圓通了身器二界總一妙性矣大目犍連即從座起至久成清瑩斯為第一冠注此因意識悟入圓通也目犍連此云采菽氏優樓頻螺此云木瓜癃胸前有癃如木瓜故伽耶山名即象頭山也那提河名因緣深義顯非世間和合粗相亦非小乘所悟之法也我頓發心即發菩提心也得大通達謂慧性開發漸見圓通境界也如來惠我袈裟著身鬚髮自落者敘投佛出家也我遊十方乃至成阿羅漢者敘將得圓通大用也十方如來歎我神力者謂不惟釋尊印其神通第一諸佛同印許也圓明清淨者謂自意識而入圓通三昧則周遍了知無所染著也自在無畏者如意自在永無摧無制也我以旋湛心光發宣者謂旋意識而還妙湛本體由湛體而發神通妙用也如澄濁流喻旋湛工夫也久成清瑩者喻湛體發起光用也六識入圓通竟烏芻瑟摩於如來前至登無上覺斯為第一冠注此因火大悟入圓通也烏芻瑟摩此云火頭即火頭金剛也舊說多淫之人本由暖觸迫發生為欲火死為業火業力增熾故成猛火聚教我遍觀百骸四肢諸冷暖氣者冷字疑誤據結文應云諸暖觸氣蓋多淫之人火大偏熾故教令即在火大下手做工夫觀此業火在百骸四肢中自何而起然後觀成火聚而懼心生焉則淫頓息可成觀體既成觀體能轉熱焰而成神光轉散亂而成定境于是化多淫心成智慧火故我全體住于火光三昧中以智慧火燒盡淫根種了成阿羅漢故諸佛名我為火頭而我復發大願永為諸佛力士親伏魔冤也我以諦觀身心暖觸者謂遍觀百骸四肢中欲火皆為淫心熾盛所發也無礙流通諸漏既銷者謂淫心頓息智火熾然所謂性火真空性空真火清淨本然周遍法界生大寶𦦨登無上覺者謂由火光三昧發則如來藏性也持地菩薩即從座起至成無上道斯為第一冠注此因地大悟入圓通也因平外地悟明心地遂持本行而證果故名持地我念往昔下敘宿生之行也要地指陸路言津口指水處言即渡頭皆舟車必由之所也有不如法者或險而高深或隘而迫狹不寬不平故妨損車馬平高填下作梁負土俗謂修橋補路也經無量佛者敘效力之行極久遠也闤市垣也詣往也不取其直不受顧價也毗舍浮此云遍一切自在唯取一錢以飢世而略資身命故也或有車牛以至拔其苦惱其行願既永故感神力以助其行也時國大王乃至一切皆平者謂毗舍如來教以攝事歸理也心為萬法之所依平等含育長養一切故曰心地悟明此心則情與無情元為一體依正二報本無自他聖凡因果一切如如凡所差殊皆隨心感變所謂隨其心垢則國土垢隨其心淨則國土淨也我即心開下敘承佛開示悟入圓通也身界微塵等無差別者謂達地大之相自心所現本無實體微塵自性不相觸摩乃至刀兵亦無所觸者謂地大自性空無所有統體唯一如來藏性何分其能觸所觸耶既了身世二塵染淨諸法惟一藏心故悟法性證無生忍也因悟無生而修菩薩行故于法華會上聞說佛知見地而機緣契合是以先得證明而為上首也佛問圓通下備敘前悟也謂由諦觀內外地大本一如來藏性循業發現故妄分根境今悟本性則根境自銷鏡智自圓安得不成無上知覺乎月光童子即從座起至圓滿菩提斯為第一冠注此因水大悟入圓通也童子乃菩薩別名表童真德也我憶往昔下敘宿因也佛名水天者謂從水大悟徹本性天真也教習水觀者以己之所證示人也觀于身中下聞法修觀也先觀涕唾津液等在一身中雖有旋復不停清濁不一而性體是同故不相傾奪也觀內既成引伸于外擴而觀之浮幢王剎等準華嚴經華藏海中有大蓮華其蓮華中有諸香水海一一香水海各有一華為諸佛剎世界種華藏世界在香水海中故曰浮幢王剎以華藏世界有二十重纍高如幢最為高大故稱為王今觀行成熟故觀身之水與彼海水性無差別雖則觀行成熟未得無我故入定之時不見一物但見湛水由定中猶存能觀之心所觀之水故出定之時亦存身相是以觀力縱然增勝入己所見皆同但定色未除能所未忘故有激水作聲頓覺心痛之事也身子入定於恆河岸有二鬼王乃過去宿冤以掌擊之出定頭痛以白於佛佛言若不入定遭彼所擊必作微塵賴蒙定力得平復耳今出定心痛故言同彼且自思惟久離見思不墮分段今復心痛將無退失四果也身質如初心不痛也逢無量佛謂所經多劫也方得亡身者謂無能觀之心亦無所觀之水則定果色亡蘊身亦空矣與十方界諸香水海性合真空無二無別者所謂性水真空性空真水也我以水性一味流通者所謂清淨本然周遍法界也得無生忍者得因地心也圓滿菩提契果地覺也琉璃光法王子即從座起至傳一妙心斯為第一冠注此因風大悟入圓通也因觀身心皆風力所轉觀成圓悟洞然無礙故號琉璃光也所事之佛名無量聲亦從此法門證得故也開示本覺妙明而令觀風大者謂本覺乃不動之體妙明乃周遍之用世界衆生皆是妄緣風力所轉者謂初由本覺一念隨緣而成無明風故感風輪執持世界今觀風性本空動相寂然則旋妄還真歸乎本覺然此尚是佛所示之觀門也我於爾時下敘入觀也觀界安立者觀方位安立由風力所持故也觀世動時者觀三世遷流由風力所運故也觀身之有動靜者由風力所轉也觀心有生住異滅者由境風鼓動心海而成識浪也是則世界身心動止不一觀其所由皆從本覺一念妄動搖明風出而生豈有差別之性耶我於觀行成熟時覺此羣動之性本自虗妄無所從來亦無所去以此推之微塵衆生皆是妄緣風力所轉自一世界衆生乃至大千世界衆生亦復如是各居一世界中喻如一器之中貯百蚊蚋啾啾亂鳴夫此衆生良由一念不覺故於自己方寸之中鼓發狂閙而已離心之外焉得有此動相哉由達心外無法故於生滅中速悟無生則本覺心開遂見震動國中有不動尊佛即能於不動如來為法王子乃至遍事諸佛紹隆法化也身心發光洞徹無礙者由觀身心皆屬風力妄緣所轉了妄無因洞見本覺如淨琉璃也風力無依者了此風相本空無所來去也悟菩提心者轉識成智也入三摩地者證圓通真理也合十方佛者上同佛果也傳一妙心者下化衆生也所謂性空真風性風真空唯一妙心也虗空藏菩薩即從座起至妙力圓明斯為第一冠注此因空大悟入圓通也無邊身即法身也真空法身遍一切處且法身無身以萬法為身故曰無邊蓋由觀彼四大無我而證此法身無邊遂轉八識而成四智即持此智照明塵剎則色色皆空是以法身四智遍融依正二界也又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際者蓋以一智而現十智照十方界窮其真空妙有乃從體起用也諸幢王剎來入鏡內涉入我身身同虗空不相妨礙者蓋稱法身智體攝諸剎海悉入其中乃攝用歸體也身能善入微塵國土廣行佛事得大隨順者是以一身遍入一切處寓物現形隨機普應如華嚴云清淨妙法身湛然應一切是也此大神力總指上能融一切能入一切及體用互攝也由我諦觀四大無依者空其身相也妄想生滅者空其心相也虗空無二佛國本同者性空真色性色真空也於同發明得無生忍者了色即是空空即是色而證無生法忍也觀空無邊入三摩地謂由觀空大而悟入圓通也妙力圓明者極言色空不二依正相入自在無礙也彌勒菩薩即從座起至得無生忍斯為第一冠注此因識大悟入圓通也彌勒正云梅怛利曳那舊說此翻慈氏為慈隆即世悲臻後劫愍物迷識故示迹發明也我憶往昔敘古從凡入聖之因行也心重世名好遊族姓者謂身雖出家心未入道重世虗名喜親貴族也修習惟心識定入三摩地謂重世名族散心馳求者為見心外有法取著名相故授以唯心識定蓋唯遮境有識簡心空入此觀門即達心外無法凡內身外境唯自識心熏習變現猶若夢幻生滅不實能如是觀則外馳心止而觀行成就矣歷劫以來乃至無量如來者謂修習既久唯識定深自知萬法如電一心內觀無復外求妄緣盡息名心悉空如是漸進得成無上妙圓悟明如來藏性則了三界唯心萬法唯識而獲無分別智證如如理故明法界身心本無二相諸佛如來自性流出不由他現也今得授記次補佛處者正顯由修唯心識定而得因圓果滿故補佛位也佛問圓通乃至得無生忍者謂由前來未修唯心識定不知見相二分唯藏識變起執為實有故成依他起性復從二者周遍計度起我法二執故成遍計執性今由修定而得悟性識明知覺明真識妙覺湛然周遍法界遂達遍計本空依他幻有唯一圓成實性故能遠離依他遍計而證無生法忍也唯識頌云若時與所緣智都無所得爾時住唯識離二取相故蓋由初觀依正染淨等法唯識變起本無自性即不起妄想遍執計我計法便離遍計也復達能變所變唯一妙覺明性更無別法便離依他而圓成清淨寶覺也如唯識云初即相無性次無自然性後由遠離前所執我法性是也大勢至法王子與其同倫至得三摩地斯為第一冠注此因見大悟入圓通也舊說準觀經云以智慧光普照一切令離三途得無上力名大勢至又言此菩薩舉足下足皆一切世界震蕩三途令成解脫凡入諸佛會中必先震動故得是名悲華經言往昔因中彌陀作輪王時觀音為長子勢至為次子今在極樂居於彌陀左右倫類也十二如來者謂無量光無邊光無著光端嚴光愛光喜光可觀光不思議光無等光不可稱量光映蔽日光映蔽月光超日月光具大本彌陀有此十三號也念佛三昧者都攝六根淨念相繼也若念自性彌陀能念屬正智所念屬真理智理一如本性佛現矣若念樂彌陀能念屬己所念屬佛但己能冥記不忘佛自放光接引也一專為憶喻佛念衆生也一人專亡喻衆生不念佛者也若逢不逢或見非見者以佛更無餘事唯念衆生曾未頃刻離衆生故曰若逢或見也衆生無心念佛而佛雖時現於前衆生冥然不知故曰不逢不見也二人相憶乃至不相乖異者喻佛生同念且如形影不離寧惟逢見而已哉十方如來憐念衆生如母憶子合上喻一人專憶也若子逃逝雖憶何為者合上喻一人專忘也子若憶母如母憶子母子歷生不相違遠者合上喻二人相憶乃至形影不離也若衆生心乃至自得心開者申釋上義謂果心專憶佛念佛現前自得見佛足見佛不離心但因迷悟故成隱顯耳既得現前即見豈有當來不見者乎且去佛不遠亦不假佛之方便而自得心開見佛矣如染香人身有香氣喻心近於佛自有成佛氣分也香光莊嚴者謂假念佛香光莊嚴自己素法身佛也我本因地以念佛證無生忍指因行言今於此界攝念佛人歸於淨土者指果德言乃因果一如也都攝六根者謂念即意根由意為諸根所依故意根念佛則以諸根攝在一處故也蓋初念佛時即以生滅心緣佛相好及依報莊嚴眷屬等一一樂事專住一境心無間斷見佛依正二報如對明鏡周眸一覽無非妙境然後觀此所見佛相妙境俱屬虗妄本無自性唯念所現復觀能念之心自何而有遂此不見一法畢竟空寂以心不見心故無相可得是則能所俱寂本來無念離念相已等虗空界無所不遍法界一如即證平等法身由念相好證法身佛蓋生即無生也然我既證法身衆生法身與我無二且無二之性互相關涉故念佛者我皆攝入也修行者能知此等法門自不以參禪者為高利念佛者為卑鈍矣
