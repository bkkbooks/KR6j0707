body:
  text: 明柴紫釋乘旹講錄新安受法弟子汪益源校梓舊說前明六天雖出塵擾未能絕欲故通名欲界自此而上明十八天雖離欲染尚有色質故通名色界又通名梵世為已離欲染也通號四禪為已離散動也欲天但五戒十善感生此天兼禪定感生然特有漏禪觀六事行耳六行者厭欲界是苦是麤是障欣色界是淨是妙是離此則凡夫伏惑超欲界道也又云前天間亦有禪定而此界方名禪者以前結云形雖出動心迹尚交足知自此已上絕無女人心迹俱離無所交接兼無食眠三欲俱忘稍涉饑倦即入禪定出定則飽滿精明是但以禪悅為食為息稍離麤重身心矣阿難世間一切所修心人至諸漏不動名為初禪冠註此明色界初禪三天也世間一切所修心者謂三界天人雖未得出世心為本修因而亦各各自謂已得真修心矣不假禪那無有智慧者謂彼惟有漏靜慮伏欲六行制彼淫習而非無漏真三摩提金剛觀智故但能執身不行淫欲及與一切時想念俱無由彼身心俱潔下無卜居故臨終時應念而生色界為梵世伴侶如此一類乃梵天之民故名梵眾天欲習既除離欲心現等謂前天既離欲習此天定心顯露而於定共戒愛樂悅豫隨順輕安故臨終時應念而生梵世匡王輔化故名梵輔天身心妙圓威儀不決等謂前天定心發露復具德化故身心圓妙威儀不缺而此天從定戒中發起智慧故解勝前天堪為梵主於臨終時應念而生梵王統攝梵眾故名大梵天俱舍說威德光明獨一而住無尋有伺定力所感下二天俱有尋伺又劫壞後去劫成先來外道不測便執為常又因起念見有天生便執能生世間為一因生下結示三天名初禪也勝流等謂已離五欲已斷十惡能勝欲界諸趣故欲界八苦所不能逼雖非真正三摩提而戒心清淨欲習已伏不為所動故名初禪亦名離生喜樂地以離欲惡故生喜身心輕安故生樂也阿難其次梵天統攝梵人至麤漏已伏名為二禪冠註此明色界二禪天也謂從前天修來戒定慧具故曰圓滿梵行也進至此天則三識不起定心一境唯緣內塵故離欲得定定深生照而心水澄湛寂然發光然心光尚劣未極其量故名少光從前少光更增光耀則心境互照境隨光發映十方界徧成瑠璃然光雖極量但徧小千世界猶未成音故名無量光從此修進又得吸持圓光成就教體者以此天無前五識亦無尋伺故能吸持無量淨光而以圓光發宣梵行不待言詮自成教體闡明淨理應變無盡故名光音下結示三天通名二禪也謂此三天又勝下天初禪雖得喜支未生極喜雖離苦惱猶有憂喜相對此得極喜故諸憂懸所不能逼能以定力伏前五識故通名二禪亦名定生喜樂地謂此定功德與徧身樂俱發故也阿難如是天人圓光成音至歡喜畢具名為三禪冠註此明色界三禪天也謂前天雖以圓光為音教披音則顯露妙理然有喜心動念猶障淨樂此天即依妙理發成精行且恬泊寂靜而通寂滅樂由靜樂初通淨空始著故名少淨此初伏第六識非大寂滅也六識既伏淨空現前此則擴充之而樂心愈寂淨空無際故內心外身皆獲輕安則寂樂已成淨空無量故名無量淨前天寂樂止徧身心此天身界虗寂觸處皆成妙樂天中淨德所成樂境無過於此是故認此淨樂為真際樂土將己身心歸託此地由觸處皆成淨樂故名徧淨下結示三天通名三禪也此天妙樂周徧無量莫不隨心順意故曰具大隨順前二禪有喜心動念故身心不得安隱今則喜心動念皆無而無量至樂自在受用雖非真正三摩提不妨心雖無喜而喜樂自具故令安隱心中恬然畢具故通名三禪天亦名離喜妙樂地謂喜是動心所發樂是靜慮所融故名欣喜而後得妙樂故界內稱三禪為極樂處也阿難復次天人不逼身心至功用純熟名為四禪冠註此明四禪天也謂初禪離苦惱二禪盡憂懸故不逼身心欲是苦因諸欲杜絕故苦因已盡三禪離喜受樂此天則知樂亦不常以樂久必壞壞即苦生故將苦樂二心同時頓捨既離於苦亦不受樂則壞相不生苦壞雙超則淨福性生故離福生此則心住不動定捨俱發意無苦樂亦名捨念清淨地前天初專捨心尚未圓融此則毫無樂念故曰圓融於捨心中仍生勝解決定任持不為異緣所轉故曰清淨由心圓融故淨福無礙於圓融無礙處有所願求無不隨順故任心自在窮未來際愛樂隨順故名福愛舊說窮未來者即資福二路受報長遠動經劫數非真常住也福愛者謂諸天之福以此天為最可愛以三灾不及故或此天積福別有愛求即希二路也是天指福愛有二岐路者隨其心念行業故也一直往道趨廣果二迂僻道趣無想先心即福愛妙隨順心無量淨光即捨俱定所發心光也福德圓明修證而住者於無量光中以四無量心熏禪福德離下地染俻歷四位廣福所感故名廣果先心同前廣果厭苦樂而增修福德此天厭苦樂而進修捨定此兩天分岐之故也精研者深搜細索也相續者勤勇無間也圓窮者必求究竟也身心三句定成尅果也謂以捨定滅除捨心令心慮灰凝經五百大劫第六現行不起妄謂涅槃不知正是微細生滅流注是人下斷其以生滅修因不能感不生滅果也初半劫滅者謂初生此天習定半劫始得想滅後半劫生者此天報盡於四百九十九劫半後復生想心也此但六識不行故名無想下結示四天通名四禪也由苦樂雙亡故二境不能動心也四禪不為三灾所動名不動地無為真不動地指第八聖位謂此禪天器非真常情俱生滅雖非無為真境而有為功用至此已純熟矣上四聖流通名四禪也阿難此中復有五不還天至如是一類名色究竟天冠註此明五不還天也此中指四禪中不還者斷盡欲界九品思惑以證三果不復生欲界矣習氣即思惑種子謂以貪瞋痴慢微細思惑分為八十一品於三界九地地各九品今斷欲界一地九品故苦亡而欲界無卜居復斷上三地各九品故樂亡而色界下三地無卜居未盡斷第四地惑故惟四禪捨念清淨地是其同分而有卜居處也苦樂兩滅等謂苦樂未亡時則厭苦欣樂交戰胸中故有煩今已兩忘則心不交故名無煩盛熱曰煩稍得清涼曰無煩機放動也括收斂也謂心之放收惟行捨念更無餘念前雖鬪心不交尚見交地今併其交地亦復研盡則意地清淨全無微煩故曰無熱既得心地澄清發天眼通故徧見十方界而無非妙境故曰妙見圓澄塵象即境沉垢即惑正顯定慧雙融心境俱淨而所見皆善故名善見既得心眼圓妙故能以定慧之力鎔鍊一切隨心自在變現無礙故名善現究竟窮研也幾微動也言以無漏一念熏有漏種種念而至於一念亦能窮色性至於微而復微將入無色邊際究至於此則色已盡矣故名色究竟天阿難此不還天彼諸四禪至自此已還名為色界舊說自此而上明無色界四天也無色者無業果色有定果色依正皆然乃滅身歸無捨厭天人雜處其類不一皆無色蘊也四天皆依偏空修進初厭色依空二厭空依識三色空識三都滅而依識性四依識性以滅窮研而不得真滅是皆有為增上善果未出輪迴不成聖道者也此中盡色趣空凡夫是其正居定性聲聞寄居而異計外道雜處也冠註此結示五天雖屬色界惟是聖居也凡此五天必是進向三果得四禪發無漏慧起熏禪業或起一品以至九品方始得生凡夫無此熏禪業故不得生謂此五天不獨四禪天人不見即四位天王但欽仰其名不知其受用不見其依正也以四天修有漏凡定五天修無漏聖定故有聖凡麤細相去懸殊也如今世間下以人間例明也聖道場地若五臺蛾眉天台等是也雖舉羅漢亦兼菩薩下結屬色界也獨行無交謂無情欲也未盡形累尚有色質也故自色究竟以至梵眾皆名色界復次阿難從是有頂至迷漏無聞便入輪轉冠註此欲明無色界天而先分岐聖也色竟天居有色頂與無色隣故名色邊際中由那含人雖根有利鈍皆以有頂捨心為因心而修定故於捨心分二岐路若利根者研窮色性求見真空發無漏慧慧光圓通橫出三界入菩薩乘名迴心大阿羅漢若鈍根者亦由捨心修定窮盡色性欣上厭下生無色界漸斷漸證竪出三界也此下明無色界若在捨心捨厭成就者躡前天也覺身為礙等舊說厭身質礙堅修空觀滅身歸無由厭色依空名空處定故報生空處也捨心有二若於有頂用無漏道斷惑入空即樂定那含也若於廣果用有漏道伏惑入空即凡夫外道也諸礙既銷而無即不依色矣無礙之無亦滅即不依空矣惟全留阿賴及半分末那即厭空依識也阿賴第八識末那第七識末那惟留半分微細者以第六分別已伏故末那一分亦伏第六俱生未斷故末那一分亦未斷此厭空無邊緣空則心散礙定遂捨空緣識名識處定故報生識處空色既亡躡前天識心都滅謂憑深定力伏其末那半分不起現行寂無攸往等以所緣既無能緣不行由彼厭識無邊緣識則心散破定遂捨識緣無所有法名無所有處定故報生無所有處識性不動者由末那現行全伏惟存種性眠伏藏識幽深難動也以滅窮研等謂行人至此志窮力盡不復研真斷惑故於無盡性中強以發宣自謂已盡其性不知但由滅定所逼則識性雖存而不起故曰如存不存別見識性盡其實未盡故曰若盡非盡由其厭前識處故入非有想厭無所有處故入非無想是名非想非非想處定故報亦生此處下總明聖凡出墜之地也此等者總指前四天人也自初天窮色歸空乃至四天窮識性歸盡性如此窮空豈惟不達性色真空性空真色之旨即人法二空之理皆所不知而妄起空盡之念故自五不還天窮空而至此天者其根行尚真候其八萬劫滿斷盡思惑而出三界者名鈍根羅漢因彼不能同有頂之回心者故曰鈍也若從無想窮空而至此天者其根行原邪以彼迷有漏天作無為解故八萬劫報滿無所歸托便淪墜矣阿難是諸天上各各天人至補特伽羅各從其類冠註此下總結三界聖凡之差別也是諸天者總指三界也天人即各天之臣民謂此天人因中唯修十善八定而以六欲四禪之果酬之故報盡復入輪迴也天王即是菩薩寄位修進乃借此天位為成等正覺之道路故不落輪迴矣下結屬無色也前二天全無身境故曰身滅盡後二天識心現行不起故曰心滅盡由身心俱滅故定性現前亦能隨化依正自在受用即出定時身心俱寂依正皆空故無業果色唯有定果色也此從空處以至非非想統名無色下復通前總結三界也謂自六欲以至非非想皆由不能了達自己本妙覺性本明圓心元無生滅業果等相故從妄積妄妄生三界所以諸天報盡則於其中復隨妄業沉溺七趣曾無休息也補特伽羅云數取趣即中有身也數數生取著諸趣故曰各從其類復次阿難是三界中至因溼氣有畜生趣攝冠註此明四種修羅也阿修羅此云非天謂其多瞋有天福而無天行也亦云無端正由男醜女美以男立名亦云無酒以瞋無和氣釀酒不成若於鬼道等謂彼前因從鬼趣發心護經呪禪戒等故藉善力升此趣中乘神通入空界居之或因想多氣勝故感卵生飛空而屬鬼趣也若於天中等謂前身在天趣中或因損德或天福盡俱貶墜此趣卜居人世固是胎生而屬人趣也執持世界等謂能驅役鬼神禍福人間其威力通徹天人無所怖畏但專權不及諸天故怒而爭之其福力變化俱等於天固是化生而屬天趣也別有一分等謂此修羅因行微劣故感生海心水口以居水穴固是濕生以下劣故屬畜生趣也阿難如是地獄餓鬼畜生至但一虗妄更無根緒冠註此總結七趣虗妄也謂精詳研究七趣升沉往復之由皆是無明惑業為因相故感七趣為果相總是由妄想受生隨妄業受報也若於妙圓精明無作本心中曾無七趣因果之相而此昏沉諸有為相在本心中猶如空華在於太虗豈有着處唯一虗妄更無根蒂頭緒之生起也昏沉即無明諸有為相即惑業皆因也受生隨業即果也有為與無作反阿難此等眾生不識本心至云何更隨殺盜婬事冠註此明妄無根緒因迷而起用答妙心徧圓何有七趣之問也不識即迷也本心即妙圓明無作本心也謂汝問此等七趣自何有也皆因迷自本心受此輪迴雖經多劫不得常住真心性淨明體而永沉生死皆由用諸妄想隨順殺盜淫故而成三惡縱能反此殺盜婬又生三善若有三惡則沉墜三塗若無三惡則飛昇天界由其善惡互相有無彼此傾奪故上昇下墜起輪迴性無有盡期若知善惡總輪迴性須得妙性開發而於善惡都不思量唯修真正三摩提則證本妙寂常心性果能至此不但善惡二性立地銷滅即無二之性亦不可得故曰有無二無無二亦滅此則豈但超七趣生死即二乘涅槃亦超脫矣如是則尚無三善云何更墮三惡哉故曰尚無不殺不偷不淫云何更隨殺盜淫事事即因果也阿難不斷三業各各有私至若他說者即魔王說冠註此結答前問而戒勉真修也前問云為有定處為復自然彼彼發業各各私受故牒答云由不斷殺盜淫業故各各私造因各各私造故在眾私同分之中非無定處言造業各私而受報有同分地即別業同報也然此別業同報從何所有皆自妄業之所發生業既妄發本無有因無因則所生之處亦無可追尋窮究矣然雖無因可究要不出三惑為之根本汝今勉力修進必欲獲取無上菩提當以除此三惑為之要訣盖彼三善惡業根於惑起故應盡其根而除之若不盡三業之根本縱得五通皆是有為功用非無漏淨業以惟伏現行不除種子不得漏盡終落魔道雖欲除妄是以虗濟虗倍增其偽但自名得道而實為業果此真可深哀痛愍者由阿難初問佛體真實云何復有諸趣故答云汝妄自造非菩提有咎也菩提指佛體也復警戒云若末世說法者如我此說即佛正說若讚行三惡者以為勸化即魔王之邪說也足見必斷三惑方可得真正三摩提也勗勉也上詳明七趣竟下詳辯魔境魔有五種曰陰魔曰煩惱魔曰死魔曰天魔曰天魔合為二種以陰魔攝煩惱與死魔皆依五陰而起故天鬼二種皆因修邪定好害正道者故總名天魔夫此魔境非具一切智者莫能辯其真偽故阿難但知啟請修定證果而定中微細魔事不能問及亦乃雖蒙世尊直示真修行路堪可趣至無上菩提而沿途艱險尚未親歷唯世尊深知魔軍勝負實正定真修成壞所關且隳妙覺心破法王家者莫甚於此是故將罷法座迴身復留逐一指明令末世修正定者自識魔外准俻無虞所以再興深慈不待問而自說也即時如來罷法座至歡喜頂禮伏聽慈誨冠註此無問自說也如來下經家所敘將罷法座顯最後開示也回身再來顯不盡深慈也汝等下總明魔能害正凡修正定者不容不識也真修行法即從耳根圓通悟入楞嚴大定也意謂我已為汝指示楞嚴大定為真修實證矣汝等亦皆明了而猶未明定中所現魔事最為微細若不預知忽爾現前邪正難辨設汝心中毫有染着彼則乘隙賺引令汝墮於邪見而不自覺矣陰魔即色陰中禪定所迫初心自現尚無外魔也天魔鬼神魑魅皆受想二陰中稍失正見引入外魔也魔正現時若不能識或自認為聖或認魔為聖皆是認賊為子而立喪家寶矣行識二陰中所現心見二魔併無外來皆是自己心邪得少為足之過也下舉一以例餘也無聞者但修無想不樂聞法不習正定自謂極果及至報盡想生衰相復現不知元非聖證而反謗佛妄說羅漢不受後有由謗法故遂墜地獄其害至此良可怖焉汝等欲修正定趣大菩提應當識此幽微魔孽故我為汝仔細分別汝當諦聽阿難等聞此魔事悚然起立歡喜聽受佛告阿難及諸大眾至所有國土而不振裂冠註此欲明動魔之端而先推真妄生滅也本覺妙明指用言覺圓心體指體言意謂真覺體用眾生與佛本同良由眾生一念妄動背覺合塵迷真逐妄而成過咎遂有根本無明發業潤生瞥爾俱起則徧迷覺體頓成空性是故迷覺性成妄想晦真空為頑空也於是化迷不息轉生世界所謂依空立世界也是則十方有漏微塵國土皆由迷真空而成頑虗昧覺性而成妄想之所建立也故知空生大覺中若片雲點太清裡已是幻化眇茫況復依空所立之世界其幻化眇茫不待言矣但為一切眾生以妄逐妄從迷積迷故不覺知耳設使汝等一人能住三摩提中開發真性復歸元覺則十方空皆悉銷滅殞亡矣況依空所有國土而不振動崩裂者哉盖謂虗空世界總一名相耳名相唯依妄想而立若轉妄想成正智則名相悉歸如如矣故曰一人歸元十虗銷殞所以古德云虗空生時但生假名虗空滅時但滅假名汝輩修禪飾三摩地至於三昧時僉來惱汝冠註此明怖魔致亂也飾嚴整也意謂汝等於深入正定發真歸元時自與十方聖賢氣分相接心精通脗混同一際不離當處寂然不動湛然清虗不相惱亂其餘天魔及與精靈鬼神乃至無想外道天等所居宮殿或處虗空或處水陸無不崩裂既然大地振坼則水居之河海精靈陸居之山川鬼恠飛騰之夜叉修羅等無不驚慴惟下界凡夫未具五通故不覺其空界遷壞唯訛傳山搖地動故無驚慴彼魔王等咸得五通未盡習漏既戀塵勞又知其故是以不容汝等摧裂宮殿然動徧空界惟魔不容者為彼所處全依邪暗汝等正定發明照見邪踪彼各竭所能欲壞汝定故僉來惱亂也然彼諸魔雖有大怒至宛轉零落無可哀救冠註此明悟迷之利害也意謂彼等固以壞汝為事而彼造塵勞中之邪行汝修妙覺中之正定邪雖怒正不能害正以邪害正猶如風之吹光刀之斷水終不能斷損於光水也以正化邪亦如沸湯之釋堅氷暖氣近而寒凝自銷矣良由彼雖恃其神通而驚慌於外終如暴客汝雖未具神通而能堅守於內終是主人成就破亂不從客便悉由主人必俟五陰主人迷己正念認賊為子則客得其便遂乘間而入劫汝家珍若使陰主當處正定一切不𮨇惟照真元縱彼魔力強橫毫無入處無奈汝何由汝陰貭漸銷光明漸發彼則久入邪群咸受幽氣近光明如暗就燈自然銷殞何敢久留明處擾亂汝之正定耶若使主人心不明悟於彼幻境或生畏愛或生取捨稍失照真聊違正定被陰所迷便墮彼類而為彼眷屬矣即如摩登殊為眇劣且彼初心惟慾呪汝破佛律儀而已故於八萬行中秪毀禪戒由彼不能毀汝清淨覺體故汝尚未遭其淪溺也若此等魔王本非眇劣之類況其初心不獨毀汝一戒心欲隳汝寶覺全身令汝喪身失命永為魔子而後已一遭其害猶如宰臣之家忽遭天王除其屬籍不但失却官位而且不免於刑律也設汝果壞全身豈止道果不成亦且墮入地獄宛轉零落至於此縱有慈力徒增哀痛其可救乎阿難當知汝坐道場至堅固妄想以為其本冠註此明色陰之本末也道場者凡事理兼修處即成道之場也銷落諸念等謂初坐道場屏除一切浮亂粗想久之妄念自離此離念相如杲日當空於一切時皎然不昧故曰離念精明於是則動靜之境不能移憶忘之識不能交而根塵識三合一精明當住此精明如一之處便入聞熏聞修金剛三昧矣然定力未深理境乍入猶為色陰所覆如明目人處大幽暗未獲般若大智故精性妙心猶未發光凡所見處惟是黑暗此則色陰區局盖覆真性不得寬廣伸大此乃色陰未破之相也若使定力增進心光發越前之暗境皆化心光雖未能圓鑑三千而十方洞開無復幽黯此即色陰已破之相也謂此色陰由妄執四大所成既有身相即有前五根攬着前境而劫奪真性渾濁妙明是故色陰盡而劫濁超矣至此返觀色陰之由元從堅固妄想內外相織凝結而成是其根本也阿難當在此中精研妙明至若作聖解即受群邪冠註此下十種明色陰中所現之境也此中謂此禪定中也精研者正是定中着力挨排之工夫也妙明指真體之用也不言其體者顯用有明昧體無遷改如鏡埋塵垢中雖掩其光明而曾未虧其體性也故行者精研妙明亦如磨鏡但去情想塵垢而大圓鏡體略無所增且此妙明本周法界曾無隔礙但由妄認四大內外交織遂成質礙故今精研功勝則不相織矣於少頃間身若虗空毫無碍斯由定中功用逼極偶令內心流溢外境虗融暫得暫失非同聖果永證無遺汝等若恬然無着毫無欣羨雖則定力挨出亦為善境若遇此境妄作證聖即受邪氣破壞正定矣阿難復以此心精研妙明若作聖解即受羣邪冠註此明內徹之境也精研妙明準前其身內徹者謂心光忽然超徹身內反觀臟腑親見蟯蛔以手拾出身無毀傷此乃心精暫明流溢形體斯但功行大急暫得形體不礙非聖所證真常之境意無所着猶然善境稍無識見而作聖解即受群邪隳汝正定矣又以此心內外精研至若作聖解即受羣邪冠註此明內外俱徹之境也內外即心境也清明時是魂為主昏晦時是魄為主斂固於內是意志為主發揚於外是精神為主此皆第六識用事故除第八識執受其身居然不變其餘魂魄等皆棄其本軄而𮞏相涉入也互為賓主者謂一為主而餘五皆為賓也聞空中說法者即指目前也聞十方密義者即指徧法界也𮞏相離合者有時精離本軄而合於魄有時魄離本軄而合於精等盖離即棄本軄而合則成他軄也成就善種者謂夙昔聞熏今加精研自能發揮而有所聞也如是下準前又以此心澄露皎徹至若作聖解即受群邪冠註此明內心澄徹外現佛境也此由精研功勝妙心益明也澄露皎徹者粗惑漸銷也內光發明者智體開朗也良以智起惑亡故無情徧成金界有情悉作如來梵語毗盧遮那此云光明徧照乃至蓮華俱時出現者謂依正莊嚴皆隨心變現也此名下斷定此境是夙昔因中曾聞大法而心有靈悟所染種習今加研究故心光忽明照諸世界然偶爾暫現非同聖證亘古如一也又以此心精研妙明至若作聖解即受群邪冠註此明精研功極故見空羅寶色也觀察不停者言觀照功切毫無間斷於諸妄念更加抑按於諸塵境更加降伏如是則制止之功太欲超越逼拶至極忽見十方虗空成七寶色或百寶色且同時徧滿而多少之色不相留礙也或青黃赤白五色俱現而各色純然曾未混襍也此由精研妙明逼極煥散而現故見此種種勝境然暫得暫失非一現永現也又以此心研究澄徹至若作聖解即受群邪冠註此明研究澄徹故暗中見物也研究即挨排也澄徹即靜極也精光不亂者心光凝定明暗二境不能移也忽於夜合者合閉目也謂於夜間閉目而見正顯下見暗室中物非從目見也見種種物等者非室中元有之物是暗中所現奇怪之物而室中之物件件如故曾未變易下斷明謂此乃心既微細見亦密澄精光凝定暗境洞徹然未透徹本地真光無乃研究功勝暫時發露耳此中合字藏板皆同今人妄改為半字不可從又以此心圓入虗融至若作聖解即受群邪冠註此明圓入虗融身同草木也圓入虗融等者謂研究功盛內身外境無不虗豁故四肢皆同草木火燒刀斫總不覺知由不覺知故火燒不爇刀割不傷也此由定力所持想心亦寂功切至極執受不行則五塵併銷排遣四大純覺遺身故無傷觸也此亦暫時透露非真色即是空空即是色也又以此心成就清淨至若作聖解即受群邪冠註此明淨心功極覩界覩佛也成就清淨等者謂厭穢濁之質礙欣淨妙之虗融凝想淨心之功至此已極故忽見大地山河化成淨妙國土又見淨土現在諸佛更見地獄天宮上下無礙此由昔聞教中所說淨穢二土隨起欣淨厭穢之念熏習成種今於定中凝想日深逼極化成暫得如是非真居淨土也又以此心研究深遠至若作聖解即受群邪冠註此明研究深遠遙見遙聞也研究深遠等者謂於定中深心研究率爾周徧到於極處遂令心光逼極飛出故於遙遠障礙處皆能見聞此亦暫時一過非實得周徧法界也又以此心研究精極至若作聖解即受群邪冠註此明研究精極見知識也謂定中竭力研窮到至精至極之處正與聖賢心精通脗之時而色陰將破魔宮振裂魔心慌越故魔擾於是而興端也見善知識等者謂行人靜中自見善知識或變為諸佛菩薩及天龍等者盖此境界元是行人曾有邪種含受於心功至於此逼極發露非真見聖或是魔入行人心腹持其神識故令行人無端說法亦能通達妙義以發其狂慧非真證聖也使行人至此先覺魔自銷歇若反生聖解則其害非細也阿難如是十種禪那現境至保持覆護成無上道已上十種魔事是世尊拈其大槩以示初心非色陰中定有此種類而不可變易也亦非決有此定數而不可增減也但論行人用心何如耳或緩急得宜則絕然不見或交互觀想則所現愈多或種類不同或多寡不一悉隨心所變非有定體若俾按經待驗則何異於刻舟求劍者哉後皆倣此冠註此結害囑護也謂此禪那所現十境皆是行人於色陰中見理未徹正定未純但以禪觀與堅固妄想兩相交戰互為勝負之所現起如一善境現即是禪觀暫勝妄想也少頃即隱是妄想復勝禪觀也由勝負互出不得永證聖境此群邪所以乘隙而入也眾生頑迷不度己功力未久亦不察其暫現復隱逢此境現便謂登聖是未得謂得未證謂證安得不墮地獄乎汝等當依如來即以此義傳示將來修正定者令其預知使天魔等不得其便更得神力以保任扶持遮覆衛護不令至惑而成無上道也阿難彼善男子修三摩提至虗明妄想以為其本冠註此明受陰之本末也修三摩提下躡前色陰已盡見諸佛心如鏡現像正是禪觀有成色陰已破洞視自己妙覺明心不從外得也若有所得等者謂但見本有真體而未能發起妙用不得任運自如此正顯受陰未破也猶如魘人喻行人被受陰所局手足二句喻上若有所得心觸二句喻上而未能用下直出正意言見真體而不得妙用正是受陰區局真性盖覆妙明不得寬廣伸大也愛陰一破亦若魘歇不為過咎真心廣大本周法界無始迷執惑為身內故生來死去不能離身若使真心離身觀面去住自由便是稍發妙用而受陰盡矣此受陰即前五識也見即領納也由前五識領納違順等境引生苦樂等受渾濁真心今則受陰破而見濁超矣至此返觀受陰之由元從虗明妄想交妄織成也虗明者謂曾無實體虗有所明而已阿難彼善男子當在此中至失於正受當從淪墜冠註此下十種明受陰中所現之境也此中謂禪定中如下文云彼定中是也得大光耀躡前十方洞開無覆幽黯謂色陰盡矣其心發明躡前見諸佛心如鏡現像也內抑過分者自知受陰為咎不得妙用急求破除也忽然發悲者亦知一切眾生皆被色陰所局未能如己心光發明故見大小有情皆生悲愍之心不覺流淚矣盖此悲心實非諸佛同體大悲但由功用抑摧太急故成過悲若能速悟本因復顧正念不作聖證久自銷歇若自謂已證諸佛大悲則有悲魔乘間入心見人則悲啼泣不已遂失正受而沉淪墜落矣正受者正是禪定中無意味無巴鼻處到此毫無欣厭亦無畏愛方可保任稍生一念則受用不住而正定失矣阿難又彼定中諸善男子至失於正受當從淪墜冠註此明舉志齊佛以致魔擾也受陰明白者盖覆稍輕也勝相現前者如得大光耀等也感邀過分等謂稍見本真似乎心同佛心故極喜成功而發大勇猛自謂不歷僧祗當下作佛此由慧狂定弱見理忽略自以高志限功輕率取證過分越禮故作此解若悟而返之可復無咎若妄任不返則有狂魔入心生大我慢上無諸佛下無眾生妄自尊大失定從墜無疑矣法句經云若起精進心是妄非精進若能心不妄精進無有涯又彼定中諸善男子至失於正受當從淪墜冠註此明沉憶無慧以致魔擾也前無新證受陰未盡也歸失故居色陰已盡也當此之際但應定慧均持攻盡虗明妄想自有新證若乃智力衰微照真失準進退未由則中隳無倚杳無所見由無慧照用故定心枯渴由前後脫空故時刻沉憶心不敢散復將沉憶不散以為勤精進相而欲成破陰之功不亦謬乎此則偏定無慧自失方便若能悟此還復等攝庶無過咎若以沉憶枯定妄謂證聖則有憶魔入心晨夕撮心懸掛一處失其本定當從淪墜也又彼定中諸善男子至失於正受當從淪墜冠註此明慧偏多狂以致魔擾也慧力過定失于猛利者謂慧猛過定也勝性懷心者妄謂自性本來是佛不待修成故自疑己身即盧舍那勿勞進取得少為足此是功力未純而不恒自審察己功何似佛功己德何似佛德唯執己之知見已同佛之知見故廢修證也若猛省其非可還無咎若堅任舍那迷不知返則類魔入心大發狂言自謂證無上道而失己正定從魔淪墜矣古德云無憶名戒無念名定莫妄名慧一心不生具戒定慧然非一非三也又彼定中諸善男子至失於正受當從淪墜冠註此明歷險多憂以致魔擾也新證一句同前偏定歷覽二際等謂觀色陰已盡受陰非實于二邊際俱難倚恃恐遭退失遂生艱險過憂不止轉成倒見故如坐鐵床乃至求人絕命此由勤修密進不覺心中恐懼過甚無復方便自慰故至于此若使改過忘憂自復正念若以憂慮為聖證憂之不止則有類魔附之而執刀自割靡所不至則失己正定從魔淪墜矣故六祖云一切無心自性戒一切無礙自性慧不增不減自金剛身去身來本三昧又彼定中諸善男子至失於正受當從淪墜冠註此明覺安多喜以致魔擾也此由色盡而無質礙受明而得清淨處此境界安然快樂遂生大喜不知大事未明如喪考妣大事已明如喪考妣縱處清隱何樂之有此由定深而得輕安若以智慧照察方息塵勞何甞妙樂喜心自禁復歸無咎若謂聖心樂道應當如此則同類之魔乘間入心從此恣情縱意自謂得大無礙證真解脫失己正定應從魔墜矣又彼定中諸善男子至失於正受當從淪墜冠註此明見勝多慢以致魔擾也自謂已足者見色盡受明不求師印自謂滿足妄自高大眇視諸聖也大我慢者謂恃己而凌人傲物乃七慢之首也七慢者謂于劣計己勝于等計己等為單慢于勝計己等于等計己勝為過慢于勝計己勝為慢過慢未得謂得計劣為多為增上慢自全無德謂己有德為邪慢對多勝者自甘下劣不敬不求為卑劣慢若彼七慢俱發則自謂超越諸佛況諸二乘乎此由唯見己靈殊為尊勝且無智慧以救其弊故耳若使發真般若等觀法性尚不見有一眾生可慢況陰未破而行猶劣安敢慢諸聖賢哉若終執迷無復改悔即有同類慢魔乘隙入心顛狂愈甚乃至毀佛像為金銅土木稱自身為活佛毀聖經為紙墨文字稱自語為真經大言不慚疑誤一切入無間獄自失正定亦從淪墜也又彼定中諸善男子至失於正受當從淪墜冠註此明輕安自足以致魔擾也于精明中等者謂色陰已銷受陰將盡故曰精明于中亦見受陰不染前塵故曰圓悟精理受陰元是虗明妄想今既將空唯見胸中虗豁無礙要見即見故曰得大隨順也身心皆離麤重而忽生輕安自謂登聖得大解脫不求前進此由稍開慧性暫獲輕清一時豁悟失定所持從此返照可保無過若使坐定輕清自謂證聖則有類魔乘間入心展轉自畫多成無聞比丘不惟自誤兼誤多人加以悔恨謗佛終于失定而遭大墮落矣又彼定中諸善男子至失於正受當從淪墜冠註此明著空毀戒以致魔擾也於明悟中即於精明中圓悟精理也得虗明性者見得虗明妄想之體性本非實有因而沉空滯寂故忽歸斷滅撥無因果一切修證悉歸于空心入邪種生斷滅解若悟此空元係邪著非證真空亦不為咎若固守斷空以為聖證則有空魔入心自謂飲酒食肉悉空無罪婬殺盜行頭頭是道因魔力故令人親信且噉淨穢一種俱空見持戒者專加誹謗陷誤多人其過無窮失己正定墮落無疑矣又彼定中諸善男子至失於正受當從淪墜冠註此明著有恣婬以致魔擾也味其虗明等者由于虗明體性深生味著不肯放捨遂起愛心蓋禪定中妙樂非世樂可比自在受用靡不如意若愛極發狂則翻成貪欲此因定境安順入心由無慧自持而誤入諸欲也若用慧觀察一切不受仍歸正受則不成過誤若迷而不返便有欲魔入其心腑唯以說欲為菩提道且轉化眷屬以至無數只待魔心生厭不附其體而後生則陷于王難死則入于地獄也阿難如是十種禪那現境至保持覆護成無上道冠註此結害囑護也謂受陰將盡未盡時防此過生也交互意同前如得光耀乃至得虗明性皆觀力勝妄想也如發無窮悲乃至無限愛生皆妄想勝觀力也是亦兩相交戰互有勝負之意迷不自識者謂不知光耀虗明性等自何因緣而生也謂言登聖者即未得謂得故曰大妄語成墮無間獄汝等下皆囑護也受陰魔相竟阿難彼善男子修三摩提至融通妄想以為其本冠註此明想陰本末也前二陰盡則前五根塵不偶見惑已盡分別我執亦伏然思惑全在俱生我執未除故曰雖未漏盡由前二陰既盡不執身相故心能離形如鳥出籠所向無礙也六十聖位者始于三漸次終至妙覺以顯圓悟圓證不歷僧祗故曰從凡歷聖也意生身者譬如意去速疾無礙從喻得名也楞伽中有三種他經亦有多種文繁不引然雖前陰已盡得意生身而想陰未破亦如雖無所魘而重睡未覺猶發寱語是寱語者雖自發語而所語之事亦不自知但所發寱語已成音韻亦有倫次而不紊亂令不寐人咸悟其語喻如想陰未破者自己雖不能徹見始終聖位諸佛悉知此人於上歷六十聖位已有次第而不紊亂矣乃想未破之相也第六識乃躁動之元故緣塵分別無暫停息如塵垢也本覺明心如鏡體也塵垢淨而鏡體明想陰盡而覺明露則三界眾生一類生死皆能知其生從何來死從何去故曰一倫生死首尾圓照乃想陰已盡之相也想陰即第六識由六識緣法塵而引起煩惱擾亂真性此則想陰盡而煩惱超矣至此返觀想陰之由元從融通妄想交織妄成謂此想陰能融通質礙如心想酢梅口中水出是也阿難彼善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛圓明以致魔害也虗妙者謂分得真體中之虗靈精妙之用即離身返觀而得自在不同前未能得用也不遭邪慮不為十種陰魔擾也圓定發明者謂前二陰既破不隨前塵所起分別如渾濁靜沉清水現前也後皆倣此心愛圓明等謂在想陰中既得圓定發明便起妄心愛此圓明欲發妙用故勇銳精思貪其善巧其意將欲大作方便廣行教化也由此一念之貪則彼天魔得乘其鏬便飛精附人口說經法以惑行人也飛者疾速也精者魔黨諸精魅也附人者魔不親說另附他人素受邪附者也以受盡之人定圓慧明非說經法不能動𦕈劣邪魔亦不能惑縱使天魔亦不能入其心腑故遣精魅附旁人惑之轉令自隳正定耳其人不覺是其魔著者即魔所附之人自己亦不知為魔所著故口說經法亦自謂得證涅槃于是來求巧人前任其所好或說法或變形廣作善巧鼓動人心是求巧人既惑為菩薩自然傾心受化故將所習定心咸被搖蕩所秉律儀盡被破壞蓋凡行人一著于魔欲心便起者一則因魔多好欲一則因自己宿種未除故每有被魔所攝至于毀戒而不能脫去者也然淨行深而智慧強任其善巧莫測但察誘婬毀戒即知是波旬說非佛說矣何至蕩心破律而身為魔子哉口中好言災祥等者謂魔所附人出言怪誕異彼常談故能煽惑人心也言佛出世祥也言劫火刀兵災也此名下指名示害也怪鬼怪誕之鬼所謂附物成形者至老始受天魔驅使以害正定也厭足心生去彼人體者謂附之既久魔鬼生厭離彼所附之人也弟子即求巧行人師即說法惑人者先覺者謂一聞其語便知是魔或貪心一萌即便削除決不起念隨魔以至輪迴也若使恣任念起隨彼所轉便墮無間矣阿難又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛遊蕩以致魔害也受陰虗妙等準前以彼前無色受二陰不為形質拘攣遂起愛心欲同諸佛遊戲剎土不勞移步所謂舉一念而十方齊現故曰心愛遊蕩飛其精思貪求經歷由此念動故天魔乘罅得便即遣精靈附人向前蠱惑也魔所附者不自變形乃變他形現前成佛者由彼貪求經歷者志欲同佛故令成佛然身既佛身則遊蕩之志何所不遂正所以投其欲也是人指貪求經歷者既以魔附者惑為菩薩自然誠心皈命矣淫逸其心者自恃證聖放蕩無畏故將圓定之心化而為縱欲之心矣魔口所說皆指眼前佛國者以彼行人意在不離當處而周徧十方故以此事滿其所欲也既遂其欲則傾心渴慕背正從邪也此名下指魔示害也魃鬼即旱魃鬼所謂遇風成形而至老方為魔使也餘意準前又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛綿㳷以致魔害也綿遠也密也㳷契合也謂欲遠契妙理密合佛心故所以澄其精思貪求契合也總欲不假形聲默然開悟而已此由行人一念求貪密契故魔使精魅附人而現密契之事以誘之也心自開悟等者謂開悟之人念念不一或得宿命而知己未生以前之事或得他心而知人心所念之事乃至說偈誦經皆是現心開密契之境以惑亂行人也是人指貪求契合之人綿愛其心者謂被魔所惑亦纏綿生愛唯欲遂其心之所求也行人既墮魔境中而魔復出妖異之言漸引漸深是以既見綿㳷之勝事併信異常之妖言遂將一往所修圓定之心洗滌太盡而反入邪知邪見矣此名下出名示害也魅鬼同遇畜成形者也又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛根本以致魔害也心愛根本者愛窮萬物之根本也此是總標下四句釋成窮覽物化性之終始者即如佛說世出世法知其本因乃至現前種種松直棘曲等皆了元由也精爽其心者謂使萬化始終一一洞徹自得精神爽朗心志痛快也貪求辨析者欲于現前萬物辨別剖析分明無惑也然此皆是諸佛如來轉大圓鏡智證無邊法身之境界而初心覬覦真用心交互也由此一念引賊入室故魔乘便而擾亂也威神摧伏者謂彼魔力善能摧折攝伏人心故聞法者自然心伏也諸人即領荷邪法展轉化導令人皆墮術中者也由彼行人心愛根本故魔所附者唯指現前生滅之法為三常住果亦指濁世染污之處為清淨本以投其所好行人既傾心受教遂將習定初心一併亡失唯信眼前父父子子𮞏代相生乃至男女二根最穢污境為萬化本元而謂如來三常住果盡在于此于是行人日親日近漸入漸深遂為魔子而不自知也夫彼天魔先施魔力以摧伏之而後宣穢言以蠱惑之彼初心淺行詎有不被惑而破戒壞定者哉此名下指名示害也蠱毒魘勝者非止一種也又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛懸應以致魔害也心愛懸應者懸遠也謂欲以己行感過去久遠諸佛應之也此總標下二句釋成周流者求之不已也精研者精思研慮至誠以求之也冥感者欲將此誠意向冥冥中感動諸佛也由此一念妄動自有天魔乘間而入故飛精附人乃至說法以應其感也暫見其身如百千歲者魔現極老之相也座中諸人因見其壽祺無比故心生愛染難于割捨且惑為先世業師前生知識于是別生法愛如膠似漆不忍分離此皆魔附之人詐現感應之事也行人既為彼惑親近日久則心相體信捨正從邪遂為魔子而不自覺也蓋魔精先以身現冥感之事而後以口宣冥感之語彼餘惑未盡者安得不信之乎癘鬼同遇衰成形之瘧癘鬼也又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛深入以致魔害也此節貪求靜謐句似與後節貪求宿命句前後顛倒者蓋此文多示宿命事後文多示靜謐事故也心愛深入者謂于禪定境欲深窮極入也此標定下釋成尅己辛勤者謂尅己工夫不計辛勤唯欲深入也陰寂靜謐皆是禪定之極地所謂深固幽遠無人能到之處也樂處貪求皆是愛心躁動也即此一念乃是招魔之端故天魔使其邪附者來彼求陰人前敷座說法以誘之且邪魔能具五通本業即宿業也令聽法之人各知本業及汝今未死已作畜生者皆宿命通也有人起心已知其肇者他心通也佛律儀外重加精苦如斷五味躶四肢以至拔髮熏鼻等誹謗訐露及言禍福臨時皆騐者雖似眼耳二通其寔狀其行事而欲取信于人也此上五通雖係邪魔詐現而鏡智未明者鮮有不信矣大力鬼即上品神通力大之鬼也又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛知見以致魔害也心愛知見者求見潛匿異事其意欲使世人不知己所獨知世人不見己所獨見也此標定下釋成由愛知見故不辭勤苦而研究尋討也愛心一起魔即乘間而詐現隱異之事以惑之矣是人指貪求之人無端得大寶珠者謂于聽法處獲珠也其魔或化畜生先銜珠寶奇物等投人而後附其體或先詐現珠寶于地下而後對眾出之以誘人或食藥草乃至麻麥而能充肥此皆詐現隱異難測之事以投其欲也魔既現隱異之事以悚動人心復出隱異之語以鼓揚眾志人安有不信哉此皆山林以至川岳之鬼神久在鬼錄而為魔所使者也或有下明其魔黨成群非止一種尤盛于前也又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛神通以致魔害也心愛神通種種變化者欲求神通變化而無礙也此標定下釋成謂精研窮究萬化之元者正欲乘之以發神通變現也此愛心一起天魔得便即飛精附人而詐現神變之事以擾之矣是人指魔所附者或復手執火光乃至越牖透垣曾無障礙者皆詐現神通變化之事唯于刀兵不得自在者足知邪術詐現非真通十八變也口中常說神通等者謂彼魔魅既詐現神變之邪事復誑說神變之邪法而欲投行人之所好也讚嘆行婬等者愈見其為魔著也此名下出名示害也天地大力等者明種類愈多為害熾盛足見隨其禪定以增益也又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛入滅以致魔害也心愛入滅者由彼不知一切法相本自寂滅不待更滅故欲滅有相之法入無相之空也此標定下釋成研究者謂研慮究竟也化性者謂萬化之體性也蓋研究化性者唯欲滅相歸無以深趣空寂也殊不知一起貪心便為魔擾矣于大眾下因貪入滅趣空故現諸空相以眩惑之或垂手足作栴檀氣或大小便如厚石蜜皆詐現異事以駭俗惑人也誹謗二句依空相而謗法誹僧也口中常說等者唯說斷空而撥無因果也雖得空寂潛行貪欲者顯是邪魔非聖證也受其欲者亦得空心撥無因果者魔力摧伏以從其化也此名下出名示害令人預知防檢也餘意同前又善男子受陰虗妙至迷惑不知墮無間獄冠註此明心愛長壽以致魔害也幾微細也由愛長壽故不辭辛苦研究微細生相而貪求永歲也舊說此中所希羅漢果位行陰開後自然證之今欲疾證而躁求之故招魔害也分段生死三界惑盡方能出離二乘無學入地菩薩斷見思惑盡生法性土方受變易生死今未離三界頓欲于分段報中變麤身為細質易短壽作長齡故曰棄分段生頓希變易細相常住也瞬息而萬里再來者五通中似神境通此魔自現神境至遠成近也數步而累月不到此魔令人親歷至近成遠也地之可縮可舒時之可延可促皆魔詐現以投其所好也因此心信疑佛現前者謂智微行劣自生驚異而墮于疑信之間也口中常說等者謂眾生諸佛等皆由彼生豈非無始元佛而永齡益壽又豈可紀極哉蓋彼邪魔先現延永之事復出延永之語彼貪求永歲者安得不信乎此名下指名示害也自在天即欲界第六天上別有魔王居處亦他化自在天攝使其眷屬謂魔王不自現身亦若飛精附人也遮文茶云奴神即役使鬼也亦云嫉妬女毗舍童子即毗舍遮鬼云啖精氣皆𨽻四天王者若已發心者則護人若未發心者則害人以彼行人定力虗明為利故食其精氣以害之也或不因師者謂不因魔附之師而令行人親見魔身說法也執金剛現美女者皆邪魔害人之幻術也口兼獨言者寔是被惑行人與魔現美女言也但旁人不見美女唯行人自見自與行欲故旁人聽其獨言亦若妖魅矣前人彼人皆指被惑行人也未詳謂不能審其是魔非聖而為其所惑更與之行欲也多陷王難雖未及遇刑其精力先枯竭而死矣此由魔魅所使故生遭王法死入地獄也阿難當知是十種魔至汝遵佛語名報佛恩冠註此付囑當机救度末世也言在我法中出家修道者或附比丘或自現比丘身也昔佛住世群魔壞法佛有大神力故皆不能壞魔作誓言待佛滅後依教出家破壞佛法佛即墮淚曰無柰汝何譬如獅子身中蟲自食獅子肉今經云或自現形皆言已成正徧知覺者正是出家破法之魔子也按前十種唯第十種自現餘皆附人魔師魔子婬婬相傳等者謂其害延後世廣壞行人也舊引涅槃經云末世魔眷屬現比丘羅漢等像混壞正法非毀戒律其意同此也汝今下正勸當机救度末世也未須先取寂滅者所謂自未得度先度人者菩薩發心也縱得無學留願度生等者即如前當机所謂願今得果成寶王還度如是恒沙眾也正心者見理真而邪境不能動也深信者行持久而邪法莫能惑也正知見者謂法眼圓明洞徹魔冤也我今度汝乃至名報佛恩者亦如前當机所云將此深心奉塵剎是則名為報佛恩也此皆師資合道彼此同心唯以弘通教法普度群生為念也生當末世欽聞斯囑而不痛切悲泣者非佛法中人也阿難如是十種禪那現境至保持覆護成無上道冠註此結害囑護也皆是想陰用心交互等者準前謂言登聖者言其不惟惑魔為聖兼亦自任聖流也汝等下皆叮嚀付囑語阿難所以結集大藏諸經流通天上人間普令受持希無上道者即其事也想陰魔相已竟
