body:
  text: 明柴紫釋乘時講録新安受法弟子汪益源校梓阿難如是衆生一一類中至具足如斯虗妄亂想冠注此申結互妄也如是衆生一一類中者總指上十二類生也各各具者每一顛倒中各具十二顛倒而一念顛倒猶如揑目各具十二猶如亂華發生此亦窮十二變為一旋復也然雖各各具足十二亂想究其本根皆由顛倒妙圓真淨明心故一時具足十二種亂想且如斯十二都無實體上明十二顛倒皆由不了性心明圓故隨染緣熏成十二類生所謂生滅名妄也此非真三摩地不能解脫故下示覺妄明真故隨淨緣熏成五十七位菩提路所謂滅妄名真也總不出真如隨緣不變無明成事體空二義也妙圓真淨體也明心用也汝今修證佛三摩提至三者增進違其現業冠注此明翻染成淨用答至何漸次得修行目之問也佛三摩提牒前所問真三摩提即耳根圓通也本因即二顛倒因元所亂想即十二亂想方得除滅即滅十二類因果也就本因亂想中立三漸次滅十二類生者教其翻染成淨即在一切亂想中求妙性明心不可離波求水所謂若從地倒還從地起也淨器喻空如來藏亦不離根中不生滅性也毒蜜喻五辛淫殺等種習湯灰喻三漸次為滌器之初法自十信至妙覺皆如淨器貯甘露也云何下標立漸次之名謂修習真三摩提當立此三漸次為入門之初步也除其助因者謂五辛能內助淫恚外引魔業故當除之刳其正性者刳刮剔也謂諸衆生皆以淫欲而正性命故當刳之違其現業者謂流逸奔境為順現業脫塵內伏即於現業違矣然妙性明圓離諸名相三種漸次及諸聖位皆世尊隨機順應故於無漸次中立漸次無聖位處設聖位耳若上根利智則狂性自歇歇即菩提何藉劬勞肯綮修證耶云何助因阿難如是世界至第一增進修行漸次冠注此徵釋除助因也十二類生即界內衆生也不能自全者謂諸未得法性身者非食不能全其生命故必依四食方可住世也四食者人間段食謂所餐必有分段鬼神觸食但歆觸而飽禪天思食食至或但思之而飽識天識食既無形色但以識想耳無毒曰甘五辛者蔥蒜韭薤興渠也興渠根如蘿蔔出土辛臭此方無之故不翻也求三摩提而不斷五辛即如世人食毒無異謂此五辛熟食發淫生噉增恚貪食即癡具此三者便傷法身慧命亦如毒能傷人生命故也如是下出過天仙嫌其臭穢者謂彼天衆皆精修五戒十善者仙亦清心寡欲者故皆遠離也諸餓鬼等常自歆於不淨故舐其唇吻也天仙遠故福德日消餓鬼近故長無利益且此等人縱修三摩地菩薩天仙不來守護大力魔王得其方便反非毀禁戒為小乘讚淫怒癡為大道則靡穢不造誠助惡之因也若不斷此惡因當來必為魔家眷屬而魔福受盡更致阿鼻極苦是故修菩提者當永斷此方名第一增進修行漸次也云何正性阿難如是衆生至第二增進修行漸次冠注此徵釋刳正性也正性者檢非前助因也謂諸衆生永沉生死皆由淫殺為其根本正性是故入三摩地者要先持戒永斷淫心也不飲酒者預防昏亂毀犯也不餐肉者斷殺心也以火淨食無啖生氣者謂生鮮之物能生穢濁之氣以火淨之然後可食此亦防微杜漸之意也阿難下反顯修行者定當斷淫殺也當觀淫欲如毒蛇怨賊者謂害法身損慧命莫勝於此且蛇賊所害唯一生一身若淫欲所害則塵劫難免而修行者豈可狎而近之哉比丘四棄即淫殺盜妄尼加四棄即觸八覆隨亦多妨淫也執身不動者謂禁七支不犯也執心不起者謂心機止絶一念不犯也淫心斷則不相生殺心斷則不相殺偷心及大妄語斷則不還宿債四種根戒不犯則是清淨人修三摩地者肉眼觀見十方界者謂眼目清淨聞法奉旨耳根清淨得通遊界身根清淨鼻舌二根亦在其中宿命無艱意根清淨如法華云現身所得六根清淨也神通遊界者隨處自在無所隔礙也得無艱險者在處無冤家債主也凡修禪定必得如是方為第二增進修行漸次也云何現業阿難如是清淨至第三增進修行漸次冠注此徵釋違現業也如是下牒前持戒修定之人此下皆因定發慧也心無貪淫於外六塵不多流逸者謂其欲界九品思惑初伏由內無貪心故於外六塵不多流逸而但言不多弗許絶無者以根中無始虗習尚未淨盡相待仍存則於現業不能盡違但以無漏而熏有漏非全無漏也因不流逸以至六用不行者謂既不流逸於外塵則根不循塵而旋復本根歸自精真故外無所入內無所出根境俱寂兩不相偶而返此流根全一真體始得對境忘情六用不行既得根塵不染現業不交則見十方國土皎然清淨由身清淨故如琉璃表裡洞徹由心清淨故如琉璃內懸明月既得身心俱快則內外無礙生佛一理故曰妙圓平等心境一如不動周遍故曰獲大安隱也一切如來密圓淨妙者淵遠難測謂之密交徹含攝融通無盡謂之圓明相精真居塵不染謂之淨隨緣變現一切無礙謂之妙此即佛果境界也皆現其中者謂果上境界皆現行人心中是人即獲無生法忍者謂此持戒修因之人即得如來不生不滅果地覺為己因地心然後圓成果地修證故知五十五位菩提路皆以此位為起程之漸次也故曰隨所發行安立聖位是則名為第三增進修行漸次也阿難前問至何漸次得修行目此答漸次已竟下文即修行目阿難是善男子欲愛乾枯至未與如來法流水接冠注此明合前三漸次為乾慧地也欲愛乾枯四句承上云既與世間永斷相生相殺之業此去必捨染趨淨矣故此殘質不復續生所謂三緣斷故三因不生執心二句謂執幻身為實有而心貪淫欲即謂之惑故復續生今了四大生於淫欲則心不貪淫乃至根境絶待種現漸除故曰執心虗明執即是惑不執即智故曰純是智慧若智慧既純則體用明圓照十方界皎清鎣淨至此始枯欲愛故曰乾有其慧名乾慧地然雖得欲習初乾而根本無明全在所謂枯木倚寒岩三冬無暖氣故曰未與如來真如法流之水相接由無潤澤故名乾慧地也即以此心中中流入至所去隨願名願心住冠注此明信心十種位次也信心者謂篤信自心是佛更不他求故成佛以信為根本也此心者躡前乾慧心也中中流入者謂從此心中不偏不倚依中道順法流而深入也圓妙者唯指行人隨地所見之理境開敷者謂發智見理如花始開從真妙圓等者謂從此心開所見真妙圓中重發此位真妙信心使真妙圓者益進於妙圓則心境冥會不變不移而妙信常住是則妄想情盡中道純真既洞見此理則深生樂欲故名信心蓋心為能住理為所住永不退屈故第一位名信心住真信明了一切圓通全躡前位發起後文圓通即前圓妙由心會妙理以理融事則根根塵塵交徹無礙故陰不蓋覆處不區分界不判隔因此遂能懸憶過去無數劫捨身及未來無數劫受身乃至業力所熏染淨種習皆現在前是人皆能冥記毫無遺忘此信心與真理念念不失故第二位名念心住妙圓純真真精發化者躡前信心住謂妙圓純真之觀力積久故得精明也觀體既純亦能起鎔妄之用故能發化也蓋由精故純至化益精耳無始習氣通一精明躡前念心住謂併前習氣銷盡無餘而通成一精明智體唯以精明二句謂既成一體精明之智則以能明之正智而進趨所明之真理而成就第三位名精進心心精現前純以智慧者謂妄習既盡故心精現前上位轉惑習而成智慧此明惑破故慧心顯現故第四位名慧心住執持智明躡前位謂前雖智慧精明若無定力以持之則妄念起而智不周遍正念失而智不常凝所謂無寂之照如風中之燈故曰遍寂者定用也曰常凝者定體也體用如如故第五位名定心住定光發明從定發慧明性深入由慧入定定慧互資明理愈深由其愈深故唯進無退成第六位名不退心心進安然者謂前雖不退勤勇無間尚涉工夫至此雖精進而不知有勤勞之力故曰安然且定慧均等安然持守永保無虞然所保持者乃自己心宗諸佛命脈我恆保持無所遺失則諸佛氣分自然與我通融吻合故成第七位名護法心覺明妙力者躡前定慧均等護法之力也前雖初與如來氣分交接𫎇佛慈光攝受猶有自他之分此則回己之妙力向佛慈光中安住回佛慈光向己覺明中安住而心佛一體初非有兩班如二鏡相照傳耀無盡故成第八位名回向心心光密回獲佛常凝者謂自心與佛光祕密吻合且得心佛同體永不動搖俱於無上妙淨之境安住無為毫無漏落於有為之境到此雖達自性天真本無增減亦無染淨然有微細無明密加隄防故第九位名戒心住住戒自在者謂前住戒心尚局不動之體此則能發自在之用所謂不戒而戒是則隨念直往無適不可由得所去如願故第十位名願心住十信位竟阿難是善男子以真方便至陳列灌頂名灌頂住舊説彼第十法雲地名灌頂菩薩今此十住亦分得也然圓教分真以來悉有應用論智力不無優劣故初住百佛世界現十界相利祐衆生位位竪入倍倍增勝經中所明各就一為若論一位具諸位功德則十義俱備十住既爾餘位皆然華嚴云此菩薩其已成就及當習學共二十種智文繁不録冠注此明十住位次也住者親生佛家領佛家業一切邪外不能搖動也以真方便等者謂真如心中本具十心妙用然非方便不能顯發故今依本真心方便發此十種妙用而此十種純是心光毫無雜染故將十用涉入一心圓滿成就本無二體且開一為十涉十為一曾未變動故名發心住心中發明躡前位琉璃喻智精金喻理謂以前開涉圓成之妙心為真智而契於真理從此履踐平坦如地一切施行步無錯亂故名治地住心地涉知躡前心即智地即理蓋智理互涉則日用動靜見色聞聲一切明了毫無迷謬故遊履十方縱橫無礙名修行住行與佛同躡前謂妙行密契佛行妙理密契佛理所謂始本一同將生佛家為法王子如中陰與父母同業相感無不冥會亦如太子處胎貴壓群臣故名生貴住上明初入聖胎下明長養聖胎既遊道胎躡前親奉覺胤者謂秉佛二智結就聖胎也形成不缺者謂六根圓滿具足方便克肖於佛無所乏少故名具足生容貌如佛躡前容貌喻應用心相喻理智既然內外同佛則成等正覺之心永無所動故名正心住身心合成躡前言表裡一如成佛身心日益增長者言擴充智行漸漸成熟故名不退住十身者菩提願化力莊嚴威勢意生福法智是也然此靈相具體而微故名童真住形成二字躡前尚未顯著至此則威儀赫奕故曰出胎親為佛子者堪紹法化也所謂從佛口生從法化生故名法王子住表以成人躡前謂堪行佛事也太子世子皆指國王之子陳列灌頂者華嚴云轉輪聖王所生太子母是正后身相具足坐白象寶妙金之座張大網縵奏諸音樂取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位菩薩受職亦復如是諸佛智水灌其頂故名為受大智職菩薩故名灌頂住上十住竟阿難是善男子成佛子已至性本然故名真實行舊説前信住行位出俗智多大悲行劣此去濟以悲願涉俗度生回真向俗回智向悲真俗互融悲智等運名十回向心亦名十願心準華嚴回向即是發願不過三處即衆生佛道真如也且有行無願行無所歸有願無行願唯徒設故須二者兼資入至涅槃彼岸冠注此明十行位次也行者言其道全德備廣行佛事故利他之事漸顯矣成佛子已躡上位具足諸佛妙德謂習學及演説皆諸佛本所修行事也十方隨順言以身命財法廣施一切自他利備機應皆喜故名歡喜行善能益諸衆生謂推己妙德利益一切令諸衆生如己無異故名饒益行自覺覺他得無違拒謂自能安住於佛法中亦令衆生同得此法故於一切毀辱皆能忍受是名無嗔恨行種類出生言度盡十二類出生諸佛也窮未來際言塵劫苦行不生悔念也三世二句言知三世十方平等一性曾無隔礙是則一心恆常正大無極故名無盡行一切下言一念定心能持一切法而聞無量法經無量劫不忘不失於諸音聲分明無惑故名離癡亂行則於下同中現異即理不礙事以真融俗異相見同即事不礙理以俗融真事理雙顯真俗並融故名善現行如是下言由此善現擴充圓融則大小相容一多無礙界入塵而界不小故小不礙大塵合界而塵不大故大不礙小毫有執著不能如是故名無著行種種下躡前由得二無礙智故能於種種變現皆合如來涅槃妙德此是最上頂法故名尊重行如是下躡前既獲圓通無礙則道同如來行齊諸佛一言一行皆合諸佛軌則故名善法行一一下謂上自利利他一切行願皆是清淨無漏智中流出稱一真性本自無為故雖修萬行總歸真如實際故名真實行上十行竟阿難是善男子滿足神通至名法界無量回向冠注此明十回向位次也善男子指已修十行者滿足下四句總躡前十行滿足神通即二無得智及種種現前等行成佛事已即成佛軌則等行純潔精真遠諸留患即清淨無漏一真無為等總結十行也蓋十行既備了得心佛衆生唯一真體涉俗度生永無留患故正當度生之時不見有生可度既度盡衆生不取度相則回有為行向無為心延無為心向涅槃路是名救護一切衆生離衆生相回向壞其可壞即上度生滅相遠離諸離言離衆生相亦復遠離是則無相可壞故名不壞回向本覺湛然體同佛體覺齊佛覺用齊佛用體用等佛則我與佛無二圓滿是名等一切佛回向精真發明本覺真體發揮妙用地如佛地自己因地心含佛果地境而盡佛境界遍一切處故名至一切處回向世界即所至之處如來即所等之佛前分自他此融唯一以世界涉如來則一一毛孔有無量寶剎莊嚴微妙不礙如來入諸法界以如來涉世界則一一微塵有無量如來轉大法輪不礙世界入諸如來且法身世界各各無盡故名無盡功德藏回向佛地即功德藏從無盡藏中各生無盡清淨因即一念具足萬行復依此因行遍周法界而取無餘極果則隨順己心自與佛心等無差別故名平等善根回向真根即平等善根此根既成則性真圓融本周法界故見諸衆生皆我本性中衆生然我根既成衆生齊成亦不妨度生之行而一一隨順一一成就故名隨順等觀衆生回向即一切法即世出世法離一切相離生佛等相然猶未出即離之間必併其即離而兩忘之方契真如實相故名真如相回向前證真體此發真用故曰真得所知既得所知則在處皆如更有何礙不唯無纏縛即解脫亦無故名無縛解脫回向真如性德體用圓成則體無不遍用無不周是以法界微塵大小量滅故名法界無量回向上十回向竟阿難是善男子盡是清淨至二無所目名世第一地冠注此明四加行為入地之勝進也阿難下結前起後四十一心乾慧一信住行向各十妙圓者既經四十一心則悟三諦理非三非一即一即三矣加行者至此加功用行方入聖地也佛覺果地根本鏡智己心自己因地心前雖覺齊佛覺猶未用為己心今雖用為己心亦未見其十全設若鏡智全轉則無明妄習灰飛煙滅矣八地方轉此位但望見耳故若出未出喻如鑽火欲然木而未然但有暖相故名暖地前以佛果地智為己因地心此又以己因地心成佛果地智而已心相猶未淨盡故若可依止而尚未可依止喻如人登高山身若入空足未離地下有微礙故名頂地前曰用曰成猶存二相至此則因果交徹佛心不分然未忘同相故雖善得中道而未實得喻如忍事人欲懷之於心而無可懷者欲出之於口亦無可出者是於所忍之事將忘未忘即如善得而未實得故名忍地前有空假中皆是數量前未忘己因心為迷中道未忘佛果智為覺中道是二有所目至此三觀融通則數量銷滅因果兩忘下無己心上無佛智則二無所目既得數量銷滅迷覺皆盡則高超世表故名世間第一地上加行竟阿難是善男子於大菩提至覺際入交名為等覺冠注此明十地及等覺位次也大菩提即三如來藏由前加行則心佛兩忘中道不立故能超出世地善達佛境然未證極但初通真境初登聖位二執將盡自他普利如其所願故名歡喜前將九界異性入一佛境名異性入同然歡心佛境猶是微垢此須同性亦滅清淨覺心始離微垢故名離垢前已離垢今復離離則覺體淨極而光明顯發故名發光前明始生此明熾盛金剛𦦨慧如大火聚一切緣影悉皆爍盡明極即如來故曰覺滿𦦨慧地即慧之至也有分別名異智無分別名同智異則凡情可勝同則聖解可勝今同異不能至則凡聖兩忘前此真俗猶分同異尚違此則真俗雙融二智並照翻相違成相應故曰難勝由前聖凡情盡二智相應則衆勝般若現前而照無為真性自然明露故曰現前由前般若照根本真如盡其涯際則超世出世法故名遠行既盡真際全歸一體正智任運不假功行親獲無生法忍諸心不生故名不動前得真如全體此發真如大用前則一塵一毛皆歸真體此則互攝互入悉成妙用具足法義辭樂説四無礙智凡所照應無非真如妙用故名善慧阿難下通結前位謂此菩薩從四加行至此屢經修斷則真如體用皆得現前而修習出世功德無不畢備故曰圓滿然此位中正好廣施佛法廣度衆生故亦得名為修習既證真如體用圓滿則慈悲如陰大智如雲是菩薩之因德涅槃如海是如來之果德以其因果相鄰故菩薩以無緣慈普應群機凡所蔭潤無作無為稱合如來大寂滅海故名法雲地如來逆流者謂如來久證妙覺果海無復進取但惟不捨衆生倒駕慈航逆流而出而此菩薩進取未竟方趨果海順流而入覺際入交者菩薩始覺與佛妙覺分劑正齊但順逆之不同耳與佛無間故名等覺阿難從乾慧心至等覺已至清淨修證漸次深入冠注此總顯諸位工夫而結歸如來極果也從乾慧至等覺者通前總攝以見分位之始終也是覺即指等覺金剛心者取其心力無間至聖至利能斷微細無明如金剛王寶能壞一切而自體不被物壞也初乾慧地指信前一位也一名一位曰單一名十位曰復乾慧四加行等妙七者為單信住行向地五者為復共成十二以乾慧為始獲以妙覺為方盡十一屬因後一屬果獲則始有所得盡則終無所得足見雖入妙覺果海毫有沾帶猶未成無上道也此皆分釋從乾慧至等妙之所以猶云此等覺從何而至耶曰由始獲金剛心中初乾慧地如是重重所歷信住行向加行地位方至等覺從此等覺方盡妙覺成無上道矣下結顯妙性圓明離諸名相見種種地即單復十二位也金剛觀察即實相般若言既成無上道已更用實相般若返觀從前所經地位無一實體所謂如幻三摩提言不但觀有為法如夢幻即觀無為法亦如空華故曰深喻十種者幻人陽𦦨水月空華谷響乾城夢影像化也奢摩他即楞嚴大定毗婆舍那即正觀此反上云至此返觀雖則如幻而漸次修證亦不可偏廢也最初必入正定用諸如來正觀令其五住究盡二死永忘亦不著定觀之相無修而修無證而證方得成就無上妙道故曰清淨修證漸次深入阿難如是皆以三增進故至若他觀者名為邪觀上明證道分竟自首卷至此方完結前有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路義故下明結經分文殊請名世尊仍以大佛頂安之於首正顯因義以定名由名以彰義而名義常相須也冠注此勉進初心捨邪趨正也良以圓修圓證雖因果互徹而發足進取須重初心故承上云如是漸次深入者最初皆以三種漸次為增進修行也五十五位等以信住行向加行地等覺皆是歸菩提家之路前乾慧地猶未起程故除之後妙覺已歸其家亦不名路作是觀等謂決定由奢摩他乃是清淨修證方名正觀其餘皆名邪觀蓋圓教之外三乘所修皆名邪觀非指邪外也爾時文殊師利至諸菩薩萬行首楞嚴汝當奉持冠注此請安經名也此經以修楞嚴大定證常住真心性淨明體為要旨故初以阿難發起教源者故令多聞人修大定也終以文殊請名奉持者要非根本大智莫能總持全經而證常住真心性淨明體也故世尊與之安名首曰大佛頂者大即稱讚之詞言諸佛以正智證真理是以心證心不見有能所之相乃無上最尊之頂法也曰大白傘蓋者言覆被一切不染纖塵含育佛子廕庇衆生也曰無上寶印者言盡十法界皆由一法之所印乃佛祖相傳之心印衆生迷此故觸處成礙如來悟此圓通法界故曰清淨海眼此約理智立名也亦名救護親因等親即阿難因即登伽菩提心即正智遍知海即真境言此顯密教理令彼脫因地苦難證果地樂境此約人法立名也亦名如來等如來即果密因即因行言此日用尋常見色聞聲處即是真因而凡小不知故曰密因依之而修則修無所修依之而證則證無所證故曰了義此約因果立名也亦名大方廣言一理而具體相用喻如妙蓮華王即萬法而不著一物猶蓮處汙泥脫體香潔十方佛母等言此法能生諸佛亦能總一切法持無量義能一念契此即革凡成聖此約法喻立名也亦名灌頂章句者謂此經出自灌頂部中乃傳紹佛位之頂法也諸菩薩等言此法門總之一心擴充之萬行俱備總括之唯一正定從定起行究竟堅固此約教行立名也故知此經教該顯密而理智人法因果法喻教行無有不載三宗五教靡不包容以具多種要妙故立多種名目汝當奉行保持不可遺失也説是語已即時阿難至修心六品微細煩惱舊説修道所斷之惑小乘於三界九地地各九品斷欲界前六品而證二果斷後三品而證三果斷上二界各九品而證四果阿難備聞全經方證二果表多聞之劣不如進修無漏之勝結經分竟此下明助道分自首卷至此雖真妄互明其正意唯以修楞嚴大定證常住真心性淨明體而圓滿無始菩提涅槃之果乃至始終地位中間永無諸委曲相也此下七趣等文廣明首卷云用諸妄想此想不真故有輪轉而一切衆生從無始來種種顛倒業果自然如惡叉聚乃至錯亂修習而成小乘外道天魔及魔眷屬皆為因地不真果招紆曲正所謂諸委曲相也故知結經以前謂之捃拾殘機結經以後謂之扶律談常皆是初心緊切法門故詳明之令人委知要旨不落偏邪然後能逈超有漏而直趨無上菩提也冠注此敘聞經獲益也密印者祕密心印即前所傳三如來藏及圓通根本皆是也般怛囉義即前所説神呪及呪功德也了義名目即前五種名也頓悟禪那等即前六解一亡頓悟真常圓融三諦從此修進五十五位而極於妙覺成無上道也心慮虗凝等言至此則正助之修證始終之地位顯密之義旨一了百當永無疑惑已斷三界修心六品思惑而得證二果矣即從座起頂禮佛足至為是衆生妄習生起冠注此欲請七趣之因而預謝前益也即從下經家所敘大威德者謂世尊有折伏之威攝受之德故能訶斤示勸令人欽仰受誨也慈音無遮者教不倦吝機無檢棄也善開者巧示也微細沉惑謝一往所示破妄者也身心快然謝一往所示顯真者也得大饒益因聞慈音而得斷六品思惑也下請問七趣者由前聞妙性圓明離諸名相恐初心人起撥無之見故請決疑大都要行人不得向外馳求亦不得撥無因果方為正智真修故爾意謂妙明真體淨妙心用本來周遍圓滿則一切處無情有情之本元真如咸與如來成佛真體無二差別既是佛體則真實無異云何復有七趣雜形各各差別耶然此等類何因而出為復真如體中本來自有耶為是衆生妄想習氣之所生起耶此問與富樓那同意世尊如寶蓮香比丘尼至歡喜頂戴謹潔無犯佛在世時波斯匿王新紹王位使臣求親迦毗羅國釋種家時摩訶男婢出一女顏貌端正送與匿王後生一子名曰琉璃及年八歲與梵志子好苦詣摩訶男家時迦毗羅國新起一講堂欲請如來供養爾時琉璃太子至講堂即升師子之座時諸釋種見之罵曰此婢生物敢於中坐琉璃出語梵志好苦曰此諸釋種辱我至此若我紹位汝當告我後琉璃紹位好苦以前事告之琉璃集兵往伐釋種佛告比丘往昔之時此羅閲城有捕魚城時世飢儉彼村有池多魚時城多人向池捕魚食之池中有二種魚一名麩二名多舌各懷報怨時有一小兒在岸見魚跳而喜以杖打魚頭爾時羅閲人者今釋種是麩魚者琉璃王是多舌魚者梵志好苦是小兒者即我身是以是因緣琉璃王殺釋種懷宿嫌也冠注此詳問地獄也梵語泥犁此云地獄亦云不自在謂彼罪人被獄卒之所拘繫不得自在故也寶蓮香比丘尼犯因有三一犯淫二謗戒三誤人漸至極重故墮阿鼻其報有二一現報謂身火自燒二生報謂墮無間獄琉璃是犯殺戒善星是犯妄語戒皆感生報而墮者也舊説琉璃匿王太子廢父自立挾宿嫌誅釋種取萬二千釋種諸女刵劓耳鼻截斷手足推之坑塹佛記其七日當入地獄王泛海以避水中自然燒滅言宿嫌者舊恨也善星即佛堂弟妄説法空撥無因果生陷者以業力熾盛連肉身陷獄也此諸地獄為有定處者謂本來自有定處問別業同報淫殺妄語即別業皆陷地獄即同報也為復自然彼彼發業各各私受者謂因彼各自造業故各自私受其報問別業別報也向後世尊結答有此二義臨文自見惟垂下求示護戒以嚴禁初心令其決意持守勿得故犯也佛告阿難快哉此問至因此分開內分外分冠注此總明內外二分為七趣之因也所問者稱合佛意故曰快哉已上犯戒謗成等皆是邪見悉非正因故今因問而發明令諸衆生不入邪見也實本真淨者謂彼七趣衆生所具性體實是本元真如性淨妙心無諸雜染因彼一念迷真遂起妄見既有妄見復生妄習謂妄見者即無明現行妄習者即雜染種子由無明種習為因自有情想相續不斷是故開為內外二分然情想墜升勝劣不同而總之一妄習耳阿難內分即是衆生分內至自然從墜此名內分冠注此別釋內分也以諸衆生隨任情愛安然本位不求增進故曰分內愛染指業識中種子因有種子對境取著發起現行固戀不捨謂之妄情情積不休潛滋貪業而為愛水遂無往而不成欲流矣何以驗其然也但觀衆生心憶珍饈而口中水出憐恨前人而目中淚盈心愛財寶而舉體光潤心著行淫而二根流液此皆情愛之所致也夫愛既化水必從淪墜所愛之物雖各別不同而能愛之心固結不解曾未有異以情愛為水故流下而不升所以墜落三塗者皆情愛為之因也阿難外分即是衆生分外至自然超越此名外分冠注此別釋外分也以諸衆生乘彼想心不安本趣志求出離故曰分外渴仰者謂仰慕勝境如渴思漿也猶指種習言因有此習氣故戀慕勝境而發明虗想則神馳浩遠無有休息想久志凝而更生勝氣遂無往而不為輕舉矣何以驗其然也但觀衆生心持禁戒而舉身輕清心持呪印而顧盻雄毅心欲生天而夢想飛舉心存佛國而聖境冥現事善知識而自輕身命此皆虗想之所使也然所想之境雖有差別而能想之心任運輕舉曾未始異以虗想為勝氣故上升而不墜所以飛騰上界者皆虗想為之因也阿難一切世間生死相續至死逆生順二習相交冠注此下明情想所招之果也意謂諸趣雖別不出情想二因但業有輕重故報有差殊也生從順習者謂現世之苦樂皆從昔前所造善惡業習隨順生來也死從變流者謂此身既死而生前業報已盡則改頭換面遷變不一是未可知故於現陰將謝後陰未續之時雖則未捨暖觸而一生所造善惡俱時頓現將復從此善惡業習而變為流類矣且諸衆生皆愛生而惡死故於是時若生則順其習若死則逆其習然二習相交唯聽業力感變而豈容著意於其間哉純想即飛必生天上至想明斯聰情幽斯鈍冠注此明想多情少者超升騰處也純想生天者謂三界諸天皆想心善業所感其間有兼行六度而願見諸佛者亦得隨願往生如想願西方而生淨土之類是也情少想多者勝想不純少帶邪情也輕舉非遠者謂竪不越四天橫不出輪圍九想一情為飛仙八想二情為大力鬼王七想三情為飛行夜叉六想四情為地行羅剎遊者謂暫時遊行非同前卜居天上常住者也去往也其中者指上四類中也善願善心者謂雖帶邪情而願心不息也護法護戒護呪護禪定者各隨心願各有種習也綏安也法忍如忍辱行及無生法忍是也住佛座下者心願護教如八部之類也情想均等者五情五想也不飛不墜等謂上不在天仙下不在毛群多生人類雖則情想均等若於想中知解明達則事理清徹斯乃聰利者也若於情中知解幽閉則事理昏迷斯乃暗鈍者也情多想少流入橫生至衆同分中兼有元地冠注此明情多想少者沉墜幽塗也六情四想為橫生其中業稍重者為毛群業稍輕者為羽族七情三想為餓鬼舊云俱舍説大地最下有金風水三輪有八寒八熱地獄在三輪之上今經云沉下水輪生於火際似水輪下又有火輪此寒獄第八在水火交際處受氣猛火謂受火氣以成身故常被火燒或得飲水亦化為火故曰水能害己八情二想生有間獄九情一想生無間獄下洞火輪即八熱獄身入風火二交過地者是風火相交處而身居此其苦可知有間即十八獄無間八無間獄純情即沉入阿鼻者舊説受罪苦具身量劫數壽命五者皆無遮間名五無間此惟情業最重者墜入至劫壞乃出若兼謗大乘等則此劫雖壞更入十方阿鼻無有出期以謗法者令無窮人墮邪見故循造下結答由前問云此諸地獄為有定處為各私受故答云雖是自招私受在衆同分中兼有元地元地即定處正答別業同報也阿難此等皆是彼諸衆生至造十習因受六交報冠注此結前起後之文也前明情想為因所感七趣為果此下明十習為因所感三塗為果自業所感者謂自心所造之業自心所化之果非天造亦非人與所謂應觀法界性一切唯心造感化也云何十因阿難一者淫習至菩薩見欲如避火坑冠注此詳明淫習因果也舊説惡業起於情惑而淫為情惑之最故前後皆首明之首句總徵十因一者下先陳生前所造因相如人下次設喻以驗其因果之實二習下三明死後所感果相是故下四引聖示戒令知畏避下皆倣此交者結搆也接者會合也發者動也相磨者染心觸樂也研磨不休精血自耗則火大熾然於其生時自有消渴內熱等疾便是自心所造因相已現獄中矣故曰有大猛火於中發動設喻驗之令知因果之實也二習者生前現習是種子所發死後種習是現行所熏現習屬因種習屬果亦是因果相符也相然者謂成焚燒之事鐵床等如別經中言化王女引罪人抱之即成火床火柱足見是目心種習所化也如來名為欲火依因示果令知驚懼也菩薩見欲如避火坑舉果揭因令知畏避也意謂果極無餘尚厭其名位登聖地猶避其害毒哉欲也而初心者豈可近之乎下皆倣此二者貪習交計發於相吸至菩薩見貪如避瘴海冠注此詳明貪習因果也貪謂吸取計謂執著由執身財為我有故起貪也吸者攬取諸物貪吸屬水吸之不已轉增固結凝水成氷即是自心所造因相已現獄中矣故曰積寒堅氷於中凍冽設喻驗之令知因果之實也凌侵奪也二習相凌等由因果相苻故感吒吒等之果相也吒吒波波羅羅皆忍寒苦聲也青赤白蓮皆堅氷色也貪水即今貪泉飲之使人貪心熾盛也瘴者癘氣也觸之輒病或復致死海已溺人況更有瘴癘之氣甚言其害令人驚避也餘意準前三者慢習交陵發於相恃至菩薩見慢如避巨溺冠注此詳明慢習因果也恃己壓人曰慢陵欺虐也恃倚也如倚財勢及與名位等陵人倣物故曰發於相恃也馳流奔馳逆流也慢恃屬水習氣高舉如水逆流故曰馳流不息便是自心所造因相已現獄中矣故有騰逸奔波積波為水設喻驗之令知因果之實也綿味即舌根絞齶不已也鼓者如風之鼓物皆上騰之意二習相鼓等由因果相符故感血河乃至融銅灌吞之果相也癡水西土有水飲之則癡如此方貪泉也見慢謂見自心起慢非謂見人慢己也後皆倣此溺者泥水深處易陷難更曰巨者益可畏也四者瞋習交衝發於相忤至菩薩見瞋如避誅戮冠注此詳明嗔習因果也怒氣衝逆曰嗔交衝彼此抵揬也忤欺陵也由彼此欺陵固結不息而氣動其心故心熱為火心鼓其氣故氣鑄為金積習久之則心火益盛氣金轉剛是則自心所造因相已現獄中矣故有刀山鐵橛乃至鎗鋸設喻以驗因果不謬也擊者觸也二習相擊等由因果相符故感宮割乃至槌擊之果相也宮者截其根割者劓其鼻斬斫者斷首截臂也銼者碎其骨刺者削其肉槌擊者鞭朴也利刀劍者觸之即喪身失命誅戮者犯之即首領不完五者詐習交誘發於相調至菩薩見詐如畏豺狼冠注此詳明詐習因果也諂諛不實曰詐交誘彼此哄賺也調者以諂言調弄也引者以詐行勾引也受彼調引者如被繩縛才禁索絞校錮而不能脫去若積久不住則自心所造因相已現獄中矣故有繩木絞校校即枷也以諂詐誘人必浸漬曰久而後令人甘受繫縛不肯脫捨故喻如水之浸田草木生長其因滋果蔓亦如是也延者引長也二習相延等由因果一如故感杻械乃至撾棒之果相也以讒言中傷正人故曰讒賊豺狼毒狠之物故當畏避之六者誑習交欺發於相罔至菩薩見誑如踐蛇虺冠注此詳明誑習因果也以言眩惑曰誑交欺彼此瞞昧也罔者欺彼不知不見而謾之也誣者説虗為實指無説有也積習既久則運心飛揚設智曖昧所造姦惡神出鬼沒令人不知不覺墮其計中此則自心所造因相已現獄中矣故有塵土屎尿穢汙不淨以誑語惑人如猛風鼓塵令彼不見驗其因果亦當如是也二習相加等由因果相符故感沒溺乃至漂淪之果相也以誑能陷害人故感淪沒陷溺之報以誑能鼓舞人故感騰舉拋擲之報以誑能抑揚人故招飛墜漂淪之報劫殺者遭之必害法身故蛇虺踐之必傷兩足故七者怨習交嫌發於銜恨至菩薩見怨如飲鴆酒冠注此詳明怨習因果也陰恨曰怨交嫌彼此相憎也銜含藏也由含藏恨心即現因相於獄中故有飛石乃至囊朴之事投即墜也礰亦石也匣貯即匣床也車檻即囚車也甕盛如鐘炙之類囊朴囊貯而撲殺之如始皇囊撲兩弟是也設喻以驗因果如是也吞者噉也尤見其怨恨也二習相吞等由因果相宜故感投擲乃至拋撮之果相也違害鬼謂違背正理暗中害人鬼之最惡者也鴆鳥最毒毛羽瀝酒令腸寸斷八者見習交明如薩迦耶見至虗妄遍執如臨毒壑冠注此詳明見習因果也見即邪見交明彼此妄分別也見習有五一薩迦耶此云身見謂執身有我種種計著二邊見於諸法上執斷執常三邪見邪語錯解撥無因果四見取非果計果如以無想為涅槃之類五戒禁取非因計因如持牛狗戒為生天因之類五者總名邪見順邪反正故曰發於違拒彼此是非故曰出生相反由自心造此因相現於獄中故曰有王使主吏證執文籍以決其邪正設喻驗之令知因果相質無處回避也交對也二習相交等由因果相符故感勘問權詐乃至文簿辭辨之果相也權變者將巧術以誘其真詞也推鞫者細推窮鞫以審定邪正也察訪披究者詳察訪問盡情剖析也照明以業鏡照明令無所匿也此五邪見能陷法身故名見坑能致人於苦海故喻如毒壑九者枉習交加發於誣謗至菩薩見枉如遭霹靂冠注此詳明枉習因果也枉者以直作曲也交加者彼此以罪相加也誣謗者以無妄之禍加之於人惟圖暢自己之懷抱不顧逼壓人之身心即此因相以現獄中故有合山等事合山者兩山相合令人無處逃避也合石謂二石夾之也碾磑即碓磨之類以此惡囚必招惡果喻讒賊之人斷然逼枉良善也排擠挫也二習相排等由因果不謬故感押捺乃至衡度諸事之果相也押捺者壓伏也捶按者打撲也蹙漉者榨淋出血也衡稱也度量也謂稱其輕重量其長短以治其罪也亦曰衡度者以迫窄孔中衡度其身如絲之狀也讒能傷人故名讒虎以可驚怖故名霹靂十者訟習交喧發於藏覆至如戴高山履於巨海冠注此詳明訟習因果也掩己所短訐人所覆謂之訟交喧者彼此相諍也攻發人之陰私故曰發於藏覆以自心有此因行即現相於獄中故曰有鑒見照燭也鑒等所謂業鏡臺前陰私畢露無容覆蓋矣如攻人之惡者人亦攻其惡也有如是因必招如是果喻如立身於日中必不能藏其影也陳者獻白也二習相陳等由惡因惡果相契故感惡友業鏡火珠乃至對驗諸事之果相也陰賊者陰害於人陽覆於己一朝露布則自害而已戴山履海喻覆愈深而害愈重也云何六報阿難一切衆生至所招惡報從六根出冠注此總明六交報也交報有二一因與果交二果時六根交互受報與前十二顛倒舉一全收同意亦與前一根返源六根解脫事反而理同也六識造業者識有了別故能造業報從六根出者根雖無了別亦能發識故報亦從根出然六識是業識之見分六根是業識之相分總是業識自作自受與前審業本云誰作誰受同旨云何惡報從六根出至星火迸灑煽鼓空界冠注此詳釋眼根交報也云何下總徵六報一者下謂眼識與俱意識造業偏多故招引惡果從眼根出而與此見業交矣下示臨終所見惡境見覺屬火業力亦勝故感猛火滿十方界而神識乘煙墜入地獄成論云極善極惡皆無中陰所以直入六報咸言直入就重言耳後皆準此發明二相者是入獄時初見之境元與生前流逸奔色見明見暗無異故明則見諸惡物生無量畏暗則寂然無見生無量恐蓋畏生於境恐生於心也如是下正詳交報此因中造業時雖眼識為主諸識必互助之如眼見美色耳取淫聲乃至身著淫觸意主貪戀一剎那間何所不具而果中互報固其宜矣然經中所明果相唯依諸根本性變起若強配前因終難盡舉徒增繁雜耳後皆倣此聽性屬水被見火所燒故為鑊湯洋銅嗅主氣性亦屬土被見火所燒故為黑煙紫𦦨舌性屬金亦主五味被見火所燒故為焦丸鐵糜身具五行亦主觸約土木被燒故為熱灰爐炭心為五行之主正性屬火被燒轉熾故為星火迸灑煽鼓空界二者聞報招引惡果至為電為雹摧碎心魄冠注此別釋耳根交報也言耳識與俱意識造業偏多故招引惡果從耳根出而與此聞業交矣下示臨終所見之境聞性屬水業力亦勝故臨終時先見波濤沒溺天地而神識降注乘流而墜入地獄發明二相者是初入獄時所聞之境元與生前流逸奔聲聞動聞靜無異開聽聞動也謂性聽種種喧閙嘈雜之聲令人精神愗亂而無主閉聽聞靜也謂杳無所聞令幽魄沉沒而罔依下正詳交報聞性屬水故曰聞波根能顯聲故能為責罪詰情之境見火與聞水相凌如陰陽相薄故為雷為吼為惡毒氣鼻屬土息即氣土氣隨水而變故為雨霧及諸毒蟲周滿身體舌性屬金塵具五味根塵隨水而變故為膿血及諸雜穢身具五行觸主有形質隨水變故為畜鬼土隨水變故為糞尿意為五行之主正性屬火水火交感故為電為雹摧碎心魄三者嗅報招引惡果至為飛砂礰擊碎身體冠注此別釋鼻根交報也謂鼻識與俱意識造業偏多故招引惡果從鼻根出而與此嗅業交矣下示臨終所嗅惡境鼻根屬土亦具出入息吸則下入呼則上出業力亦勝故臨終時先見毒氣充塞遠近而神識從地湧出復從上而墜入地獄發明二相者是初入獄時亦與生前流逸奔香聞通聞塞無異通聞者謂鼻有所嗅而被穢惡之氣熏極鼻根令心擾亂也塞聞者謂根無所嗅故氣掩不通悶絶于地一無所知也下正詳交報質礙塞也履通行也嗅性不離通塞故衝息則為礙而不能行為通而能行氣隨火變故為火炬氣隨水變故為沒溺為洋沸味塵皆隨氣變則為敗魚敗羮故曰為餒為爽身具五行皆被氣蒸而敗故為綻破爛壞等物而遭無量咂食心主五行而性亦屬火似氣與火土交感故為灰塵瘴氣為飛砂礰石擊碎身體四者味報招引惡果至為飛熱鐵從空雨下冠注此別釋舌根交報也言舌識與俱意識造業偏多故招引惡果從舌根出而與此味業交矣味即嘗也下示臨終所見之境舌性屬金且貪味則網捕燒野取諸生命以滋口腹故臨終時先見鐵綱猛焰熾烈周覆世界而神識下透挂網倒懸其頭墮入地獄發明二相者是初入獄時所見之境亦與生前流逸奔味吞吐氣味無異故吸氣從外入者必寒故結成寒氷凍裂身肉吐氣從內出者必熱故飛為猛火焦爛骨髓下正詳交報舌噉生靈誣罔良善皆令忍聲納受故歷嘗則能為承忍痛苦也依見貪味亦是金火交發故能為然金石依聽發惡而為唇鎗舌劒亦是金水相磨故能為利兵刃依嗅恣味籠取羣生亦是金隨氣變如火鑄金故能為大鐵籠彌覆國土貪味傷物亦是金得木而為弓箭弩射思味害物亦是金被火鎔故能為熱鐵從空而下五者觸報招引惡果至為墜為飛為煎為炙冠注此別釋身根交報也言身識與意識俱造業偏多故招引惡果從身根出而與此觸業交矣下示臨終所見惡境獨此根見相偏惡偏多者以身具五行且因貪男女染觸及大宅侍衛驅使鞭撲等事則淫殺盜妄靡所不犯故積罪如山所以臨終之時見有大山四面來合無復出路而神識亦見鐵城火蛇乃至獄卒羅剎手執鎗矟驅入地獄也發明二相者是入獄初見之境亦與生前流逸奔觸合離取著無異故合觸則感合山逼體骨肉血潰離觸則感刀劍觸身心肝屠裂下正詳交報道趨獄路也觀獄王門闕兩觀也聽案皆治罪之處皆身根所依處也二火交發故為燒爇水火交感故為撞擊倳射倳插刃于肉也括袋所以收氣也水土閼塞令氣不通考縛者不容身根動搖與括袋一意以火鑄金故為耕鉗斬截之具思乃飄蕩不定亦是二火交熾故感飛墜煎炙之境六者思報招引惡果至皆是衆生迷妄所造以上十因六報皆順生滅門中論有為因果則未出世間物理且生則為陽死則為陰所謂未離三界外猶在五行中故以根性所變之境悉按陰陽五行而釋之然窮源極本不出自心不惟衆生因果即諸佛化報亦皆自心所現之影像矧陰陽五行猶是業識見相二分又豈外乎自心而別有耶抑且因果報應雖謂粗淺法門亦乃業識中不思議熏不思議變非鏡智圓明五眼具足莫能測其源委所謂浩浩三藏不可窮淵深七浪境為風而世智肉眼者寧得輕忽於此哉冠注此別釋意根交報也言意識為前五識所依造業偏多故招引惡果從意根出而與此思業交矣下示臨終所見惡境思為五行之主而且飄蕩亦以思本無形能壞有形之物故臨終時先見惡風吹壞國土而神識被風吹上空中旋從空落乘風而墮入地獄發明二相者是入獄初見之境亦與生前流逸奔法散亂昏沉無異故不覺迷極則不知頭路徒荒忙奔走無有休息不迷覺知則受無量煎燒苦痛難忍下正詳交報思雖無定必有所思之境故結思則為受罪方所見火能鑄思金故為鑒而照明罪人之事水土交結故能為大石氷霜及與上霧氣能運轉隨火而變故能為火車火船火檻思得舌而作發故能為呌喚悔泣身具五行皆隨思所變亦無定體故能為大小之形生死偃仰之事阿難下結答言十因六報皆是迷己真心妄業所現本非實有若能達妄無因即住無生法忍則生滅如幻況地獄乎若諸衆生惡業同造至妄想發生非本來有冠注此明因果輕重也意謂雖則迷妄所造亦有重輕不等惡業同造者謂六根十因具足于一切時皆同造所感極重故入無間大地獄而受苦無量經劫亦無量也六根各造者謂雖具十因但前後異時而造故曰各也及彼所作兼境兼根者謂兼一根一境以至二三根境各造此罪次重于前故入八無間獄若身口意三唯造殺盜淫餘不兼造稍輕于前故入十八獄泥犂經云火獄有八寒獄有十是也三業不兼者謂或具身口而犯殺盜唯缺意與淫或具身意而犯殺淫唯缺口與盜或具口意而犯盜淫唯缺身與殺此又次輕于前故入三十六獄見見一根者謂六根中單犯一根一境餘五不犯單犯一業者謂三業中唯犯一業餘二不犯此又次輕于前故入百八獄也由是下結答疑問由阿難前疑為有定處為各私受此謂別作別造答為各私受謂入同分地答為有定處總言別業同報也前疑為本自有為生妄習此答謂妄想發生非本來有復次阿難是諸衆生至則妙圓明本無所有冠注此明地獄罪畢方入鬼趣也非無也破律儀者謂犯大小乘戒不信罪福自陷陷人也犯菩薩戒者細犯大乘戒也毀佛涅槃者謗佛謗法也律儀是衆生出苦之根本菩薩戒是衆生成佛之正因佛乃世出世之慈父涅槃乃無上之妙理若此三者全具則斷滅三寶種性此方獄壞更入十方地獄永無出期故曰無此三者唯犯十因等雜業則雖入地獄歷劫燒然將來還有罪畢之時可脫獄報而受鬼形也下詳明鬼趣貪物即貪習交加之餘習故地獄罪畢猶戀戀于物如依金玉附草木而為精怪者故曰遇物而成怪鬼貪色即淫習交接之餘習故地獄罪畢欲情流動火大猶然故附風成形而為旱魃之鬼貪惑即詐習誘引者唯以巧令惑人生理盡喪故罪畢餘習附畜成形而為魅鬼若孤精等是也貪恨即怨習銜恨者故罪畢餘習附毒蟲蠱害于人今有妖術令成蠱病皆此鬼主之也貪憶即嗔習相忤者不忘宿惡伺衰施害故罪畢餘習附衰成形而為瘧鬼若今散瘟行瘧之類貪慠即慢習交陵者慳吝無德虗驕恃氣陵人傲物故罪畢餘習附氣成形而為餓鬼貪罔即誑習欺罔者潛心陰昧魘覆一切故罪畢餘習附幽暗而為魘鬼猶存暗室魘昧于人貪明即見習交明者本是邪見妄作高明故罪畢餘習陰附精靈為魍魎鬼常處杳冥似有若無貪成即枉習誣謗曲人成己故罪畢餘習附明成形為役使鬼明神明也由前曲人成己今依靈廟被神驅使反曲己成人也貪黨即訟習交喧者結黨朋證訐人陰私故罪皆餘習附人成形為傳送鬼良以因中刺人隱暗之事而傳𮞏之故今為鬼亦附巫祝傳吉凶也阿難下結妄無因純情者舉重該輕前文九情八情皆在其中業火燒乾者以情屬水情罪受畢故曰燒乾總謂獄因報盡故生鬼趣也此等皆自妄業所招妙圓心中本無是事所謂妙性圓明離諸名相復次阿難鬼業既盡至皆為浮虗妄想凝結冠注此明鬼業報盡而生畜生趣也情想俱空者但空地獄鬼趣之情想前云純情墮大阿鼻九情一想墮無間八情二想墮有間七情三想生餓鬼者此皆業火燒乾尚有六情四想而生毛群羽族中與元所負人酬償宿債也下詳明畜趣昔因貪習而為怪鬼所附物銷鬼報亦盡順習生世多分為梟類貪貨財絶倫義多感此類多者約業習重者言未必盡然後皆倣此因淫習而為魃鬼所附風銷鬼報亦盡生為咎徵咎徵乃凶事前驗如鼯鼠呼人商羊舞水之類亦旱魃為災之餘習也因詐習而為魅鬼所附畜死鬼報亦盡復生狐類皆妖惑餘習因怨習而為毒鬼所附蟲滅鬼報亦盡復生毒類如蛇虺蝮蝎等皆陰害餘習也因嗔習而為癘鬼所附衰窮鬼報亦盡多生蛔類依人銷食亦懷瘧附人之餘習也因慢習而為餓鬼所附氣銷鬼報亦盡多生食類驕吝恃氣者翻充人飢虗所謂反報也因誑習而為魘鬼所著幽銷鬼報亦盡土為服類常從暗中欺魘于人今為蠶蟲牛馬為人服乘亦是反報也因見習而為魍魎鬼精銷報盡多生應類如社燕寒鴻應節而至亦貪明之餘習也枉習附明為役使鬼明滅報盡多生休徵之類如嘉鳳祥麟亦是依神明而效走使曲已成人之餘習也因訟習而為傳送鬼所依巫亡鬼報亦盡多生循類如貓犬等亦是阿附順人之餘習也阿難下總結三塗皆自妄業招引若悟明菩提則一無所有如汝所言下牒前所問墮獄之人如是惡業以三人惡業例該一切惡業也本自發明者謂以上所説惡因惡果皆是自己如來藏中循業發現良以性明圓故無所不具但循何等業即發現何等報故非天降地出亦非人與元是自造妄業自受妄報若以鏡智觀之皆為浮虗本無實體雖有三塗總是自己妄想凝結所成所謂如水成氷也復次阿難從是畜生至及佛出世不可停寢冠注此總明畜趣報盡而復人趣也鬼之為畜雖則六情四想而元為酬償宿債故也既酬債畢即兩無干涉設使所酬過于本分或鞭䇿苦逼食噉無度則此畜生便得情想均等復生人中而反徵其剩徵剩者謂復索其過取之餘也若彼過徵之人淨業力勝能保人身更有布施等福德則就人中償其過徵或遭竊奪或被負騙之類若乏淨業兼無福德無力可保人身則復轉生畜道而償彼畜生餘剩之債也下明負債易償負命難償也言此人反償餘直者若元所過徵為彼變賣錢物仍售其錢以償之為彼負重致遠仍役其力以償之償足自停永無纏繞設使不但過用錢力而又于中殺其身食其肉則生生世世𮞏相食噉如井轉轆轤互為高下無有盡期若非自修正定轉重為輕諸佛出世投佛懺除則永難雪此怨對也此世尊苦口慈心甚言當警戒之不宜恣情殺食也汝今應知彼梟倫者至此輩名為可憐愍者冠注此詳明畜類報盡而復生人類也貪習為性為梟而復人形猶然頑嚚不測倫理不受教化者餘習使然也參合者雜廁于其中未必愚惡一類皆梟所化也後皆倣此淫習為魃鬼為咎徵復生人中參合異常而與事理不諧者妖淫為害之餘習也詐習為魅為狐復生人中參合庸鄙碌碌營生者諂世求容之餘習也怨習為蠱為毒復生人中參合狼類毫無仁慈者銜冤陰毒之餘習也嗔習為癘為蛔而復人形參合微賤雖親附人人不介意者依衰附物之餘習也慢習為餓鬼為食類而復生人中參合柔怯不能勇猛委靡不堪者恃氣傲物之反報也誑習為魘為服而復人形參合勞類役役于世無復休息者驅䇿乘服之還報也見習為魍魎為應類復生人中參合文類稍通文義可稱小慧者妄自高明之餘習也枉習為役鬼為休徵而復人形參同明類頗附世智辨聰效世小用者搆副神明之餘習也訟習為傳送為循類復生人中參合達類諳練世故曉解人情者在畜類循人既久自有餘習使之然也以上十種前七似幽情斯鈍者後三似想明斯聰者然文明達者皆便巧雜技世智辨聰者非賢達文明之士也下總結警戒曰是十種者昔在人趣中造三塗業受三塗報報畢而復形人道此皆自無始來所造惡業冥計不忘輪回顛倒互相生殺酬償命債無有休息雖復人形若不遇如來出世不聞如來正法令其銷釋冤對解脫惡緣仍于塵勞中恣情縱意不顧根本則呼吸間復入三塗矣蓋此循業輪轉法爾天然豈容逃避哉嗟嗟既得人身不善保持真為可憐愍者阿難復有從人不依正覺至報盡還來散入諸趣前五行字作平聲讀後五行字作去聲讀上明仙趣竟此下明天趣天有三界欲界色界無色界也欲界自須彌腰頂二天以至空居四天共有六重皆有飲食淫欲睡眠三欲具足故總號欲天其男女嫁娶妻妾亦如人間但諸天人無骨肉亦無大小便利身有光明無分晝夜報得五通形無障礙是故天趣為界內極尊也冠注此明從人趣而修入仙趣也夫此一趣起于衆生貪生惡死之念故雖有多種總是厭懼無常求身常住殊不知此身乃常住真心中之幻影故昧根本智而錯亂修習如西土外道宗摩醯首羅為天主此方黃老崇上太清為元始皆仙趣之至也從人者謂從人中修證也不依正覺修三摩地者謂不依常住真心發起正智修楞嚴大定而證究竟堅固之理也別修妄念等謂彼不知色身是堅固妄想結成終從變滅故誤認有性命可修養俾之長生不死而存留想念固守色陰令其不散不壞也山林人不及處即名山洞府崑崙等處人迹不到純是仙居也下十種工夫雖有優劣不同而存想固形是其要訣下分釋十種堅固服餌等如煉食胡麻紅鉛以固守其形縱得功成但可壯體延齡而不能飛舉故曰地行堅固草木等如生啖黃精松柏等以固守色陰縱得成功但能身輕足快行步如飛故曰飛行堅固金石等如煎鉛汞煉丹砂九轉大還堅守形神縱得功成但可化白石為黃金化凡骨成仙骨而周行無礙故曰遊行堅固動止等謂一動一止皆守氣固形如煉精還氣煉氣還神煉神還虗久而功成可羽化飛升故曰空行堅固津液等謂鼓天池咽玉液能令水升火降而結內丹以固其形久而功成氷雪卓約不交世欲輕舉近天故曰天行堅固精色等謂服虹飲霧朝採日精夜採月華久而功成則精氣貫通物理故曰通行堅固呪禁等謂專以呪術固守色陰持呪既久凝神永命而得長生之道故曰道行堅固思念等初繫心臍輪下透尾關升夾脊以至達泥洹衝頂出神以固守其形思久功成形神照應故曰照行堅固交遘等謂內以坎男離女匹配夫婦外以採陰助陽攝衛精神久而成功此感彼應吸彼精氣固己身形故曰精行堅固變化等謂觀世萬物生于化理存想化理久而覺悟則能移山倒水改易四時亦能固守其形留住世間此仙道絶術也故曰絶行下結妄謂此十種修習皆于人趣中修煉妄心不達常住真心不修金剛正觀反於妄身中別求長生之理縱得行理圓成壽千萬歲休止深山海島絶于人境亦在輪回妄想中流轉而于自己常住真心性淨明體茫然不知若不聞正法不修正定徒別修妄念存想固形一朝仙趣報盡依然形銷流入異類矣阿難諸世間人不求常住至自此已還名為欲界冠注此明欲界六天也謂從人道修十善因而入于天道者不能修真三摩提求證常住真心由無正觀正定故未能捨己妻妾恩愛然于他人妻妾不唯身無所犯即心亦不流逸矣由其正淫雖有邪淫念息則愛水澄鎣意地光明命終時捨人身而受天身生須彌腰居欲界第一重鄰日月宮名四王天若在人世不唯不流逸邪淫即自己妻妾踈淡減少不多流獨居時間有念起不得前人超勝一倍故命終後亦超日月之明生須彌頂居欲界第二重名忉利天此上二天名地居天雖形交成淫但手相抱而已非同人世有不淨流液也此下名空居天若居人間不逢欲境則淫念不起即逢境時唯暫交一過去即釋然不復追戀此于淨居既得全味故此欲念動少靜多功倍于前命終後朗居空界身殿自光遍周互照不須日月以蓮華開合為晝夜以鳥來去為春秋居欲界第三重名須𦦨摩此云時分天唯把手成淫不交遘矣若居人世能于一切時唯靜無動而自無欲念但應彼欲境迫觸不能拒絶猶順從之此未能全無心但于動少靜多又勝一倍故命終後上升勝境精細微妙下界諸天人等不能窺見且此天有內院外院又有業報一天乃有漏業果所成為總報天修十善者得生彼天果屬有漏三災可壞內院是補處菩薩寄居之地今此天主名曰彌勒縱至劫壞三禪而此內院三災不及亦未嘗壞此欲界第四重如是內外總名兜率院云知足天能于五欲生知足故但以一笑成欲又不同于把手矣若在人中自己本無欲心淫境橫陳于前力不自由雖應觸之而了無滋味如嚼蠟然其功又倍于前故命終後生越化地能超越下天亦能自化樂具居欲界第五重名樂變化天謂所樂之具皆自能變化故若雖居世間無心于世唯守戒支修心上界但權同世情行夫歸事至于交時不但無味而且超然境外毫無干涉又勝前功一倍故命終後超出化無化境化即第五無化即下四天居欲界第六重名他化自在天凡欲樂境不勞自化皆由他化而自在受用耳以上二天皆以眼相視便為成淫故益勝下天也下總結曰如是六天形十欲境雖不同世人躁動無節如野馬無羈莫能控制而猶未至于全無心迹而絶交故通名欲界自此以下直至地獄皆欲界所攝所謂五趣雜居地也
