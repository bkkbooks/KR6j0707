front:
  text: 楞嚴講録自敘諸佛言教有權有實有通有別有半滿有小始終頓圓而其逗機説法也或密或顯或廣而略或豫以奪或倒以順或獅吼雷鳴而掃蹤絶迹且其流傳而被吾震旦也承受之品既殊機緣所及亦異從上諸師登法王座矢口演法者孰不知稱此楞嚴一經為諸經之統攝十二分教兼總於斯而未嘗詳言其故使初學者流何從信受不幾儱侗真如乎乘時於此經探尋有年師承有據請不惜口業為四衆一推究之使知從來開演諸人信受有不易見聞者在乎蓋此經是世尊最後之極談出於法華之後屆於涅槃之前按本經中阿難言世尊與文殊等諸法王子談實相時及世尊説耶輸陀羅尼已蒙授記故知應在法華之後世尊將説涅槃阿難不在文殊白佛曰阿難被魔所擾世尊説呪命文殊往攝安知非救回阿難先説楞嚴後説涅槃耶故知應在涅槃之前又世尊説涅槃有二義一者為法華未熟輩追説四教具談佛性令知真常入大涅槃故名捃拾殘機教二者為末世比丘畜不淨物樂誦外典戒乘俱失起斷滅見亡失法身故更提三藏廣開常宗設三種權扶一圓實故名扶律談常教此經自阿難啓請一心三觀世尊開示楞嚴大定發明三如來藏性乃至自乾慧地直入妙覺果海即涅槃第一義也阿難請問度生方便佛説四種律儀更與廣明七趣皆由妄業招感乃至禪那之魔相五陰之根本即涅槃第二義也世尊於阿含會中唯説人天因果接引初機此經説三種相續十習因六交報廣明七趣因果則阿含教已備世尊於般若會上説四聖六凡本自空寂依正因果宛若幻夢專利上根此經説陰界入七大等相皆如空華火輪乃至非五陰四大非四諦六度非菩提涅槃則般若教亦備世尊於方等會上説非空非有即空即有為欲普被三根此經亦説即陰界入即七大即四諦六度即菩提涅槃乃至非即非離則方等教復備世尊於華嚴會上説四無礙一乘圓頓被上上機而此經亦説狂性自歇歇即菩提是即非即離即離非微塵之轉輪毛端之現剎大性本然而周遍法界妙覺湛然而含吐十虗與四無礙何異世尊於法華會上授記三乘皆得成佛此經從乾慧地歷五十五位菩提路而後入等妙二覺又與法華何異故此經不獨該通五教亦且圓攝三宗蓋法華華嚴等經互貫諸經之堂奧者也而楞嚴一經兼貫法華等經之脈絡者也非遍閲諸經者詎識此經之微妙非熟諳此經者又詎知其為諸經之綱領乎世尊滅後天台尊者默識西域具有此經朝夕遙望禮拜十有八年未遂所願後感般剌密諦尊者志欲流傳此土三被國王追取尊者乃以細白氎密寫破臂藏策親送此土譯出奏聞爾時朝廷多故不暇頒行詔秀國師入內講解師將此經隨出洛陽天宮寺後師遷化上以王禮殯送當陽度門寺經亦與俱彼時流傳未廣幾希湮沒慧正法師訪度門而得之始為宣布然則此經之至此土也今固已幸彰明較著追維其始何其紆回屈曲而展轉艱阻之如斯也豈非佛之慈悲曲垂方便而衆生之根基器量與此方之時節因緣參差分別有所不輕傳授不易信聞者耶時侍本師度門迹公和尚多歷年所鋭志二楞片言半偈稍不愜心則如病如癡頭目腦髓捐縻罔惜必期直契心宗上徹慧命幸蒙本師策勵間亦因文識旨離旨會心鐫磨寒暑煅煉昕夕瀝血嘔心無非諦認佛旨之玄致痛掃諸家之葛藤楞伽一疏近已刊布而楞嚴講録每就講堂會心徇口直述根源者未嘗容易筆受也頃天啓初運憩虞山之大石山房幸居士芝房孫公鴻所張公空如程公葵陽沈公等為諸禪侶敦請主法於東塔蘭若勉爾對衆舉揚一時緇素歡喜願聞亦不過順經旨之自然代覺王之口𦦨靡敢一字違背祖教而一時聽信大衆咸謂明白顯易若遊翔通衢闢撤溪徑有恆吾居士汪公遂堅志請布時固辭之曰余不敢為文言綺語久矣況敢步趣溫陵長水諸師之後塵乎居士曰不然如如所説如如所聞真所謂不滯言詮不蹈途轍不事潤色者也此經貫串諸經而此講貫串諸説藉一時之筆舌作萬世之梯航其上報佛恩下利群品不亦大哉時唯唯曰嘗聞之依文解義三世佛冤離經一字即同魔説非依非離之間其有至妙存焉時言不過依文解義者但願聽言而通於文義之外庶幾識得者不為冤乎若涉一字勦説而離背本經則何敢以自魔者而魔人也夫以一經貫串諸經則此經之奧旨時敢明推其所以然以一隅之言而謬為貫串諸説在居士當密究其然不然而時終不敢信其然也請以是質諸明眼天啓壬戌佛成道日書於大石山房楞嚴講録序若論此事直得三世諸佛口挂壁上向威音那邊更那邊薦得猶是鈍漢又何事以大定堅固著眼中金屑為良由娑婆穢土皆以淫欲而正性命故勞嚴淨阿難權作當場子弟此尊既刳肉作瘡證龜成鱉矣而本師柴紫和尚以陰有囑付為之下元字腳使見聞者以楔出楔獲妙淨明心性淨明體當知楞嚴會上不曾道著一字不異柴紫峯頭從它橫説竪説也源不慧侍巾塵有年已刻楞伽講録今復梓楞嚴作渡海囊倘有欲透此葛藤者請向葛藤中驗取切弗空費草鞋打之繞者也天啓壬戌冬原一居士汪益源焚香書大佛頂如來密因修證了義諸菩薩萬行首楞嚴經明柴紫山釋乘時述凡經題目有世尊親安者有結集人約義而安者此經乃世尊親自安名佛説五十五位菩提已有文殊菩薩在大衆中即從座起頂禮佛足而白佛言當何名此經我及衆生云何奉持佛告文殊是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海亦名如來密因修證了義亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名灌頂章句諸菩薩萬行首楞嚴共有五名而後譯者將謂語雖不一義可互陳是故存三隱二合成一題曰大佛頂如來密因修證了義諸菩薩萬行首楞嚴經夫大佛頂者指諸佛三十二相中最尊最上無見頂相而言其相不唯凡愚小乘莫能見即地上菩薩亦未能覩其邊表唯佛與佛乃可見之何以故以有見者不能見以無見者亦不能見以非有非無見者不能見以即有即無見者亦不能見唯離心意識出凡聖路途者無能見亦無所見方許親見頂相然依最尊上頂顯最上乘法就有相以形無相寄幻相以徵實相故耳蓋實相者即佛生本具常住真心性淨明體但為凡愚執有二乘墮空所不能知乃至地上菩薩亦尚未窺其涯際唯佛世尊三德圓通萬行具足據無作妙智了不思議境親證常住真心全體大用而亦具大佛頂相亦能闡最上乘法是故尊者被魔所攝佛自頂門放光化佛説呪救脫尊者因而殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便佛即全提正令直指人心曰有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路及至文殊請立經名復以大佛頂三字辨之經首可見非入楞嚴大定者不證最上乘果非證最上乘果者不見大佛頂相見大佛頂相者是名如來夫如者指其真體來者表其大用體具威音那畔用展今世門頭然正在威音那畔不妨今世門頭正在今世門頭不妨威音那畔若謂寂然不動則感而遂通若謂感而遂通則寂然不動無所從來亦無所去故名如來夫如來者果德之稱也非有密因莫能證果然人但知密非是顯因非是果而殊不知如來修因曾未離見色聞聲處即此六根六塵六識便是成佛根本一切現成無不明了特為衆生逐境迷心聚緣內搖趣外奔逸日用不知故謂之密是密乃對衆生言豈如來之因有密者哉是知淪生死證妙常皆不出此根塵識法除此一法更無別法了此一義更無別義斯乃一修一切修一證一切證一了一切了無了無不了豈唯如來凡諸菩薩所修萬行靡不在茲菩薩半梵語具云菩提薩埵此翻發大道心衆生謂發起初心必成佛度生而後已其利己利他必假六度及四無量心為十種根本大行復以十資百以百資千以千資萬然萬乃隨世之極數豈行有一定之數乎擴充之或有多種總括之不出一楞嚴大定耳梵語首楞嚴此云一切事究竟堅固所謂一切事者不離六種根塵識法究其體性唯是常住真心如法華云是法住法位世間相常住亦如肇論云聖遠乎哉擬之即神道遠乎哉觸事而真且曰大佛頂又曰首楞嚴王者簡非二乘之枯禪滅定亦若大經云男子身中入正定女子身中從定起乃至眼根入正定耳根從定起舌根入正定身根從定起亦若祖家云行亦禪坐亦禪語默動靜體安然凡得此定者自然六根返源諸法寂滅復還元覺還元覺者即同如來然如來是能證之人首楞嚴王是所證之法若大佛頂相又乃人法之標準也是茲十九字脈絡貫徹而義攝餘題如悉怛多般怛囉無上寶印十方如來清淨海眼者詮顯佛生本具之真理也梵語悉怛多般怛囉此云大白傘蓋謂此理體括十虗用周沙界遍覆一切不染纖塵世出世間盡無有貴重若此者亦無有高上若此者以此印心無非真心以此印境無非真境如印印泥毫無差爽第為凡愚於見色聞聲處妄認緣影是為肉眼凡夫十方如來親證乎此而盡十方界乃清淨妙境義可攝入大佛頂三字中如云救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海者是明當機等於此一會聞法證果之謂也義可攝入諸菩薩萬行五字中大方廣者言一理而具體相用妙蓮華王者喻斯理即萬法而不染一物猶蓮處汙泥脫體香潔義可攝入大佛頂三字中亦可攝入首楞嚴三字中如云十方佛母陀羅尼呪者梵語陀羅尼此云總持呪有革凡成聖義謂斯乃出生三世一切諸佛之妙門亦能總一切法持無量義凡一念契茲則入聖胎義可攝入如來密因四字中亦可攝入首楞嚴三字中如灌頂章句者言斯經亦在灌頂部中攝乃灌頂部中之章句也是故斯十九字豈獨義攝餘題亦可攝十卷文言如自首卷中因阿難誤墮淫室世尊自頂門放光光中出生蓮華華中化佛説呪勑命文殊持去提獎阿難歸來佛所阿難請一心三觀佛便審最初發心才答見相發心已知生滅窠舊即為立真立妄教以直言直心更與判內外之境定前後之見七處徵心一無定見阿難重請真際所詣佛於面門再放寶光令十方界合成一界更於一身心中指出二種根本要知真妄兩門不離聖凡一道斯皆單提向上不立階級要使直下承當立成正覺得與大佛頂敵體相應奈何阿難惘然無措是以世尊只得向第二門開方便路故曰諸有智者要以譬喻而得開悟遂以拳類見漸引漸入使阿難自陳二障所纏命陳那曉他客塵二字再以屈指飛光引彼了真息妄奈何分動分靜認境認心至於二卷執生與不生論實與不實觀河不變垂手莫遺更諭之以色心諸緣併晦昧為空為兩段要旨立一心軌則使彼知其從真起妄了妄即真之綱領是故下文辨八還擇諸物以至三卷中三科七大皆歸如來藏心完結色心諸緣一段公案乃息妄歸真顯真諦理見般若德之要訣也至於四卷富樓那不達循業發現執俗難真問及清淨本然忽生山河大地佛詰之以性覺妙明本覺明妙隨立雙關任他去取奈彼認明墮所作既妄立無同異中熾然成異只因一念不覺頓成三種相續以此闡明晦昧為空一段公案無乃依真起妄顯俗諦理見解脫德也以至即真即俗非即非離非因緣亦非自然一多無礙小大相容如我按指海印發光汝暫舉心塵勞先起此又會歸中道了義顯第一義諦見法身德也三德既圓萬行當修示妄無因真不離妄狂性自歇歇即菩提因緣自然俱不可得斯雖屬見道而諸佛圓修圓證之密因盡在茲矣至四卷後佛責多聞無益勸修無漏阿難謂已得華屋要因門入佛示二種決定五種渾濁六根優劣擊鐘驗常以至五卷六解一忘令二十四聖自陳宿因各各悟入六卷觀音陳白耳根文殊揀選圓通三決定義四種律儀至於七卷再宣神呪倍顯功德阿難問四十四心佛答二種顛倒及因生十二類八卷明漸次之助因開菩提之正路此又修證了義及諸菩薩萬行之標指也向後二卷復開七趣輪回廣前三種相續及設十種禪那以明五陰根本無乃助成楞嚴大定耳若尋常將此一經配合三觀恐非本經要旨世尊説法唯在直指人心見性成佛誠一言之下心地開通則聞一句乃至一偈未嘗不入楞嚴大定證圓通三觀矣豈待循行數墨首尾一貫而後可入三觀哉矧尊者雖請三觀方便世尊唯答曰有三摩提名大佛頂首楞嚴王云云是毫𨤲有差天地懸隔矣斯又豫之深信者也經者常法也謂一切諸佛所傳者乃萬古不磨之法也亦謂徑也為諸修行人從凡入聖之徑路也題目已竟凡經大旨準常科為三分一序分二正宗分三流通分序分有通有別通者諸經通用故別者亦名發起序謂凡經各有發起由緒不同故
