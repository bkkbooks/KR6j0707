body:
  text: 明柴紫釋乘時講録新安受法弟子汪益源校梓爾時富樓那彌多羅尼子至欽渴如來無上慈誨滿慈發問有三意一則廣明前晦昧為空一段之所以方顯從真起妄義二則發明前隨衆生心應所知量循業發現之端的三則為阿難等詳審微細之惑滿慈唯斷分別二執不知俱生二執故疑今新聞悔昔未修阿難則分別我執未盡分別法執全在習漏者當指有漏習氣云陰界處等者以等了七大又如來說地水火風者特為問其各性周遍所以另出耳舊說陰界處等單領三科地水火風下方領七大乃是移前七大文中清淨本然四字安置三科文中必不可從前後影略其文乃譯者巧妙耳何膠柱之固乎冠注此敘疑請示也爾時下至而白佛言經家所敘請法之儀也以下皆因滿慈雖破分別我法二執而俱生二執全存尚未轉根本後得二智故不達性相不二弗悟循業發現是以一聞陰處入界以至七大皆如來藏性頓起三疑故先讚嘆曰吾佛世尊有大威德故能折伏人之倒心迷執能開發人之正智悟機即上來所敷演者皆如來自證第一了義三諦圓融之至境非心思言說可及今為衆生向五陰四大等處分明指出如來藏性俾諸衆生性天朗耀心地開通非吾世尊誰能善於斯乎夫此第一義諦豈獨非佛不能敷演抑且非佛不能徹悟世尊每常於說法人中推我第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋意以聾者聆蚊蚋切近尚不聞況百步外於百步外即大聲亦未必聞況蚊蚋聲尚且本所不見其形安能聞其聲乎是故佛雖宣明斯義令我掃除舊時之惑今猶未詳斯義所以不能究竟入於無疑惑之地且如阿難輩雖則開悟而意地中無始有漏習氣尚未除滅猶望世尊微細審除豈無疑乎即我等輩在法會中位登無學功超有漏於欲有諸漏皆已盡矣今聞此法音尚紆疑悔況未盡習漏者乎下牒定佛語而呈疑曰世尊若說世間一切根塵陰處界入乃至七大皆如來藏清淨本然夫既謂清淨當如太虗本無形色無聲響無所染著最初云何忽生山河大地身根業果乃至染污等諸有為相耶既謂本然則是本自天然不待修而增不修而減迷亦不失悟亦不得不變不易云何根身器界善惡業果皆屬循業發現而有次第遷流之不停始終相續之不斷耶且如來又說地水火風本性圓融周遍法界湛然常住然地性堅凝水性溶流云何相容耶水火二性俱遍法界更相陵奪云何皆同虗空周遍一切而不相陵滅乎地性障礙空性虗通云何二性俱遍法界乎故我不知是義之所趣向惟願如來宣揚密旨流布大慈使我迷雲頓開慧日獨朗悟其諸法生續之由各性融通之故庶可究竟至于無疑惑地也爾時世尊告富樓那至欽佛法音默然承聽冠注此大慈許說也意謂前雖自五陰以至七大俱歸如來藏性總為破妄歸真為勝義中之勝義今復普為汝等及諸會中諸漏已盡位登無學者宣明從真起妄令知萬法起於一性諸大歸乎一心以至即妄即真非即非離一多無礙小大互容又乃勝義中真勝義性夫勝義有三一義勝義謂真如蓋真如有隨緣不變義能勝一切義故二得勝義謂涅槃是聖人所得之極果極為殊勝故三行勝義謂聖道是聖人所行之道諦法此法最為殊勝世出世法不能及故具此三者正合楞嚴大定也定性者謂彼尚未回心趣向大乘也未得二空者謂但得人空未能兼得法空也回向上乘者謂已回心趣向大乘也意謂此三等人根雖不齊得聞此法皆獲最上一乘總歸大寂滅地梵語阿練若亦名阿蘭若此云離喧諍亦云間靜處凡阿羅漢咸得此名然無喧諍而寂滅非真為其耽於空寂未證諸法本自寂滅故所行者皆岐路小徑耳唯得楞嚴大定則根無大小心無喧寂境無動靜等入佛乘咸歸究竟觸境融通得心自在方稱真阿練若正修行處所謂唯此一事實餘二則非真也故令滿慈等審諦而聽今當為說而滿慈等欽佛法音默然承聽佛言富樓那至彼無同異真有為法有僧問長沙景岑禪師曰如何轉得山河國土歸自己去師曰如何轉得自己成山河國土去曰不會師曰湖南城下好養民米賤柴多足四鄰僧無語師示偈曰誰向山河轉山河轉向誰圓通無兩畔法性本無歸長水子講師自落髮誦楞嚴不輟從洪敏法師講至動靜二相了然不生有省謂敏曰敲空擊木尚落筌蹄舉目揚眉已成擬議去此二途方契斯旨敏拊而證之然欲探禪源罔知攸往聞琅邪道重當世即趣其席值上堂次出問清淨本然云何忽生山河大地琅邪憑陵答曰清淨本然云何忽生山河大地師領悟後住長水一日顧衆曰道非言象得禪非擬議知會意通宗曾無別致於此皆可同參冠注此明循業發現之源委也如汝所言下是牒定滿慈疑詞遂詰之曰汝尋常豈不聞如來宣說性覺妙明本覺明妙乎滿慈答言我常聞佛宣說斯義蓋性覺者生生不息之真體而性體之妙常自精明本覺者本來具足不假修為而本體之明常自靜妙然滿慈問清淨本然云何忽生山河大地諸有為相等世尊以此二語詰之者蓋謂清淨本然即性覺本覺謂之體也山河等相即妙明明妙謂之用也然上句當重從體起用下句當重攝用歸體故有性本之辨別明妙之倒易性覺若差別智故照了山河大地等相而妙用精明本覺若不動智故徹映山河等相而明體靜妙然非真體不發妙用非妙用不顯真體第能體用不分能所雙泯則性相不二之旨得矣故復並立兩關以徵究滿慈曰汝稱性覺妙明本覺明妙者作何理會為性覺體本來自明即昭靈不昧者而直名之為性覺乎為本覺體元自暗然有不明處特加功以明之故稱為明覺乎一則墮在明邊一則墮在不明邊滿慈雖證無學說法第一豈𡧓以不明者而名為覺體故曰若此不明之體亦名為覺既無能明則無所明畢竟性體能明方名為覺也殊不知有所有能則於性覺妙明相去遠矣佛故牒其言曰若汝執言必有所明方稱明覺若無所明則無明覺是覺以有所無所為起滅也豈知真覺卓然本無能所乎遂告之曰若謂明妙有所已非真體而不得謂本覺矣若謂性覺無所已非照用而不得謂妙明矣既無照明之妙用又非覺湛真明之性體矣蓋性覺無明而無乎不明方為妙明然若言性覺必定妙明則妄生計著執無明無所總墮於無執有所必明總墮於有如先德云只這箇是頭上安頭若道不是斬頭覔活故於性覺妙明本覺明妙中稍有一念執著便轉為無明業識矣是以世尊直示之曰性覺本體元無所明因汝認能明之妄見則立所明之妄境既立妄所復生妄能是見相二分互相生起自有能明之見聞覺知所明之山河等相豈非無同異中而熾然成異乎更不覺是妄念生起反疑清淨本然云何忽生山河等相諸大之性各不相容云何俱遍法界意必使性同而後方許俱遍故憎其異則建同以遣異豈非欲異彼所異而因異立同乎既使同異發明矣復厭其同異意必待此山河等相罄盡無餘化成虗空始還清淨本然豈非因此復立無同無異乎意謂必如是方可究竟到無疑惑處豈知愈究愈遠而倍增疑惑哉遂牒指上文云只因汝認能認所因異立同因同異而復立無同無異如是擾亂轉相對待妄生勞相則是勞真心而生妄見勞妄見而發妄塵然總不出乎自心取自心而反渾濁於清淨本然之性覺妙明本覺明妙矣故總結斥曰由是認明墮所之一念故引起業識轉成見相二分更生十使煩惱既為塵勞煩惱若起心動念自有三世遷流四方判隔若昏沉無記自成頑虗死水所謂善惡無記生成法則既意識中有此塵影則於外境亦然故見虗空無差別遂計為同相見世界有三世四方遂計為異相蓋為一念妄動因明立所便將無同無異之清淨本然翻成世界虗空之真有為法矣勞指見分塵指相分覺明空昧相待成搖至故有水輪含十方界別經言世界安立土輪下依金輪金輪下依水輪水輪依風輪風輪依空輪空輪無所依與此經略不相協蓋彼約安立自下升上以成其次此約目前四大生起之由故風輪即指空中之風能鼓持世界故金輪雖屬地大亦指現在世間運轉之金寶故曰保持國土及火大但言變化性水大但言含十方界不待辨而自明矣此唯以妄想成四大為正旨若以金攝土以風攝木則五行生尅亦備但不必插入耳雖言風金相摩而生大上句堅覺搖明自是無明雖言金火相蒸而生水寶明之明元指無明本文中鈎鎖連環義又不可不識也古鈔云由妄見動故外感風輪由執心堅故外感金輪由研求燥故外感火輪由愛心深故外感水輪也冠注上明真性轉為妄覺此明妄覺復成四大也意謂如來藏清淨本然周遍法界本不動搖亦無定相但循衆生業力發現故有動搖等相而成真有為法衆生業力自無明始由本覺體上忽起妄明則晦昧真空而為頑空復計無明為明計頑空為昧明昧對待轉相搖動而成無明風故感風輪起諸空中執持世界其風大種由無明起也既覺明因空昧而生搖動無明有動必有靜則妄念固執立成堅礙而世有金寶者亦因妄覺中堅礙無明故感金輪保持國土其地大種亦由無明起也堅覺無明既成金寶搖動無明既有風出則一堅一動相摩相蕩故感世有火光蒸金出水結水成地更能於萬物鎔散成熟而為變化性其火大種亦由無明起也既有明覺立堅之金寶而能現含潤之相有金風相摩之火光而發蒸之氣則金火相合故感世有水輪為涵潤性而含十方界其水大種亦由無明起也火騰水降交發立堅至以是因緣世界相續易云天一生水水生東方震巽之木木生南方離火火生西南坤土土生西方兌金而西北乾金復生北方坎水如環無端蓋五行以相尅為夫婦以相生為父子子由婦生必夫劣於婦然後陰陽和而生子故震為木兌為金木之望金為我尅之妻金之望木為尅我之夫東西相對而為夫婦是震為夫兌為婦金木生火是夫劣於婦而生子離為火坎為水水之望火為我尅之妻火之望水為尅我之夫南北相對而為夫婦是坎為夫離為婦水火生土亦是夫劣於婦而生子坤為地艮為山均屬土萬物之所成始而成終也故春夏萬物發生恆於地上而可見秋冬萬物收藏恆於地下而不可見此河圖所以成變化行鬼神以彼流行之用與此生起之源雖錯綜其文而意則符合故併録之冠注此明由四大而結成器界也意謂無明既成四大則四大之性各相違而互相濟如火性本炎上水性本潤下一騰一降交發相濟互為立堅結成器界而且濕為巨海故世有四大海等之水鄉乾為洲灘故世有四大部洲之陸地以是水火結成故彼大海中本涵濕之淵似不應有火而火光常起者由火之氣脉存焉洲灘中本堅燥之處似不應有水而江河常注者由水之氣脉存焉夫水能尅火若水勢勝必滅火豈能相生哉今則降勝為劣故水從火而結為高山是故山石擊則成𦦨者是火之氣脉未亡融則成水者是水之氣脉未亡抑且土能尅水若土勢勝必涸水豈能生物今則降勝為劣故土從水而抽為草木是故林藪遇燒成土者是土之種性猶存因絞成水者是水之種性猶存善最初由一念妄動為搖動無明而成風大堅礙無明而成地大既而堅礙與搖動相摩而成火大既而實明與火光相蒸而成水大故有四大交妄發生仍因水火既濟而為洲海之種更降水勢以從火勢而為山石之種復降土勢以從水勢而為草木之種則遞相為種而結成器界以是因緣故世界有成住壞空終而復始相續不斷也復次富樓那明妄非他至以是因緣衆生相續瑜伽論云言中有身者謂此五趣有情身在生有死有間名中有亦以異熟五蘊為體是業招故其胎卵中有身便如當生本有身形狀如人中有似人餘趣中有亦爾身如五六歲孩子大其形量雖小然諸根猛利如本有身能作諸業於父母邊起顛倒想或唯見男或唯見女如是漸近彼之處所漸漸不見父母餘處唯見男女根門若男中有緣母起愛生於欲心若女中有緣父起愛生於欲心由起二種愛心已與愛境合所泄不淨流入胎藏認為己身便生歡喜此心生已中有身沒受生有身故曰同業相纏若濕化二生中有由先業力不簡近遠染著稱情當染香處便即受生俱舍明胎中凡有五位一七名羯羅藍此云凝滑二七名頞部曇云皰狀如瘡皰三七名閉尸云軟肉四七名健南云堅肉五七名鉢羅奢佉云形位今略舉前二等取餘三也冠注此明衆生相續之由也承前云妄為明覺者非有他故即是真覺體上妄起能明為過咎耳有能明即立所明所妄既立則性覺妙明本覺明妙之真理不能超越於能所之外所謂本是一精明分成六和合以是因緣聽不出聲見不超色則六妄知根與六妄塵交相成就此約過去已迷而承迷入迷由是現在依舊明理不越分開見聞覺知六妄知根攬著色香味等六種妄塵起自他愛憎之惑作情想合離之業其同業者多因情重當來必待父母與己三者同業相纏而生屬胎卵類其合離者多因想重當來不假父母但由己業或合濕而成形即蠢蠕也或離異而托化如天獄等也此約本陰身起惑作業故感未來時有中陰身投胎納想之狀其狀惟何謂前陰報謝則根塵等現行亦滅唯有種子總歸業識而現中陰身其胎卵二中陰身欲投胎時見無緣處盡如黑夜唯於父母有緣處見有一點微明然未覩明時獨有業識冥然無知一見明時乃發起意識即生貪愛直趣明處或見父為男色或見母為女色了然發現則顛倒想心遂得成就若男子投胎憎父愛母女子托胎憎母愛父既成愛境則流注已愛於父母赤白二滴中以為種性則父母赤白二滴中即納已想愛以為胎胚既三緣交遘發生已仍吸引過去同業入於胎中故有同業因緣而生羯羅藍遏蒱曇等然胎卵濕化各有定業故隨其所感而應之以四生之報舊說亂思不定曰想結愛迷戀曰情親附不移曰合捨此趣彼曰離以此四心感召而四生各類應之然不止此也自今而後改頭換面生死無窮或情變為想想變為情合化為離離變為合無定因也或卵變為胎胎變為卵濕變為化化轉為濕無定趣也或飛變為沉沉變為飛無定報也以是因緣則有衆生輪回終而復始相續不斷也富樓那想愛同結至以是因緣業果相續冠注此明業果相續之由也意謂世界屬依報元依無情故不結業衆生屬正報本係有情即有業也業莫大乎殺盜淫三者而根自淫始以流愛為種納想為胎便是作業根源想愛不結則猶可離既彼此同結如膠似添則生生世世自不能離父母子孫相生不斷此等皆以欲貪為本凡有身命必求滋養故彼貪此之芻豢此愛彼之血肉貪愛同滋津津味著而殺於是乎生焉貪味不止則於四生中隨力強弱遞相吞食而盜於是乎生焉此等皆以殺貪為本遂至以人食羊羊死為人人死為羊乃至十類衆生死生不斷互來相噉且凡有此惡者世世俱生一處相值以償其債窮未來際無有休歇者皆以盜貪為本由殺盜二貪故有汝負我命汝還我債我負汝命我還汝債以是命債因緣故常在生死中酬還不已由欲貪故今有汝愛我心我憐汝色我愛汝心汝憐我色以是愛憐因緣故常在生死中纏縛不絶也夫此三者實由貪愛貪愛不遂別強吞為殺陰取為盜皆所以成其貪愛也故有一業則三業齊具凡貪愛遂必至於愛心憐色貪愛不遂必至於負命還債是故殺盜淫即根本業因而生死纏縛即循環業果而相續不斷也富樓那如是三種顛倒相續至因此虗妄終而復始冠注此躡上三種相續以結答滿慈忽生終始之問也意謂此三種相續俱由背真合妄顛狂迷倒而生何則即此三種皆是性覺妙明本覺明妙了了常知本體真性因汝最初突起能了之見兼發所了之相則業識成而見相分從此妄見頓生山河等相遂有次第遷流相續不已汝問云何忽生山河等相當知唯因此顛倒相續之虗妄故次第遷流終而復始也可見妄法元無唯一本覺明妙而已富樓那言若此妙覺至有為習漏何當復生冠注此執在纏覺體以難出纏覺體也言若據世尊所說則此衆生未生山河等相時其性覺妙明本覺明妙元無染無礙與諸如來心比並言之佛心不增衆心不減彼衆生止因妙覺明體轉為妄明而以覺明空昧故無狀忽生山河等相如來今得妙空明覺與衆相反其山河大地諸有為法及有漏妄習何時又當復生耶山河大地是世界有為含衆生習漏含業果也佛告富樓那譬如迷人至菩提涅槃亦復如是蓋前二喻顯清淨覺體本來圓滿不假修證後二喻亦不廢修證若單舉前二喻恐諸行人墮撥無之過成斷滅見單舉後二喻恐諸行人妄認覺體本非清淨元具生滅成雜染見是故四喻併舉使知妄本無生然非證真不能滅妄真本不變然非除妄亦不能證真故知一切衆生未嘗有生死而輪回不息諸佛如來曾未有涅槃而常住不動是則生即無生無生即生則始終相續之相何所從而來也冠注此下設四喻以明覺體也一喻迷惑無因二喻妄法無體三喻真成不復妄四喻妄斷不復生總顯真妄本無終始也故先舉喻以審迷因曰譬如迷人於一聚落忽生迷惑以南為北汝謂此人之迷而復因本來之迷而有耶因本來之悟而有耶滿慈答曰此迷亦不因迷又不因悟何以故未迷之先元無生迷之根云何因迷而有耶悟迷相反本非生迷之根云何因悟而有耶若知悟不生迷則知妄依真起而真未嘗妄故復舉前喻反詰滿慈曰汝既知迷本無根假使村居之迷人正在迷南為北時忽有悟人指示令悟此人縱久迷之今既得悟於此聚落更生迷否滿慈答曰既悟斷不復迷也下法合云十方如來亦然既悟不復更迷但於未證極果時雖有無明畢竟體空亦如此迷本無根蒂是故覺明真體本來清淨昔在迷時本無迷性可得如迷方者縱在迷時而方實不移豈獨迷不可得覺亦不可得但以迷時望覺時似乎有迷有覺如惑南為北時望知南非北時似乎有移有定若一覺迷迷即頓滅滅則覺亦不可得豈復生於迷乎復舉喻以辨斥滿慈曰亦如有人眼中有翳見空中有華翳病除則華相滅忽有愚人於滅華之空處待華更生汝觀是人愚耶慧耶滿慈被詰據實而答言空元無華豈有生滅乎見華滅於空中已是顛倒妄見且期華更生斯是愚癡狂亂極矣云何更名其愚與慧乎佛就其言而斥之曰此待華之人誠如所言癡狂極矣然汝既知此云何問我如來妙覺明空何時又當更生山河大地耶自今應知佛即除翳之人汝即待華之人既知空元無華妄見生滅即知諸法本自寂滅覺體元無迷悟執佛實有滅妄證真已是顛倒況待佛從真起妄則與待華更生者有何異哉復舉喻曰又如金礦雜於精金時則金在礦中混和無辨若假爐火煉作精金其金一純更不雜礦又如木既因火而成灰則不復為木矣法合云諸佛如來獲菩提涅槃者已成無上智體證真如理性則既以真修實行出乎煩惱生死則一證永證不復退墮猶金之出礦一純永純不復更雜於礦也此煩惱生死既經雙空觀智轉為菩提涅槃一斷永斷無復更生亦猶木既成灰不復再成木也富樓那又汝問言至云何復問不相容者冠注此明七大性相皆依如來藏性循業發現用答七大周遍不合相容之問也又汝下牒定滿慈所疑譬如虗空體非群相喻如來藏清淨本然周遍法界元非諸大則不墮於有也而不拒彼諸相發揮喻循業發現七大性相而不墮於無也下重徵演釋云所以者何彼大虗空日照於空則發揮明相雲屯於空則發揮暗相乃至土積於空則發揮塵霾之相水澄於空則發揮映徹之相汝意云何如是殊方同時而有明暗等諸有為相此相為因彼日雲等而生乎為復因虗空而有乎若謂此明相因彼日輪所生且日照空時既是日明則十方虗空凡有明處同是日色即當滿世間成一日體云何空中更見圓日之體若見圓日則日體之外餘有明相應不屬日安得謂因日而生明耶若謂此明相非日所生是空所有空既常在明應常照云何於中宵雲霧無日之時唯見暗相不生光耀乎當知是明非即空日不異空日若此明相元非空日不離空日不可指陳則諸相亦然夫彼虗空不拒諸相發揮喻如來藏不拒七大循業發現日雲乃至水土七者喻七大各自種性亦屬於妄明暗乃至霾映七相喻七大幻相推其明相與日及空非一非異非即非離喻七大幻相與各自種性及如來藏性非一非異非即非離然是七者但應其數不可強作七大且下自有法合之文唯顯此空性是遍是常而七者性相皆無定體不遍不常故曰觀相元妄無可指陳由此七相元妄不可指陳當知七大之相亦元妄不可指陳相既元妄其差別種性亦然若乃妄言有可指陳猶執空華實有者已為迷妄況復詰其相陵滅義是猶復邀空華而更期其結空果真乃迷中之迷妄中之妄也若知虗空是遍是常而日等種性與空不即不離應觀七大之性統體元一真性唯是性覺妙明本覺明妙清淨本然周遍法界更非別法能如是而觀自知性覺妙明本覺真心先非水火等性水火等性且無更問誰不相容耶舊說氣凝如烟霧之聚霾字從貍起於山獸騰踏令土蔽空或合風雨紛然而下曰霾水澄映者如海晴湛之時與空文映朗然澄徹也真妙覺明亦復如是至宛轉虗妄無可憑據冠注此以法合喻申明七大之循業發現也意謂性覺妙明本覺明妙猶如太空日照則明乃至水澄則映故循發空之業即現空相如鑿井則空現循發四大之業即現四大之相如一處求水一處水生一處求火一處火生若遍法界同時循發諸大之業即遍法界同時現諸大之相如遍法界執滿世界起下復舉喻以明循共業而齊現幻相者亦是真妄並舉愈顯虗妄無據且各現猶未見其展轉虗妄而俱現則可盡表之矣蓋日體喻正智水喻真理智理一如本無去來之相乃統體一如來藏性日影喻諸大幻相兩人同觀喻共業之妄見東西各行各有日影隨各人去喻循俱發之妄業而俱現諸大之幻相一東一西先無準的喻一真性俱現諸大幻相而定準何相為的實之體乎故戒止曰不應難言此日是一云何東西各行各行既雙云何現見一日是則戒止衆生分別妄見不應難言此諸大相既不離一真之處何得循共業而俱現諸相既俱現諸相何得云不離一真之處假使有定體方可辨難今正如明相與日併及虗空非一非異非即非離元無定體而於無定體者宛轉辨難則愈辨難而愈入於虗妄真可謂無同異中熾然成異以至同異發明復立無同無異而有何憑據乎富樓那汝以色空至故發真如妙覺明性冠注此下以迷悟對辨而總結問答之義也意謂不達諸大性相唯依如來藏循業發現而反詰其相陵滅者猶兩人見日東西各行宛轉虗妄相似或曰據今諸大之性熾然不同宛然陵滅其故何也故明示之曰由汝因明立所能所既立則業習尤固見相未除而執空執有所以循色空之業習相傾相奪於如來藏而如來藏隨汝業習為空為色周遍法界是故我說猶如虗空於中風起則發揮動搖之相風滅則唯有太空澄清之相日照則發揮明相雲屯則發揮暗相所以衆生違背性覺妙明本覺明妙而順合妄緣塵境自相渾濁於清淨本然之真體是故引發塵勞煩惱而見世間唯有山河等相反執山河等相為心外之法也我以山河等相全為性覺之妙明本覺之明妙本無生滅則攝此妙用合乎如來藏體而自如來藏體發起妙用則唯妙覺明圓照法界更無一法可得是故於全體大用中得事無礙蓋一塵即多塵多塵即一塵故曰一為無量無量為一毛端現剎海剎海現毛端故曰小中現大大中現小不動道場遍十方界是一為無量身含十方無盡虗空是無量為一於一毛端現寶王剎正中現依且寶剎不小毛端不大坐微塵裡轉大法輪依中現正且身相不小微塵不大皆小中現大大中現小也此皆大圓鏡智現真如妙境然如來唯妙覺明圓照法界者乃佛生共具曾無餘缺但由衆生背覺合塵故發塵勞有世間相如來滅塵合覺故發真如妙境妙覺明智也性即智體而如來藏本妙圓心至離即離非是即非即冠注此依本覺體用以結顯三如來藏也先明離一切法以結顯真諦空如來藏承上云性覺妙明本覺明妙雖隨迷悟以現染淨二相而如來藏本妙圓心清淨本然元非七大非六根非六塵非六識此非世間法也非明無明乃至非老死盡則非緣覺流轉還滅二法也非苦非集乃至非智非得則非世出世間因果及能空之智所空之理也非檀那乃至非波羅蜜多則非菩薩能趨之行所趨之理總非出世間法也如是乃至非怛闥阿竭非阿羅訶三耶三菩則非如來三號非大涅槃及常樂我淨則非涅槃四德乃至出世間上上法也檀那此云布施尸羅云戒毗梨耶云精進羼提云忍禪那云定般剌若云智波羅蜜多云到彼岸怛闥阿竭云如來阿羅訶云應供三耶三菩云正遍知涅槃此云無生滅乃四德之總名常者非惟二死永忘無諸生滅亦且世相常住究竟堅固也樂者非惟離諸生死苦亦且得不思議解脫受用無量法樂也我者非惟證真法身猶若虗空亦且山河大地草木微塵全露法王也淨者非惟妙淨理體無諸染著亦且清淨遍周無染非淨也此涅槃別相也次明即一切法以結顯俗諦不空如來藏也以如來藏不動周遍循業發現故曰即如來藏元明心妙即七大即六根六塵六識此即世間法也即緣覺法即聲聞法即菩薩法此即出世間法也即如來三號即涅槃四德即出世間上上法也復明如來藏雙遮雙照以結顯空不空如來藏也以如來藏非心思言議可得故曰即如來藏妙明心元本不定屬於即亦不定屬於非即故云離即離非此雙遮二邊也抑且不定屬於離即故曰是即亦不定屬於離非故曰是非即也以是字貫下如云不離即不離非此亦雙照二邊也若獨以非一切法明如來藏則滯於空若獨以即一切法明如來藏則滯於有若以離即離非明如來藏則棄二邊滯中道若以是即是非即明如來藏則捨中道滯二邊是故全非而即全即而非離而非離非離而離則三諦融通離名絶相不思議體圓妙極矣如何世間三有衆生至愛念小乘得少為足此經以明三如來藏為主雖言佛知見亦不與法華同意彼為衆等開示令其悟入佛知見也此特為滿慈不達諸法性相不二皆依如來藏循業發現故問忽生山河等相更言陵滅相容則與佛知見相左而反生謬難故曰用世語言入佛知見也然如來藏未嘗不是佛知見但不必頭上安頭且世尊依一真理隨處標名為人演說如摩尼珠隨方映色若因珠是一而謂青黃赤白唯是一色可乎琴瑟等喻寶覺性體也妙音喻真心妙用也妙指喻妙智也妙指能發妙音如妙智能發妙用也寶者舊說略有三義一離垢穢二具光明三富財用本覺不變之體即離垢義圓照之相即光明義隨緣之用即財富義按指二字對下舉心二字看特顯其妙用耳只作法看不必局於喻文不過假按指以顯其舉心非妙智也海印者如閻浮提一切衆生身及外色大海中皆有印象故名海印佛菩薩亦爾得大海印三昧已能分別一切衆生心行於一切法門皆得慧明也冠注此普責凡小而策進佛乘也意謂如來藏妙明元心乃三諦圓融一法不立非心思言議可到之境如何世間三有衆生及出世二乘各據所知之境能知之心而思惟測度謂如來無上菩提亦同己證豈知無上菩提是如來以無障礙智親證不思議解脫境胡可以識心分別哉況復用世間語言問及忽生諸相陵滅不容而欲參入佛知見耶殊不知儘思共度量不能測佛智也下設喻以䇿進之曰譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與衆生亦復如是寶覺性體真心妙用各各圓滿若得無礙妙智即能發其無量妙用若無妙智雖有寶覺性體不能發其妙用即如琴瑟等皆有妙音而能發不能發者在妙指之有與無耳如我於寶覺性體中唯一按指即為海印三昧發大光明則一切衆生心行及一切法門皆得慧明汝於寶覺性體中暫一舉心即為能見妄心所見妄境而滿目塵勞先起於前所謂我以妙明不生不滅合如來藏而如來藏唯妙覺明圓照法界汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界是也夫所以體雖圓而用缺妙者良由根微志劣不肯勤求無上覺道愛念小乘但得有餘涅槃執化城迷寶所蓋得少為足故也富樓那言我與如來至自蔽妙明受此淪溺冠注此一領一問以窮究妄因也我與如來下領上寶覺真心各各圓滿義而我昔遭無始妄想久在輪回領前因明立所所既妄立生汝妄能以至三種相續義今得聖果二句領上愛戀小乘得少為足義世尊諸妄下領前四喻及諸佛如來菩提涅槃亦復如是義敢問下正問起妄之因意謂我但得小果猶未究竟故不知妄因何起世尊五住究盡二死永忘所謂一切圓滅獨妙真常世出世法無不覺了敢問一切衆生何因有妄自蔽寶覺體上妙明之用而受此淪溺耶前問忽生山河大地等相答曰因明立所所既妄立無同異中熾然成異今更問所既妄立之妄又從何有然此問答正要發明圓悟圓證不落階級初發心時便成正覺之旨以為修道分張本也佛告富樓那汝雖除疑至妄性如是因何為在冠注此明妄本無因以破滿慈滅妄求真之疑也意謂汝雖聞因明立所所既妄立已除忽生山河之疑陵滅不容之惑尚不達此妄無因故強索其因而擬滅之斯正是餘惑未盡也汝若不達妄本無因亦無有滅吾今就現前一事問汝汝參究之則可知矣汝豈不聞室羅城中演若達多忽於晨朝以鏡照面迷頭認影以為魑魅無狀狂走之事乎於意云何理會此人有何因由耶無故狂走耶滿慈因世尊先以無狀示之而遂以何因無故審之則於言下有省答言是人唯是心發狂顛而走更無他故佛即舉法以明之言妙覺明心佛生同圓其體本來圓滿其用本來明妙曾無餘缺亦無迷悟在衆生中妄未嘗生且既稱之為妄云何有因若有所因即為實有云何為妄若推其因元是自己妄想展轉相因而起初無實體而妄想唯依一念昏迷以迷積迷經歷塵劫積集深厚是故佛雖為汝種種發明猶不能返妄歸真而徒索妄因豈知如是迷因唯因迷却自己妙覺明圓本圓明妙而有更無別因汝又云世尊諸妄一切圓滅但能識此迷本無因則汝妄想自無所依然則一切衆生現在輪回尚不見有妄生何得云世尊諸妄一切圓滅亦欲索其妄因而滅之乎從來未曾生今復何為滅即得菩提者雖得大覺豈能確指過去妄因以示人乎今分說迷妄亦如寤時人說夢中事心縱精明欲何因緣直取夢中所覩之物以示人也然所覩之物雖屬乎夢亦非世之絶無者宜乎可取尚不能取況復無根之妄本無有因乃欲我指其因而滅之胡可得哉夫汝有此妄想即如彼達多有狂性相似豈有因由緣故而後狂元是自己迷頭認影怖畏狂走若使其頭果有得失不名為狂忽然狂性一歇頭非外得縱未歇狂頭本自在有何遺失若使妙覺性體果有得失不名為妄悟非外得迷非真失故名為妄汝之妄性既如達多之狂性則因無所在覔因且不可得欲從何而滅之乎演若達多此云祠受從神乞得故也此以照鏡狂走喻如九法界中依正二報皆大圓鏡中之影像其性本空但為一切衆生迷頭認影妄生取捨故狂走不息也汝但不隨分別世間至方悟神珠非從外得冠注此示圓悟圓證之法門也意謂汝索妄因殆欲得此因已勞筋苦骨以斷之今既了妄無因何必乃爾汝但悟其世界業果衆生三種相續如鏡中影像本非實有妄見其有而妄亦無因自不隨順此三者以起分別妄心此心一歇則三緣頓斷而三種流注習氣便不能生此即所謂現行斷則種子不生矣復舉前喻直示之曰汝認三種為實有而生取著者正與達多認鏡中頭影而狂走相似若果了妄無因分別頓歇正汝心中演若達多狂性自歇之際蓋此狂一歇當下即是菩提不假餘力即如達多忽然狂歇頭非外得縱未歇狂亦何遺失故曰勝淨明心本周法界不從人得所謂但離妄想即如如佛何藉研真斷惑尅苦修證耶奈一切衆生現被五蘊覆蓋勝淨明心亦如有人於自衣中繫如意珠也迷却此心不能究竟徒趣人天小果亦如持珠乞食馳走他方也雖在迷途元未失真亦如雖實貧窮珠未曾失也一朝見佛聞法證得此勝淨明心本周法界不從人得方知不藉劬勞肯綮修證亦如忽有智者指示其珠所願從心致大饒富方悟神珠不從外得也雖然狂歇即菩提者談何容易哉菩提果智之號勝淨明心極果之體智體兼舉也骨間肉曰肯筋肉結處曰綮特取微細斷惑義也中觀論云無物從緣起無物從緣滅起惟諸緣起滅惟諸緣滅也即時阿難在大衆中至惟垂大悲開發迷悶冠注此是當機第三番躡佛語而執因緣也最初執見精當屬因緣次執萬法當屬因緣此執證果當屬因緣意謂向也極排因緣而今又說三種分別緣斷則殺盜淫等三因不生斯則因緣皎然明白云何如來既說因緣而復頓棄之耶且我輩由此因緣之法心得開悟又豈獨我等年少有學聲聞藉此悟道即此會中大目犍連等初從老梵志信修異道因於途中相值波離迦葉等聞說生滅四諦因緣開悟信從然後見佛得成聖果今說狂性自歇即是菩提不藉因緣即前拘舍梨等所說八萬劫後自然成道猶如縷丸極處停止不假修證者翻成第一義諦也世尊不墮因緣則墮自然此又我等迷悶而莫能決一者惟垂大悲開發之也殺盜淫舊說略牒業果之因而意該世界衆生也然佛種從緣起因緣本不礙菩提但執取為礙耳佛告阿難即如城中至如恆河沙秪益戲論據本經云理則頓悟乘悟併銷事非頓除因次第盡是則解行兩門不可偏廢但行由解起行起解絶則近之矣若更知狂歇即菩提者惟悟因地不生滅心其果地不生滅覺非行不證自不墮理障而捐實行也冠注此並拂因緣自然而伸明狂性自歇歇即菩提之正旨也欲拂其計先揆其情意謂汝所執吝不出二途今就前達多一事推之汝必謂達多狂性因緣若得滅除則不狂性自然而出故汝執吝生滅與不生滅理若非因緣必是自然若非自然必是因緣出此二途則理窮計盡矣下審明按定曰設使達多頭本自然既是自然亦本自天然則狂與不狂無非自然何因照鏡之故始怖無頭而狂走耶若雙計兩途曰自然有頭照鏡因緣而遂怖無頭故狂走也下即奪破因緣一計曰是則因緣非實所以者何若實有因緣何不自然本有之頭因照鏡故而實失之乎彼雖怖無頭本頭不失而無狀狂怖妄謂無頭而已且正當狂怖覺無頭時非有所失及至狂歇覺有頭時非有所得而狂起狂歇曾無變易則本頭定不藉照鏡因緣而無明矣下奪破自然一計曰若謂狂與不狂皆屬自然非藉因緣者則狂本出乎自然應當本來常有狂怖不知未狂之時此狂性藏於何處而不起耶既無藏處則狂非屬於自然明矣若謂不狂出乎自然則頭本無失應當常無狂妄何為而怖頭狂走也若知頭無變易不藉因緣無亦非自然有足見狂怖妄出既知頭之與狂如此則知菩提真性本非因緣及與自然而計因緣自然者皆妄出耳故直出正意曰若悟本頭曾無得失自能識知狂走唯妄出也若使真正親見菩提真性不從迷而失不從悟而得則是狂性頓歇而因緣自然俱為戲論全無實義矣復伸己意云由是二俱戲論故我說但得三種分別緣斷當下即菩提真心然計緣斷而後菩提心生者亦墮戲論何以故謂菩提心生而生滅心滅此但是生滅之心仍非菩提真心也夫只許緣斷即菩提心不許緣斷生菩提心者正顯不但生滅心盡而滅生滅者俱盡捐捨藏識至於無功用道方近菩提也到此分際菩提心生亦不容許豈容自然若有自然則明自然心生生滅心即此自然滅亦是生滅猶然戲論而已何以言之汝以第一義諦無生滅者名為自然是對世諦生滅者名為因緣而立非真無生滅也若以喻明正如世間因諸相雜和成一體者名和合性對此和合性而遂指非和合者稱本然性則此本然與彼和合均屬對待非戲論而何直至本然非本然和合非和合而非然非合俱離離與不離俱非至此方名離句絶非卓然獨出之末後句方是無戲論法然理須頓悟事假漸盡縱悟到此尚屬因地心果地菩提涅槃尚在遙遠況不捨戲論法而欲證菩提胡可得哉故知菩提涅槃非汝歷劫辛勤多聞記持者所能修證也豈獨記持我說之法而不得菩提縱復憶持十方如來十二部經所知清淨妙理更如恆沙之多亦是理障而名言習氣不除亦秪資益戲論而已汝雖談說因緣自然至如何自欺尚留觀聽此世尊極力責勉令其進修也言一日熏修非歷劫可比一念熏修又非一日可比阿難比丘非耶輸女身可比況登伽淫女又不及耶輸也登伽宿為婆羅門女名本性今帶宿名故為性比丘尼已上見道分竟下文發明修道分也冠注此極斥多聞之障以激修無漏也言汝雖能談說因緣自然決定明了毫無差舛而多聞人中推為第一然用此多聞積劫熏習不能免離惡呪之難若此多聞可脫淫術何須待我放大頂光宣說神呪方使登伽心中淫火頓歇立斷粗惑而證三果便得報居不還不生欲界設使登伽愛河不枯安能令汝脫其淫難哉是故汝雖歷劫辛勤憶持十方如來祕密章句妙嚴淨境而見聞習漏終莫能除不如一日入無分別頓斷三緣即不漏落於染淨分別縱見淫女粗濁之相不起憎心見如來淨妙之相亦不起愛心自能遠離世間多生憎愛二苦矣復舉劣機受益而痛責之曰如摩登伽宿為淫女其業障何等深厚由神呪力銷其愛欲今在法中名姓比丘尼且與羅睺母耶輸陀羅同悟宿因始知歷世報居女身全因欲愛深重今緣宿命開通洞見纍劫而悔悟懇至乘此一念熏修無漏善故登伽便得出纏耶輸已蒙授記夫耶輸女身已為劣弱而登伽淫女更下劣今尚以一念熏修俱獲大饒益而汝以丈夫根智稟受佛法反徒戀多聞不修無漏且明知戲論無功熏修有益尚留見聞分別而耽著戲論非自欺而何阿難及諸大衆聞佛示誨至在會一心佇佛慈旨無餘涅槃果地覺本發心路因地心也此特求示因地心以趣果地覺也攀緣分別二執此等前已開示悟明矣此復求入路也開示由人悟入由己也冠注此先敘大衆領悟後請修行門路也聞佛示誨疑惑銷除通指前來多番破除因緣自然和合非和合也心悟實相者遠指離即離非是即非即如來藏心近指狂性自歇歇即菩提勝淨明心本周法界不從人得併三緣斷故即菩提心無功用道離合俱非等皆是也身意輕安者放捨戲論得正定想心若空海也得未曾有者極慶其聞所未聞也阿難到此領悟愈深而悲感愈切故曰重復悲淚皆經家所敘也無上大悲超過一切悲心也清淨者無垢智也悲智雙運利樂無盡如摩尼珠隨意濟拔而得自在故曰寶王善開我心者言我等迷妄固閉久不開悟今蒙多番指示令得開通下申明善開意如是者指上之詞種種因緣指演若達多以下意方便提獎謂能提撕以警其迷執獎勸以振其疲怠引謂誘掖沉謂陷溺冥謂障蔽苦海即憎愛二苦海也世尊下領悟前如來藏性妙覺明圓照法界乃至坐微塵裡轉大法輪意含包含育生育如來正報剎即依報蓋謂我等本有如是廣大如來藏心清淨寶嚴含育十方乃不自知徒沉苦海世尊興大悲心以種種因緣提獎引誘令得開悟不勝慶幸但世尊復責多聞無功不逮一日修無漏業然欲修此業無門可入我今猶如旅泊之人忽蒙天王賜與華屋不獲其門終莫能入惟願如來示我入門之處在會衆等雖為障蔽而不明前途久滯化城今畢竟捐捨小乘直趣如來無餘涅槃故求導師舊由之路倘蒙指示亦令未入化城之有學者從此法門攝伏疇昔攀緣妄想而後得一心總持三藏圓融深入佛知見也爾時世尊哀愍會中至發覺初心二決定義下示二決定義者由阿難問如來無餘涅槃本發心路併攝伏攀緣入佛知見故世尊以二決定義語之欲知本發心路須擇生滅心得不生滅心為因地心然後圓成不生不滅涅槃果德此初心第一決定義也欲攝伏攀緣須詳審攀緣根本在何處知根本矣然後但擇圓根一門深入彼六知根一時清淨此初心第二決定義也欲證無生須擇生滅欲擇生滅須知根本煩惱欲斷煩惱不離六根但知淪生死證妙常未出六根故二義未始不相成也冠注此總標二決定義也於菩提心未得自在者捨小趣大不得其門而入者末法衆生亦指凡小言無上乘即一佛乘指果地覺妙修行路由此路而直入佛乘指因行言也決定發菩提心於佛如來妙三摩提不生疲倦者與上文畢獲如來無餘涅槃等相呌應妙三摩提即妙修行路也不生疲倦者謂今已棄化城決定直至寶所不復疲倦也發覺初心者覺即始覺謂最初發此正念決定不退亦無猶豫也云何初心二義決定至從始入終五疊渾濁冠注此欲明初心第一決定義先示生滅與不生滅也云何二句總徵阿難下審定言汝等決定捐捨小乘修菩薩乘而欲入佛知見應當審諦細觀此因地發心與果地覺同乎異乎若於因地中仍以分別因緣自然之生滅心為本修因而欲求佛乘不生不滅之涅槃果是欲南而之北惡可至哉由心有生滅及不生滅故而根身器界亦然汝等未識身界中生滅與不生滅義當照明一切世間凡可作之法皆從遷變壞滅汝更微細觀察諸可作法誰是不壞然終不聞爛壞虗空何以故空無造作無始終故然始終有作有壞之法與始終無作無壞之空初未嘗離也以此器界例汝身界中則骨肉之堅相為地大潤濕之津液為水大暖觸之氣息為火大動搖之筋脉為風大此皆可作有壞之法由執此四大為身相而自纏縛故將汝本來澄湛周圓之真體本覺明心之妙用如太虗而無始終生滅者翻成渾濁而不澄湛翻成判隔而不周圓矣且分為視聽覺察之六根既成六根則五根六塵總名色陰由前五根相對五塵發起五識名為受陰由前塵緣影引起意識名為想陰前六識既成染緣於中念念生滅堅執我相名為行陰既有前七種現熏彼如來藏轉成含藏識名為識陰是則色陰為始識陰為終遂有五疊渾濁也後有始終與前無始終相照應云何為濁阿難譬如清水至是第五重名為命濁此五濁者自一念晦昧真心為妄心迷真空為頑空便成千百劫輪回之苦總是渾濁不能清潔故將授澄濁之方先示生濁之由也以澄湛水體喻湛圓妙覺以窒礙土沙喻四大六根以兩物汩然而成渾濁之相喻執四大為身遂為根塵識法故渾濁真性而成五陰也若論五陰生起初因真性隨緣轉成業識由境風鼓動業識轉出見相二分而後依互轉生相續不斷也此經自色陰始至識陰終者要使行人從外斷去如澄濁水自粗而細故也且如前見道分中是以佛知見照之故根身器界無非如來藏性此修道分中猶是衆生知見觸境生情故身器二界無非妄境所以決定要知目前妄境從何而起從何而滅故見道當在一切處見修道當從自己身心中下手古德云心如墻壁乃可入道又云時時攝在腔子裡聖教中亦云求其放心而已皆此義也冠注此先喻後法合明五疊渾濁也喻中但借水土二物彼此不分形容一濁相耳倫類也留礙謂有形塊也法爾者猶云天生一定之性也不相循者不相順也猶土不順水而成清水不順土而成礙也汩湣汩也正顯湛圓妙覺明心與四大六根本不相循由一念妄執四大為身則覺體汩然而成視聽覺察遂有五疊渾濁故曰汝濁五重亦復如是法合曰汝湛圓本覺之真見與太虗空元來一體遍十方界由一念妄動分為六根則能所分隔故舉目見空清濁不分有空處無能見之體如水亡清潔矣有見處無所覺之空如土失留礙矣兩相交織妄成濁相見空既爾見色亦然眼根既爾餘根亦然蓋由執四大為身相自有前五根相對前境而劫奪真心渾濁淨妙總成色陰是第一重名為劫濁也既有前五根對境即發前五識領納前塵而成受陰故曰汝現摶取四大為體而見聞覺知元一湛圓妙覺本無留礙為四大所壅故成留礙如水亡清潔矣水等四相元屬於物曾無覺知為見等四性所旋故成覺知如土失留礙矣兩相交織妄成渾濁以涽汩真心是第二重名為見濁也見即領納義也復由前塵落卸影像引起第六識而為想陰故曰又汝心中憶持過去境了別現前塵誦習未來境然此三者本來無性為意識知見所發故成有性意識本無容貌為六塵所現亦成容貌故離三種法塵無意識之相如水亡清潔矣離意識知覺無三種塵性如土失留礙矣兩相交織妄成濁相以擾亂真性是第三重名煩惱濁也前六識既成染緣則第七識思量執我於湛圓妙覺中起生住異滅念念遷謝而為行陰故曰朝夕生滅不停則思量執我之知見念念欲常留於世間而所作善惡業運密密欲恆遷於國土故欲留者不能常住如水亡清潔也欲遷者未必頓去如土失留礙也兩相交織妄成濁相則翻菩提種成生死根是第四重名衆生濁也衆生者衆緣和合而生心由生住異滅身由地水火風皆和合義也由前根塵識三法各有種行熏如來藏轉成業識含藏執持而為識陰故曰汝等見聞等六根元是藏識相分而性未始有異皆由執四大為身而分為六根即對六塵發起六識故有見相二分判然隔越無端異生然性體本一知覺相通似同而非異如土失留礙矣動用各別隨境相背又似異而非同如水亡清潔矣或同或異二不可定兩相交織妄成濁相則轉如來藏為染淨因是第五重名為命濁也命猶使令也謂如來藏本無生滅去來被前七識熏成含藏識其中既有染淨業種則隨業種使令而輪回諸趣故曰命濁也阿難汝今欲令見聞覺知至皆合涅槃清淨妙德冠注此以法喻合明澄濁還清之妙訣也言汝今六根初由認四大為身而令湛圓妙覺分為見聞知覺雖則分隔性未嘗異欲令四性遠契如來常樂我淨四德應先擇去生死根本日用尋常莫隨根塵而生識心唯依不動智隨方應物則轉攀緣心成圓湛性體遂以澄湛正智旋其虗妄滅生之幻境則轉名相成如如真境境智一如能所兩忘惟一圓成實性是則伏還元覺矣元覺即本覺也既得本覺明體無生滅性為因地心而因中已獲真常妙性然後圓成果地修證復何難哉等覺前皆為修唯妙覺為證也舉喻以示圓湛旋妄之工夫曰如澄濁水貯於靜器靜深不動沙土自沉清水現前喻如初伏客塵煩惱是見思二惑分別二執不起則深伏六識心矣至於去泥純水喻如永斷根本無明轉為根本智是無明體空即不變真如蓋全無明幻相而為妙明實相精而不雜純而不二所謂富有萬德蕩無纖塵故隨機所感應物現形縱橫自在更無煩惱則喜怒哀樂皆與如來涅槃四德妙相符合斯是第一妙修行路也第二義者汝等必欲至於器世間不能超越冠注此釋上第二決定義以明生滅根本處也汝等下至諸有為相是牒定語也生大勇猛者謂攝伏疇昔攀緣也諸有為相即四大五陰等所謂可作之法也意謂疇昔攀緣及可作之法本屬生滅固當擇去然不知其根本安能決擇故曰應當審詳煩惱根本蓋煩惱即發業無明謂發現業用如取捨執著等屬第六識也根本即潤生無明謂津潤俱生如投胎入舍而生憎愛者屬第八識也攀緣作造者惟此六識是作業主能造染淨業因故也受果報者惟此八識是總報主能含藏染淨種子執持不散故也然細推之前七俱為第八現起亦似自作自受也是以修菩提者如澄濁水從粗入細先伏六識令其不涉攀緣則現行不起無所造作而漸除八識中諸種使種現俱盡則白淨識名空如來藏矣然欲降伏六識須知根塵識種之根本今在何處故反顯曰欲修行者決定當知煩惱根本若不審觀煩惱根本則不能知虗妄根塵何處顛倒蓋根塵識種所謂微細生滅因者皆在八識中既不知此自不能知根塵識法雖有現行本自虗妄但由初念不覺妄分能所逐妄迷真遂成顛倒而顛倒起處元在八識尚不能知妄倒起處從何降伏疇昔攀緣既不能伏以何為因而欲取如來常住之果位耶是故欲除妄倒決當預知妄倒生起之處復舉喻曉之曰汝觀世間解結之人不見所結之處云何知解然有結解處始可擇去無結解除何得擇去所以不聞虗空被汝隳壞分裂者以其無結可解故喻汝湛圓妙覺不可擇去者亦無結可解故也何為有結可解者則汝現前六根及與身中六識心者吸覽外塵渾濁真性真如世之內人反為誘賊之媒招引外賊自劫家寶然根塵識三法元從妄認四大為身自生纏縛分汝湛圓妙覺為視聽覺察於是見不超色聽不越聲等遂兩相交織而成結故曰由此無始衆生世界生纏縛故於器世界不能超越也以此觀之則根塵識三法元一湛圓妙覺現起而反損滅如來藏中功德法財豈非內賊而劫家寶乎然結一解除則根塵不偶即此內賊亦化而為佳兵矣阿難云何名為衆生世界至各各功德有千二百冠注此明衆生世界纏縛而不能超器世界故有定數限量也真性本無遷流亦無界畔但由妄立能所織妄相成遂有依正二報既有內外即有遷流及與方位有此即有數量既有數量即有優劣既有優劣則不得不揀選斯皆約生滅法以示人也言世為遷流界為方位者謂衆生身中自有三世遷流上下左右也汝今當知下先借器界以指明三世十方也猶云不知身中遷流及與方位當知器界與身界不異也何見其不異謂一切衆生本無身相但由四大五陰交織妄成故有身相既有身相則有方位界限而身中亦有變易遷流故有世界交相互涉而不離也然界雖有十唯取四方不取四隅以非正故不取上下以無位故不取中位以無定故惟取四方與三世相涉故以世涉方數成十二以方涉世亦成十二流變三疊者自一而成三疊也一十百千者舊說增一為十增十為百增百為千今以方涉世明三疊者第一約四方各論三世共成十二第二於東方三世變一為十成三十南西北方亦復如是四方共成一百二十第三東方三十變十為百成三百三方亦爾四方共成一千二百也以世涉方其例可解此世界相涉之定數也總括者謂全屬一身也始終者即三疊之始終也六根各具千二百功能德用者謂身中雖總有三世四方而六根中各有四方三世亦可自少變多而圓滿其數也然但約衆生所具者言耳若聖人六根功德數當無量矣貿者有無交易也遷者彼此互到也此惟取變易遷流義阿難汝復於中克定優劣至一千二百功德冠注此克定六根優劣者令其選擇故也上約性中相知本無優劣此約用中相背故有優劣也眼根三分之二者謂四方各二百四隅各一百今眼所見前及左右三方已成六百并前二隅二百共成八百惟後二百及二隅二百不見故也耳根周聽無遺者十方擊鼓十處俱聞故聞聲時似有近遠不聞聲時實無近遠故為圓根也鼻根缺中交者舊說出入中交共成三分一分四百闕於中交故惟八百而已舌根不取嘗味唯取言說言有方分理無窮盡者或言詞有局義則皆遍通世出世智皆可宣揚故具圓滿功德也身根離一合雙者謂離中不知是缺一分合時有覺有違有順故具二分也意根默容者謂此意根善能思惟十方三世乃至世出世法若凡若聖之意無不包容盡其涯際故得圓滿功德也阿難汝今欲逆生死欲流至彼六知根一時清淨織妄業流者謂由彼四大六根相織妄成則流逸奔境而造生死之業故欲旋此流還從六根旋之也世尊密揀耳根圓通以就當機使其向熟處入門所謂是非裏去了是非裏薦取奈當機久受多聞所溺不敢承當何夫此雖獨顯耳根為深為圓為離亦不必說透向後文殊菩薩揀選圓通常三種真實即此義彼通義即此離義彼常義即此深義圓義不待言矣冠注此令阿難於六根中揀選圓根也意謂既知虗妄之根本亦知六根之圓缺已正當揀取圓根以攝伏疇昔攀緣也夫汝所謂攀緣者即是六根流逸奔塵深沉亡返此謂順生死之欲流也攝伏者即是內旋六根外脫六塵中滅六識此謂逆生死之欲流也然此但逆分段生死必從淺至深返窮生死流根使業識中生滅種子竭盡無餘而後始至二死根斷而寂滅現前也是故汝欲至此地位先當勘驗此等領納塵境發現功能之六根誰是合中知誰是離中知誰是幽深誰是淺近誰為圓通誰不圓滿若能于此六受用根中自驗自審悟得誰為圓通根本即從此根逆彼織妄相成流逸奔境之業根而循入不生滅性則與不圓根較其功效猶日劫相倍也我今于前第一決定義中顯汝六根唯一湛圓妙覺明心于此復顯六根本來所具功德有離合有深淺有全缺歷歷分明無不備顯但隨汝樂欲于中詳擇其可入不生滅者吾當開發明白令汝直趣徑進永無退墮然令汝自擇者循其根性也若以十方如來法眼觀之則于一切法性無不通達若逆若順皆作方便修行皆得圓滿菩提于中曾無優劣但汝根性尚劣未能于一切法中皆得圓通自在智慧于六根中未免隔越故我宣揚優劣令汝于中揀選一根若能一門深入使妄窮真現則餘五根應時圓脫齊入無生不俟餘力矣阿難白佛言世尊至終不汝根元一元六冠注此因問答而聊示一門深入六根皆淨之端也阿難意謂欲逆生死流至不生滅須是六根俱入始得云何深入一門而能令六根一時皆淨耶世尊意謂湛圓妙覺非一非六秪因迷惑而妄分一六其惑惟何即汝須陀洹名預流果良以不入六塵得逆生死欲流而入見道位其所斷惟是界內分別我執亦名八十八使也若第六根中所積種子而能生現行者乃無始虗習即八十一思惑亦名俱生我執其根本尚在含藏識中必要因修道方可斷得斷此方無上二界貪慢癡惑得逆生死有流及無明流而始證四果可名阿羅漢何況此含藏識中生住異滅同體無明亦名俱生二執乃有四十二品非至等覺不能斷得其分齊頭數汝安得而知之乎由不知此故不能一門深入六根清淨汝若不信一解六淨且觀現前六根實為一乎實為六乎若言定一耳亦可見目亦可聞頭亦可履足亦可語今則不爾何得定一若言定六則身口與耳不相為用我今與汝說法汝之六根誰來領受阿難答曰我用耳聞佛言既定是六汝耳自聞與汝身口何干乃必于聞時而口問身欽耶可見亦非定六是故應知若非是一終須是六若非是六終須是一豈有汝根元定是一又元定是六耶既非一非六足見一乃對六而成六乃對一而成元非定有一六之名也下示一六生起之由阿難當知是根非一非六至六受用根亦復如是冠注此欲示一六義生先舉喻以通之也承上云既非定一又非定六而衆生為六為一者何故哉蓋由無始一念顛倒妄立根塵而循生死流沉淪衰替故于一圓湛體而執一執六今汝方得初果不入六塵雖六用不行惟銷現行其虗習種子尚在含藏識中故未亡一由其根塵種子俱存故不達一入六淨也然一與六義雖依圓湛體生而圓湛本體未始有異正如太空之參合群器由器有方圓長短而名空為異空未始異也除器異而觀空故說空為一斯亦對異說一空體何有一乎但因參器而說空不同因除器而說空為同此徒有言說而已且器未參合時彼太虗空憑何故而為汝成同成不同耶其同異皆不可言況更名是一非一若言彼空是一何處更有其二者乎則汝了知六根亦然此圓湛體分為六根由根六而言體為六而體未始六也旋伏六根言體為一斯對六言一體何有一乎可見因根分而言體六因根銷而言體一此徒有言說而已且根未分隔時此圓湛體憑何故而為汝言一言六耶若言此體是一何處更有其二者乎由明暗等二種相形至失彼精了黏妄發光冠注此以法合喻正明一六義生也夫湛圓妙覺本無一六如太虗空本無同異由根塵相結妄分一六亦如群器參空言空有同異也前云世間解結之人不見所結云何知解斯示以所結之由向後六解一亡復授以解除之方也蓋謂湛圓妙覺如珠映色本無染著最初由明暗二塵互顯于妙圓覺性中而湛圓妙性一念不覺被塵黏著引發見精照映二塵遂攬色塵結為勝義根此根雖屬色法猶是白淨色故曰根元目為清淨四大其相微細最難分辨所謂愚者難分識與根也因有勝義為浮根之元依此立名即有眼體如蒲萄朵既有浮根是外依色香味觸內依地水火風結成二根則見精托根流逸奔色而循色流轉無返本時也由動靜二塵相擊于妙圓覺性中而湛圓妙性一念不覺被塵黏著引發聞精照映聲塵遂卷聲塵結為勝義根此根雖屬色法猶是白淨色故曰根元目為清淨四大其相微細愚者難辨因有勝義為浮根之元依此立名即有耳體如新卷葉既成浮根是外依色香味觸內依地水火風能所八法結成二根而聞精托根流逸奔聲故循聲流轉無有窮時也相擊互不相容也卷包攬也由通塞下明鼻根也相發互相引發也納吸取也餘並準上由恬變下明舌根也恬者無味之味也變即五味之總有味之味也以有味無味相對而成二種也參雜和也絞旋取也由離合下明身根也二者交際曰摩摶攬取也腰鼓俗呼杖鼓也顙腔也由生滅下明意根也知精指勝義根意思者謂意以思量了別為性幽室見者如人在明處不能見暗室中人而暗室中人能見明處人蓋意根處此身內為前五根思惟籌度故也然既以幽室見而狀其思意之體似不必泥于正法念經而確指肉團心也下總結顯云如是六根皆由圓湛覺明之體一念不覺而有能明之明覺此覺一妄遂失彼真覺精了之本體由是黏明暗而發見光黏動靜而發聽光等彼一六義生及所結之由皆不出乎此也光指見精等是以汝今離暗離明至由是六根互相為用冠注此示根結體空而明一解六亡也由此六根元係結塵所成是以汝今離明暗色塵則無見體離動靜聲塵則無聽質乃至無生滅法塵則了知之意根無所寄托汝問云何深入一門能令六根一時清淨汝但反旋六根不循動靜乃至明暗等諸生滅相奔逸流轉此即逆生死流循涅槃流乃簡易圓頓之工夫也然亦不必六根齊反隨汝選一圓根專心努力以旋拔之但此一根外脫塵相內伏根性根境不偶識心不起復歸元明真體永不黏妄發光而本來光明逈然獨照既從本性發起真光則餘五根一時拔脫至此則外不由塵內不循根常光寂照周遍無礙雖假彼根以顯此照用而實不循根如是則耳可見色眼可聞聲一根可作諸根用矣此即入一無妄彼六知根一時清淨也阿難汝豈不知今此會中至圓明了知不因心念冠注此引六人以證六根互用也阿那律陀無眼根而能以心見跋難陀此云賢喜龍能以角聽殑伽此云恆河亦云天堂來主河之神以身聞香驕梵鉢提受牛飼報故曰異舌也舜若多此云空即主空神也其質如風而能覺觸舊說空神多劫以無身為苦佛放拔苦光映令暫現身觸則樂不可言無色界天人亦然迦葉此云飲光修滅盡定者六七二識分別俱生我執悉斷故無心念矣引此六人或是凡夫業報或是小乘修得斯皆妄力尚不循根何況圓脫豈不互用耶阿難今汝諸根若圓已至應念化成無上知覺冠注此結明依不生滅圓湛性成以湛旋其虗妄滅生復還元覺是于身世界不生纏縛即能超越器世界矣諸根圓內瑩發光者心光融徹表裏一如也浮塵六根也器世界諸變化相總指山河萬物染淨苦樂等相也如湯銷氷應念化成無上知覺者謂以根本智親證法性則天地與我同根萬物皆吾一體乃至一多無礙小大互融無所不可也阿難如彼世人聚見於眼至云何覺明不成圓妙冠注此明寄根明發之本體在凡夫肉眼中曾未虧缺也意謂汝若不信明不循根本來周遍但觀世人見不藉明則可知矣如彼世人未悟真明不知見性周遍無礙唯以見性聚于眼根故離根離明則不能見假令彼人忽然急合其眼則暗相現前雖有眼根黯然與頭足無異設復有人當其前立此合眼者以手循彼外人之體而揣摩之雖不假眼而頭足一辨明然無惑是暗中知覺與明中知覺未始有異若藉緣之見必因明始見暗成無見若不藉明緣而見性自發者乃真明獨露了了常知則明自不能使其明暗自不能使其暗然則世人見性尚不藉門而見況內瑩發光根塵既銷者安得不成圓通妙用耶阿難白佛言世尊至惟垂大慈開我蒙吝冠注此阿難謬解佛語誤認黏湛發起見精等為湛圓本體遂起斷滅之疑也先按定教旨云據如來所說若于因地以生滅心為本修因而求佛乘不生不滅無有是處必要因果二地同一常住真心而後可爾且常聞世尊所說果地覺曰菩提乃斷盡煩惱而得者曰涅槃乃淨盡二死根本而證者曰真如乃不變不動究竟法身也曰佛性乃本覺真性也曰菴摩羅識乃白淨識離諸垢穢者曰空如來藏是空諸所有者曰大圓鏡智乃轉藏識所成之根本智也此七種名雖差別皆是果地位中斷盡無明性德具足其體性不可損動如金剛王寶能壞一切而一切不能壞乃究竟堅固常住不壞一成永成無復變易者也前蒙世尊備顯六湛圓明敕我擇一圓根當為發明令我增進今云見等六根離塵無性若此見聽等六根離彼明暗動靜等六塵畢竟無體還同世尊前來所斥之念念隨塵起滅分別識心離於前塵本無所有也云何將此畢竟斷滅者為因地心而欲獲如來七常住果若離明暗等見等畢竟性空誠如所斥若無前塵念自性滅我今前後反覆周而復始微細推求根畢竟空則本無我心若離於塵則心無所在既成斷滅將何者立為因心而求取無上知覺乎且如來前言六湛圓明今言離塵無性是則違越誠言終成戲論云何如來號稱真實語者蒙謂暗鈍而不悟佛言吝謂凝滯而不果自進也佛告阿難汝學多聞至塵俗諸事當除汝疑冠注此責其執常為斷也言汝唯學多聞不暇盡漏所以動輒錯誤吾前為汝指出顛倒起處要汝除其種習而汝心中徒知顛倒所因而種習仍在是但能記持名言及至真倒現前實未能識今欲直示根性真常恐汝誠心甚吝猶未信伏吾今試將塵俗易曉之事為汝方便指示即當因事而釋疑也顛倒所因指前顛倒之處因即種子也真倒即以常為斷也未盡諸漏即倒習未除也即時如來勑羅睺羅至閉塞開通說聞無性冠注此假聲塵生滅驗聞性真常為耳根圓通之定案也自羅睺擊鐘至音響雙絶則名無聞乃二番審定令其親自決斷或有或無皆是聞根向後以正義斥之則惟是聲塵無關於聞根也斯正是顛倒處由顛倒故迷本聞根而循聲流轉也下以正問反之也自如來又敕羅睺擊鐘至音響俱絶則名無聲此復三番審定方露正義令知聲有聲無非關聞根也少選有頃猶云少時頃刻也自佛語阿難至如是云何不名矯亂此乃斥其答報無定自成矯亂也蓋雖以聲聞並問而有無唯屬於聲豈可隨人口角混答聞之有無哉自失定見故成矯亂也自聲銷無響至說聞無性乃直示聞性真常曰第一番鐘聲歇時汝答無聞豈知唯是無聲元非無聞也若實無聞則汝聞性隨聲已滅汝身同於無知枯木矣二番鐘聲更擊汝應不聞今更擊仍聞則知汝聞性不同聲無然汝聞性既知聲有又知聲無足見或有或無自是聲塵豈彼聞性因聲塵之有無而為汝成其有無哉設若聞性實滅則知聲無者其誰耶故知聲塵在於聞性之中自有生自有滅非是汝聞性於聲塵中生而令汝聞性為有亦非是汝聞性於聲塵中滅而令汝聞性為無也故結責之曰體性斷常或難決定根塵有無宜乎易曉汝今尚且顛倒矯亂惑聲為聞而不自知何怪乎以真常體性為斷滅因耶吾今為汝發明不應復言六根離塵無性也如重睡人眠熟牀枕至云何不成無上知覺冠注此舉夢昧及與形銷以驗聞性不斷也亦與前不藉明之見性同意也重睡眠熟者睡濃時也搗練砧杵聲也聞舂搗聲別作鼓鐘聲者重睡識昏境成錯亂故也即於夢時自怪其鐘為木石響者正見雖處夢昧而根性不斷也忽窹遄知杵音者覺而後知其夢境誤也自告家人我正夢時惑此舂聲將為鼓響者醒時述夢中境也下決定根性為常住故告阿難曰是人正在夢中豈有思惟憶持其靜動二塵及與身根開閉通塞者哉但其形雖𥧌而聞性不昏汝疑離於二塵根性斷滅即當觀此重睡之人於根塵俱忘之時猶能分別杵碓之聲則聞性離塵不滅宛有明驗矣又豈唯睡中不滅縱使形銷命光遷謝之時亦寧為汝形銷滅而聞性亦與俱滅耶既不消滅云何不成圓妙由諸衆生逐妄迷真從無始來循諸色聲逐念流轉曾不開悟故不知根中體性無染無縛本來常住是以不能逆彼所流循此所常逐諸生滅妄塵造一切業由此生生雜染流轉諸趣若能棄捨生滅妄塵脫黏內伏守於真常本有常光真發明耀根塵識心應時銷落所謂耀性發明諸餘五黏應拔圓脫更能盡除見相二分微細種子是想相為塵識情為垢二俱遠離則盡法界是汝清淨法眼所謂生滅滅已寂滅現前云何不成無上知覺意謂汝言何故將此畢竟斷滅以為修因欲獲如來七常住果豈知即此根性便是元覺無生滅性依此修因自得圓成果地修證矣云何不成無上知覺耶
