body:
  text: 唐天竺沙門般剌密諦譯冠注唐此方國名經來此土適李唐中宗時也天竺西域衆國之總名此云月國有聖賢繼化地當閻浮中心以大國形于小國如衆星拱月沙門云勤息勤行淨法息滅染緣般剌密諦云極量譯師名也譯者翻梵字為華字烏萇國沙門彌伽釋迦譯語冠注烏萇云苑古大國之苑囿也亦云北天竺國之別名彌伽釋迦云能降伏譯語亦云度語謂裁度華梵音韻翻梵音而成華音也菩薩戒弟子前正議大夫同中書門下平章事房融筆受冠注菩薩戒弟子者謂宰官受菩薩戒尊三寶為大師也前者舊也為現謫廣州知南銓事故指以先官名為舊職正議以下皆官名也筆受者譯場中分職專司之謂也譯語後或拙醜秉筆確定而潤色也明柴紫釋乘時講録新安受法弟子汪益源校梓如是我聞一時佛至優波尼沙陀等而為上首自如是我聞至歸來佛所總為序分有通有別通者諸經通用故阿難於涅槃時請問一切經首作何等語佛曰一切經首當安如我聞等即今如是我聞至五十人俱是亦名證信序證其有此方是佛説而當信受否則偽説不足信也亦云佛法無量信為初基由是登菩提路信位居首一切善法以信為先別者揀非通用故亦名發起序謂經各有發起由緒不同故自皆是無漏至歸來佛所是佛者略梵語具云佛陀耶此云覺者謂自始覺而證齊本覺則能自覺覺他覺行圓滿梵語室羅筏或云舍衛此云豐德以國豐四德謂財寶五欲多聞解脫也祗具云祗陀此云戰勝匿王太子名生時父王與外國戰勝因而立名桓林也須達布金買園而太子施林因名祗樹給孤獨園精舍即給孤所建純一清淨絶諸喧雜也比丘梵語含三義謂乞士破惡怖魔千二百五十人者佛初度陳如等五人次度三迦葉兄弟兼徒一千次度舍利弗目犍連各兼徒一百次度耶舍長者五十人經舉大數故略五人此衆俱先事外道勤苦無證一遇世尊便登聖位得果感恩常隨助化漏者猶破器而有滲漏謂欲漏有漏無明漏亦云漏落二邊今無此多種滲漏故名阿羅漢亦含三義謂無生殺賊應供大者揀非定性小乘乃回心向佛乘者已上有三種息疑六種成就諸疏備載文繁不引諸有者三界二十五有皆受生死處以人天等道不忘因果故俱曰有毗尼此云善治亦云調伏調練身心制伏過非即戒律之總名舍利弗此云秋子秋即母名連母稱名目犍連云采菽氏拘絺羅云大膝秋子母舅富樓那云滿父名彌多羅尼云慈母名連父母名云滿慈子須菩提云空生亦云善解善吉優波沙陀云塵性空摩訶云大也冠注此序分文也不動周圓曰如無妄無非曰是合云指法之詞亦謂信受之語若順本經宗旨宣指一切事本自如如是究竟堅固法元來無妄無非自當信受也我者指阿難亦有主宰義聞者順耳達心之謂也大都佛法要有真主宰者能聞而後信故知我非所執之妄我聞非逐境之妄聞佛與尊者等猶塤篪相和鼓吹此道不可執迹而論凡佛法以破我為先著吾佛出世一開口即曰天上天下唯我獨尊入滅時又命以我聞二字安置經首斯真我耶妄我耶且如阿難憶持沙劫祕藏及今四十年法若果妄心妄聞安能如瓶瀉水而無遺漏乎雖然師資道合要觀時節因緣一時佛在室羅筏城祇桓精舍與大比丘千二百五十人同居者道隆世盛之時縱值良時苟非其人法將安付幸而乘時際會皆超諸有漏大阿羅漢何以知之請以德驗既受佛化從佛口生從法化生為佛真子亦能以佛道任持而不忘令佛法久住而不滅任持不忘者自利之行久住不滅者利他之行凡言自利不過謂出離諸有而佛子則不然亦同諸衆生居諸有界而超諸有界不亦善乎凡言利他不過謂説法度生而佛子又不然能于所經國土但使自己三千威儀八萬細行一一成熟就緒而諸衆生見其有威可畏有儀可法一觀感際亦復如是不言而信無為而化其德行可思議乎故常從佛遊不特侍衛而已亦且輔弼佛化共轉法輪依佛行持不違軌轍既能成己成物自不畏生死而欣寂滅慈父之寶藏正好付託法子之才德正好擔荷故曰妙堪遺囑夫遺囑者謂託付一大事因緣使未來衆生有所皈命也今觀佛子早已嚴淨毗尼具足梵行其身心皎潔將來自與三界群生作大師範又豈止三界隨感而現無剎不可一切衆生或見或聞莫不度諸苦惱脫諸纏綿使墮者得拔溺者得濟然此雖塵劫後事亦若今日大衆見佛聞法善超諸有不被塵勞所纍也上嘆德竟下列名文顯不重録上首者謂此六尊者又是千二百中所推尊者妙者正好也復有無量辟支無學至文殊師利而為上首梵語辟支此云獨覺出無佛世寂居觀化自悟無生者也亦名緣覺出有佛世聞法觀十二因緣流轉還滅二門得無生者也屬者遇也適當也自恣者七月十四十五十六日也迦陵頻伽此云妙聲鳥文殊師利此云妙德亦云妙吉祥冠注此敘雲集衆也謂不止千二百衆復有無量辟支言其德有真窮惑盡不復進取者謂之無學亦有才發出世心研真斷惑者謂之有學雖非常隨衆而同來佛所者質疑故也蓋佛制夏月護生避嫌令比丘九旬禁足坐蠟休夏不得乞食俟期滿解制考劾德業之期或自疑有過恣從己白自不知過恣任僧舉是故十方菩薩凡心有疑而不能決斷者今適當自恣日皆來見佛求其決斷也既雲集已俱欽敬瞻侍惟見佛有攝受之慈憫亦有折伏之威嚴將欲求其祕密奧義機感相符而如來即展坐具而安處之復為宣揚指示其幽深玄奧之旨法席大衆皆得境澄心寂一時踴躍曰聞所未聞也又不特此佛之音聲猶迦陵鳥聲雖居殼中已超衆鳥真超然玄化之仙音故立遍十方界而恆沙菩薩心聞洞徹尋佛妙音來聚道場而衆所推尊者唯大智文殊師利也時波斯匿王為其父王至及阿羅漢應諸齋主波斯匿此云勝軍即舍衛國王也過去龍光佛世位登四地亦大權也諱日者按史書諱當訓避諱者言其不諱也謂死者人所不能避如漢武帝病篤霍光涕泣問曰如有不諱誰當嗣者是也舊説忌諱之日人子於親終之日言之即慟故隱諱而不敢言也兼録於茲博者裁之宮掖者內庭左右如人肘掖也冠注此敘國主請供以發示墮淫室之端也夫解制日正本國先主不諱之日是時舍衛國主勝軍王為其父王諱曰營齋內庭亦曲躬至敬親迎如來兼諸大菩薩俱延入宮掖資親冥福其設則廣備其羞則珍品其味則上妙其誠敬至矣盡矣此城中復有齒德兼隆之長者清白自處之居士俱遵法化同時飯僧夫臣民咸佇立待佛而佛亦不拂其虔心故勑命文殊等各自分領清衆溥應齋主然而君臣皆佇佛來固是等心皈依而佛親赴王所命弟子分應臣民亦是等心利益斯不壞世法即出世法也唯有阿難先受別請至一切衆生無量功德阿難此云慶喜佛成道日淨飯王弟斛飯王復報生子淨飯賜名慶喜是佛堂弟不遑無暇也次列也上座以歷夏淺深分上中下歷四十夏或上更無人者稱上座阿闍黎云軌範應器即鉢應己食量而為大小也次第循乞猶云挨門而乞最後者謂城中長者居士既有文殊等應供我不必去矣餘則次第乞之若説必求從來未行施者又不能次第矣檀越云施主剎利云王種旃陀羅云屠者西域最鄙賤之不得與良家共居行持標幟人亦避之方行者依佛乞食之方而行也看下文自有此義冠注此敘誤墮淫室之由也正分應齋主時唯阿難不在是于自恣日先早受別處之請所遊亦遠尚未之還故無暇預此分應衆僧之列且律制一僧遠出必以二師翊從所以嚴行防失也二師者一上座是歷四十夏而上更無人者一阿闍黎云軌範是能紏正弟子行者阿難出時既無二師獨歸精舍又無齋供故即持鉢于先所遊城次第循乞且心中作念我從來未行平等慈此去初求個未飯僧的檀越為我齋主因有次第念故無問淨穢貴賤自王種之尊姓以至屠殺之微賤一無揀擇唯依佛乞化之方行我平等之慈夫發大志願特為未成功德者皆令圓成功德無量也阿難已知如來世尊至淫躬撫摩將毀戒體訶實淨名世尊不非所訶則指世尊亦可佛常乞食無遮限者有五能勝故一者由內證平等理外不見貧富相故二者由心離貪慢慈無偏利故三者具大威德不懼穢惡相故四者息凡夫猜疑故五者破二乘分別故此事菩薩行之或無阻礙矧尊者初果聲聞何得效佛所為行既躐等安逃魔孽雖然尊者亦衆中之上首與秋子等方車並駕不落後乘何則以多聞第一方諸智慧第一以至説法第一何優劣哉無乃內祕外現示墮淫室發起教端明示真心不容不悟大定不容不修勿恃多聞勿狎欲境多聞恃而我慢山高欲境狎而愛貪海底是故閲教乘者唯以尊者為龜鑑而不必計其大權小乘使尊者實在聲聞初果自非博地凡夫而方行等慈則翼翼小心乾乾恐懼尚遭魔攝返觀自己誠聲聞耶菩薩耶徑混俗和塵而無忌憚可乎不特此也如後文中尊者曲盡迷情巧陳懦態執己見則謬辨多端感佛恩則悲泣不已皆所以罄智悲而激引群生耳凡開卷見此不審自己虗實徒為如來阿難説是過非評長論短縱使佛祖點頭終是礙境不唯遺失本真似坐聖賢於人我場中矣與己何益摩登伽女此云本性多劫與尊者有欲愛緣登伽經載之頗詳婆毗迦羅云金頭縛指而食半米為苦行者也亦云黃髮外道所傳呪術稱先梵天者妖者偽稱謂先自梵天傳來也隍城河也郭門者即城門也冠注此敘依佛行慈更遭魔擾也凡行平等慈須得平等智根基未固徒依模樣忽值外魔有所不免阿難所行未從自己平等智中流出但為須菩提捨貧乞富謂富則易施亦令善種不斷大迦葉捨富乞貧謂貧當植因亦令苦果不續世尊皆訶責曰為阿羅漢心不均平阿難知之意謂二者所行皆有遮限未免富者疑貧者謗是欲欽仰如來之教開闡無遮之慈度諸疑謗之衆便經歷城隍已而徐步郭門已而嚴整乞食威儀已而肅恭應齋法則如此矜持洽轍無疑然才涉思惟便墮坑落塹只因循次乞食不免經歷淫室豈知摩登伽女愛習不除宿怨未雪且見阿難具佛二十相好色美如銀便以所習婆毗迦羅先梵天呪呪巾覆食與之阿難受之不覺遭大幻術攝入淫席淫躬撫摩將欲毀其清淨戒體也然後文云八萬行中止毀觸戒心清淨故尚未淪溺可見雖至垂危根本如故也如來知彼淫術所加至及摩登伽歸來佛所上序分竟此下正宗分復分為四一見道分二修道分三證果分四結經分且先明見道分冠注此敘世尊慈心救度也阿難垂危之際如來以佛眼觀之已知淫術所加齋畢旋歸王及臣民皆前佇佛來應者意謂齋訖説法佛之常儀今既旋歸或因內外間隔我等不齊歸必説法俱來隨佛願聞法要豈知齋畢時正阿難被害時速歸者為救彼故也放肉髻光者顯本有智光元是超出根塵限量最尊最上法也色如百寶所成而曰不畏者顯其萬德俱備慈威並彰善無不攝惡無不摧也光中生蓮蓮中化佛者顯三身頓現因果雙融也化佛説呪者顯祕密法藏亦自無為心中流出也勑文殊將呪者顯大智能破極愚也然世尊妙用難思亦不可執一而論彼時世尊既知阿難被魔所制即加庇之不令攝入有何難哉縱攝去矣即使二人自來歸投又何難哉豈必待如是作用而後始得惡呪銷除耶又豈文殊不將呪去必莫能來耶是亦不然但知如來藏中靡所不具故應機接物任其所來當以辨才應者自不與之神通當以神通應者自不與之辨才若所應非其所感是欲進而反退矣是故登伽女以幻呪攝入阿難世尊亦以幻呪應之蓋以幻除幻則彼邪幻心降翻然皈投正幻矣或曰佛所説呪不可言幻斯亦似癡人前不可説夢也提獎者提携獎勸而來也阿難見佛頂禮悲泣至退坐默然承受聖旨十方如來指能證人言菩提此云覺道指所證果言妙奢摩他等指所修因言最初方便指入門第一方法言妙字指修行者於禪定中所得趣味言如蜜中甘美唯食者自知向人形容不出沒奈何故假妙字稱之若不如是何故十方如來一入其中難割難捨只到徹頭徹底且一徹之則群魔不能視況加害乎奢摩他此云止亦云寂靜亦云空觀即空如來藏三摩略一提字或地字或云三昧此云正定亦云正受亦云等至亦云假觀即不空如來藏禪那此云靜慮亦云思惟修亦云中觀乃定慧雙融義即空如來藏羅漢辟支見前冠注此正宗分也阿難蒙佛救拔大恩故一見之即頂禮而謝悲泣而感忿然而恨且謂曠劫多生徒憶持誦習而正定禪那全未得力尚未知修證工夫亦未得最初入門方便若親證實受圓滿果位安得復遭魔孽耶故殷勤啓請云云此等名言皆阿難熟聞久矣但未及修證必得入門方便始可修禪定必假禪定可證菩提也阿難啓請時有常隨衆及雲集諸大弟子俱願樂聞默然承旨也諸師注疏都以向後經文分章割段配三觀義雖不為過覺太死殺法且非世尊本懷亦非本經要旨乃義學輩之習氣耳況世尊所説俱從不思議藏中流出雖機有利鈍智有淺深皆可隨分悟入若刻定死法不可差池未免令人束手縛腳矣如根性頗利者一句乃至一偈亦可悟入圓通三觀矣若必將全部文言如線貫花串入心中方得三觀圓通是纍墜殺人也且經中文義不可定配者甚多略示一二其餘互見如三科七大之文是一個理路俱是幻妄稱相其性本真相如空花泡影性即如來藏性豈可定配奢摩他耶豈可定配三摩耶又豈可定配禪那耶又豈可將三科配一義七大又配一義耶又如三種相續二種妄見以至非即非離是即非即一多無礙小大相容則事事無礙亦可説世間因果亦可説又配作何觀又如二十四聖各陳圓通那個不具三觀如觀音從聞思修以至四不思議非融通三諦耶經云狂性自歇歇即菩提配作何觀經云知見立知即無明本知見無見斯即涅槃併真性有為空緣生故如幻無為無起滅不實如空華于一心三觀何所不備況本經宗旨唯顯一切事究竟堅固若説圓融三觀則可割截強配則不可最初方便亦不必遠指下文即是何則世尊説法如谷答響豈容擬議但見阿難自道恨無始來一向多聞即知他心已服病第未知病根所在何為病根不過見聞知解之種子耳故即問他發心所以使他陳出病根來揑著痛處逐一針灸使其胸中所有盡情吐出至于理窮詞盡則習氣空而病根去矣自後漸進調養之方非方便而何已上所録雖乖常途要非有心猶若破句讀經唯自得之唯自信之實不敢以此強人也佛告阿難汝我同氣至是以渴仰從佛剃落三十二相者舊説始於頂肉髻相終於足平滿相勝者諸天輪王所不能及妙者端嚴美麗難以言宣絶者超出衆聖映徹者若赤金色而明透淨明者處塵不染皎潔分明紫金光聚者佛身如紫金山光明無量含攝無盡備載觀佛三昧海經中冠注佛見阿難情甚苦切且慰之曰凡諸弟子有問必答矧汝我同氣情無彼此性等天親有所請問而不傾肝膈乎遂詰之曰但父母重恩男女深愛皆難割捨當初發心于我法中見何勝相頓然捨之阿難以實答曰我見如來三十二相云云夫阿難曰見相曰常自思惟曰渴仰剃落者正是他根境相緣識心轉熾淨穢難忘愛憎競起處故佛因他請最初方便即審其當初發心而從容探索其病根俾之微細陳出而後逐一針灸豈非方便乎然阿難既以多聞為恨而請在佛當問他聞我何法其問答承接亦覺順便置此不問而問見何勝相其故何也謂聖凡雖別淨穢雖殊佛相魔相均一色塵捨凡從聖總一妄見愛淨憎穢等一識心昔若不愛佛相今亦不憎魔相佛尚不著而況魔乎可見阿難未答語時佛早知其病根第使自己吐出庶無所隱匿耳然此病根即大地衆生之通病是以佛與阿難互相建立此見聞思惟四字為一經之線路向後文中每每針灸如云此非汝心云緣塵分別影事等皆破此思惟以顯真心也如云離物離見云見猶離見等皆破此見相之見以顯真見也如擊鍾驗常云返聞聞自性等皆破此多聞之聞以顯真聞也雖然相去幾何但息波痕不無水體若離波求水亦外道餘乘之見矣斯正一經之脈絡不可不珍玩也佛言善哉阿難汝等當知至此想不真故有輪轉一切衆生指三界二十五有言無始者言其前無始後無終謂浩劫漩洑永無息滅也常住真心約用言性淨明體約體言先用後體者稱佛事門頭言也常者非一定死常之常乃寓物成形而曾無遷變也住者非住著之住同生住異滅而本不動搖也真者在幻化而不偽照境曰心為性之用也性者生生不息之理也淨者處染而常潔也明體者處長夜而不昏也斯皆佛生本具無欠無餘不動周圓之真如也衆生不覺故取舍情見淨穢心生若一念純真則聖凡平等染淨不二即如來三十二相皆影像分耳愛自何生冠注此真妄並立而令諸衆生捨此登彼也佛言善哉者為阿難對以實情故喜而慰之也意謂汝所對者固皆本懷但發覺初心早已差謬汝等發心當求不生不滅之真心若見勝相而常自思惟者乃諸衆生之生滅妄心也此想不真故有輪轉故勉之曰汝等當知云云汝今欲研無上菩提至中間永無諸委曲相冠注此直指菩提道路也阿難既有回小向大之志又陳白最初發心矣佛既與之建立真妄兩班又令他知其門戶矣到此要使直取無疑故汝今欲研者是阿難要微細窮究也世尊意謂欲究菩提不離當下無上菩提豈是他物即人所共有的真心但未發明若能開發明了就是菩提然而開發工夫只須心直言直應當有問即答莫涉思惟絶諸擬議則近之矣即汝所問十方如來出生死得菩提者亦同此道皆以直心直言故得因果如是直出生死直證菩提從始至終凡中間所歷地位永無紆回留難之相自此以下是單提向上不列階級以顯最上乘法要阿難立地成佛不由他悟也心言直者不容擬議不落意識在以不動智去思惟心亦若祖家云説個直指早已曲了故才著擬議即加棒喝奈阿難不能擔當世尊再向第二門頭另開方便即後文云諸有智者要以譬喻而得開悟以下之文是也真發明性即發明真性特文倒耳直心即真心也真性是體真心是用體用皆真非菩提而何阿難我今問汝當汝發心至故我發心願捨生死緣字有能所義相屬所緣見屬能緣中間愛樂乃思惟識心佛既教以直心酬對阿難豈不受教但不知佛説的直是稱不動智應一切境如鏡映色了然妍𡟎而無能所之見紛然去來而無生滅之相毫無思索故謂之直阿難則以見相發心之思惟愛樂據實而告誤以為直則翻藥成病矣冠注此一問一答之詞上既教以直心酬答斯即驗其曲直且亦提掇病根令他知其下落便即掃除故問及當初發心那段光景倘阿難猛然大覺則過去心相宛若幻夢矣豈但過去即現在心亦不可得則漆桶破而大事明矣爭奈仍墮舊時窟穴何佛告阿難如汝所説至唯心與目今何所在冠注此徵究心目之處也承上云汝謂目見心思願捨生死不知捨生死者即生死之因何則汝説目見勝相心生愛樂者正是劫奪真心之賊也譬如國王被外賊所侵發兵討除是兵要知賊所住處而後能破其巢穴誅其種族也汝自無始以來流落生死輪轉不息併無他過唯汝心目為之賊媒自劫家寶汝今欲證真心如護國王欲修禪定如用佳兵欲除心目如勦強賊汝心與目今何所在此雖心目並舉要重在心以至後文重重破見但為心無巴鼻恐迷者罔措故寄見徵破耳阿難白佛言世尊至如是識心實居身內後文中住字即此處居字凡七處徵破唯破一住字耳其內外中間無有不可雖辨識心而真亦在焉蓋心如太虗身如房舍若謂空住房內房外豈非空乎內外中間亦復如是故般若云應無所住而生其心或謂七處皆非心者則五陰以至七大俱非如來藏矣請深玩之十種異生如後列十二類生除空散消沉土木金石非心眼倫故青蓮華者西域此蓮之瓣極為纖長佛眼似之浮根四塵元是四浮塵根乃譯語者嫌其古拙以巧其文耳亦是阿難一時連帶之詞猶云豈獨眼根併耳等四浮塵根秪在我面看一秪字自了然矣諸師因後文有能所八法之説便謂色香味觸豈阿難半吞半吐耶且佛但問眼何所在而阿難又道眼是四法所成何太多事乎冠注此阿難執心居內也阿難並陳心目所在似同迷者之見而出言吐詞自有分曉何則既曰十種異生者可見未出生死者俱同此計又曰識心自非真心一切衆生所以幽囚六趣汩沒三途皆由計此以為我執事障之深根也曰縱觀如來青蓮華眼亦在佛面而確指浮根四塵又非勝義根也夫阿難語雖斟酌未免隨處滲漏縱謂識心亦不必定執實居身內能見三十二相者豈獨浮根乎佛亦明知此過且不與之説破佛告阿難汝今現坐至故我在堂得遠瞻見冠注此三問三答之語也阿難既謂識心實居身內佛即當問曰心實在內能見心肝脾胃否亦置之不問乃先問其現坐講堂觀祇陀林今何所在阿難答曰清淨講堂在給孤園內祇陀林實在堂外是內外之境令阿難自定矣次問汝今堂中先何所見阿難亦答曰先見如來以至方矚林園是先後之見亦令阿難自定矣次問汝矚林園因何所見阿難亦答曰戶牖開豁故我在堂得遠瞻見是所見之因亦令阿難自定矣夫世尊三番審定者特為阿難素有多聞習氣亦能巧辨若不預為防限未免臨時轉計曲費饒舌凡善知識開導未來不可無此方便也爾時世尊在大衆中至阿難頂禮伏受慈旨梵語三摩提亦名三昧此云等持亦云正受舊説一切不受名曰正受大都在禪定中一念不有處正是受用而吐不出吞不下故謂之三昧大佛頂見前梵語首楞嚴此云一切事究竟堅固王者尊貴義亦云自在義妙莊嚴指菩提果上言舊説摩頂者撫以示愛禮足者伏以示敬上愛下故摩頂下敬上故禮足冠注此建一經之綱宗示諸佛之通津截餘乘之岐徑也上既審定阿難仍不加其徵究而特為摩頂開示者何也為其最初啓請禪定方便佛自審其發心而左提右挈以至于茲在佛未嘗非禪定方便在阿難猶未見標名直示若更加徵究則令其罔措矣故佛舒金色臂摩頂撫慰阿難及諸大衆而告示曰有三摩提云云夫此三摩提是禪定之通稱非前所請三觀中之一也名大佛頂下是假諸佛頂相以名三摩提之體也具足萬行下是假十方如來以顯三摩提之用也謂此三摩提凡情聖解皆不可入有心無心皆不能證識不能見智不能知空而非空有而非有中而非中乃世出世間最上無比之法故假大佛頂以名之然而亦不離諸世諦名相即一切事本自如如周圓不動具此三昧則百千三昧皆在其中斯是諸三昧中最為尊上之王也不特具此即六波羅密四無量心等一念具足故十方如來皆由此以出生死河由此以登涅槃岸由此以成萬德莊嚴也佛全提正令要使頓證真常一彈指頃三祇果圓然而世尊雖以此示阿難而與所請奢摩他等不無天淵矣在阿難似由方便而得禪定由禪定而證菩提不無漸次修證佛既曰有三摩提名大佛頂等則一色一香無非大定即大經云男子身中入正定女子身中從定起乃至一根入正定諸根從定起亦如祖家云莫動著莫妄想是故諸祖提唱宗風每舉楞嚴大定而佛於向下多方追究亦令妄心盡處見菩提耳佛告阿難如汝所言至住在身內無有是處此下多設難問以曲折搜求者要使迷者得悟滯者得通而凡涉難辭亦不當以實理詰之因實理不明故以非難為難難至無難則實理自顯若見其曲屈巧辨而責以實理妄搆圖度非不能因言入理抑深昧言之所由讀內典者不可無此擇法眼冠注此牒其前言以破執心在內也如汝等四句牒前所見之由以局定阿難亦有等四句世尊復設一計以審定阿難答言下四句是阿難墮在計中矣汝亦如是者乃佛之總斷語猶言汝計心在身內與在堂不見如來而反見林泉者曾無有異蓋最靈者莫過汝心凡所在處無不明然了知若汝現前所明了心實居身內爾時當先見其臟腑而後可見外物始與汝先見如來以至方矚林泉之語相合不特此也據汝所言宜乎世間多有衆生先見腑臟後觀外物今果有耶無耶然身內容有不可見者亦有不可不見者何則若謂心不能見心如眼不能見眼肝脾胃者最近於心亦若眼不能見眉睫汝縱不能見此其餘爪生髮長之處筋轉脈搖之處斯等在內而與心相離者理合明了如何離合之處俱不能見耶若汝最靈之心在內而必不知內物云何反能知外物也然則與在堂不見如來而反見林泉者何異哉汝計謬矣是故下結破語猶云汝言在堂不見如來能外矚林泉者無有是處可知汝計心在身中不見內而反見外者亦無是處也斯破心在身內竟縱不能等舊説以幽深膚淺釋之似自外而之內則心在外矣不可從頗者多也阿難稽首而白佛言至同佛了義得無妄耶冠注此執心在外也阿難聞佛説個必不內知云何知外頓起謬解意謂佛説我心在外義見言表故曰我聞如來如是法音悟知我心實居身外何則我心如燈我身如室佛謂心若在內宜先見內而後及外者譬如燈然室中必然先照室內從其室門後及庭際一切衆生不見身中獨見身外者亦如燈居室外不能照室是義必竟明了無所疑惑與佛上來所説了義無不同者豈得同前在內之妄耶佛告阿難是諸比丘至云何一人能令衆飽冠注此先設一喻以明心不在外也夫心既在外則身與心分而為二亦似兩人彼此不相干涉故審定阿難曰是諸比丘一人食時諸人飽否阿難即答曰不也且自徵明曰是諸比丘雖阿羅漢軀命不同云何一人食時能令衆飽即此則知心在於外自不知身而阿難之計將負墮矣適值也當也摶食者亦名段食有形段可摶取者四食中揀非觸思識也宿止也猶云今日不食矣佛告阿難若汝覺了至住在身外無有是處冠注此破心不在外也若汝能覺了能知見之心實在身外則身外於心而心亦外於身各不相干然則心所知者身不能覺身邊能覺心不能知則與一人食時衆不能飽無以異也我今示汝兜羅綿手汝眼見時心分別否阿難答言眼見手時心生分別佛曰若然則身心元相知而不相外矣云何執心在外耶是故下結破語兜羅云細香此綿白軟佛手似之阿難白佛言世尊如佛所言至無障礙者潛根內故冠注此執心潛根內也如佛所言下牒前言而起後文也我今思惟知在一處者揀非前內外一處也處今何在者佛徵其所言之處也既不知內等語意謂根不見內故若根能見心自隨其分別矣觀下文可知猶如有人至隨即分別一段是喻乃發揮潛伏根裡一句義故以能合琉璃喻如眼之浮根以所合雙眼根喻如識心琉璃不礙眼見如眼根不礙心見也阿難此處早有眼見心知之意但未明言而世尊亦不理會妙不可言也然阿難向下負墮者重在彼根隨見隨即分別二句法喻不齊猶輕然我覺了至終又是委曲完成上文既不知內而能見外二句義猶云不見內者為根不見故根若見內心自隨知矚外無礙者亦潛根內故根既能見心何所礙何怪心不見內而獨見外者乎潛者藏也佛告阿難如汝所言至如琉璃合無有是處冠注此破心不潛根也佛以二難破阿難若心見眼而眼自不能見境心亦不得成隨矣若心不見眼則法喻不齊矣故先躡本喻以按定阿難謂汝既以人之琉璃喻如汝之眼根以人之眼根喻如汝之心體彼人正當見山河時曾見琉璃否阿難答言實見琉璃佛即難曰汝心潛伏眼根若同彼琉璃所合之眼者汝心正見山河時何不見眼設若見眼則眼反同心所見之境矣若同於境則眼乃無知之物然則眼先不能見物汝心又隨何者而起分別耶汝計隨見隨即分別者不得成矣斯暗點他見非是根也設若汝心不能見眼則法喻又不齊云何説心潛根內如琉璃合眼耶是故下結破語阿難白佛言世尊至名為內見是義云何冠注此雙計內外也阿難轉計多因被斥暫時逼成唯執心在內是其本意故堅執不捨今雖內外雙執而意在曲成初計有藏則暗者謂由其暗故不能徹見藏腑閉眼見內者謂既名見內豈為不見有竅則明者謂由有竅故所以外明開眼見明者謂由其明故所以能見外物然則心居身中不見腑藏而見外物亦不違理也因被三番奪破故不敢直斷但曰是義云何耳佛告阿難汝當閉眼見暗至名見內者無有是處冠注此破閉眼見暗名見內也欲破彼執先設二問以審定之下方辨破若此暗相與眼對者是此暗相在汝眼前反成見外云何成得見內若言見暗即成內勿論眼之前後即當凡居暗室中無三光處則應盡是汝之三焦五腑然寧有是理哉若此暗相不與眼對則暗與眼自相乖離亦不名見又云何成得見內如是則眼與暗相對與不對皆不成內若言我道閉眼見暗非道開眼見暗何論對與不對這是離諸外見返觀暗相謂之見內若汝眼根離却外見返觀暗相成內對者即當開眼合眼二處皆能可也若能合眼返見暗時名見身中於開眼見明時何不返見己面若開眼時不能返見己面則閉眼時又不能返見身中若謂開眼見明時果能返見己面則汝心眼皆在虗空又不得返見身中而內對必不成矣若果在空豈獨不成內對抑且非汝之心體若言雖在虗空而見我面亦是我之心體殊不知汝眼所在當有汝身然則如來亦見汝面即應亦是汝身縱謂心眼所在不必有身則汝心眼在空亦見汝面是汝心眼已有知覺則汝身中應無知覺矣汝必執言身中有汝知覺空中心眼亦汝知覺則汝一身應有二知既有二知即汝一身應成兩佛有此理乎是故下單結破見內不成也阿難言我常聞佛開示四衆至亦非內外中間三處冠注此計心在隨所合處也阿難四番被斥伎倆將窮故引佛法為己證據殊不知昔説心法互生者要顯諸法無性妄心無體以破妄也今謬執心法實有所生復計因法而有之思惟體為己心性既謂心隨法有不可説合既謂之合必是兩物現成始得且心體尚無豈待合而後有乎不特此也既曰心隨法有而亦與法合則法在外而心亦在外矣何謂非內外中間三處通身是病而不自知也佛告阿難汝今説言至若從外來先合見面冠注此破隨所合處之計也阿難引兩法為據佛單牒一法辨破則彼無所賴矣若謂法由心生則似心為法體聊有倚傍而獨説心由法生則似法為心體是心自無體性心若無體則無所合蓋六種根塵各有體量已合成十八界矣汝無體之心復與何法相合豈六塵外更有一種無體之塵與汝無體之心合而為一而成十九界耶何以故因七塵故是義不然若汝心必有體必在隨所合處者汝今以手自挃其身看所知心從何所來若無所從來又非隨合隨有必待挃而始見方是隨合隨有若有所從來必有內出外入果內出耶外入耶若有內出外入則復襲前咎豈得隨合而隨有乎不曰二十一界而曰十九界者正顯心與塵俱無體故此雖小節亦應知之挃者觸也阿難言見是其眼心知非眼至若見物者云何名死冠注此計眼見心知也阿難聞佛見內見面之説遂生疑計謂眼但名見心但名知責心令見恐非正義佛即暗牒前戶牗開豁等文作喻顯知見唯心以阿難喻心以門喻眼謂如汝在室中雖因門見外須得汝身而後能見若非汝身而門豈能見之乎法合應云雖因眼見外須得汝心而後能見若非汝心而眼豈能見之乎若唯眼見則諸已死云云以此觀之可見知見唯汝一心豈妄分眼見心知乎阿難又汝覺了能知之心至心則隨有無有是處冠注此復拈上文心若有體一義作四分破之承上云汝心若必有體為是一體多體遍體不遍體若一體者挃一支時四支應覺若咸覺者挃應無處若挃處有在定非一體若多體者有一心體則成一人有多心體則成多人於多人中何體為汝若遍體者同前一體挃一支而四支咸覺若不遍者止在一支當爾挃頭而亦挃其足若頭覺而足不覺可言不遍今頭足併挃必爾併知又非不遍然則心體尚無定在豈有隨合隨有之處耶是故下結破語阿難白佛言世尊我亦聞佛至表體既混心應雜亂冠注此計心在中間也阿難但知引證而不知談實相者是説萬法唯心不隨妄執直指真實本相而言豈同浮想識心乎反領前非而作思惟謂心若在內應有所見又無所見心若在外應不相知今又相知內無知故在內不成身心相知故在外非義外既相知內復無見當在中間彼雖言中而中相尚迷佛先審定中相在身在境後推破之意謂若在汝身而身有中邊二義在邊則不名中在中則同前在內仍當見內若在身外之處而處有表與無表二義無表則中相無所標準表則亦無定方可觀蓋表體尚無定在豈心有一定之中相而不雜亂乎表中標竿也凡立標以顯中位曰表阿難言我所説中非此二種至當在中間無有是處夫凡看此等經文要知非難為難勿得望空鑿實然而語雖變幻於中線路隱然絡然若虗非虗但循文銷釋妙趣天然若強援證據徒成贅語豈獨不成一片反作七穿八孔當觀阿難所引佛語曾無一二當可世尊併不究其來歷亦不問其差訛唯了眼前公案雖係折辨其實直捷又如阿難所執之心世尊豈不知是第六識豈不知為前塵影事未及緣熟自不與之説破若乃伎癢知識未免捫風撲影不顧其當與不當契與不契唯圖展其所有而殘經剩論餘歌冷頌甚者諸子百家紛然雜出譬諸庸醫修藥料愈多而病尤深夫何益哉冠注此一答一破之詞也阿難答曰我所説中非身處二種如世尊云云阿難一時兩引證據則前後矛盾而亦不自知蓋佛處大乘時説真心實相如如不動無在而無乎不在豈謂不在內外而在中間乎佛在權乘時説眼色為緣生於眼識謂根境為緣以生妄識而互無體性如本經後文云幻妄稱相是也又豈與實相真心無異乎然此應置之勿論況復解釋佛語謂眼有分別而指定根屬內身謂色塵無知而指定塵屬外境謂識生其中而指定心在兩楹之間以顯中相嗟夫謬矣墮矣故世尊乘隙審定阿難曰汝心若在根塵之中此中之心體為兼根塵二種為不兼耶遂辨破之曰若兼二者汝道眼有分別色塵無知者一定眼是有知之根一定色是無知之物汝心自是有知之體而復兼在根塵之中是體與根皆係有知雖兼而不必論矣但無知物色與有知心體二者兼在一處則有知無知豈不互相雜亂乎若必執言二者雖兼不妨物色猶自非知而心體猶自有知未嘗雜亂者則是雖相兼而未相合若汝心體與外物既如此與內根亦復然即當以一心體兩分而立半與根敵半與塵敵然則心體既非定一依何為之中位乎若兼二不成是不兼根塵汝道眼色為緣生於眼識若汝心體不兼根則非屬有知若不兼塵又非屬不知然則如為父母子自何生根境既不為緣則心之體性自何而有心體尚無依何以顯中相乎是故下結破語以兼二破阿難是躡眼有分別二句作贓證以不兼二破阿難是躡眼色為緣二句作贓證物體雜亂句且除却根説物非體知句眼上句轉出來以分釋不雜亂義成敵兩立句又跟物非體如句推出來以此例彼仍提起根來方作三法破之阿難白佛言世尊我昔見佛至則我無著名為心不冠注此計無著為心也阿難愈授愈謬不知世尊昔日為四大弟子常言覺知分別心性者正説思惟妄心也不在內外中間俱無所在者正為破妄無體令識本真也猶云三際求心心不有心不有故妄元無妄心無處即菩提豈謂有妄心而但無所在乎況復釋成佛語謂一切無著名之為心且不敢自決唯曰則我無著名為心否蓋阿難不知分別心性隨境生滅亦無實體反認心實有體但不著一切嗟嗟不著一切早著忘了也然將名為心否之語較前實居身內之語則知阿難名言宿習銷過半矣非佛方便焉能如是佛告阿難汝言覺知至名覺知心無有是處冠注此破無著名為心也世尊欲破其計先牒其語次則標名一切猶云汝所謂一切者即世間之虗空及水陸飛行諸所有象種類雖多總名一切遂辨破之曰汝謂無著一切者為有汝心在言無著耶為連汝心亦無言無著耶若心亦無則同龜毛兔角矣汝心既無以何名為無著此當用一喻可明譬如我有個瓶甌在此容許説這瓶甌不著於案上豈連瓶甌亦無脫空説個不著於案上而不著者果何物也若有心言不著者則不可名無何以故若心無相則同龜毛兔角之無固不可脫空説無著若非無相則心有相心相一有則著在一切物上云何以無著名心無相下雙結上有無二義是故下總結破語有無皆指心言舊説指一切物言豈前標明水陸等而後復論其是有耶是無耶為在之在字虗説猶云有心在此乎則在之在字是言心在物上了也蓋心必即物以顯相豈可離物以言相乎爾時阿難在大衆中至傾渴翹佇欽聞示誨冠注此舊謂責躬請教之文也夫凡有所執著有所倚傍有所分別有所憎愛取捨皆名言妄想耳故七番徵究處處皆斥為非使阿難絶斷思惟於一切處無可傍副一切心無可跟究一切言教無可恃賴一切意解無可圖度則知見消磨名言灰滅而常住真心性淨明體立可承當豈非楞嚴大定乎阿難當面蹉過只得再申啓請爾時阿難至而白佛言乃經家標敘請教之儀也最小之弟者四王生八子唯阿難最小也意謂因沗同氣而居最小故得蒙如來慈心愛惜由慈愛故雖今出家猶恃嬌憐不復努力所以徒尚多聞未得無漏故被魔呪所攝溺於淫舍然且不知何故而至於此也今蒙如來開示皆由不知常住真心用諸妄想故有輪轉始知所以未得無漏而為魔所溺者當由不知真心實際之所詣然我等今欲詣進真際尚迷途路願佛慈哀指示奢摩他為詣真際之捷徑萬一由此而證真際縱值惡知見如娑毗羅摩登女者自能使之魔心頓歇正念現前豈不令諸闡提隳彌戾車乎作是語已下亦經家所敘文嬌憐即慈愛也傾渴者如渴思飲也翹佇者如鳥張望也欽敬也闡提云信不具彌戾車云惡知見是一串義猶云令諸信不具者墮壞惡知見也應上娑毗等文最親切爾時世尊從其面門至皆住本國合掌承聽冠注此放智光以示真際也佛與衆生同一真體而權實二智無不具足衆生不覺舉目成礙佛能大覺觸境皆通然根本智光即六根而超六根也故世尊先放肉髻頂光以顯超出六根之最上乘法因機教不偶復俯尊就卑從眼耳鼻舌放此智光亦顯一真法體不出六根但衆生日用而不知縱有世智聰敏者凡所見諦未出陰陽至理必曰天動地靜陽明陰暗以德合天地智齊日月然亦不出第八識之見相二分縱親證之亦是理障唯佛乃能轉識成智故從根本智放種種光其光晃曜則千日隱其明大地虗其質而見相二分翻為智用矣故令十方世界合成一界十方菩薩不離本座承聽法音然微塵國土曾無毫許間隔諸大菩薩曾無頃刻不面但情生智滅根境妄分於器世界不能超越而妄成隔絶今仗佛光炳然見之而反為奇特若根塵識滅本光透露乃一種平常耳凡佛説法有權有實而放光則權實並彰若上根利智一見此光一覩此事即獲本真證無生忍此光豈非實法乎若中下之根必待説法而後悟者先假此光發起信根而後聞法始可深入則此光又屬權乘矣然佛光非有權實而權實唯機有耳六震者動踊震起吼擊也佛告阿難一切衆生至而不自覺枉入諸趣惡叉西域毒樹名聚者謂彼毒果生必三同一蒂喻惑業苦三生必咸聚也魔羅此云殺謂戕害正修也劫魔此云長時塵劫者以微塵記彼劫數言極長時也一切衆生下指泛爾凡夫而不知修行者諸修行下指修行而不得根本正智不能證極果者皆由下有結前起後義猶如煮沙下極喻上錯亂修習者云何句徵上文以起下文要與阿難一身敵體指出二種根本使他立見真際然真際即在第八識中故謂識精元明精者不雜也謂真如雖隨緣成識而不變性曾未點染也元者自本而出曰元明指用言此元字與上元字少異上元字即本字是真如本體此元字已在識中雖不受點染不妨與本體有一間耳此菩提涅槃元清淨體雖即前常住真心性淨明體此生死根本雖即前用諸妄想而於中自有不同處前是泛指一切衆生以曉阿難且但曰不知真心用諸妄想尚未言及根本此因阿難請問真際所詣故先自修與不修者漸漸説及阿難向他一身中敵體指出二種根本故先標其名後指其體又且則汝二字何等緊確然雖真妄雙指要重真邊一則令識本真故二則阿難獨問真際故真根本中只重識精元明一句若阿難知得第八識則真際菩提等自在其中矣寧有不由第八識而證真常者哉是故雖言惑業苦及錯亂修習以至菩提涅槃元清淨體一槩不重但要知得識精元明則無法不在此中無一樣人不從此流出如對法經云無始時來界一切法所依由此有諸趣及涅槃證得是也夫識精元明離了六根六識亦無處覔故後文觀河不變者識精也如第二月者識精也見非是見以至六解一亡者皆識精也蓋此識精在眼而尚未雜色者即名見精在耳而尚未雜聲者即名聞精乃隨根立名亦無定名但於一根中知此識精則去真性不遠矣故向後多寄見精以指真際也由是衆生下雙結迷真執妄也冠注此為阿難敵體指其真心實際也初因啓請得成菩提之禪定方便即為並標真妄以至七番破妄令契真常迷而未悟重請真際佛即放光現瑞雖全體舉出彼猶不識今復開示曰謂諸衆生從無始來迷己真心正智隨無明流起顛倒惑由惑有種種造種種業由業熏種自有苦果相續不斷夫惑業苦三生必同聚如惡叉果生必三同一蒂也非特衆生即諸修行者亦不得根本正智不能得成無上菩提或唯厭業果而欣寂滅者謂之二乘或迷自本真而求道心外者謂之外道或修有漏善戒而取善果者謂之諸天或耽護欲境而惱害正修者謂之魔羅此等皆因不知真妄根本誤妄為真盲修瞎鍊猶如煮沙作饌縱經塵劫終不能得可見妄非真因不成真果亦若沙非饌本不成饌也然此真妄根本不在別處則汝阿難身中立可得見蓋生死根本者第八識中根本無明也攀緣心者前七識也菩提者根本智也涅槃者真如理也正智契真理智理一如本無能所故名元清淨體總指不變真如全體大用也識者第八識之妄分也精者第八識中元有不變真如自本明而出謂之元明言雖居染位不受點污指第八識之真分也識精元明總指真如隨緣成第八識也本識能生見相二分見為能緣相為所緣以妄緣妄而不能緣及真性故曰能生諸緣緣所遺者夫元清淨體與生死根本非有二體非定一體真如無始無明亦無始為真如具隨緣不變二義無明具成事體空二義然真如隨緣即為成事無明而無明體空即為不變真如蓋真如即如來藏性但一念隨緣為成事無明而無明中自有不變真如故曰真妄和合成第八識由第八識有見相二分見分即前七識相分有親有疏親即五淨色根疏即浮根色身及外六塵等相若第七識執我第六識隨塵分別前五識領納前境根境相偶以現行熏種子使第八識受熏持種即是用前七攀緣識心為自性亦是第八識為無始生死根本因果循環輪回不息也若根境不偶前五識不領受前五塵第六識不隨法塵分別第七識不執我則現行漸滅種子漸消使第八識漸至湛不搖動復還真精元明漸盡根本無明轉識成智即為無始菩提涅槃元清淨體矣觀此則豈獨阿難敵體本真是菩提果凡諸衆生各各圓滿但為根塵不脫令諸妄識遍緣一切不能返觀自性故迷真執妄遺此本明然既曰本有真明何遺之有常在六根門首無須臾離而但不能覺耳止因不覺墮入凡愚諸天外道等趣是不當墮而枉墮者也枉者屈也阿難汝今欲知奢摩他路至我與大衆同將眼見冠注此舉拳驗見令知真際也承上云汝曰不知真際所詣而復問奢摩他者是以奢摩他為詣真際之路意謂願出生死而詣真際必要先知其路也我今為汝指出真心實際當不勞舉步立可至之而汝可能至之乎即時如來舉臂屈指為光明拳而三番審試一則舉拳語阿難言汝今見否阿難唯答言見二則曰汝何所見阿難唯答見光明拳曜我心目三則曰汝將誰見阿難又唯答曰我與大衆同將眼見嗟夫世尊要使阿難於一眼根中直證真常而阿難全然未醒然此三轉語中不無緩急第一轉語問曰見否唯答曰見尚未見得次則問何所見正要立見功效唯答曰拳曜心目則病源深固實難療治而世尊婆心切切更問汝將誰見又唯答曰同將眼見在世尊則一步一緊在阿難則寸步不移斯緩急之別智者審之佛告阿難汝今答我至佛言咄阿難此非汝心冠注此再徵妄心而直破之也世尊先牒而後問牒曰汝今答我如來屈指為光明拳曜汝心目即問曰目在汝面我可見之今以何者為汝之心當我拳之光曜耶將心來我看此乃世尊極力為人處與初祖為神光曰將心來與汝安同意若阿難被此深錐痛劄猛然有醒曰求心了不可得則奢摩他路亦不必矣爭奈阿難仍行舊路以前七處推窮尋逐之能推者認為己心殊不知前自述思惟愛樂者即此心也世尊所判用諸妄想及用攀緣心為自性者亦皆此心也故世尊振聲一喝咄此非汝心雖然世尊下此一喝要非偶然必待因緣時至而後施之有益蓋阿難被世尊在處斥之為非又於舉拳後連加轉語以搜索之方説得能推者三字出若正在推窮尋逐時尚不知何名所推之處亦不知何名能推之心而彼時縱與之千喝萬喝豈特無益即彼亦未必驚愕如此斯當詳之阿難矍然避座合掌至失汝元常故受輪轉冠注此一問一答以顯能推者非真心也阿難被世尊一喝即矍然驚愕離座合掌起立白佛此非我心當名何等可見阿難一向唯知有此今聞説此非心自覺駭然阿難既索其名佛即直示本名曰此是前塵虗妄相想意謂汝指所謂能推者是因前五根所對色聲香味觸而前五識領納前塵落於其中使汝思惟想心緣彼塵相虗妄暫現豈有實體哉由此妄想惑亂汝之真性猶如竊汝之賊也由汝無始至於今生誤認為心亦若認賊為子也既認賊為子則於真子不復求覔豈不失汝本有真常乎由其所認非常住真心故受生死輪轉諸趣亦若念念賊子而常被竊奪也前所云使汝輪轉心目為咎者此心也云發兵討除要知賊之所在者斯正賊之所在也前所見之佛相魔相及一向多聞者皆此所謂前塵也阿難白佛言世尊我佛寵弟至惟垂大悲開示未悟冠注此述疑求示也阿難雖聞世尊明示能推者名前塵虗妄想相而不能擺脫且更加擬度謂必不能外此心而別為用也故歷敘有生以來造善作惡凡所用處皆是此心凡有功能皆出此心若此發明非我心者我乃同諸土木矣何則除此之外杳無別心可得也云何如來説此非心一聞此説我實驚怖兼此大衆無不疑惑者雖蒙如來説此非心名前塵虗妄想相尚未開悟惟垂大悲更為開示也夫阿難陳白本懷亦為大地衆生説法即此觀之則知作善作惡唯此第六識心最為殊勝而凡夫瞢然不知二乘人雖知而不覺其妄反以此為主人公也爾時世尊開示阿難至性一切心而自無體凡親證實受無生之理唯自知之向人極力形容不出故曰忍詰追問也本體無垢曰清淨處染不染曰妙淨湛寂虗靈曰明心物各有性者猶言物物一太極也世物從心現起者猶言統體一太極也然斯約第八識現見相二分而成世間法也若約真心言之則心如明鏡而十法界依正二報皆鏡中影像耳舉草葉等者以微小況粗大也舉虗空者以無形況有形也而自無體亦況顯之詞猶云所現之物尚各有體而能現之心豈反自無體乎決言真心必定有體也冠注此示真心有體以釋其驚疑也世尊見阿難驚懼疑惑故先安慰而後開導之無生忍者即楞嚴大定即如幻三昧也謂證此則於三界內外併不見有少法生有少法滅於一一法當體如如而忍可於心言不能表衆生不能證入於此者皆由誤認前塵虗妄想相故於此忍永隔而不能入佛將破生滅以顯無生故於師子寶座摩頂安慰阿難而告之言如來尋常説萬有諸法非別所生唯一真心之所現起以至十法界中因果謂之正報者及十法界中微塵國土謂之依報者莫非因一真心以成其依正之體不特此也若諸世間凡所有者如山河大地乃至極細微者或一草一葉一縷一結詰其根本元流咸有體性豈獨細而有形者縱令大而無形之虗空亦有豁達無礙之貌以此觀之則世出世法有情無情若大若小凡有一物必具一體何況清淨妙淨明心乃能現世出世法範圍天地曲成萬物而凡所體性皆從真心現起而能現之心豈反自無體性乎若汝執吝分別覺觀至其誰修證無生法忍法塵分別影事指過去説前塵分別影事指現在説雖心因塵有塵亦因心有為破妄心只重心邊塵邊不可説出事業者謂塵是心所司之事業如言五官相似事已成曰業業初與曰事敕教也揣摩工夫向後八還處始見此處兼舉六知根六現行識亦只重第六意根意識也內守幽間等只宜渾説不可定指何等果位我非敕汝等恐阿難罔然無措未免離波求水故使他即妄求真也冠注此示真妄之別令捨妄趣真也世尊雖示真心有體阿難執妄不移故曰汝堅執不捨者名分別覺觀即六知根所了知性即前六識之現行皆因現前六塵引生而自無實體者也若汝必定執為真心則此分別心即應離諸色等六塵及依塵所司事業別有全性毫無虧欠許為真心然此非難辨立可甄別即如汝現今承聽我法此則因我説法之音聲而有汝之分別若離我之聲自無汝之心既離聲塵而無體性豈為真心乎非特此現行六識不是真心縱將此名了知性的六識現行息滅更滅了名見聞覺知之六知根而於暫息塵勞處內守幽深間靜雖為禪定寂境猶為法塵分別影事何以故能守者制伏之心所守者幽間之境此心此境因昔隨塵而分別顯今離塵而寂靜正是過去法塵所遺落之影事尚不得名真況汝現前隨塵生滅者即欲認為真乎然我今亦非教汝執吝此心定非汝心但教汝就於分別覺觀心微細揣度摸索是真耶是妄耶離塵有體耶離塵無體耶若離前塵有分別性即汝真心若離前塵無分別性斯即前塵分別影事若汝所執之心是因前塵而有者則前塵體性元非真常不變者若能生之塵變滅時則所生之心即同龜毛兔角矣心既隨滅則汝法身亦同斷滅更使何心修因而證無生法忍乎即時阿難與諸大衆至雖得多聞不成聖果冠注此申釋上文以誘進當機也阿難聞息滅六識猶為塵影又令揣摩心體為有為無則默然無辨而生平所執為心者亦不知果有體耶果無體耶杳無可據如人失其所有也世尊見阿難一無所辨則知胸中餘習亦將盡矣故更激之意謂豈獨認前塵緣影者未出生死即世間諸修學人由欲界而入四禪由四禪而入滅想定是由九番次第始入滅想定也然雖想念息滅無乃禪定所制非盡滅想心也若念此禪定念寂樂不復前進則不得漏盡成大阿羅漢斯等皆由不知此第六識心乃生死之關鍵若凡夫瞢然不知則隨此起惑造業固墮分段生死若定性小乘執此妄心不起處誤為真實涅槃亦墮變易生死可見凡堅執妄想者必受輪轉是故汝今雖得多聞不成無漏聖果也此不得漏盡者指方入滅想定猶未盡滅想心特定力制住不起耳與前內守幽間者相似對阿難説者是以勝況劣有激進義九次第定前八凡位後一聖位阿難聞已重復悲淚至發妙明心開我道眼冠注此傾誠悔過以請真心道眼也阿難聞入滅想定者尚墮生死則信妄非真重悲痛責長跪白佛曰自我從佛發心出家以來曾未精修唯恃佛威神且常自思惟無勞我修將謂如來是我同源共派必以慈恩惠我三昧豈知縱乃天性之親而彼此身心本不相代今蒙如來見斥見呵將我一向希望本心盡情打落上因恃佛嬌憐故恃佛威神故所以雖身出家心不入道自今觀之不修自己真心而望人代替者譬如富人之子捨父逃逝甘為窮子而從人乞食也今日乃知佛力不可恃多聞亦不可恃雖有多聞若不精修淨行與不聞等若徒聞而不修者亦如聞人説食而不療己飢聞之終何益哉世尊我等今者但能聞而不能修者被煩惱所知二障所纏縛故不能解脫二障者良由不知自己本有寂常心性而恃賴於人故與捨父逃走甘為缺食虧衣窮身暴露而無所棲藏者無以異也雖蒙如來指示妙淨明心至今迷覆雖蒙指示非眼能見至今瞢翳惟願如來哀愍窮露發妙明心開我道眼阿難此番感悟痛自悔責兼陳二障者良由上聞滅想定人尚在生死路途故也二障者煩惱及所知也亦名事理二障亦名見思二惑亦名分別我法二執名異而體同也二障所纏者不能解脫也本不動搖曰寂本無生滅曰常心乃了了無窮之用也性乃生生不息之理也空有不羈曰妙體用鑑徹曰明道眼簡非肉眼真妄顯現決擇分明直見道體曰道眼又物不能礙曰妙物不能混曰明即時如來從胸卍字至性淨明心得清淨眼如來隨處放光總顯根本智而根本智即常住真心也卍者彼方萬字也佛胸前有萬德吉祥紋也光從此出表根本智萬德圓備明爍萬有用等河沙也幢乃摧邪立正即破妄顯真也獲妙微密性淨明心以妙字貫下猶云獲妙微密性妙淨明心體用皆言妙者言三德祕藏不縱不橫超出偏小故也於真心之體曰微密者謂十地見之如隔羅縠故曰微唯佛與佛乃能究盡故曰密於真性之用曰淨明者謂此心即智也汙不能染境不能蔽而靈照卓然即妙明心也清淨眼者對境而離稱理而觀周遍一切不著有無即道眼也冠注此先放智光後示心眼總為阿難發妙心開道眼也世尊三次放光自是隨機感應亦有深淺不同蓋最初放頂光之後説大佛頂則所顯所説皆迥出根塵之最上乘理要使阿難立地成佛不由行布阿難搆副不上重請真際佛自面門放光之後指二種根本其所顯所説雖落一層以屈尊就卑亦要阿難悟此最上一乘亦不離六根門頭耳奈彼亦不能搆副而尚曰二障所纏觀茲機緣非從梯航不能證入是故如來再落一層從胸卍字湧出寶光意謂即六根而超六根者即在此也汝不知此即不知其有心矣豈有人而不知有心乎吾一知此吾一證此而從此流出本有光明無色不備無礙不通不動一塵而周遍法界即十方世界所有寶剎而剎中所住如來及如來所有無見頂相以此一光莫不灌攝豈特十方如來若聖若凡情與無情平等融通即汝阿難及諸大衆平等貫徹故曰汝請發妙明心開我道眼吾今為汝建大法幢亦令十方云云阿難汝先答我見光明拳至屈握示人故有拳相冠注此辨驗阿難之迷悟也世尊既建法幢為阿難開發真心道眼竟但未知領悟何如耳故拈前語疊發三問以詳審之一問汝先答我見光明拳此拳光明因何所有二問云何成拳三問汝將誰見此雖拈前見拳之語為問端而實在暗探見三十二相之病源阿難併無遷改一曰光明因清淨所生用答光明因何所有也二曰我實眼觀用答汝將誰見也三曰屈握示人故有拳相用答云何成拳也此曰清淨所生即前云非欲愛所生也既曰眼觀依舊肉眼非道眼也閻浮檀金此云勝金須彌南面有此檀樹果汁入水砂石成金此金一粒置常金中悉皆失色佛身之色似之赩赤𦦨也又傳此金有破暗之光故佛身之色如之也佛告阿難如來今日至例如來拳事義相類冠注此以拳例見也阿難陳白二障後雖覩法幢不妨仍認肉眼為見而杳不知其見性則不能頓悟真常矣故世尊只得向第二門頭少開方便故曰我今實言告汝諸有智者要以譬喻而得開悟亦問之曰譬如我今有手則成我拳若無我手則不成拳例如有眼則成汝見若無汝眼則不成見其理義是同是異阿難疾答無疑言既無我眼不成我見例同如來既無佛手亦不成拳事義相類然佛據理而問阿難據事而答理須智了事起妄知阿難出語似有分曉冷處亦當著眼佛告阿難汝言相類至前塵自暗見何虧損冠注此以拳見不齊而顯見性無虧損也承上云汝謂事義相類則不然也何以故如無手人拳畢竟無彼無眼者非見性之體用全無但無浮根而似用稍不顯耳於體性曾未虧欠汝試於途詢問盲人云云前塵自暗者謂明暗色空皆眼家塵相即浮根既壞不能現色亦為暗相故此前塵但指對見之暗相言若槩指前塵則有眼人於白晝時亦同見暗矣見何虧損指見性言即真見而真見即真心也後文自見阿難言諸盲眼前唯覩黑暗至二黑校量曾無有異冠注此執盲人無見也阿難一向堅執眼見心知至今未化驟聞無眼能見未免迷悶故猶強辨云諸盲眼前唯覩黑暗云何成見世尊引一有眼人處於暗室所見暗相與無眼人所見暗相例同以詰阿難是同是異阿難認定有眼無眼所見暗相曾無有異世尊向下以燈例眼以證其謬也阿難若無眼人全見前黑至合掌清心佇佛悲誨冠注此引燈例眼以顯見性也承上云據汝所言有眼無眼雖異而所見黑暗是同則有眼人處於暗室唯見全黑亦不成見若以汝論之無眼人全見前黑時必不成見忽得眼光還於前塵見種種色定名眼見者則彼暗中有眼之人全見前黑時亦不成見忽獲燈光亦於前塵見種種色應名燈見何以故無燈時與無眼者無異故若燈見者燈能有見即屬有情自不名燈又則燈觀何關汝眼事也是故當知汝所謂能見者妄見也夫妄見要假根塵相緣而後成見離前根塵則無見性汝執眼能見者不出此也若據汝所執而燈但能顯色指能見者是眼非燈也我所謂能見非妄見也離前根塵自有體性故説無眼亦能見若依我所説而眼但能顯色指能見之性是心非眼也故在眼根則以日月燈為助緣在見性亦以浮根為增上緣若汝知此見性非道眼而何若了見性即真心非妙明而何世尊雖以見性是心指示真心而顯真心未離眼中之見性阿難縱能信而未能悟蓋一向但知能見是眼根今謂能見非眼根但知有眼方名見今謂盲者亦名見但知見明見色為見今謂見暗亦為見且世尊前言見相思惟非我真心今謂眼中見性即是真心是故口已默然心未開悟合掌清心佇佛悲誨夫見性是心者謂統體一真心不妨在眼名見性在耳名聞性以至六根中隨處立名而抑非一非六且一不必合六不必分猶云揑不成團撥不開也兩處如是二字皆指定之詞謂阿難指眼能見世尊指性能見雖復下皆經家所敘之文爾時世尊舒兜羅綿至因何開悟今成聖果鹿園者古國王養鹿之地五比丘者佛初為太子出家時父王命隨侍者父族三人一阿此云馬勝二跋提此云小賢三拘利華言未詳或云即摩訶男似是長子之稱母族二人一阿若多此云解本際亦曰憍陳那又曰陳如即其姓也此云火器亦事火之族也二迦葉此云飲光共五比丘而阿若多為最先發解者也菩提大乘極果也羅漢小乘權果也皆指佛初轉法輪時言所指客塵者單取昔所説之喻不必拘溺昔所喻之法也若必以昔日所轉之四諦法配合此經中義者乃刻舟求劍之流也冠注此更垂方便令先悟者導之也阿難前陳二障所纏請示心眼世尊即放心光全體托出以至向眼根中指出見性謂之真心阿難尚默然未悟世尊只得將機就機令彼即向二陳處究竟真心故舒兜羅綿網相光手開五輪指誨敕阿難云云時憍陳那起立白佛至名為塵義佛言如是冠注此陳那自陳最初悟境以答世尊也如來初成道時為陳那等五比丘初轉四諦法輪開示客塵煩惱而陳那先解斯一段語唯取客塵二義客喻見惑塵喻思惑亦應阿難所説之二障若詳細喻明當謂見惑粗重數數造業流轉諸趣曾未停息故以行客投寄旅亭等喻如諸有衆生遷滅流轉也以自無所往主人喻如縱破見惑壓伏妄想者即將意識為主人公然未免認住與不住為兩個也思惑幽深微細雖暫息妄想若內守幽間者而但見其光影故以新霽清暘升天喻如廣大智以隙中之光發明空中諸有塵相顯曠野處不見塵相喻如粗心散亂時不能見此思惑苟能暫息塵勞而智光稍有一線之明始於身中照見微細思惑也塵質搖動虗空寂然喻如思惑未破無明未盡者未證廣大真空不了生即無生也然若論唯與下文張本不過辨定客塵二字以明動靜也佛言如是者但印其所説於昔時無異也即時如來於大衆中至誰為無住佛言如是冠注此以所見辨動靜也因上陳那答出客塵主空以顯動靜分明矣世尊要使阿難即客塵悟主空故以手開合辨問之曰汝今何見阿難具實而答我見如來百寶輪掌在大衆中一開一合世尊即究之曰汝見我手衆中開合為是我之手有開合為是汝之見有開合阿難唯答我見寶手衆中自開自合非我見性有開有合世尊見阿難似悟非悟極力提掇曰汝看動者誰乎而靜者又誰乎如此等語要令阿難當下直取了客處即主塵處即空即動即靜即妄即真奈阿難唯言佛手不住而我見性尚不見有靜誰為無住斯是阿難以動為境矣世尊明知此見性二字自佛口角邊認來動靜二字從陳那腳跟下轉出雖未透徹較前認浮根為能見以暗相為不見又覺清楚幾倍矣故將錯就錯聊暫印可再作方便耳然佛言如是者唯許見性尚無有靜誰為無住二句將近乎理故聊自印可意謂見性從來無動今何説靜而靜尚不可説豈有動乎此中要看誰動誰靜一語阿難明言手有開合見無開合佛豈不知而復問何者是動何者是靜耶請著眼看百寶者貴重之稱輪掌者佛之手足中心各有千輻輪相故云如來於是從輪掌中至誰為搖動佛言如是冠注此從疏至親引向一身中辨動靜也上因對境而分動靜雖云謬誤恐有內外之辨故如來於是從輪掌中飛一寶光於阿難左右令阿難左右顧盻而問之曰汝頭今日因何搖動阿難唯答我見如來出妙寶光來我左右故左右觀頭自搖動阿難説個頭自搖動則謬之甚矣若頭能自動與眼能自見有何差別且死人亦有頭在可能動否世尊婆心太切恐彼驚愕放寬一步但究之曰汝盻佛光左右頭動為汝頭動為復見動阿難仍舊答曰我頭自動而我見性尚無有止誰為搖動阿難又以動為身矣上文境動見靜而在迷者猶可遮辨此在一身中認頭自動而見不動是一身中有個動的又有個不動的此乃凡小口吻耳世尊依舊將就放過聊且印可令彼安隱一二再作方便耳要知世尊命陳那答客塵二字要令識取客塵即主空孰知到此但如客塵與主空有動靜之不同耳若知非風幡之動乃仁者心動則近之矣於是如來普告大衆至輪回是中自取流轉冠注此領陳那之語寄大衆之名以實責阿難乃大權方便也意謂陳那已悟塵處是空離客無主決不離動取靜矣若復有衆生以搖動者名之為塵宜知塵即是空以不住者名之為客當知客不離主汝觀阿難但言頭自搖動見無所動豈知頭自搖動即見無所動乎又汝觀我手自開合見無舒卷豈知手自開合即見無舒卷乎若了頭自搖動即見無所動云何汝今但以動為身耶若了手自開合即見無舒卷云何汝今但以動為境耶由汝分頭分見辨境辨心認動認靜故從始至終用此念念分別之心生滅不停反遺失其不生不滅之寂常真性非顛倒行事而何蓋由性心失真認物為己所以輪回於顛倒之中無停息之時然此輪回非從天降亦非人與乃自取流轉耳凡失念念生滅認物為己二乘迷己為物遺失真性斯中兼有之也雖然此事若悟後的人頭頭法法拈來即是未悟者實難開口使阿難認定頭動即是心復為前塵影事若離頭動覔見性又是波外求水除是向世尊問手有開合見有開合處別行一路不上他鈎餌始得解脫去也然非己分中流出則又不可也
