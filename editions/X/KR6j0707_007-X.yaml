body:
  text: 明柴紫釋乘旹講錄新安受法弟子汪益源校梓阿難汝問攝心至一切魔事云何發生冠註此結答問辭也妙門即上四律也以四律為本自能生定發慧而餘末戒自然成就故根本清淨則枝葉不生緣塵不偶則魔事潛消正定入矣故曰妙門心三者謂貪嗔痴口四者謂妄言綺語兩舌惡口斷此則三因不生對前大妄語見此口四為枝末不遺失者謂念念不忘戒本則自無秋毫相犯矣一切魔事依塵而立托塵而入心於六塵絕無貪愛則戒根清淨而魔事遠離現業不交定慧自發也若有宿習不能滅除至揚於順風有何艱險冠註此勅持呪以銷宿業也上之三學能破煩惱障此下神呪能銷業障報障也宿習謂過去惑業種子也舊說現業易制自行可違宿習難除必假神力今夫行人好正而固邪欲潔而偏染隱然若有驅䇿而不能已者皆宿習之使也且有病魔侵擾俗姓牽纏凡值善緣諸魔兢起無非宿世惑業與道為冤初學之人行力微弱不能排遣必假神呪方得銷除也摩訶薩怛多般怛囉此云大白傘盖體徧十虗用廓沙界曰大絕諸妄染曰白覆庇一切曰傘盖謂此秘密章句全從如來藏中流出故威力無量能除宿業也無見頂相者華嚴九地知識為佛乳母初生親捧持諦觀不見頂示頂法不可以見見也光中所化故曰無為心佛至理無言故曰從頂發揮坐寶蓮華所說心呪顯此心呪因果齊彰也舉登伽者以見宿習甚深也愛心永脫者指初聞呪得三果也成四果者指前文殊簡圓通後也良由先承呪力銷除宿習後藉法音悟明聖果使非呪力除此宿習安能契於法故仍歸功於呪也比丘非同于婬女求最上乘非同于無心修行以見凡修行者若加呪力決定成佛也宿習如塵呪力如風誦呪除習猶若順風揚塵有何艱險哉若有末世欲坐道場至摩頂安慰令其開悟冠註此明欲坐道場必先擇師也清淨禁戒指前四根本大戒也師者學人之模範若模範回邪而能成正器者鮮矣故欲修淨戒當擇戒師梵網經云千里內無授戒師當於佛前自誓受戒先懺七逆後求戒法皆見相好方知滅罪得戒不爾不得戒也戒成已後著清淨衣者內外一如表裡俱潔也誦呪百八者銷百八煩惱也內戒既成亦能生定但恐宿障未除不能發慧故須求現在諸佛放光灌頂助成大慧白衣兼近侍男近侍女雖四眾同壇而僧俗男女各從其類必不混同也四戒清淨方發菩薩願者以戒為願力之根基也出入澡浴者外潔其身也六時行道如是不𥧌者排遣昏散內攝其心也佛自現身摩頂安慰者淨行所感如水澄月現也令其開悟者仗佛威力助發大慧也阿難白佛言世尊至合佛世尊清淨軌則冠註此請結壇軌則也無上悲誨即上四種清淨明誨也自知修證無學道成者謂既得自悟圓通復藉呪力冥扶故知必證聖果矣建立道場即牒前安立道場意謂若欲安立道場云何結界方合世尊清淨軌則也佛告阿難若末世人至純燒沉水無令見火冠註此示以壇場清淨軌則也雲山大力白牛非是常牛此牛雖獨出雪山亦不恒有盖瑞物也且彼唯食雪山香草唯飲雪山清水故其糞微細可以和香塗地也若非雪山牛其牛臭穢況所出之糞乎故不堪塗地也高平曰原穿去地皮五尺者取其未遭踐踏潔淨故也黃者取正中之色也以十種香細羅為粉合上成泥以塗場地取其清淨香潔也方圓丈六為八角壇舊謂壇乃除地之墠似是若壘土為之經當明言層級今並無之疑是平地塗為八角也壇中置一蓮華者即第一種莊嚴也鉢即應量器鉢中盛八月露水水中安華葉者助成蓮華之香潔也八方安鏡圍繞華鉢者取其圓光相映也鏡外蓮華香爐各十六而間設者取其重重莊嚴欲令天人等眾深如敬禮而尊信勝事也燒沉水香無令見火即焚香常法也此之壇儀次第無乃順世敷陣有為法事其尊嚴整肅不過令人一瞻仰間收攝身心經行進道而已古今多用表法似不必強援分配也取白牛乳置十六器至燒令烟盡享佛菩薩冠註此示以享獻清淨軌則也前以白牛之茹退塗地此以白牛之醇乳供佛足見其為異物也乳及砂糖等言以乳酪醍醐和合眾味而成上供也於蓮華外亦各十六圍繞者對像設供也每以食時若在中夜者合日中受食之法軌也取蜜半升用酥三合乃至燒令烟盡享佛菩薩者取其清香熱𦦨能除一切不淨氣味故也令其四外徧縣幡華至使其形影重重相涉冠註此示以設像清淨軌則也令其四外徧懸旛華者使壇外嚴飾也舊說當陽盧舍那寂場教主也釋迦娑婆教主也彌勒當來教主也阿閦彌陀略舉四方教主也諸大變化觀音形像圓通教主也金剛藏常領金剛護持呪人伏魔斷障教主也門側左右釋梵等眾有力外護也末法修行全賴於此一有闕焉必不成就烏芻火頭金剛藍地迦青面金剛軍茶利金剛異號也毗俱胝三目持鬟髻是也頻那夜迦即猪頭象鼻二使者空中鏡與壇中鏡方面相對使其形影重重相涉者要令行道者處處唯見佛光而引發自己心光於法法頭頭圓通彰顯故也於初七中至誠頂禮至身心明淨猶如瑠璃冠註此示以禮誦清淨軌則也舊說凡所蘄向以歸依三寶為最初方便故初七日至誠頂禮諸佛菩薩羅漢名號所以假其不思議力發行助道也二七日專心發願者不出四種洪願或如梵網經中十種大願也三七中則時無間歇呪無徧限工夫純一特能以精誠感格進力克功也至第七日於鏡光交處承佛摩頂則是心水既澄佛光映現因心果智感應道交故即於道場而修正定能令行人得大開悟身心明淨猶如瑠璃內外明徹根境無礙此即因定發慧故知顯修密持所得圓通等無差別阿難若此比丘本受戒師至汝問道場建立如是冠註此明道場成就雖仗佛聖加被而師友不淨欲成亦難矣不成就者謂不能尅期取證也從三七下明證果也利根者舊說謂惑障俱輕慧性明悟者也陀洹按位即圓初信若依涅槃及是初入別圓地住也至此則信得自心是佛到不疑惑地必不向外馳求矣汝問下結答語也阿難頂禮佛足而白佛言至佇聞如來秘密章句冠註此重請說呪也未證無為等謂初果力弱被魔所攝也前雖仗文殊密持以解危尚未親聞今復請世尊宣說者意欲流通末世耳力不自由者以未全道力故不得自由前密承呪力得脫淫難故曰冥獲未聞也身解脫者謂銷業離苦也意解脫者謂破惑證真也呪力勝深如此故佇聞如來秘密章句也爾時世尊從肉髻中至放光如來宣說神呪冠註此重說神呪也世尊說呪先為驅除邪術令入正道也且世間呪詛不過幻術而已世尊順世應機以幻除幻故從如來藏中以無作妙用現種種變化之相警䇿群機然後宣呪也百寶光者如百寶所成之色顯從根本智中流出而含攝萬相也光中涌出蓮華者顯從智體發起因行也有化如來坐寶華中者顯果從因證因果一如也化佛頂放寶光光中復現密迹徧虗空界者顯此幻中之幻乃尊中之尊大中之大密中之密妙中之妙所以智體不動神用莫測無善不輔無惡不摧也畏愛兼抱者謂畏其威而愛其慈故兩難捨離也一心聽佛宣說神呪者謂眾生兼懷威慈而承順如來唯從神化以宣流也南無薩怛他蘇伽多耶至虎𤙖都嚧甕泮莎婆訶冠註舊說呪者祝願也世尊以此呪呪眾生令其革凡成聖而不自知如蜾之祝螟蛉曰類我類我久則肖之矣亦云諸經神呪例皆不翻自古人師多有異說天台會之不出四悉檀一云呪者鬼神王名稱其主名部落敬主不敢為非此世界悉檀也二云呪者如軍中密號唱號相應無所訶問不相應者即執治之此為人悉檀也三云呪者密默遮惡餘無識者如微賤人奔逃異國訛稱王子國以公主妻之而多瞋難事有一明人從其國來主往訴之其人語曰若當瞋時應說云無親游他國欺誑一切人麤食是常食何勞復作嗔說是偈時默然瞋歇即對治悉壇也四云呪者諸佛密語唯聖乃知如西域國王索先陀婆一名而具四物謂鹽水馬器群下莫辨唯智臣按時而解之呪亦如是秪一法語徧含多義亦有大力令持誦者生善合道即第一義悉壇故存本音於五不翻中即秘密不翻也於四例中即翻字不翻音也亦云秘呪非但只是梵語仍是一切聖賢秘密之言盖梵語此方不曉而天竺之人日用共所曉解者也至於秘呪非但天竺常人不知理應下位聖賢不達上位之呪大都聖賢弘化例有顯密二教如醫療病率有二途一者授方則顯說病源藥性及炮治之法如佛顯教二者授藥則都不顯說但惟與藥令服者病愈而已不必求知何藥何治如佛密教故今秘呪正同授藥不必求解若解生則呪喪矣眾生但當信持之自蒙諸益也冠註舊說唵字以前皆歸命諸佛菩薩眾賢聖等及敘呪願加被離諸惡冤諸難等至跢姪他此云即說呪曰唵字以下方是正呪前云行道誦呪一百八遍者當誦此呪也然本經前後稱讚功德皆指呪心而所誦者應是呪心決非此數句也阿難是佛頂光聚至遠諸魔事無有是處冠註此明呪心之功能也凡言呪心或言心呪者謂此大白傘盖唯從如來藏心流出所以廣大無染徧覆一切亦乃秘密藏中之精要如人身四肢百骸之統乎一心也微妙者謂隱微奧妙不可思議也出生諸佛者謂此呪心能含育妙德長養聖胎即是佛母真三昧也因此呪心得成正覺者謂此呪心乃出生如來之真種子故諸佛必因之而得正果也執此呪心降魔制外者謂此呪心如金剛王寶劍執此則威神勇猛而能斷一切邪惑也乘此呪心應微塵國者謂此呪心是大慈航能運載眾生出離生死河而登涅槃岸也含此呪心轉大法輪者謂此呪心能包含萬德蘊藏辯才故左右應物莫不有也持此呪心蒙佛授記者謂此呪心總一切法持無量義乃佛佛之心印祖祖之秘訣也依此呪心濟群苦者謂此呪心如尊勝幢能離諸畏難所以地獄依此而空餓鬼依此而飽畜生依此而脫盲聾依此而明聦瘖瘂依此而語言怨憎依此而歡會別離依此而諧和依此而財德具足故無求不得苦依此而我法皆空故無五陰熾盛苦依此而一切承順故無諸橫也其餘賊難以至貧窮莫不依此而應念銷散故依此呪心則無難不解也隨此呪心為法王子者謂此呪心乃隨順覺性從心滿願若如意珠無適不可也行此呪心不生驚怖者謂此呪心通達無礙乃從凡入聖之通衢故凡所攝受雖性有親因根有大小而一聞此呪則驚疑怖畏永不能生如阿難登伽皆是親因小根聞此秘藏不惟不生驚怖抑且永斷愛心立登聖位也誦此呪心入大涅槃者謂此呪心乃究竟圓滿三德秘藏故誦習不輙即圓成極果也傳此呪心悉得清淨者謂此呪心乃諸佛授受相續不滅故以此為正法眼藏以此為究竟覺地以此而令法久住以此而任持大道以此而嚴淨戒律悉得清淨也經恒沙劫說不能盡者如華嚴一字法門海墨書而不盡也亦說此呪名如來頂者謂此呪心是諸佛所傳無上頂法汝等三果已前未盡分段生死者發心欲成真阿羅漢若不持此呪而坐道場豈能遠離魔事哉阿難若諸世界隨所國土至一切諸毒所不能害冠註此明書呪佩帶功德也樺皮貝葉各隨國土所產皆可書之物也白氎天竺之物紙類也有價直無量者此土無之貯囊帶身書於宅中一切諸毒所不能害者顯此呪心功德不可思議也阿難我今為汝更說此呪至成就眾生出世間智冠註此總標二義以明呪心不思議妙用也謂此呪心在世能護生出世能助道所謂救世悉安寧出世獲常住也若我滅後末世眾生至皆領深恩常加守護冠註此正明救護世間得大無畏也誦持眾生火不能燒水不能溺大毒小毒所不能害者謂得此呪心則境空心寂智起惑滅逢諸惡境應念感化故不能害也世間惡呪皆不能著者謂正能摧邪如文殊密持即能破登伽邪呪是也心得正受者謂因呪力而得三昧也既成正受則一切不受故雖有羣邪如火燒空毫無虧損然以三昧力銷除群毒如靈丹一粒鐵石成金故曰入此人口成甘露味一切毒物不能起惡者謂因此呪心而證慈心三昧故一切磣毒皆被慈風扇化不獨不能侵害更加守護不獨不為災禍反降禎祥也阿難當知是呪常有至周徧了知得無疑惑冠註此正明成就眾生出世間智也金剛隨侍者謂此呪心是諸佛所傳無上頂法而金剛菩薩乘願護法故晝夜隨侍也以散亂心持呪亦常隨從者謂此行人雖未決定住三摩地而但常持呪故亦隨從既曰心憶口持而稱善男子定非放逸穢惡者決定菩提心者言是常住三摩地中而又持呪希求速得圓滿菩提者故此菩薩不惟常隨守護更於冥冥中以神力加助令彼速發神識而得開悟至於河沙劫外一切妙理皆能周徧了知而入無疑惑也從第一劫乃至後身至貧窮下賤不可樂處冠註此明持呪心永離惡趣不生下賤也第一劫指初發菩提心時後身指最後成佛時以見修行永離妨患也對本曰讀背念曰誦圖印曰寫密佩曰藏貧則困苦賤則役苦皆妨道業者離不可樂處定生可樂處也此呪心是最上乘白淨法由持勝淨法故感勝淨報也此諸眾生縱其自身至不持齋戒自成齋戒冠註此明持呪現獲功德也如來功德悉與此人者謂此呪心是諸佛秘藏凡功德法財具足其中專持久之自然發現諸佛同生一處者謂此呪心元從無為心佛中流出持之既久則即心即佛所謂朝朝同佛起夜夜抱佛眠如惡叉聚永無分散者謂持此呪心則三無漏業所熏成佛種子永無散失也破戒之人戒根清淨者謂能轉染成淨故未戒得戒者謂能成戒根未進得進者謂能從戒生定無慧得慧者謂能自定發慧不清淨得清淨不齋戒成齋戒者謂人有宿障屢欲清淨齋戒而不得持此呪心則宿障自銷決定成就也阿難是善男子持此呪時至悉皆滅除更無毫髮冠註此明持呪能滅現在染業也犯戒于未受時者指未受戒持呪時也持呪謂心憶此呪如手持物不可放捨也一時銷滅者謂犯罪于未持呪之先銷罪于既持呪之後也縱經飲酒噉辛不將為過者亦指未持呪前經過之事既持呪後悉皆銷釋非持呪之後縱恣無度也猶云曾經有此事于今無之自當寬宥也著破弊衣與著新淨衣等不入壇與入壇等者謂一心持呪凡所皆忘則是身皆為清淨法身地皆為寂滅場地何淨穢之有哉舊說比丘四棄即殺盜淫妄四根本罪梵語波羅夷此云棄謂犯此四者永棄佛法海外猶若死屍大海不受故比丘尼復加四棄曰觸八覆隨即第五不得與染心男相觸第六不得與染心男捉手捉衣入屏處屏處共立共語共行身相倚相期等八事第七不得覆他重罪第八不得隨舉大僧共給衣食即為僧所舉未作共住法者不得隨彼通上四棄故名八棄僧所舉者即舉訐之義意謂曾經有如此重罪若能悔過誦此呪罪業如聚沙呪力如猛風一掃無餘有何難哉阿難若有眾生至不久皆得悟無生忍冠註此明持呪能滅過去染業也無量劫來未及懺悔者顯宿障深厚也若能讀誦書寫乃至安住園舘如是積業猶湯銷雪者顯此神呪妙用不可思議所謂千年暗室一燈能破也不久皆得悟無生忍者謂豈獨能銷過去染業兼且能證現前聖果也證此則罪福性空聖凡平等離諸苦厄得無障礙矣復次阿難若有女人至邊地下賤何況雜形冠註此明所求皆遂也至心憶念者謂心無夾雜工無間歇也便生福德智慧男女者顯此呪心具福德二根故生時所求如願也命終之後亦得隨願往生者顯此呪心若如意寶珠隨意滿足無所禁匱也不生下賤何況雜形者顯此呪心是貴重無比之法故隨因感果在處居尊也阿難若諸國土州縣聚落至五穀豐殷兆庶安樂冠註此明國土康寧歲豐民樂也飢荒疫癘刀兵者三灾也賊難一切者謂餘殃害皆在其中矣支提此云可供養處即淨剎之通稱也脫闍此云幢奉迎斯呪禮拜恭敬一心供養者謂必至誠至敬心一無二始獲其騐也佩身安宅灾厄悉滅者謂以正摧邪如湯銷氷也在處有呪天龍歡喜以至兆庶安樂者顯此呪心具四無量心故天龍八部一聞此呪皆生歡喜而令雨暘時若庶民樂業也然眾等一心久而敬之方獲靈騐舊說若呪雖徧有束之高閣曾未敬禮或更置于猥褻之處塵穢不堪而責呪無騐者亦惑之甚也亦復能鎮一切惡星至諸惡灾祥永不能入冠註此明轉凶為吉也變怪災障等皆宿生妄業所感此呪心能消宿障故不起也人無橫夭杻械枷鎻不著其身者謂此呪心順真常性中流出亦能解黏去縛故也常無惡夢者良由晝不見惡境故夢中所現皆善境界也舊說惡星有八萬四千者皆由眾生八萬四千煩惱所感二十八者四方各七即二十八宿也八大惡星即五行之經及羅計孛也順則福應逆則灾應書云惠廸言從逆㐫是也能生灾異者亦應其逆而已如彗孛飛流應同分妄見非星之為也有此呪地永不能入者以呪力叶乎百順故惡變悉滅于天灾祥不入其境也灾祥者吉㐫之先兆也是故如來宣示此呪至十方如來便為妄語冠註此結勸誦持也保護入定遠離魔冤者顯此呪心能滅過去冤債也汝及未來不生疑悔者謂現未修行者能依我壇規守我戒律所師不穢于法不疑于此四者一無所犯則現生取證必無疑矣身證心通者舊說據前所謂不出三義一者證果即端坐百日有利根者不起于座得須陀洹也二者發解謂縱身心聖果未成決定自知成佛不謬也三者宿命是人應時心能記憶八萬四千恒河沙劫周徧了知得無疑惑矣若果依教奉行不得此益則十方如來便為妄語足見所說真實必不賺悞也說是語已會中無量至得成菩提永無魔事冠註此明眾神護呪也金剛力士眾也現其執金剛身不同後之菩薩也修菩提者以修耳根圓通持呪心為上後皆倣此爾時下諸天眾也審猶果也一生如願者謂令現在身證心通若謂事事如願亦可也復有無量藥叉下八部眾也誓願常護令修行者速成大果也復有無量日月下天神眾也師伯亦主宰統尊之稱年歲巡官即四直功曹之類復有無量山神下川神地祗眾也山海神川嶽主也土地地祗類也水陸空行舉三居以該多眾也萬物精祗如主樹木苗稼等神以上皆有形之類下該無形風神王即主風神也無色界天無業果色皆無形類同時稽首者或仗佛威光暫能現身也保護行人永無魔事者謂持此呪者以受正法凡諸百靈自當守護令其不畏魔冤得成正覺也爾時八萬四千那由他至恒令此人所作如願冠註此明菩薩護呪也欲至如來究竟覺地須假金剛觀智斷除塵沙無明方盡妙覺然末世修行邪外熾盛縱有金剛觀智亦能持呪若無菩薩冥熏加被亦不能入楞嚴大定成正修行故金剛藏王菩薩常隨此呪救護末世修行者此亦菩薩帶果行因以酬護生本願故也定心散心常隨侍衛者正是菩薩深慈大悲而持呪修行者亦當自護淨戒如惜明珠庶無仰愧于菩薩可也大自在天即色界魔天也求其方便終不可得者謂縱近其傍無鏬隙可入也除彼發心樂修禪者謂諸小鬼神心慕禪定呪力亦能衛護行人故得於如來前親近修定持呪者以寶杵碎首者此大權菩薩以慈心護法正令摧邪若涅槃殺闡提仙預誅淨行皆由住無緣慈得一子地乃能如是也恒令此人所作如願者謂無願不從也已上修道分有正有助若自耳根證入圓通為正修若結壇持呪為助修或兼不兼隨根利鈍耳修道分竟下明證道分雖圓修圓證亦有位次若位次不明則淺深失準未免妄竊佛果虗標聖位故須問明使無紊亂也阿難即從座起頂禮佛足至佇佛慈音瞪瞢瞻仰四十四心者謂十信十住十行十迴向及煖頂忍世四加行漸次即三漸次也修行名目始自乾慧地終至四加行也地即十地也阿難此請有二義一者既知行門必有位次如得門入室須知堂奧淺深也二者初聞佛說心言直故如是乃至始終地位中間永無諸委曲相到此解行圓融則心言直矣地位無曲其相云何故遂請之冠註此請證果位次也欲問位次先謝教誨曰我等愚鈍實難明理亦難斷惑況好多聞強記故于諸漏種習未求出離今蒙世尊深慈教誨得悟耳根為正熏修持呪為助道因則知修證無惑故得身心快然饒益矣然雖得正助二門堪為修證望佛菩提及大涅槃尚在遙遠于其中間所有艱險所經階級又不可不知我等縱能如是而修佛楞嚴大定而證佛無餘涅槃未到涅槃以前作何功行名為乾慧地又以何功行名為四十四心若自原始要終而論發覺初心至何漸次而後方得乾慧地及與四十四心之修行名目既歷四十四心又至何所名入地中既入地中更做何等工夫得名為等覺菩薩也爾時世尊讚阿難言至合掌刳心默然受教冠註此讚嘆許說也世尊讚美阿難不惟為一身一世乃能普為現前大眾及末世諸眾生凡修楞嚴大定求大乘法者始自凡夫三漸次終至妙覺而中間經歷五十五位然後得歸涅槃逐一問明欲我預為懸遠指示無上了義正修行路而使現前當來諸修行者從始至終直超妙覺果海更無委曲諸相其問不亦善乎刳者刮剔也謂虗浮其心絕無疑滯及與辯難惟默然承受而已懸者遠也先也非謂途遠特世遠也佛言阿難當知妙性圓明至斯則如來真三摩地菩提即正智涅槃即真理此下十二類生總明生滅名妄一句意亦廣明前三種相續此以眾生顛倒攝前業果也冠註此明真如妙性元離世出世之名相也妙性者真如實體也圓明者徧照妙用也名相者五十七位菩提路也意謂汝問從何漸次乃至等覺者總屬名相而妙性圓明中元無此名相雖有菩提涅槃之名特對世界眾生而立耳且實際理中本來無有世界眾生何復有此菩提涅槃耶盖以真性妙明能為染淨依故由初念不覺依真起妄而成無明遂有世界眾生忽然生起既有生即有滅所以有生滅故而稱之為妄則有二種顛倒乃至十二類生此依染緣而立眾生世界之名相也既然成妄復立真以遣妄所以由妄滅故而稱之為真則有三漸次乃至五十五位菩提路此依淨緣而立菩提涅槃之名相也是則稱如來為得無上正智而證大涅槃者特轉煩惱依菩提故滅世界顛倒轉生死依涅槃故滅眾生顛倒但轉用不轉體轉名相不轉真性以生死涅槃皆如來藏中之影像故也下直示曰汝今欲修五十五位真正禪定直至如來無餘涅槃須當識此二顛倒因亦知菩提涅槃即在二顛倒中求以此顛倒不生即為二轉依號斯則如來真三摩地所謂狂性自歇歇即菩提也阿難云何名為眾生顛倒至由是故有眾生顛倒將欲復真等暗指阿難所問五十七位菩提路意謂一念未起前將誰立真真且尚無而況妄者乎舉生住略異滅舉心法略身受乃互相影略耳冠註此明眾生顛倒也云何下徵問詞由性明心性明圓故者性即真體心即妙用明圓即具足義良由真體妙用中本來具足生滅與不生滅性故若以淨業熏則漸成真種以染業熏則漸成妄種其妄惟何因一念能明便成無明依無明而成業識故曰因明發性由業識而生見相二性故曰性妄見生既有見相二分則根身器界頓然俱現故曰從畢竟無相之真而成究竟有相之妄遂以眾生為能有世界為所有然就眾生推之曾無能有之因就世界推之亦無所有之因雖眾生為能住元無能住之相世界為所住亦無所住之相以此推究了無根本然妄雖無本依真而立故曰本此無能無所之中而妄自建立其所住世界及能住眾生者止因最初一念妄動迷己本性圓明之真體而便生虗妄此虗妄性元非實體亦無依止之處既無體無依真妄兩忘更將誰復即此欲真一念已非初念未起之真正真如性矣況于非真性上更生求復之心耶此于無可欲慮而強欲之于無可復處而強復之故圓明本體愈復愈遠反使真性乖違宛成虗妄之非相矣夫非相者不出生住異滅身受心法而已然此亦以非生計生非住計住執非心為心執非法為法其生住異滅乃微細遷流屬第七識身受心法乃我法二執屬前六識由此妄識展轉發生遂有因果相續不斷然究其本根不過由染淨種子發生力勝故能發明各各現行種現熏持則成業苦既有業苦則有感招既有感招則相生相滅輪迴不息由是非相執相故有眾生稱為顛倒也阿難云何名為世界顛倒至變化眾生成十二類冠註此明世界顛倒也云何下徵問詞上文雖明眾生亦兼世界此下雖明世界亦兼眾生足見根身器界俱從妄念生起本不相離也此處當領上總標文來方接貫但譯者略其文耳猶云世界顛倒者亦由性明心性明圓故因明發性性妄見生從畢竟無成究竟有如是則既有能有之眾生亦有所有之世界是故上下四方分段妄生此界之名所由立也然就眾生推之元無能有之因就世界推之亦無所有之因且無能住之相亦無所住之相而所謂能所者總一虗妄耳是故以妄承妄念念遷流不能常住因此三世相續而成此世之名所由立也由此三世四方和合相涉宛轉十二世界既成十二則諸眾生織妄相成明理不越根塵判隔亦成十二故隨依正應數變化而成十二類生也分段即界限也是故世界因動有聲至若非有想若非無想冠註此總明身界交涉織妄相成故有十二類生也意謂既有身界相涉則于一念妄動時而內根外塵頓然俱現曾無前後但此方耳根偏利聲能通垣故以聲居六塵之首而曰因動有聲因有聲故必有色在因有色故必有香氣因有香故必可齅而成觸因有觸故必知其味因有味故必知其為何法既有六塵境風鼓動心海則六種根識紛然亂起亦如塵相隨動其一則餘五者一時俱起故隨所起之惑便成業性盖由一念妄動而成十二種區分類別從此輪轉無有停息是故世間六根六塵隨舉一法則十二法一時俱現而根塵窮十二變為一周旋往復以根塵造業既具十二乘此業力輪轉諸趣顛倒生相于世界中亦成十二類生所謂卵胎濕化乃至若非有想若非無想夫此眾生隨舉一類則十二類一時俱現亦窮十二變為一旋復後文自見此總明下分釋阿難由因世界虗妄輪迴至魚鳥龜蛇其類充塞冠註此明卵生因果之相也依殻而生曰卵生由因下明造因如是下明感果卵惟想生虗妄即想也想體輕舉由迷真妄動而輪迴生死顛倒真性故曰動顛倒卵以氣交名和合氣成想多升沉不定名飛沉亂想十二類生各言八萬四千者悉由八萬四千煩惱感變故羯邏藍此云凝滑入胎初位胎卵未分之相也魚鳥龜蛇皆隨飛沉亂想所感之果也由因世界雜染輪迴至人畜龍僊其類充塞冠註此明胎生因果之狀也含藏而出曰胎生由因下明造因如是下明感果後文倣此胎因情有由情塵雜染淨性而輪迴生死故曰雜染輪迴情生于愛故曰欲顛倒胎以貪愛交遘而成故曰和合滋成八萬四千應煩惱數也情愛亦有邪正不同如云正淫邪淫故曰橫竪亂想遏蒲曇此云皰即胎卵漸分之相也人天本竪龍畜本橫皆隨橫竪亂想所感之果也由因世界執著輪迴至含蠢蠕動其類充塞冠註此明濕生因果之相也假潤而生曰濕生濕以合感合則執著由執著不捨而輪迴生死故也合由愛心觸境趣附時勢顛倒真性濕藉陽生故曰和合煖成趨附無定故曰翻覆亂想蔽尸此云軟肉即濕生初相也既不入胎故無前二位矣含蠢蠕動皆隨翻覆亂想所感之果也由因世界變易輪迴至轉蛻飛行其類充塞舊說化生染處名和合觸成經云地獄及諸天一一皆化生轉托業化即宜收盡以天染處地獄聞腥故也但速疾無難而已是皆轉托業化非無而忽有意生妙化也冠註此明化生因果之相也無而忽有曰化生變易者變化改易謂易此形而化彼形故輪迴諸趣無有出期且假彼托此顛倒本性故曰假顛倒觸類而變名和合觸成厭故喜新名新故亂想羯南此云硬肉蛻即成質故無軟相自下皆稱羯南者諸類通稱止此若第五鉢羅奢佉云成形則各隨狀貌非通稱也轉蛻飛行者如𧏙蜋化蟬蛻行為飛如化蛤轉飛為行斯皆新故亂想所感之果也由因世界留礙輪迴至休咎精明其類充塞冠註此明有色因果之相也留礙輪迴者由彼固執不移而墮生死也障顛倒者由彼背自本明反事日月水火以求光明是則求明反障故名障顛倒和合著成者由彼精明顯著而與日月等和合以成色相也精耀亂想者謂彼亂想一切精明神物故也有色羯南者謂其想已結成精耀故但有色而已休咎精明者如日月星辰之類吉者為休㐫者為咎至于爝火蚌珠皆此類悉為精耀亂想所感之果也由因世界銷散輪迴至空散銷沉其類充塞舊說此之二類前類即無色界天不止外道亦兼凡夫聖人聖即鈍根那含惟無業果色而有定果色也更應別屬空散謂散心即空無色相也後類即主空神方純外道二色俱無更應別屬銷沉謂惡取空昧銷磨沉沒也冠註此明無色因果之相也銷散輪迴者謂彼厭有著無滅身絕智而墮生死也惑顛倒者迷有漏身起無為解和合暗成者彼既厭有歸無則與頑空和合而成暗昧矣陰隱亂想者彼欲銷形體附識陰隱無色羯南者即無色界外道之類但有想無色不成業體故也空散銷沉者謂彼身心散入頑空而深沉汩沒皆陰隱亂想所感之果也由因世界罔象輪迴至神鬼精靈其類充塞冠註此明有想因果之相也罔象輪迴者謂逐妄遺真蹈跡附影而墮生死也影顛倒者謂既失本真和著影像故名顛倒和合憶成者謂識無所託唯依憶想和合成功潛結亂想者謂志慕靈通而憶想于罔象中潛結不散有想羯南者謂但有想相而無實色也神鬼精靈者相不可見而幽隱靈通如天魔精恠等皆為潛結亂想所感之果也由因世界愚鈍輪迴至土木金石其類充塞冠註此明無想因果之相也愚鈍輪迴者謂不明理諦冥然株守而流落生死也癡顛倒者慧性不明反以無情為至理也和合頑成者謂灰己知見而與頑冥無識和合成功也枯槁亂想者謂凝心枯槁固守愚頑也無想羯南者謂隳滅想心但有形質也精神化為土木金石者如外道計無情有命金石堅牢沉思既久心隨境變附物成形如華表生精黃頭化石皆枯槁亂想所感之果也由因世界相待輪迴至以蝦為目其類充塞冠註此明非有色因果之相也相待輪迴者謂本非有色待物成色不能自用待物成用而互成流轉也偽顛倒者迷己天真假托浮偽故名顛倒和合染成者謂彼此異質均借染緣和合成功因依亂想者謂假托因依𮞏為形勢彼借此勢此假彼力資身養命更互巧借也非有色相等者謂業果相循不從自類受生故曰本非有色待物以成色也水母等以蝦為目者謂水母及有情身中八萬戶虫之類皆因依亂想所感之果也由因世界相引輪迴至呪詛厭生其類充塞舊說有引蝦蟆以聲附卵者有謂現見有呪樟柳木人令其說報吉㐫者有謂推論因果必是生生好為呪詛害物傷生因果相酬等流相似故受此生等者備錄於此智者辨之冠註此明非無色因果之相也相引輪迴者謂被邪法牽引而墮生死也性顛倒者謂彼不達自性虗靈反習邪業使性失正故名顛倒和合呪成者謂將己神識乘彼邪呪彼此和合而成功業呼召亂想者謂彼不循正理妄隨呼召即傳習符訣驅召鬼神者也非無色相無色等者謂本非無色循彼邪術而想成無色也呪詛厭生者即世間不正鬼神隨人驅使原從邪術呪詛精魅厭物因而有生者皆呼召亂想所感之果也由因世界合妄輪迴至異質相成其類充塞冠註此明非有想因果之相也合妄輪迴者謂兩妄相合同流生死也罔顛倒者謂背己天親罔昧至理故名顛倒和合異成者謂彼此異類和合相成也迴互亂想者各迷生理均相迴互也非有想相成想等者以異質故非有想相以相成故有想如彼蒲盧本為桑蟲非有蜂想而蜂相既成則有蜂想此皆迴互亂想所感之果也由因世界怨害輪迴至是名眾生十二種類舊說土梟破鏡按史記孝武本記云祠黃帝用一梟破鏡孟康云梟鳥名食母破鏡獸名食父黃帝欲絕其類使百祠皆用之破鏡如貙而虎眼今云鳥者恐譯人之誤或鳥字合是等字後人妄改耳是名下結成類數也冠註此明非無想因果之相也怨害輪迴者謂以冤害相酬而沉淪生死推其來由原為懷冤圖報俱生為害也殺顛倒者謂昧己深重恩愛反殺傷父母故為顛倒和合怪成者謂生理怪誕棄絕倫義是以怪因招感和合相成也食父母想者謂彼忘其至恩至愛而反惟作吞食之想也非無想相無想等者如梟附塊非無鳥想而土本無想也是名下結成類數也
