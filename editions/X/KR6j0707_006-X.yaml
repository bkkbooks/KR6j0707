body:
  text: 明柴紫釋乘旹講錄新安受法弟子汪益源校梓爾時觀世音菩薩至生滅既滅寂滅現前入流與出流反凡根性流逸奔境謂之出流反流全一謂之入流如般若云不入色聲香味觸法是也此亡所與所入二所字與滿慈立所之所字同彼因立所故頓成三種相續此由亡所故頓獲二種殊勝盖所即處所也心着於所即是迷境心離於所即是悟境故般若云應無所住而生其心然此亡所聞所覺所空所皆有病有藥由最初以藥治病雖則病除而藥復成病故更加藥以除之直至病根盡而藥性空一無所有而後已自入流亡所至了然不生如圓覺云應當遠離一切幻化虗妄境界如是漸增聞所聞盡如云心如幻化亦復遠離覺所覺空如云遠離為幻亦復遠離空覺極圓空所空滅如云離遠離幻亦復遠離是也此節文是廣明上從聞思修入三摩地二句意下文如幻聞熏聞修金剛三昧者乃重述此節文意也冠註此因耳根悟入圓通也若依次序應次眼根由前二十四聖所證圓通皆非阿難入道之因緣亦非此方逗機之教體唯茲一門因果圓徹機教適宜事理融通淺深悉俻故於最後別陳也觀世音者圓悟圓應之號也於世音聲不曰聞而曰觀者謂以智光照不用耳識聞也且初因耳根悟入而後以觀觀音足見六根元無隔礙用耳而觀亦不違理也然此經與法華釋名不同彼約果位釋唯顯利他之盛德此約因位釋多彰自利之深功抑且彼此互為隱顯而見名實之圓妙也所師之佛亦謂觀音者顯所證有所授而機教諧合因果不謬從來遠矣發菩提心者謂開發正知正覺上以求佛果下以化眾生若不發此心所修諸行盡為魔攝故欲修耳根圓通先須發此大道心也從聞思修入三摩地者謂從此方教體故也聞即聞慧自耳達心不隨聲塵起生滅一味返聞聞性而令餘根圓拔也思即思慧外脫五塵內亡三性諸念不生冥契智境也修即修慧銷磨虗偽習氣蕩滌名言種子尅妄循真也既得三慧圓明則身心悉入楞嚴大定矣然此三慧工夫必從粗至細三觀智理亦自淺入深謂此聞性本是湛圓妙覺良由動靜二塵黏湛發聽流逸奔境謂之出流今最初下手工夫先於聞根中旋轉聞聲之聞反聞自性謂之入流則與素所聞之聲塵不相交結而聲相自亡識心不生盖入流則根寂亡所則塵寂二者既寂不惟動相不生即靜相亦不生矣此雖聞根與外塵兩不相總而返聞之聞機與所聞之聞性猶然能所積習尚存故復加功行斷除我執則能聞所聞二俱滅盡斯則聞慧之功極矣所謂此根初解先得入空也然住此能所俱盡之境猶為智障故復加觀智覺破此障透過此境雖則如是若悋此覺觀不能放捨亦是能所尚墮法愛必更加雙空觀智空前智境盡除法執則思慧之功極矣所謂空性圓明成法解脫者也然能所縱空此空相未亡亦成空病故復極修圓行使能空之智併所空之空二俱泯滅斯修慧之功極而至無功用行所謂解脫法已俱空不生得證無生忍者也盖自入流亡所直至空所空滅中間所歷行位皆屬微細生滅既抵於此則二執永忘俱空並遣一切生滅亦俱除滅即此滅相寂然不見而入大寂滅海唯一如來藏性清淨本然周徧法界矣此即一根返源諸根清淨入三摩地圓滿菩提之標榜也忽然超越世出世間至與諸眾生同一悲仰冠註此總標二種殊勝以顯耳根圓通之果德也忽然即頃刻也超越即得真解脫也謂頓斷煩惱頓證真常則世出世間凡小諸法頃刻解脫三界內外無所纏縛分身法界圓照十方而得二種殊勝功德也本妙覺心體也慈力用也一者上合十方諸佛者謂此菩薩因圓果滿以始覺合乎本覺即與十方諸佛所證真體妙用皆相合也二者下合十方六道眾生者謂佛與眾生同一真體妙用而菩薩所證者即是佛生同具之全體大用故證真之時即能上下俱合而不遺也所謂心佛與眾生是三無差別然由能超越世間法故得上合諸佛同一慈力由能超越出世間法故得下合眾生同一悲仰也世尊由我供養觀音至而為說法令其解脫冠註曰修道入滅若諸眾生欲心明悟至而為說法令其成就冠註此現身天中應機說法也欲心欲身二欲字皆樂欲之欲也欲心明悟謂深達淫欲為招苦之本心若明悟身自清淨心悟不開身亦穢濁故樂不犯欲塵然此欲塵不獨指下界麤欲即他化之樂亦在其中矣梵王即色界天主乃初禪頂天說法者金光明經云大梵天王說出欲論解脫者令其捨欲塵而生梵天也帝釋即欲界第二天主彼天橫有三十二天而帝釋統之說法謂十善法也金光明經云釋提桓因說種種善論是也自在天是欲界頂天亦名他化自在天謂假他所作以成己樂或云第六天上別有魔王居處亦自在天攝游十方者六欲四洲之十方也大自在即色頂摩首羅天大論云三目八臂騎白牛執白拂而能飛行虗空以至他界者也天大將軍帝釋所管將也分住三十二天各領鬼神鎮護四方即八部之屬能於下界國土摧魔護生也四天王者上昇之元首下界之初天於須彌山各居一埵臣於帝釋分統四洲所領鬼神每王二部共八部神將救護國界者也四王太子即那叱之類按統紀四天王各有太千九十一人能跨握鬼物護世益人者也四天王次於帝釋天大將軍是四王所統者若諸眾生樂為人王至而為說法令其成就冠註此現身人中應機說法也舊說自金輪至粟散皆屬人王所攝粟散如國小王散於天下如粟之多大士為其現身說法令修五戒十善為主貴之因及尊重德業以熏隔生之種也長者具十德謂姓貴位高大富威猛智深年耆行淨禮俻上嘆下歸以德位俱隆故世間推讓也居士者不求仕宦不樂名聞愽聞多識以道自娛或談道論德為人模範或著書立言垂教後世者皆是也愛治國土者如立綱正紀化俗遺風之類剖斷邑者如興利除害政治清平折獄解紛吏民信愛之類三台輔相州牧縣長所司雖別俱號宰官也愛諸數術者如天文地理和合占相推步盈虗兼修梵行之類攝衛自居者如調護身心延齡益壽之類婆羅門此云淨行四姓之一也諸律者自十戒以至進具二百五十也諸戒者亦自五戒進具五百也優婆塞此云近侍男優婆夷云近侍女皆以五戒自守堪任近侍出家比丘及比丘尼者也內政即泛言一切婦道所謂有閨門之修而無境外之志也立身即勤儉閑靜也家通大夫以下國通諸候以上女主天子之后國夫人君之妻命婦謂妻因夫榮者大家如後漢扶風曹世叔妻同郡班彪之女名昭字惠姬和帝數召入宮皇后貴人以師事焉號曰大家不壞男根即有志終身不犯色欲者也處女亦名處子謂未嫁之女愛樂處身者願常為處女終身不嫁也不求侵暴者謂不願隨從堅貞自守縱有強施侵暴亦誓所不從也家音姑若有諸天樂出天倫至而為說法令其成就冠註此現諸趣身應機說法也上諸天愛樂欲入天界令其成就此諸天厭樂欲出天倫令其成就現龍身者謂龍倫雖具神通福德威權猶屬惡趣受諸苦惱欲求脫去為人以希修進故為說法令其成就下諸趣倣此藥叉此云輕捷有三種一在地二在虗空三在天趣攝也乾闥婆此云香陰亦云尋香行帝釋樂神也帝釋欲作樂燒沉水此神便尋香而往故阿修羅此云無端正以女美男醜從男彰名亦云非天以諂詐無天行故緊那羅形似人而頭有角因呼為疑神天帝絲竹樂神也小劣乾闥婆亦云歌神摩呼羅伽云地龍亦云大蟒因多嗔心毀戒故感此報樂人修人者謂現在人中而求捨身之後復得人身盖唯人道易聞法易修行非同諸天受樂餘趣沉苦故求世世不失人身而修進不懈也有形如休咎精明寺無形如空散銷沉等有想如神鬼精靈等無想如精神化為土木金石等皆非人也大士隨類現形說法令其成就者如龍樹化五百龍眾俱受具戒及迦毗尊者為大蟒受三歸聽訖現老人素服而去皆此類也是名妙淨三十二應至無作妙力自在成就冠註此總結名也謂隨類現身應機說法皆緣聚而現緣盡而沒無所從來亦無所去迹同心絕故曰妙淨聞熏聞修即上三慧圓明也依無作智現大神變普應群機如帝網尼珠映攝無礙不勞心慮不假身力故曰無作妙力緣對即現無不當可故曰自在成就世尊我復以此聞熏聞修至獲十四種無畏功德冠註此明第二殊勝下與眾生同一悲仰也盖由菩薩返聞自性遂得三慧圓通而達得法界身心同一體用故眾生悲仰之心攝在菩薩大悲心中菩薩大悲之心徧在眾生悲仰心中凡聖體同交相感應故曰令諸眾生於我身心獲十四種無畏功德盖眾生遭苦難者正在怖畏時而蒙救脫即無怖畏便獲功德也如世尊成道時徧觀大地眾生皆成道竟相似但謂菩薩達得諸佛眾生一體同圓曾無彼此之相故菩薩離怖畏獲功德時大地眾生莫不如是不必說加被也下文倣此一者由我不自觀音至經過險路賊不能劫冠註此令眾生於我身心獲八難無畏功德也菩薩根不隨境而聲塵自寂聞性無生境緣不偶即得解脫而成觀智達此觀智與諸眾生心體冥同故曰由我不自觀其音聲但以觀智而觀之則彼十方苦惱而觀我名號者皆得攝入觀智之中是以我之觀眾生與眾生之觀我體用如一苦樂不二聖凡平等情智融通故我得一根返源不隨六根所起妄業而令諸眾生便歸真寂解脫苦惱矣二者下顯諸根解脫總收七大盖知見雖則屬火本由外塵黏湛發光今復旋見歸湛則見業不交塵火自息火性空寂即如來藏周徧法界故令眾生火不能燒也聞性雖則屬水本由外塵黏湛發妄今復旋聽歸湛則聞業不交塵水自竭水性空寂本如來藏周徧法界故令眾生水不能溺也妄想即暗鬼也鬼神以陰隱為想因以殺害為墮緣故妄想生滅殺害法身慧命若妄想斷則內滅暗鬼外除殺業歸一如來藏心故令眾生免於鬼害也五者下顯耳根功勝収六根也熏聞成聞者謂當返聞時以本覺真聞內熏妄聞成真聞性則六根銷復皆同耳根所謂一返六淨也根境既銷則心鏡虗明智光不動誰分自他而臨當被害耶刀兵段壞塵性空也割水吹光根性寂也盖雖有其身如光可見而不可握水可劃而不可壞也所謂將頭臨白刃慧劍斬春風也聞熏精明者謂以真聞熏妄聞功行至極則歸精明本體內瑩發光徧照法界無明邪暗性不能全藥叉解見前羅剎云可畏鬼鳩槃茶云厭魅鬼毗舍遮云噉精氣鬼富單那云熱病鬼凡鬼類皆受幽氣以成者明能破暗故不能現之也七者下顯聲塵銷則諸塵俱銷收六塵也音性圓銷則內無所繫觀聽返入則外無所累由心塵累故有禁繫根塵質礙故有枷鎻若內無所累外無所偶則雖處縲絏而心境空寂也聲塵劫心害性猶若盜賊故滅音圓聞則聲塵滅而根性圓內外無敵善惡本同至於一切處徧生慈力而無復惡心相向故令眾生雖經險賊亦化為慈力矣九者熏聞離塵色所不劫至諸阿顛迦永離痴暗冠註此令眾生於我身心獲三毒無畏功德也九者下舉貪瞋痴而盡除根本無明也熏聞成真逈離於色亦能隨方映色若鏡現像而色豈能劫其真心乎根境既脫貪欲之念自何而生耶瞋恚生於敵對發於鬪拒既了純一圓音則或毀或譽無非妙音總歸第一義諦聲塵既純根無所偶則一切圓融無對所對而是非之心本寂違順之境自空何瞋恚之有哉痴由妄塵障蔽真心無明盖覆智體今能銷除塵暗旋復精明內而身心外而法界洞然明徹如淨瑠璃唯一智體誰為痴暗耶阿顛迦此云無善心乃痴鈍之極者也此貪嗔痴不惟凡夫所有二乘欣涅槃即貪也厭生死即瞋也迷中道即痴也菩薩廣求佛法即貪也訶斥二乘即瞋也未了佛性即痴也十二者融形復聞不動道場至眾人愛敬有相之女冠註此令眾生於我身心獲二求無畏功德也融形復聞者謂融銷幻身旋復妄聞唯歸淨妙寶覺而證一真無際則萬用全彰真俗不二故能不動道場涉諸法界以無量身事無數佛乃至供佛而得福足稟法而得慧足故能紹隆佛化使不斷續既有真子之道亦令眾生於我身心遂應其求而生福慧之男也六根互用圓通無礙唯一妙明真心寶明妙性故能照能含由照明無二故立大圓鏡智以表印現不謬由包含法界故立空如來藏以顯含育無遺唯含育故能承順秘密法門唯照現故能受領無失盖承順即坤義柔德受領即閨門能事既有女子之德亦令眾生於我身心遂應其求而生有相之女也十四者此三千大千世界至施無畏力福備眾生冠註此令眾生於我身心獲稱名無畏功德也三千大千百億日月指釋尊之化境也六十二恒沙菩薩指化境中能化度者也方便權智也智慧實智也言此菩薩雖具二智自利利他各各法門種種不同然我所證圓通本根唯一耳門開發圓妙克順機宜能循教體然後能以一切身心即一身心故曰微妙含容能以一身心即一切身心故曰周徧法界夫此圓根乃萬行之本三德之基得證於此則一切平等是故持我一名功德與持眾名功德等無有異世尊下出無異之所以得真圓通者謂耳根具三種真實獲此圓通即證平等法身是名下總結上文福備眾生者言非但令彼無畏兼復全其福德也舊說此方眾生耳根利故受道者多所以觀音化勝餘根鈍故受道者少所以諸聖化劣是知行位雖齊機對有異總彼河沙菩薩止敵觀音一人故使持名二福正等據此所說已自密簡圓通為未曉者更俟文殊詳揀也世尊我又獲是圓通修證至四不思議無作妙德冠註此總標四不思議也我又獲是圓通者指上心佛眾生三無差別之圓通也修證無上道者似是等覺所證之境界四不思議者顯前二種殊勝猶可思惟擬議此更極圓至妙不容心思言議凡現形說法皆非有為作意所成乃任運自在成就故曰無作妙德一者由我初獲妙妙聞心至救護眾生得大自在冠註此明一體現多容一音說多呪不思議也言耳根本具三種真實妙絕餘根由我初於聞中返聞自性一證圓通諸根互用此又妙中之妙故曰妙妙聞心下復釋成曰此妙妙聞心者由彼返聞久之唯一心精盡脫根塵令其六根一時圓故使見聞覺知不能分隔復歸一真法界圓滿菩提融通萬有無垢無淨含攝一切故於一身現眾多容而說無邊秘密神呪盖理出無為神功莫測誠哉不思議也爍迦羅此云堅固母陀羅云印清淨寶目猶云五眼圓明照徹諸法首為六用之總臂有提接之力目有照了之用翻八萬四千塵勞成八萬四千手眼足見轉八識成四智轉五陰成三身則渾身毛孔俱為妙用或現慈容以護善根或施威靈以折惡性或以定相止其散亂或以慧相開其昏迷是故攝化群機汎應一切未始作意不假施為隨感而應曾無滯礙故曰得大自在此由金剛三昧熏聞性而成慈無量心故能救護眾生得大自在二者由我聞思脫出六塵至皆名我為施無畏者冠註此明現各各形說一一呪不思議也聞思即上聞慧與思慧脫出六塵不能為礙即上修慧由眾生根機不同故應機現形亦不同由眾生好樂不同故應機說呪亦不同然現一一形說一一呪皆能令其眾生離諸怖畏是故微塵國土眾生悉名我為施無畏者此由金剛三昧熏聞性而成悲無量心故能令諸眾生稱為施無畏者三者由我修習本妙圓通至捨身珍寶求我哀愍冠註此明所過者化不思議也本妙圓通指耳根言由此而證清淨本根則轉藏識成鏡智於諸塵境毫無取著故所游世界皆化慳心而為喜心亦捨身寶求我哀愍納受此由金剛三昧熏聞性而成喜無量心故能令諸眾生歡喜不惜身財四者我得佛心證於究竟至求大涅槃得大涅槃冠註此明供養佛生不思議也我得佛心者謂治得因地心妙契果地覺證於究竟者終入妙覺果海則無量功德法財俻現於前故能出諸珍寶廣作佛事既以種種珍寶供養諸佛復以種種法財供養眾生者謂菩薩以平等心等法界中無非佛者故同生佛想廣施供養妻子長壽世間法財妻子屬外壽命屬內三昧涅槃出世法財乃至者超略之詞世出世間法財二施中不能俻舉者皆在其中此由返聞根以得佛心而成捨無量心故令世出世間諸凡聖輩所求如意佛問圓通我從耳門至故觀音名徧十方界冠註此結答圓通也謂我從耳根一門深入彼六知根應拔圓脫故得三慧圓照一體純真而上同諸佛下合眾生隨緣應化心得自在然推其因自始於入流亡所得三摩地終成菩提契合本覺所謂以不生滅心為本修因然後圓成果地修證且彼佛授記令我得名皆由善得此圓通根本一根既返六用不行則十方圓明唯一如來藏心故我觀聽能徧法界而十方法界皆聞我名爾時世尊於師子座至梵唄詠歌自然敷奏冠註此明聖凡塵剎總一圓通本根也五體同放寶光以顯渾身上下皆是圓通本根也諸佛放光往來灌頂者顯自他真覺本自融通亦無優劣斯正圓通之實體也惟灌其頂顯此圓證法門最為殊勝更無有上焉者也自諸佛而灌至羅漢者顯因該果海果徹因源且既證圓通者果得彼我同暢未證圓通者不免自生隔礙也林沼演音交光相羅者顯根塵既銷音光交涉則依正二報其性故真智現前則一切聲是佛聲一切色是妙色無非悟入之處無非圓通之理故一切大眾一覩此相一聞此音便能破惑障而獲三昧所謂一切事究竟堅固不出乎此且攝二十四聖同歸觀音圓通根本皆得名為金剛三昧矣即時雨花至自然敷奏者顯一根返源五濁皆淨根性銷亡塵界合一惟自寶覺妙心隨處發現無作妙行自然成就清淨妙音在處圓鳴也梵唄二句冥合耳根圓通於是如來告文殊師利至何方便門得易成就冠註此勅文殊選擇圓通也雖則隨根隨塵無非真理皆可悟入但最初下手須自一門且教體有方根器不一而證性總歸圓通逗機欲擇方便然非大智者不能簡選故命文殊也最初方便指未證圓通時言真實圓通指既證時言所謂開方便門示真實相也實無優劣前後差別者唯歸一如來藏本無有異也誰當其根者謂諸聖證處雖皆平等而初入之門豈盡對阿難之機耶然對機唯取一門而已故當簡擇以令阿難專取也何方便門得易成就者謂不唯現對阿難一機兼我滅後此界修菩薩因求無上果者必從何門而易得成就也文殊師利法王子至承佛威神說偈對佛覺海性澄圓至初心入三昧遲速不同倫冠註此明真性隨緣故起迷妄而反妄循真故有方便初入方便亦有遲速必須選擇以合機宜也文殊下經家敘文也謂本覺性體猶如大海本來澄湛圓滿而此覺性本具圓通妙用不假造作絕諸能所良由元明性體上妄起能照遂生所照能所既立而能照真性亡矣本性既晦空覺自分此即迷如來藏而成藏識迷真空而成頑空由是依空晦而結色相復生妄想分立身器二種世界而妄想凝結便成無知國土妄想分別則成有知眾生此即依無明藏識生見相二分也豈知虗空生於大覺體中不異一漚之發大海以虗空較之大覺尚𦕈劣如此況有漏微塵國土皆依空所建立者其微小又何如也若知海漚速滅則空體本無況復依空所生之三有乎故知滅諸妄境復歸元覺性本無二而欲復此無二覺性則方便亦有多門非止一途若登聖地則全證本性處處可入法法圓通所謂十方如來於十八界皆能證得何須揀擇但初發心人欲入三昧若得圓根與不圓根日劫相倍因有遲速故選圓根也遲速與順逆相應耳根順故成功速餘根逆故成功遲他方反此色想結成塵至能所非徧涉云何獲圓通冠註此明六塵不對此方之機乃逆而遲者故當揀之謂泥沙陀雖因色塵悟入但此色性因妄想而結成乃障礙之塵既因想成則精了之心不能明徹豈有結暗不徹之塵而初心者欲依之以獲圓通耶陳如雖因法音悟入但此音聲一雜語言便是名句味而已一字直目為名詮自性也多字兼表為句詮差別也味即義理且名不能含句與義句亦不能徧含義理而初心者豈達一言徧含一切義而欲依之以獲圓通耶伊是也香嚴雖因香塵悟入然香塵合鼻方知有香離於鼻根元無有香且能覺之知不得與所覺之香恒常合一而香豈常住乎初心者云何依之而獲圓通耶藥王雖因味塵悟入然此味性亦非本來常然之體要以舌根味時方有其性離根元無其能覺之根亦不與味塵合而為一根不恒一味不恒有云何因此而欲獲圓通耶以味之味即甞也䟦陀雖因觸塵悟入但此觸塵必以所觸之身方顯能觸之塵若無所觸即能觸亦不明顯是則能所兩合則觸塵有性能所兩離則觸塵無性合有離無性非一定云何依之而欲得圓通耶迦葉雖依法塵悟入然法塵乃前五塵落謝影子故稱為內塵且能依之內塵必有所依之意根方顯離根元無雖則相依互立而能依中元無所依性所依中亦無能依性能所既非徧涉初心者云何因之而欲得圓通耶憑依也見性雖洞然至想念不可脫云何獲圓通冠註此明五根非對此方之機乃逆而遲者故當揀之律陀曾因見性悟入然此見性雖則洞然明了若論四方但能明前三方向後一方即不能明若論四隅又缺向後二隅初心者云何依此不圓之根而獲圓通耶維即隅也虧即缺也虧一半但明前二隅也槃持迦雖因鼻根悟入但此鼻根出息盡時不能即入而入息盡時亦不能即出於出入間而缺中交是則支離間斷不相涉入如何依此支離之根而獲圓通耶支離不接續也匪即不也涉即交也鉢提雖因舌根悟入但此舌入非無端而顯必因味塵方生知覺若味一亡則此覺了亦不可得初心者云何依之而獲圓通耶畢陵伽雖因身根悟入然此身根與上所觸同義必因能觸之塵方顯所觸之身而能依所顯所依能彰各非圓覺且身根觸塵各有邊際限量不能冥會云何依之而獲圓通耶善解雖因意根悟入然此意知根雜於亂思之意識設使意識澄湛明了之時終不見有意知根若有意知根必有想念而根識相依不可脫離故久修滅想定者猶不能脫去想念獨見意根云何初心乃欲依此而獲圓通耶亂思想念俱指第六識而六以七為根故名意根識見雜三和至念緣非離物云何獲圓通冠註此揀六識非對機之圓通也秋子雖因眼識悟入然此識因根塵和合而生若詰其本曾無體相根境相合則有根境相離則無自體無定云何依之而欲獲圓通耶普賢雖因耳識悟入但此心聞洞徹十方皆由久修因行乘大願力之所生故非初心劣行可能得入云何於此而欲得圓通耶孫陀雖因鼻識悟入但此鼻想本是權機秪令收攝散心而得暫住且心既成能住則鼻端白相亦成所住云何依有住之心而欲獲圓通耶鼻想者謂於鼻端作觀白之想也權機者謂權設以應機也滿慈因舌識悟入然說法雖由舌識調弄音聲文字但能開悟他人令先成果而於自果未必即成且名句乃有為之法非無漏所攝云何依之而欲獲圓通耶開悟先成者如對菩薩人說大乘法而自不取證是也波離雖因身識悟入然持戒但能約束一身若無縱有其識亦無所束且身識惟局於身不能徧通一切云何依此不徧之識而欲得圓通耶目連雖因意識悟入然此神通本是曠劫宿因所成而於聞法分別有何關涉或云由聞三迦葉宣佛因緣法而得悟入豈無關於佛法乎故曰縱念因緣法亦非離於物云何依此攀緣之識而欲得圓通耶若以地性觀至因果今殊感云何獲圓通冠註此揀七大非此方對機之圓通也持地雖因地大悟入然以地大觀之元是堅滯質礙之性不能通達且平填要路功涉有為元非聖性遇佛開示方得悟入而初心之人云何因此而欲獲圓通耶月光雖因水大悟入若以水性觀之是有想念而後成其觀行非真實如如之理欲契如如不動之理須是如如不動之智非分別覺觀之心所能證得者云何依此而欲獲圓通耶烏芻因火大悟入彼雖徧觀火性猶是厭有而求離非是無能離所離之真離且彼因多欲故習此觀行亦非通用之方便云何依之而欲得圓通耶琉璃光因風大悟入彼雖徧觀內外皆風力所轉則是一動一靜對待之法既有對待非無上覺云何依此而欲得圓通耶虗空藏以空大悟入然此空性因無明執成其性昏鈍非有知覺既無知覺則與菩提果智相反云何依此而欲獲圓通耶彌勒因識大悟入然此識性念念生滅非常住性且存心觀之乃屬虗妄云何依虗妄之心而欲獲圓通耶勢至因攝六根念佛而悟入然凡有運籌皆屬無常既曰念性元是前後相續生滅不停既為生滅因必不能感不生滅果云何依此因果差殊之法而欲獲圓通耶我今白世尊至離苦得解脫良哉觀世音舊說聖人設教隨方不同或有佛土以佛光明為佛事或有佛土以佛菩提樹為佛事乃至或以園林臺觀或以虗空或以寂無說示如香積佛國無文字說但以眾香令諸天人得入律行而此方教體唯假音聞皆各隨機緣故也冠註此獨選耳根為此方對機之圓通也此方二句惟重教一邊謂娑婆世界眾生唯耳根偏利皆能由聞性以證真常故佛對機適宜而以音聲作佛事所以逗此根機之利是則合音與聞乃為此方真實教體清淨行門也欲取二句唯重機一邊謂教體固在音聞而欲取正定實以耳根聞性中為入定之基盖聲教但能詮表聞性實能妙契故見道雖藉音聞而修證獨從聞性也此句方定指耳根為圓通本根至妙法門也離苦二句唯重在人謂悟入圓通者雖有二十五聖而能離二死之苦脫人法之執便成自利利他之德者誠哉唯觀音一人而已於恒沙劫中至救世悉安寧出世獲常住冠註此申釋上離苦二句義也劫數如恒沙者照前無數恒沙劫以顯時為極長也國數如微塵前入諸國土以顯處為極廣也得大自在力照前以無作妙力三十二應隨機說法也無畏施眾生照前令諸眾生於我身心獲十四種無畏功德也汎應群機無不合宜為妙音十方三世六道三途一切苦惱齊觀並救為觀世音清淨說法無著四相為梵音隨緣赴感應不失時為海潮音具此四音故能救世間苦惱者悉得安寧亦令出世者皆獲常住之極果我今啟如來至覺觀出思惟身心不能及冠註此申釋上欲取二句義以顯耳根功德之勝也我今二句承上起下猶云我今說恒沙劫中等八句偈啟白於如來者亦非我之胸臆但述觀音所說耳根功德而已且據彼之言而推之則知耳根不惟周圓融通抑且常住不滅但諸眾生心多昏擾日用而不知假如人於靜居之時十方俱擊皷十處一齊聞乃俱擊俱聞無有前後者正此聞性之周圓真實也若以五根例之其功較為殊勝何也即如眼根隔紙膜不見外物隔皮膚不見五臟身根必以塵合而後方知口鼻二根則亦復然稍離於塵便不覺知意根雖圓而紛亂無緒若耳根者隔垣能聽非若眼根不觀障外遐邇俱聞非若三根離塵不知於靜居時俱擊齊聞非若意根之常亂而無緒此五根之所不齊而耳根為最者正是聞性之融通真實也且由音聲性有動靜故在聞性中為有為無所謂聲生聲滅令汝聞性為有為無而顛倒者乃以無聲惑為無聞然非聞性實無也所謂聲於聞中自有生滅非為汝聞有生有滅若聲無時而聞性既無滅則聲有時而聞性亦無生然彼聲生時而聞性知其生彼聲滅時而聞性亦知其滅足見此聞性二處俱圓也且彼聲生時而聞性未嘗生彼聲滅時而聞性亦未嘗滅足見此聞性二處俱離也是則任其聲塵生滅而聞性湛然常住寧非真實妙性乎夫此聞性縱令在夢想中無所思念時似乎無聞然猶聞舂擣聲誤為皷響則知不為不思而無所以聞性之體用出於覺觀思惟之外而身心之所不及者為具三種真實故也今此娑婆國至豈非隨所淪旋流獲無妄冠註此申釋上此方二句義以顯耳根宜便初機也意謂此方耳根雖利亦須音聲論量始得宣暢發明此圓通本性也或曰此方耳根既利而如來聲論又明宜乎凡被聲教者皆當免於流轉而間有不免者良由不能忘聲論以返聞本性既迷本聞則徒循聲論而亦不免于流轉矣豈獨眾生迷本循聲即阿難縱能強記十方如來十二部經所明妙理如恒河沙尚不免落于邪思溺于婬室不得自由下總結云彼眾生與阿難豈非隨其所聞而彼淪溺者乎若此觀音大士又豈非旋倒聞機入流亡所而得證真常者乎足見淪生死證妙常唯此耳根而已豈非二字貫至下句此二句總結我今白世尊以下文義阿難汝諦聽至將聞持佛佛何不自聞聞冠註此以圓通本根專囑當機也言我今承佛威靈之力勅我宣說此圓通本根然我所說者即觀音所謂如幻聞熏聞修金剛三昧是也夫此三昧是十方薄伽梵一路涅槃門真為生育諸佛之母也若汝不能修此三昧而惟樂多聞縱于微塵佛所徧聞一切秘密法門而不先修無漏勝業則畜聞愈廣種習愈深于道無益徒成過誤而淫室之難故所不免矣且世尊設教務人得旨忘言汝等迷本聞而循聲論豈入道之方也哉汝將循聲之聞根以憶持佛佛之文言何不就此能聞而自聞其聞根審彼聞根果自何而有耶佛佛即諸佛也聞非自然生至摩登伽在夢誰能留汝形冠註此令其審察妄聞而證真聞也承上云若肯細審聞根必當知此聞根元非自然而生初因動靜二塵黏湛發聽以至卷聲成根遂有耳根之名此即結根也汝今內旋聞根外與聲脫塵既脫而根隨滅則惟一圓湛性成豈復有耳根之名乎于是一根既得返源而彼六根俱成解脫故了見聞覺知猶如幻翳三界塵境宛若空華若見聞一返則翳根頓除塵界一銷則本覺圓淨若種習銷除至于淨極之處即是轉藏識而成鏡智于寂照間含吐十虗況依空所生之根身器界乎到此地位却來返觀世間種種事業猶如在夢所謂得菩提者如寤時人說夢中事果能如此則摩登伽昔以邪呪攝入婬席亦是夢事誰能于夢中而繫縛汝身乎但由汝執幻翳為見聞認室華為實體故為彼所制耳所謂夢裡明明有六趣覺後空空無大千如世巧幻師至餘塵尚諸學明極即如來冠註此申釋上一根既返二句義也先喻後法巧幻師喻真如隨緣幻作即幻呪喻無明業力真妄和合變成見相二分喻如幻作諸男女諸根喻六根一機抽即抽幻人之機關喻一識精元明由抽動機關故幻人口眼俱動若不抽機關則幻人口眼皆歸寂然即諸幻法亦成無性矣六根下法合一精明即識精元明指藏識也六和合即根塵識三法六和合為能依一精明為所依由黏湛發妄結塵成根遂分為六于是在眼見色在耳聞聲等故曰元依一精明分成六和合若一根休復則餘五根應拔圓脫即前此根初解先得人空也塵垢者謂想相為塵識情為垢指見相種子言良以六解之後則塵垢亦應念皆銷而識精漸得矣圓明淨妙即前空性圓明成法解脫也盖塵垢餘習未盡尚居學位未得究竟若明圓淨極即是十方如來所證之極果矣是則由一返六解而直證如來藏性即前俱空不生證無生忍也大眾及阿難至我亦從中證非唯觀世音冠註此普勸進修也言眾生勿迷本聞阿難勿得強記唯當旋倒汝聞機脫塵內伏反此能聞不聞聲塵而聞己聞性若此圓湛性成即是無上妙道所謂生滅滅已寂滅現前汝等欲知根選擇圓通入流成正覺者實乃如是而已夫此圓根正是十方如來一門超出妙莊嚴路所以過去諸如來由斯門而成就菩提現在諸菩薩亦由斯門而各入圓明是故未來修學者必依此法門而入也不惟諸佛菩薩由此門入即我亦不外此門而入也寧獨觀音為然哉誠如佛世尊至非是長修學淺深同說法冠註此回報尊命也誠如佛世尊詢我諸方便者牒前佛問二十五聖誰當阿難之根也以救諸末劫者牒前兼我滅後此界眾生也求出世間人者牒前入菩薩乘也成就涅槃心者牒前成無上道也謂前世尊所詢四義而欲獲全順者唯觀音耳門最為第一也自餘二十四聖法門皆是佛之威神加被故得悟入也且若那律之失明畢陵之刺足持地之填路䟦陀之入浴孫陀之觀鼻皆偶觸一事而忽捨塵勞非是通長可修學亦非上中下根同說之法若通長可修淺深同說者唯觀音耳根一門而已頂禮如來藏至圓通超餘者真實心如是冠註此禮讚佛法願求加被也謂我所選圓通本根即前世尊所說三如來藏心即前勸修無漏業亦是觀音所說不思議妙德也然我選法門雖合機宜猶願諸佛廣施神力加被未來進修者令其于此法門明然無惑且以此方便接引初心最易成就故可以教阿難亦可以救末劫沉淪也苟能以此圓根熏修自可超越一切法門矣以上揀選勸修乃至讚嘆求加被者以真實心自當如是也於是阿難及諸大眾至阿耨多羅三藐三菩提心冠註此正明開悟也當機自三卷說偈讚佛乃至于此已經五番領悟皆有增進足見未得親證菩提者須假漸次工夫亦如古德云大悟一十八徧小悟莫計其數也菩提涅槃乃是極果故以隨業牽纏流落生死喻如因事遠遊以菩提涅槃喻如家以耳根圓通喻如歸家道路意謂拋家棄業流落他鄉非一日矣縱欲還家未知頭路今蒙導師指引雖未起程而還家路道必不迷矣皆得本心謂已獲不生滅因地心也遠塵離垢者謂斷除根塵識種也獲法眼淨者謂得六根互用不被根塵隔礙也性比丘尼成阿羅漢者謂登伽女出家已證四果也發菩提心者謂開發大道心也阿難整衣服於大眾中至於菩提心得無退屈冠註此欲修菩薩乘入無上道故請安立道場之規則也悟得如來藏故曰心圓明根塵識種應念銷除故曰迹圓明悲謂悲塵劫之迷淪欣謂欣一時之圓悟由久滯他鄉忽得歸路故悲欣交集也是中指耳根中謂已悟成佛法門從耳根入者定無疑惑矣常聞下以佛言為勵己之據自未得度而欲先度人者為菩薩自己得度而專為度人者為如來雖則諸佛菩薩皆以度生為事而佛果未圓當以菩薩行為回小向大之急務也故特請益曰我已悟知入三摩地必從聞思修矣但恐末世眾生去佛漸遠邪師說法多如恒沙且邪必亂正而修進者正定難成欲令先攝其心而後從聞思修入三摩地畢竟以何法則令彼安立入道之場使邪魔不能擾動定力於菩提心方得無退屈乎爾時世尊於大眾中至是則名為三無漏學冠註此下明清淨律儀為末世攝心之定式也毗奈耶乃三藏中之律藏也此大小乘戒之通稱小乘稟法為戒粗治其末大乘攝心為戒細絕其本法戒則身口不犯心戒則無思犯也此下四種清淨明誨乃十戒之初以婬殺盜妄四波羅夷為根本重罪勿得思犯故獨言其心也三決定義者謂決定當依此三種為修證之根基也攝心為戒者檢異權小粗治身口今取毫無思念目之為戒也如六祖云心性無非自性戒是也因戒生定者謂攝心不動即目為定如云心性無亂自性定是也因定發慧者謂靜極圓明內瑩發光即目為慧如云心性無礙自性慧是也三義圓具則有漏種習蕩盡無餘故名無漏學阿難云何攝心我名為戒至第一決定清淨明誨冠註此明婬戒持犯之利害也謂諸眾生皆以婬欲而正性命故纏生死若斷其因則緣不能續故以斷婬為首也其心不婬者言不但身口不犯而已若起一念思想之心便為破戒必得此心如枯木寒灰方與攝心為戒相應方得不隨欲流而相續生死也餘三倣此三昧即指定慧塵勞即指見思二惑若淫心不除則二惑必不能斷生死何由而出耶縱有定慧現前而帶婬修行欲根不除遇境即現故必落魔道然魔道亦隨定慧強弱而成上中下品且魔之攝人反以婬行為首故於末法時廣行貪婬為善知識而以行婬為善事使婬婬相傳無有斷絕也落愛見坑者見即見惑愛即思惑坑即深坑于見愛之中而失正修行路也舊說諸經戒殺居首謂設化以慈悲為先此經婬戒居首謂真修以離欲為本盖欲氣相濁染污妙明欲心狂迷易失正受續生死喪真常莫甚于此故須首戒而為清淨第一明誨也觀阿難起教示遭邪染而厥初發心先厭欲濁至于三漸次中一一首徵然後身心妙圓獲大安隱十信初心由欲愛乾枯而慧性圓明遂階等妙諸世間人由心不流逸澄瑩生明漸乎六天是故真修內攝必先離欲也是故阿難若不斷婬至不如此說即波旬說冠註此申釋帶婬修行者以顯決定斷婬方可望菩提果也先喻後法如蒸砂下以喻明帶婬修行枉勞功力也汝以下法合謂以生死根修因欲得不生滅果如蒸砂欲其成飯也縱得妙悟皆是婬根者合上經百千劫秪名熱砂根本成婬輪轉三塗必不能出如來涅槃何路修證者合上此非飯本砂石成故機者如弩牙也指婬根種習謂種習不除觸境即動此機一動而身心隨動故必斷其種習則身心二種婬根俱斷矣若究竟而論縱使身心俱斷能斷之性若存則所斷緣影不忘終非了絕猶係生死根本必使藥病俱除方是菩提根本既得其本而圓極之果可希冀矣如我下判結邪正準繩也盖因阿難恐末世邪法熾盛而啟請輔正摧邪之規則故世尊說此四根本戒以辨定邪正令末世聞法者唯知如我所說即佛正說若不如此說而言婬行不礙者便為魔說矣阿難又諸世界六道眾生至第二決定清淨明誨冠註此明殺戒持犯之利害也此中所戒非但人畜下至蠅蚋蛇蝎等皆勿殺也亦非但親殺雖食肉服衣亦在所禁又非但秪禁身口雖心念亦當斷絕矣負命索償為生死緣故其心不殺則不續也三昧塵勞等俱見前鬼神優劣亦有多品此中三品俱屬多品中上品所攝故曰縱有多智禪定現前足見須以定慧帶殺心者方墮斯類若徒殺者報在地獄此神道者如世間血肉之神大力鬼即天行羅剎今人間尊奉稱帝稱天者多是此類也各各自謂成無上道者妄自稱尊以鬼道惑人也自言食肉得菩提路者倡言食肉不礙佛果也五淨肉者不見為我殺不聞為我殺不疑為我殺加自死鳥殘也假名為肉者神力所化非真生命也柰何如來滅後食眾生肉名為釋子者可見凡佛佛開許者皆佛在時之權變漸引慈化耳如今勸人且食日齋月齋相似若有志希上乘者當務實行不可以引權自欺也縱得心開似三摩地者謂定慧得力正受樂境然食肉障重似而非實也皆大羅剎者現前花報也必沉苦海者將來極苦果報也相殺相吞等者謂惡業俱生酬償冤對解脫無期何由出世故當信此決定斷殺是清淨明誨也是故阿難若不斷殺至不如此說即波旬說冠註此明決定斷殺方可望真解脫也修禪欲出生死反乃行殺墮生死中譬諸塞耳避人反乃高聲是欲隱彌露也不蹋不仁慈之至猶及草木況食眾生肉耶舊說東方不無裘毳西土不無絲綿各以多分言也皮毛乳酪等皆彼身一分之物故或服彼皮毛食彼乳酪皆為彼緣也足不離地者劫初之人體有飛光足若躡雲由食地肥啗香稻故其體堅重而足不離地身謂血肉骨髓也身分謂乳酪裘毳也身心二塗不服食者謂不惟身不服食而心亦不可有纖毫係念服食故須二塗併斷方得真解脫也如我下判結邪正繩尺也盖因阿難恐末世邪法熾盛而啟請輔正摧邪之規則故世尊說此四根本戒以辨定邪正使末世聞法者唯知如我此說即佛正說若不如我說而言食肉不礙菩提路者便是魔說矣阿難又復世界六道眾生至第三決定清淨明誨冠註此示盜戒持犯之利害也此之偷盜非但竊人財貨凡言行詐偽詃惑恐動乃至一念邀求恭敬希取利養者皆為犯戒也其心不偷者謂忘其利欲而貪得之心一念不萌方得斷生死根若偷心不除生死必不能出也必落邪道者謂存心回邪取利委曲言行不正感墮邪類精霛者如山精水怪似仙非仙似神非神而具邪通者也妖魅者出沒世間妖氣魅人或奪精氣或盜財物者也邪人者被魅所著言行妖異惑亂眾人者也然此皆指定慧力勝偷心不除者若徒偷行感報不止於此故曰各各自謂成無上道而不自知為邪魔也潛匿姦欺者隱匿己惡詐稱得道知識或作妖言或現妖通恐彼愚令其改心易志不惜身財傾心奉之故所過之處其家耗散也我教下顯違教害眾其過甚深也循方乞食者方即法也所謂分施眾生衛護道力無事畜藏無所顧念皆方法也乞食者銷其高慢捨其貪念而成無上道也不自熟食除其滯著也且知身為倘寄亦知世為旅泊此身一往矢不復來豈可戀戀塵世累積業因乎意謂如此行持方為佛子云何賊人毀佛遺則內懷竊志外假僧儀反以佛法為獲利之具廣行裨販造諸業因者皆所謂之佛法乎彼且是己非人而反指出家具戒者為小乘而以己所為者妄稱大乘則是盲盲相引必墮無間獄寧有出期乎且我教世人於我滅度後欲修三摩地者現世雖未作盜業誠恐生前有犯亦當懺悔故令於如來像前作燃燈燒指之微因以償宿生負債方許長揖世間永脫諸漏果能行此雖未頓悟無上覺路是人決定能信正法矣若不行懺悔縱成佛果還來人間酬其宿債如我曾于毗蘭邑王馬廐中食麥三月者由我宿生詬罵比丘可食馬麥故償此報且我偶出惡言尚爾酬償況宿生逋負而可免哉是故凡修出世因者當信此第三盜戒為決定清淨明誨也捨身微因用償宿債者謂先世竊他外財以資己身今世更捨己身以供上聖方得翻破無始盜業也舊說一切難捨無過于身難捨能捨則自餘貪愛決能棄捨故曰是人于法已決定心然若現前貪愛居然不改徒慕捨身傷毀遺體則反增業苦豈能明覺路而決正法哉裨附也販賣也是故阿難若不斷偷至不如此說即波旬說冠註此明決定斷盜方許望真三昧也先喻後法意謂根本戒破縱修定慧于千百劫亦不能滋長慧性而圓滿菩提故譬如水灌漏巵塵劫難滿也衣鉢之餘分寸不畜者斷貪心也乞食餘分施餓眾生者斷慳心也于大集會合掌禮眾者斷我慢也有人捶詈同于稱讚者斷嗔恚也身心俱捨斷我法二執也身肉骨血與眾生共者轉貪嗔我慢成同體大悲也不了義說者如阿含經云畜物可以資身進道及薩婆多論許百物各可畜一但禁餘二又布施不及身命等迴為己解以誤初學者謂己不能奉行大乘而反曲引權乘以自誤誤人也果能戒根清淨利心永斷佛印是人得真三昧矣如我下準前阿難如是世界六道眾生至第四決定清淨明誨冠註此明妄語戒持犯之利害也如是下顯前三戒清淨猶懼此過況三戒未持者乎凡言行不顧為小妄語妄自尊大偽稱證果為大妄語若犯此戒縱前三戒圓成而于禪定亦不得清淨貪其利養來己尊勝名愛魔妄起邪見謂己齊聖為見魔總是見思二惑未斷故所謂下釋成大妄語得謂得道理證謂證果位也須陀洹等曰果阿羅漢曰道謂小乘果位至羅漢而極故曰道也乘位者道果也求世尊勝要恭敬也求彼禮懺希供養也一顛迦即一闡提也多羅樹以刀斷則不復活喻大妄語永絕如來善種也三苦海即三途也我滅度下正顯佛子決無妄語也言我滅度後勅諸菩薩羅漢于末法時或現淨相或現染相為同事攝稱讚佛乘令彼身心修禪得定終不許自稱是真聖泄佛密機縱值初學亦不輕言求彼欽仰唯除命終隱隱然遺言付法令彼信受奉行耳蓋住世則不露密機一露必不住世此應真設化一定規則如布袋和尚永明禪師等是也若泄言仍住則是要求利養之邪人人豈信之乎我勅佛子如是行道云何是人惑亂眾生成大妄語耶是故凡修出世因者當信此第四妄語戒為決定清淨明誨也是故阿難若不斷其大妄語至不如此說即波旬說冠註此明決定斷妄語方許期正覺也刻糞求香者喻粉飾形儀喪亂心行而欲與聖真氣味相通必不得矣我教下牒前未得謂得未證謂證者而深責之也直心道場謂心無虗假即是成道之場言我教比丘于行住坐臥中尚不容一念虗假云何自稱得上人法是何異一介貧兒妄號帝王自取誅身滅種而已且一國人王尚不容妄稱尊號況世出世間無上法王而欲妄竊其名位可乎若以此大妄語為因欲求佛果則求進反退求正反邪求昇反墜如以自口欲噬自臍豈可及哉必欲成就無上知覺須以直心直言為因地行而後能圓成果地覺也如我下準前始標三學終止四戒者定慧已備其中所謂因戒生定因定發慧故不復明也上人指果位中人唐邑尉劉幽求謂桓彥範許敬暉曰武三思尚存公輩終無塟地若不圖噬臍無及
