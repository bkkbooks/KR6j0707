body:
  text: 明柴紫釋乘時講録新安受法弟子汪益源校梓爾時阿難及諸大衆至與不生滅二發明性冠注此述已迷悟以請示二性也阿難謂前聞世尊呵此非心及法身斷滅我實驚懼不寧且離此心外更無別心今蒙指出眼中見性即我真心復賜印可則驚疑稍息所以泰然兼自念言從無始來失却本心猶如窮子捨父逃逝妄認緣影亦如認賊為子今日開悟又如失乳嬰兒忽遇慈母是以先禮謝後請益所悟惟何聞佛指出二種根本則悟身中有真有妄命我揣摩此心有體無體則悟身中有虗有實又云念念生滅遺失真性則悟身中有生滅與不生滅者雖得開悟尚未明徹願聞如來顯出身心中何者是真何者是妄何為生滅何為不生滅一一發明令我知此真妄等性可也觀此則彼認自身中必有真妄等二種性尚未知其分量故請發明而上捨動求靜則可知矣時波斯匿王起立白佛至諸有漏者咸皆願聞冠注此述邪疑以請正教也匿王未聞佛法時但見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃蓋由不知七八二識故不達轉藏識即如來藏而反執斷作常也今值佛雖聞二種根本及見性不滅猶自狐疑故請佛云何開發指揮令證知此心不生滅地則宿疑氷釋矣夫此真常非特匿王欲知凡諸有漏者莫不願聞也然匿王此問正為發明念念生滅中有不生滅性迦旃延此云剪髮毗羅胝云不作皆立斷滅宗者涅槃譯有多義猶以不生滅為要義狐乃疑獸凡人多疑者似之佛告大王汝身現在至當從滅盡佛言如是冠注此將示生滅中有不生滅而先徵其生滅也意謂汝言此身死後斷滅且不問汝死後問汝現在肉身為同金剛常住耶為復畢竟變壞耶匿王便答我今此身終從變滅佛更徵之曰汝身尚未曾滅云何知滅耶世尊垂語諄諄提醒若匿王能向未滅而知滅處薦得即證無生矣然頓悟雖不得而漸細工夫亦自有分觀匿王答云我此無常之身雖未曾滅我觀現前念念遷謝新新不住以至殞亡不息等語則無常迅速惕然在念故能因現前不住而知當從滅盡何待死而後知滅哉故佛言如是者印其所答不謬也新新不住猶云交臂非故也大王汝今生齡已從衰老至如何見比充盛之時冠注此兼舉老少審之令其自勘而詳敘也故佛但問衰老顏貌何如童子之時匿王更答少壯老三時顏貌大相懸殊言在孩孺時肌膚腠理滋潤鮮澤及至長成精神備固血氣充滿而今頽年迫于衰而形色枯悴迫于耄而精神昏昧其髮白而皺宛然衰耄之態逮將不久如何見比充盛之時況童子之時又不必言矣佛言大王汝之形容至故知我身終從變滅冠注此密加詳審也意令匿王從粗至細將生滅細惑推至于一念而後方與指出不生滅者承上云據大王所言汝之形容應不頓朽乃因漸而至于此也王曰變化密移我誠不覺唯見寒暑遷流漸至于此宜乎漸衰而非頓朽也何以知之我年二十之時衰于十歲三十之時又衰于二十以至于今六十有二返觀五十之時宛然強壯然此推度猶以十年為率不過驗其大略耳若令我微細審察豈獨一紀二紀之變化實為年變月化日謝時遷若更沉慮而思審諦而觀剎那剎那念念不停故知此身終從變滅也此乃見行陰之工夫即阿難前以六識為真常猶不能及況凡夫粗心而能覺之乎書云殂落者以魂升于天曰殂魄降于地曰落此經但以老相日升曰殂壯色日降曰落亦如先德云我初生孩童時剎那剎那念念已死何得今日反畏死乎是也剎那至促時也以九十九剎那為一念一剎那具九十九生滅以利刃斷一絲為一剎那也十二年為一紀牒前十年變其文耳佛告大王汝見變化至我今示汝不生滅性冠注此徵生滅中之不生滅也世尊見匿王歷敘生滅工夫細密可以示不生滅性故問曰汝既知剎那不停終歸滅盡能知剎那之處有不滅者耶王聞此語不覺悚然故合掌白佛我實不知斯王王所久昧者早知有此自不受外道所惑矣佛言汝既不知我今于中指示汝不生滅性以灰汝斷滅之執也大王汝年幾時見恆河水至年六十二亦無有異冠注此于生滅境上示不生滅性也佛先牒匿王之語而後審其三歲所見之水與十三所見之水云何王答言如三歲時宛然無異乃至于今年六十二亦無有異即此便顯生滅境中原有不生滅者然水之遷流不舍晝夜而六十所見之水亦豈即三歲所見之水耶所謂不異者水之性也遷流者水之相也即相以達性故曰江河競注而不流今使達境明心故先辨境而後辨見也耆婆此云長命謁此天神求長命也佛言汝今自傷髮白面皺至踊躍歡喜得未曾有冠注此重審觀河之見以示見性不滅也牒上云汝今自傷髮白面皺定比童子時異則汝觀河之見有童耄不王言不也佛即指示曰汝面雖皺而此中觀河之見精性未曾皺皺者變而不皺者亦不變變者受滅而不變者元無生滅云何于汝生滅身中同受汝之生死既現前不受生滅而言死後斷滅固已謬矣況猶引末伽梨等都言此身死後全滅名為涅槃又謬之謬者也王聞是言信知身後捨生趣生等語為除凡愚斷見則可若以捨生趣生得未曾有為喜證無生則不可何以故縱見到此乃第八識之分齊而真性豈有取捨乎斯正一靈何去皮袋猶存而不知一靈皮袋皮袋一靈也即如世尊曰而此見精性未曾皺只重一性字若見精即上根本中識精雖真而兼于妄如第二月也然世尊亦是將機就機不以法強人匿王止見得行陰而第八識尚未之見豈以真如實性強之乎不容不知亦不可執此以論匿王之得失也末伽黎云不見道同前二人皆斷見外道也阿難即從座起禮佛合掌至願興慈悲洗我塵垢冠注此躡上文以生疑也阿難先請發明二性世尊為匿王指出觀河不變之見性已發明念念生滅中元有不生滅性而阿難反生疑滯意謂見聞全是生滅可說認見聞而遺失真性若此見聞必不生滅云何世尊上來名我等輩遺失真性顛倒行事耶故請開示阿難不知上來所說之不生滅者乃見性而非妄見也見性如真月見精如第二月見聞如水中月影即此是阿難遺失及顛倒處故下文先明顛倒次明遺失也即時如來垂金色臂至不知身心顛倒所在夫斯倒正非有莫大之別但與一物上不循物理以首作尾以尾作首即謂之倒反此則謂之正而正倒元未嘗離於物是故衆生與佛同一體性若認心境為實有則轉法身而為五蘊四大矣若達心境本無則轉四大五蘊為法身矣故以心包太虗性融法界為正遍知執心在身內法生心外為顛倒見而為正為倒亦皆名相而已阿難能於世尊問處達得名字性空則妄想情盡求正遍知亦不可得而顛倒所在豈實有之乎母陀羅此云印相好也法身無身以萬法為身而亦無身相可得故曰清淨法身目睛不瞬即釋上瞪瞢二字義冠注此發明顛倒相也諸佛衆生同一體性曾未遺失特顛倒見耳夫心中之顛倒難以言表亦難領會故世尊只得指模𦘕樣向有相處發揮令阿難易曉是以垂手下指問定阿難曰汝見我手為正為倒阿難伎倆已盡不敢自決亦不能無言乃曰世間衆生以此為倒且即推乾曰而我不知誰正誰倒世尊就語而追之曰若世間人以此為倒又將以何為正阿難被世尊一語鈎定不能脫去則曰若如來以手上指于空則名為正世尊即竪臂告之曰若汝等必以上指為正則當以首作尾以尾作首汝與世人一類瞻視何得言世人以此為倒而汝不知誰正誰倒耶然凡物元無正倒唯以循常為正異常為倒若手以上指為正何得時時而下垂乎若手以下垂為倒何不時時而上指乎以此觀之凡對境如如稱性而知則為正知逐境紛紜強生分別則為顛倒由汝等輩多生見解而如來毫無作意則知汝身與諸如來清淨法身比類發明則如來之身當名正遍知汝等之身當號性顛倒汝等既以手指于上為正自以手垂于下為倒則是如來以汝身為倒法身為正汝等自以法身為倒汝身為正今將正知且置勿論隨汝諦觀汝身與佛身各稱顛倒者其顛倒二字今在何處斯乃世尊更加錐劄要阿難向二身中指出顛倒名字實在何處阿難被世尊一拶與諸大衆若瞢若啞不知身心顛倒所在佛興慈悲哀愍阿難至寶明妙性認悟中迷此節文為後文三科七大張本此處指如來藏現起根身器界向後文乃會根身器界歸如來藏其文義互相照應若合符節向後文雖廣唯銷得此處一物字耳冠注此發明遺失真心也前呵責云此非汝心等要令知妄無體又云諸法唯心所現要令滅妄歸真阿難到此仍認妄失真世尊愍其瞪瞢不悟故發海潮音云云世尊說法不前不後應不失時喻如海潮色指一身為五蘊之首心指第六意識為一身之主諸緣指前五根為能緣之根及心所使心指第六第八皆可所使指前五識若以第六為主人公為分別依即為第六所使若依第八發起即為第八所使也諸所緣法對上能緣根說廣指六塵收盡山河大地等法唯心所現指第八識能現見相二分而見相二分該盡情與無情也然第八識心又是真心一念隨緣現起故申釋上文云以此觀之汝之色身及主汝一身之第六意識皆是真心中所現之物耳遇物而照不被物蔽曰妙明遍徹萬法而不雜纖塵曰真精具足衆義曰妙心也故責勉阿難曰云何汝等遺失妙心妙性反認悟中迷耶不假修而自妙曰本妙融通萬法本不流動曰圓妙乃用之妙也皎潔堅實貴重無比乃體之妙也舊說心之與性體用互稱心則從妙起明圓融照了如鏡之光性則即明而妙凝然湛寂如鏡之體認悟中迷者不能即幻妄而悟本妙反遺本妙而認幻妄也即上以動為身境及認物為己等皆是也若據理而論則二乘人皆悟中之迷者凡夫反迷中之悟者是故古德以二乘人喻如去汁之灰凡夫喻如完灰謂二乘人雖在悟中永無成佛之期凡夫雖在迷中猶有成佛之時也晦昧為空空晦暗中至咸是妙明真心中物此段經文明示從真起妄為向後三種相續張本按本經宗旨唯顯諸所有法不出一念而一念生起萬法俱有一念息滅萬法俱無非法自有無而有無由心也古云智者除心不除境愚者除境不除心亦云迷不識性悟不識空皆合斯旨文中六為字亦當體察猶云空不自空因無明以為空色不自色因空以為色身本非身由妄執以為身昏擾擾相元非心性妄認為心性而心性非在身內既認昏擾之相為心決定惑為色身之內冠注此明心現萬法之由也承上云色心等法固唯心所現最初因何而現起所謂一念頓起萬境全彰若在本妙明心寶明妙性一念未起時則世之身心色空等法一無所有渾一心性耳若妙明心性隨緣而動則迷性明而為無明故于一念慮間便著于空而遂以空為頑虗既以空對無明渾然暗昧而復于暗中膠結不捨則因空執色既分空分色則無明漸成妄想而妄想雜于色塵而更妄認四大想相以為己身如是從迷積迷以妄承妄則分內分外仍聚外緣搖內妄想以內妄想趣外奔逸昏昏不明擾擾不停旋執此昏擾擾相以為心性既一迷而執此昏擾者為汝之真心則決定惑為此心唯在色身之內殊不知內之色身外洎山河以至虗空大地皆是妙明真心中所現之物耳譬如澄清百千大海至如來說為可憐愍者冠注此喻總結遺真認妄及顛倒行事也譬如澄清百千大海棄之惟認一浮漚體目為全潮者喻如阿難遺棄廣大妙明心性而反妄認四大為身相昏擾擾相為妙明心性殊不知此身此心乃妙明心中現起如大海中一浮漚耳窮盡瀛勃汝等即是迷中倍人者法喻相參而最緊切也喻中謂認漚為海者豈獨認一漚體迷棄大海將遍海之漚搜窮認盡唯見浮漚終非見海棄海認漚復認漚為海乃迷而又迷者也喻如阿難認此妄身妄心為妙明心性豈獨認一身心迷失妙明心性認至于千生萬生惟知四大緣影終不能知妙明心性迷真逐妄復認妄為真是亦迷而又迷者也然漚不離海坐在大海之中而不能見海喻如妄不離真自居妙明心中而不知妙明心性豈真有遺失哉唯顛倒見耳如我垂手下指反以為倒竪臂上指反以為正等無差別也夫身居海外而不知海者猶不足憐況身在海中而不知海耶喻如阿難若使真正遺失似猶不足深憫今本未遺失而終不能得如懷珠乞丐枉受窮苦如來所以說為可憐憫者全潮猶云全海之潮指大海言瀛渤海之異名亦指大海也阿難承佛悲救深誨至拔我疑根歸無上道舊說圓音有三不可思議一者殊方異類皆同本音二者大小淺深隨解皆益三者有緣隔遠皆同目前我疑根者謂唯此疑最深自不能拔故仗佛力以之阿難至此始知多聞習氣深厚難除也冠注此述疑請決也世尊發明者絶諸能所對待之真心阿難猶執能所緣心還是以攀緣心為自性也意謂一向顛倒淪溺今承悲救一向遺失妙心今承深誨感佛大慈故垂泣叉手而復請問言我雖承佛如是妙音悟得妙明心性元是自己本來圓滿包括十虗遍周法界曾未遺失亦不生滅之常住心地但為我等一向遺失此心妄認緣心故佛以妙心誨我以緣心斥我然而我今現聞法音現悟真心皆用緣心蓋所信真心者緣心也瞻仰如來者亦緣心也世尊令我悟得者乃圓滿真心雖名常住現今不得其用若捨緣心將何受法是故徒獲此心未敢認為本元心地而使我疑似不定取舍末由願佛哀愍宣示圓音拔我疑根令斷疑歸一成無上道也佛告阿難汝等尚以至無所了故汝亦如是冠注此責其認能詮而遺所詮也阿難認能緣而佛先遣所緣若所緣之境忘則能緣之心漸息矣意謂我費多番饒舌特為除汝緣心以契真性而汝等至今尚以緣心聽法汝等既以能緣妄心聽我所說圓妙心法則此圓妙心法翻成所緣妄境而安得證此法性夫法性者即汝等妙明心地而非我之音聲也要知我說法者如指月之人汝聽法者如看月之人若能因我法音發明自己妙心此是因指識月而忘其指者若徒逐言句被聲塵所轉此是以指為月而反忘月體者豈唯不識月亦不識指豈唯不識指亦復不知明之與暗何以故為指體暗月體明而於明暗二性無所了知故也今汝認法音為所緣之境而起能緣之心以迷失法性亦復如是也若以分別我說法音至各有所還云何為主冠注此責認緣心而迷妙心也上遣所緣之境今遣能緣之心承上云汝曰現以緣心𠃔所瞻仰若以能分別法音者為汝真心則此心自應離所分別之法音有能分別之性夫無性者如客有性者如主客有去來主人常住心之真妄亦如是也汝若以能分別法音為汝真心則此心應離聲而性體常住云何離我說法之聲無汝分別之性豈唯分別我聲離聲無性即汝分別我容離我顏色相好亦無能分別之心性不但因塵起滅之前六識心非汝真性縱將前六識及六種根塵所謂能分別心所分別境寂然都無而不屬根塵之色不屬識心之空斯等恍惚境相猶是行陰分齊而外道拘舍離等昧而不覺妄為冥諦夫冥諦者冥然莫辨妄立真諦彼謂冥初生覺是萬法之元始而妄尊為極則之理也既至于此尚非真心況離塵無體妄心云何認為真性耶若汝耳識緣聲則有離聲復無眼識緣色則有離色復無以至意識緣法則有離法復無然則汝之心性各有所還咸如寄客暫止便去云何為汝真心若亭主之常住耶此文照應阿難最初所陳見聞二字及上聽法瞻仰等語阿難言若我心性各有所還至今當示汝無所還地冠注此求示無還而先假喻示也阿難聞分別心性有還而問如來所說妙明元心云何無還佛告之曰無還者即在有還處豈可離波而求水耶且汝見我之時即此見根之中自有精明之用不雜于色者乃自本而出謂之明元夫此見精雖自識精元明中流出而體受妄熏精分六處未能旋六亡一故但為見精未為妙精但為明元未為明心而不妨切近本妙明心寶明妙性如第二月雖揑目所成切近真月非水中月影有天淵之隔今當示汝見精無所還地也良由妙明心性廣大無方圓滿無相卒難定指故托此見精方便指示若從見精悟入而全體大用亦在茲矣此當以真月喻妙明心性第二月喻見精水中月影喻緣塵妄見見精即上識精及觀河不變者此在阿難見三十二相處亦未嘗虧缺但轉與不轉耳阿難此大講堂洞開至是故如來名可憐愍冠注此欲示無還之見先標可還之相也意謂非可還之相不顯無還之見汝見講堂洞開之時旭日東升則見明相中夜黑月及雲霧晦瞑則見暗相戶牖之隙則見通相墻宇之間則見壅相分別此等相處則有能緣妄見頑虗象中而周遍者即是空性𡋯相中而紆回者則是昏塵澄霽斂氛又觀清淨之相夫此八相亦有能所之辨而分別妄見自屬能緣餘雖七種不出明暗色空俱係眼家之塵自屬所緣而能所之相自各有因相假因成則同變化汝咸看此諸變化相吾今各還本所因處云何本因此諸變化相各有來因今將明相還本日輪何以故無日不明明之本因自屬於日是故還日暗相還本黑月通相還本戶牖壅相還本墻宇能緣之見還本分別之所頑虗之相還本空性𡋯之相還本昏塵清明之相還本澄霽則世間凡所有相不出斯類汝見八種塵相而對塵不雜之見精明性於此八相之中必與何相而俱還耶何以故若於明相俱還於無明時暗相現前復將誰見雖明暗等相種種差別變化不停而汝之見精一時俱見足知諸相於汝見精之中自相變化而汝之見精昭然不昧凝然不變寧同能緣妄見與明暗色空而俱還耶若能所諸相俱可還者自然非汝見精汝當捐捨汝之見精不與諸相而俱還者既不屬諸幻相自是汝之見精非汝見精而何耶若汝知此見精則知汝之真心不待修而本妙不待揩而本明不待濯而本淨雖朗然見諸塵相而忘諸能所超諸障礙絶諸染淨汝今執吝能緣妄見迷悶不捨喪汝本妙明淨枉受輪回於生死之中被此漂溺永無出期皆汝自取是故如來說汝真可憐愍者此八種相中以分別屬能緣明暗色空屬所緣而所緣之境變遷則能緣之見自滅即前所示離塵無體之妄心至此於中指出見精無還即前所示揣摩工夫於無體中揣摩個有體者出來矣此處獨指見精無還者蓋見精離不得真性故兼明性而舉之向後至同別二種妄見十方遣此見精獨顯真性除第二月以見真月也阿難言我雖識此見性無還至云何得知是我真性冠注此呈疑請決也阿難承上佛示云見精雖非妙精明心如第二月而亦不同妄見與諸相俱還然既如第二月猶非真月云何得知此見精明性即是我之真性耶佛告阿難吾今問汝至衆生洞視不過分寸阿那律此云無滅昔因其施供受福不滅是佛從弟晝眠被訶精進失目遂證四果得天眼見大千如觀掌果今云閻浮提或指娑婆界言菴摩羅此云難分別桃奈相疑一大千為界菩薩雖見百千總皆有限窮盡微塵總言無數量也佛眼所觀淨穢均等不過分寸對勝說劣意謂以佛菩薩較之縱極其見量不過分寸而已且凡言衆生則攝盡蜎蠕矣此下有四節經文第一節明物不是見第二節明見不是物第三節明離物無見第四節明離見無物要將四節合看方見深旨若云見不是物不妨離見無物若云物不是見不妨離物無見若離見無物則求物不可得矣若離物無見則求見亦不可得矣如是則能所雙泯是非兩忘法法頭頭真空妙有塵塵剎剎第一義諦然非具根本大智者不能契之故文殊菩薩以身擔荷而為阿難等作大標榜也冠注此欲示真性先顯見量之不同也上已遣除離塵無體之妄見而顯出離塵有體之見精此下又即萬相以明真性故向後云離一切相即一切法自此始也意謂汝欲知真性當先識其見量阿難但證初果未得無漏清淨未具天眼須仗佛力方見初禪阿那律已得天眼見閻浮提如觀掌果菩薩已具法眼能見百千世界如來五眼圓明能見微塵國土衆生肉眼洞視不過分寸也真性是一聖凡平等本無餘缺而不妨見量有聖凡之不齊者蓋體同而用異也必使隨修隨證漸明漸遠則修真斷惑之工夫豈可缺乎阿難且吾與汝觀四天王至此精妙明誠汝見性冠注此欲明物不是見而先令阿難自行審擇也意謂他人見量一切遠近汝自不知亦不能擇彼之見且吾與汝現前同觀四天王所住宮殿止在須彌腰間而上齊日月下至大地中間遍覽以至水陸空行凡諸物相所在之處雖有昏明種種形像無非眼前塵相與汝能分別之見為遮留障礙之境汝當於此所見之境分別揀擇何為自己見精何為他物分明不雜汝既不能我為代擇今吾將汝見精擇於所見之境中使汝了知何為汝之見精那是如來之見體何為物象三事分明毫無混雜自知汝之見精我之見體同遍一切也阿難極汝見源自眼而出上至日月天宮其所見者皆是物相非汝見精中間至於七金山周遍諦觀雖有種種光明亦皆是物非汝見精漸觀漸近更觀雲騰鳥飛以至草芥人畜咸是物相非汝見精既知諸物非汝見精則汝見精自應擇出故復指陳曰阿難今汝所見若近若遠若大若小諸有物性列在見前而汝見精周遍萬相雖則物有種種不同不妨同汝見精清淨所矚而不相雜亂當知物類自有差別非汝見性有所差別即此見精而不雜於物者是汝妙淨明心則知妙淨明心誠不離汝眼中之見性云何汝等於諸物中不能揀擇耶四天王宮殿居於須彌腰間七金山圍繞須彌山外也看此經文及下文必要照顧前且吾與汝觀四天王句方知世尊所以與阿難同觀前境者要假佛之見體以辨阿難之見性也若見是物則汝亦可至自然非物云何非汝冠注此明見不是物也承上云豈獨物不是見見亦不是物若汝見是物我見亦是物然則汝亦可見吾之見恐彼謬執云與我同觀四天王宮併一切物時世尊之見即在一切物上吾豈不見故牒云若謂汝我同見物時名為見吾之見者則我收視不見物時汝何不見我不見物之見而指其所在耶若吾不見物時汝不能見則同見物時汝亦未嘗見若必執言亦能見吾不見之處則吾之見自然非彼不可見之相反是有相可見者我之見既可見則汝之見亦當可見今何不見我既不見汝何能見若汝不能見吾不見物之見而迷其所在則吾之見自然非有相之物吾見非物汝見亦非物既非物即汝見性云何非汝之見性耶又則汝今見物之時至性汝不真取我求實冠注此又顯有情無情若聖若凡等毫𨤲不須動著自是一真法界耳承上云汝之見若是物則物亦是汝之見而汝今見物之時汝既見物物若有見亦能見汝則諸世間有情之見體與無情之物性紛然雜亂不可辨矣則汝見與我見亦不可分矣并諸世間一槩無辨不成安立今汝見物見我之時若一定是汝之見而非我之見是汝我分明現成安立則情與無情判然不混即知見性離諸物相縱汝現前觀彼四天王宮乃至草芥人物皆汝自己見性周遍總不屬物亦不屬我非汝之見性而誰乎云何不自信而反自疑耶蓋汝真性汝固有之而不信以為真反取我言以求其實而曰云何得知是我真性迷之甚也真如法性有安立非安立二義此顯安立真如後文乃顯非安立真如也阿難白佛言世尊若此見性至願垂弘慈為我敷演冠注此躡上文以疑見性也承上云若此見性本來周遍心我自有非同他物何故與如來同觀四天王宮殿時則周遍娑婆國土退歸精舍秪見伽藍更入戶堂但瞻簷廡夫此見體本來周遍一界今在室中唯滿一室如此大小之不定者將為見體隨室限量而縮大為小耶抑為見體未縮唯被墻宇夾斷而不續耶我今不知此見性大小縮斷之義果何定在願為敷演夫師資問答止要發明前五種見量之不齊者特為各自惑業有盡與不盡耳非見性有不一也看下文除器觀空當自了然矣佛告阿難一切世間至更除虗空方相所在冠注此示大小在塵相而見性本無舒斷也意謂如汝所云於諸世間見大見小分內分外諸所事相業用各屬眼前塵境不應說言見有舒縮斷續也汝之見性譬如虗空一切塵相譬如器皿塵相有大小內外見性無舒縮斷續猶如器有方圓而空無定相也汝今不知見性與塵相但觀空器則可知矣汝於方器中自見方空汝所見之空為復定方為不定方若定方者於圓器中空應不圓若不定者現在方器應無方空汝之見性亦復如是若一定大而遍滿一界入室之時不復為小若不定者而於室外應不周遍汝言不知斯義所在其大小縮斷等義亦若空然云何為之定在耶夫能於定處見不定於不定處見定則心同太虗矣故曰阿難若復欲令空性入無方圓者但除器之方圓而空體本無方圓之相不應說言除器後更除虗空方相之所在意謂欲令見性入無大小者唯除情塵而見性本無大小不應說言除情塵後更除見性大小之所在所以古德云不用求真唯須息見若如汝問入室之時至寧無續迹是義不然冠注此牒難斥非也意謂汝見於入室之時既使縮大令小則於仰面觀日之時亦可挽齊日邊若於築墻宇處既能夾見令斷則穿為小竇亦能引見令續今觀日不能挽之令舒入室豈能縮之令小穿竇既無續迹可得築墻又豈能夾之令斷哉是義必不然也一切衆生從無始來至遍能含受十方國土毛端含國土世謂難信之法請以淺況深亦似可知凡人身一毛孔中之痛癢莫不知之即能知者是我心性全體大用而此心性用於一毛孔中其體用毫𨤲不曾減用於遍身中以至俯仰天地遍周萬物其體用毫𨤲不曾增即此心性與三世諸佛一體同圓等無差別昔江州刺史李㴾問歸宗曰教中所言須彌納芥子㴾即不疑芥子納須彌莫是妄談否宗曰人傅使君讀萬卷書籍還是否曰然宗曰摩頂至踵如椰子大萬卷書向何處著㴾俯首而已即此推之衆生心量於諸佛等而身之毛孔含諸國土有奚不可冠注此總結顯五種見量以下一段義前言認物為己以凡夫該二乘此言迷己為物以二乘該凡夫蓋能見所見唯一真性本無隔礙亦無大小良由無始轉本如來藏性以成藏識而現見相二分為根身器界凡夫不達諸法乃真心中泡影認為實有二乘亦不知藏識故不能會萬物為一己反迷己為外物既失本有廣大圓妙明心自不知情與無情皆吾一體而於根境不能超越則非惟不能轉萬物歸自己而反轉自己歸萬物故於一物中動被隔礙而觀大觀小矣若了法法唯心是能轉萬物歸自己而諸法如義則同如來轉色身為法身轉識心成正智身滿十虗心如千日攝大千沙界入身心之中而無去來遷動之相即此身心亦是諸佛菩薩成道之場於此身中舉一毛端遍能含受十方國土以小攝大而小未嘗增將大入小而大未嘗減小不增則大中現小大不減則小中現大依正圓融事理無礙見性妙圓一至乎此何限量大小之有哉則同如來照前佛眼等阿難白佛言世尊若此見精至惟垂大慈開發未悟冠注此領上義以生疑難也意謂世尊云此精妙明誠汝見性又云見性周遍非汝而誰然則現前所有皆我見精若此見精必我妙性今此妙性現在我前遂難云若使周遍之見精必是我之真性則我真性反在身外而我身內現今能分別外境者復是何物耶復申難曰而今身內之心實能分別外物而彼周遍於外之見性曾別無分別能分辨我身然則見性似在我而非遍一切者也若周遍於外者實是我心今當令我之身為彼所見既能見我之身則周遍見性是我而身又非我如是則不應說言我能見物則與如來先所難言物能見我有何差殊然則認見性則遺身心認身心則見性不遍惟垂大慈開發未悟大都世尊所示乃無能無所之見性阿難所執是有能有所之心境若達能所不二則疑情自釋矣令我今見者乃文倒耳當云令今見我也佛告阿難今汝所言至別有自性佛言如是如是冠注此顯離物無見以遣是見也承上云今汝所言見精現在汝前者皆非實義總成妄誕若汝見精實在汝前汝實見之則有相狀若有相狀定有方所既有方所自當指陳示我且今與汝坐祇陀林遍觀林渠以至草樹纖毫大小雖殊但有形者咸可目觀手指以示諸人若其見精必在汝前亦應以手確實指陳何者是見以示我也汝等當知現前有形者總屬於物無形者即是虗空除此二種別無可指若空是見空既成見指何者是空若物是見物既成見指何者為物汝可即諸萬象微細披剝析出精明淨妙見元不雜於物不受物蔽不染於物脫然物外指陳示我亦若諸物分明無惑可也阿難答曰我今於此若遠若近若上若下凡可目觀手指者盡皆是物無是見者如世尊所說況我有漏初學聲聞乃至菩薩亦不能於萬象前剖出精見離一切物別有自性指示于世尊也佛許可者印其離物無見以超是見也此段文應與上物不是見一節文合看然世尊問在不即處而阿難答在不離處此師資鼓唱之妙也披開也剝剖析也析辨也佛復告阿難如汝所言至無非見者佛言如是如是冠注此顯離見無物以遣非見也先述阿難之言以牒定其意猶云據汝所言則知萬象之中畢竟無是見矣今復告汝如來與汝坐祇陀林更觀林苑乃至日月種種差殊之象必無見精可以指示今向萬象之中亦應指陳何者非汝之見精耶阿難答言我實遍觀萬象之中不知何物非我之見也何以故物類雖多今舉一二則可盡知矣若樹非我之見我云何見樹若樹即是我之見樹既成見復指何者為樹若空非我之見我云何見空若空即是我之見空既成見復指何者為空我又思惟此萬象之中微細發明無非我之見精者也世尊許可者印其離見無物以超非見也此段文應與上見不是物一節文合看然世尊問在離即處阿難答在離非處斯亦師資鼓唱之妙也阿難答語似乎兼無非見無是見兩意然止重無非邊多因跟世尊前語為式故兼帶之耳觀思惟二字定非稱性流出也於是大衆非無學者至汝諦思惟無忝哀慕冠注此聞兩皆印可一席失守而以慈心安慰也蓋以權小初機晦昧未開不達根身器界俱為真性之勞相而認為實有故辨是辨非今蒙佛示無是無非之妙性則無所歸著不知是非裡去了還在是非裡薦取故聞佛兩番印許則茫然不知而於無是見無非見二義之本末趣止一無所決意謂若是若非決於一定則可株守今則兩許皆無未曾一定故令人驚疑而失其守也如來憐愍此等而安慰之曰我是無上法王凡所說者皆真實之語稱我所證真如實理而說非賺誤之言無虗僞之過非外道所謂有即是無無即是有亦有即是亦無亦無不是亦有之矯亂論議汝等審諦思惟自不負汝哀慕之心也變懾即惶悚意真實者一定不謬也上如字稱也所如者所證真如理也忝孤負也是時文殊師利法王子至於其中間無是非是冠注此代問之語也大衆雖蒙世尊安慰令諦思惟然皆未證法空者故罔措而無問文殊乃大智者自當代問故曰如來已為大衆發明精見色空二種之中本無是見非見二義觀此大衆豈唯不悟且反懷疑意謂若此色空等象果是見者應於萬象中指出見精今奚不能若此色空等象果非見者應於萬象中一無所視今奚能矚是故不知無是見無非見二義之所歸著故有驚疑怖畏然此大衆縱屬有漏而非往昔之善根輕鮮不可策進者惟願如來大慈發明此諸物象與此見精本來元是何物則於其中間乃無是見而亦無非見乎此元是何物三語非大智慧者自不能發佛告文殊及諸大衆至云何於中有是非是冠注此會根塵識等歸一真本體以答文殊之問也大菩薩如文殊之類及捨藏識而得如幻三昧者於其自住即自覺智三摩地即楞嚴大定以自覺智常住楞嚴大定非有出入時也見指見精該攝六根見緣指六塵想相指前六識也妄想本無相因所想之塵以為相斯連下二句用釋衆疑應上文殊云若此色空等象是見非見二義猶云此色空等既如空華本無所有憑何指其是非耶此見及緣同上文亦攝六識但文略而義猶備也自此下用答文殊之問猶云汝問見精空色元是何物於中無是非是若此見精色空果有二體於中可謂是見及與非見但此見精色空元是一箇菩提妙淨明體云何於中得有是見非見耶此又為後三科七大張本也文殊吾今問汝如汝文殊至故能令汝出指非指此二指字正應前指是見指非見之指前未悟一真法界則指是指非今既悟得則超出是見非見之外故能出指出非指也此中有二喻以二法合明初以文殊喻一真性無是非二相佛言下以法合明乃有攝妄歸真之義妄為色空下復引起一喻兼明從真起妄了妄即真二義是以下以法合上第二月明從真起妄義由是下以法合上但一月真明了妄即真義然展轉發明唯顯一真法界本無是非二相耳蓋前以第二月獨喻見精止攝見分以歸真性此以第二月廣喻根身器界盡攝見相二分以歸真性故以真月喻廣大真心而向後二種妄見中復於別業中以赤眚換却第二月止將一赤眚喻見相二分而但得見眚則非病矣可見真妄無他唯在一念若一念妄動則心境紛然是非鋒起若一念純真則唯一妙覺湛然周遍而能於一切處不起妄想於諸妄想亦不息滅住妄塵境不加了知於無了知不辨真實則率爾覺性本周法界何容是見非見於其間哉亦如古德云此理諸人本有諸佛菩薩喚作示珠人從來不是物不用知渠解渠不用是渠非渠但割斷兩頭句割斷有句不有句無句不無句兩頭迹不現兩頭捉汝不著數量管汝不得不是缺少不是具足非凡非聖非明非暗不是有知不是無知不是纏縛不是解脫不是一切名目無可比無可喻若能如是即妙淨明心亦不見有豈有是見與非見耶冠注此假文殊為喻師資問答而發明一真法界本無是非二相也故問之曰如汝文殊但直一體今就汝本體之中而更有文殊可指陳曰是文殊者耶為併本體而全無文殊可指陳曰非文殊耶此有三義一真義二是義三非義文殊答中亦有三義一曰世尊文殊亦如是也蓋我文殊唯一真體耳二曰於一體中更無是文殊何以故若說有一是定有一非須二文殊方可對非言是今唯一真故無是也三曰然是固不可說而真亦不可泯則我今日非併真體而全無豈可更說於非乎但於一真體中實無是非二相可指也即如祖家云心有所是必有所非若貴一物則被一物惑故世尊以法合明云此見精妙明與諸空塵亦如汝文殊唯一真體併無是非二相即此見與空塵本是一箇妙明無上菩提淨圓真心是故無是見而亦無非見也夫是非所以生起者良由本覺真心一念隨緣以成藏識轉為見相二分而有色空及與見聞夫色空見聞依真而起如揑目所見之第二月雖非實有宛見二輪迷者不覺妄生擬度其誰為是月耶又誰非月耶若謂是真月不妨有二若謂非真月離真無體所以往復是非而不能逃也若汝文殊自知本月唯一真體縱有二輪揑目所見於真月中自無是非可辨復以法合明云是以妄為之故汝今觀此見精與諸塵相分內分外則內而根身外而器界中而識心俱名虗妄亂想昧本妙明而不能出乎是見與非見也斯如揑目所見第二月而妄恣擬度終不出於是月非月之謬見也若由此而一念純真前後際斷則盡法界唯一精真妙覺之大用而亦不離寶明妙性之全體則體用一如心境不二即此根身器界唯本自心故能令汝超出於是非之外而豈復於萬象之中謂何者是見而可指乎謂何者非見而不可指乎亦如見一月真則妄計無施是非自泯矣阿難白佛言世尊誠如法王至獲真實心妙覺明性此與前分別都無非色非空拘舍梨等昧為冥諦相照應意在破除常見而顯真常然雖謂世出世法唯一真不二無缺無餘而儱侗真如又非妙覺是故不墮凡夫之見解揀別外道之斷常不濫小乘之偏空猶是見精如第二月尚非真見妙心夫一真法界談何容易此下至二種妄見皆明斯旨最宜珍玩梵志此云淨裔謂是梵天苗裔先者古人也娑毗迦羅云金頭冥諦見前投灰即苦行外道真我即外道所執我相不出三種一大小二微細三廣大我相也楞伽此云不可往自然者本自天然彼計內外諸法本末無因無修無證為彼不知含藏識中有染淨種子發業潤生為捨生趣生之根本遂妄計身中自有真我常生各趣遍滿十方而此性不滅也冠注此惑邪宗以濫正法也意謂世尊乃無上法王凡所說法必無誑妄而謂此見及緣元是菩提妙淨明體曰見性周遍曰圓滿常住曰不動道場曰而汝見精性非生滅此皆世尊誠實之語若見與見緣果能遍十方界誠能常住而性非生滅則與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我遍滿十方有何異耶然則反違自宗矣曾聞世尊於楞伽山為大慧等敷演斯義謂彼外道執內外諸法本末無因自然而然不假因修不從果得故佛唯說內而根身外而器界俱有正因種子假諸外緣助發方能從因獲果是以斯因緣義非彼自然義斯修證境界非彼撥無境界也我今觀此覺性自然曾未遺失非生非滅一體本真周遍法界名正遍知然則似違昔日所說之因緣反與外道之自然相符合矣若世尊所說之自然與外道所說之自然果有不同更以何等方便開示令我不入群邪而得證真實心妙覺明性之全體大用也佛告阿難我今如是至見性斷滅云何見明冠注此斥破自然也意謂我今為汝先開方便後說真實汝猶未悟反惑為自然耶凡言自然者必自體本然不隨緣變可為自然若隨緣顯現不名自然若汝必以周遍湛然性非生滅之覺緣為自然者汝須甄別明白自己身中有箇不隨境顯固實不變之體方為自然且汝觀此妙明之見即汝所謂覺也明暗空塞即汝所謂緣也於中以何為自然之體若以明緣為見之自體是以見明為本自天然之體而一定不移則此見性只合見明及至暗來時此見與明同滅全不見暗若以空緣為見之自體是以見空為本自天然之體一定不移則此見性只合見空及至塞處無空當與空同無全不見塞乃至諸暗等相亦應如是今明來見明以至空塞俱見則知汝之見性隨緣顯現云何惑為自然耶自客塵下至八還後皆方便開示自見不是物直至見與見緣元是菩提妙淨明體等皆真實語上覺緣二字即前此見及緣字此妙明見三字即上覺字此明暗空塞即上覺緣之緣字大都因阿難將見性色空合為一種自然故世尊問於明暗等相以何為見之自體若了十法界唯一妙明精見而更容何法於中為自然體耶阿難言必此妙見性非自然至緣明緣暗同於空塞冠注此捨自然而執因緣也意謂既非自然必借因緣且因緣乃昔所說之正法非彼外道義也但因緣生法未必常住不滅今謂妙明見性本非生滅常住周遍而義似不合於因緣之性第不知云何方契因緣之性耶心猶未明故咨詢於如來也故佛躡問而斥破之言今汝見牲因見明暗等相而後始有見性現前則此見性於明暗空塞中因何而有若因明有是以明為生見之因及其暗來明即滅矣既因明有還因明滅如𦦨因柴有柴盡焰息應不見暗因暗空塞例此可知今既明暗空塞俱能見之則此見性非因所生自當明矣又汝見性於明暗空塞中緣何而有若緣空有是以空為生見之緣至於礙塞處則無空現既緣空有仍緣空滅如藤緣樹有樹倒藤枯應不見塞緣塞明暗亦復如是今既明暗等相一一見之則此見性非假緣有又當明矣因親緣疏因乃因依義緣乃假借義因緣二字在此處只當活看不可定指內種子外助緣也若謂明暗等非見之種子則見自有種子說因何妨若謂明暗等為助緣其實是助緣說緣何妨豈不聞佛種從緣起當知如是精覺妙明至虗空云何隨汝執捉冠注此結顯精覺妙明不獨非因緣自然凡沉空滯跡者皆不能契也故曰應知此精覺妙明體用一如隨緣不變夫精體不變故非屬因緣妙用隨緣故非屬自然雖然即所謂因緣自然者如迷海認漚亦未嘗離此妙明故曰非不自然非不因緣但妙體本無元字腳而本無非因緣非自然亦無不非因緣不非自然本無是因緣是自然亦無非是因緣非是自然蓋離一切相即一切法雖云萬相皆虗不妨一真法界有非心思言議所能知之者汝今云何於妙明中措心擬議復以世間因緣自然對待戲論一切名相而分別此精覺妙明即如以手撮空秪自勞耳虗空云何隨汝執捉虗空不可措手妙明而可措心乎非不自然下當補非不因緣句意始完前八還以下離一切相也五種見量以下即一切法也以至無是見無非見及文殊章後又不即不離也此下又為後文張本向後三科重破因緣自然七大重破和合非和合始完此段公案也阿難白佛言世尊必妙覺性至因心因眼是義云何冠注此阿難執昔言以迷今誨也意謂言妙覺性不屬外教之自然則可必非因緣則自教相違矣世尊云何常與比丘說見性具四種緣耶阿難不知昔所說者眼識故以第八識心為根本緣以空明及眼根為增上緣今乃托見精以顯見性令由見性以證妙覺明性反誤認見性為眼識殊不知法相宗中唯說眼識四緣生豈謂覺性四緣生耶佛言阿難我說世間至二俱名見云何不見此與下文當是兩結由阿難最初見相發心總認見聞知覺為真性不知如月影故世尊自七徵以至八還特破此妄見指出見精如第二月而托此見精發明真性到此將欲直指真性故先以此段文言結完八還以前意下文自是故下至見不能及止一段文言又遣見精而直指如真月之妙覺明性以結完八還以後至離一切相即一切法意文雖重疊而意不出此三層耳若循文識旨自得了然豫述於此知者詳之冠注此結破妄見以顯見精也因阿難妄認見性為眼識世尊且不與分辨但言我昔說因緣特為辨破邪宗權引小根使知世間萬相皆仗因托緣非實有也非今所說第一了義之旨豈可躡彼而難此乎然非妄莫能顯真汝等欲明第一了義當先知世人之妄見若世人自言我能見者是因何而名見說自不能見又因何而名不見阿難答曰世人因有日月燈光而見諸色相故名能見復因無日月燈光不見衆色故不名見然則見與不見俱屬外緣故世尊躡其語而詰破之曰汝謂無此三種光明既不名見即應併暗亦不能見若不見明時必能見暗既見暗此但無明云何名為無見耶復反例以斥其謬曰汝等若謂居暗時不見明相故名不見者今在三明現前時不見暗相亦可名不見矣如是則見暗時無明相見明時無暗相俱名不見不亦謬乎蓋此二相勢不並成於中見性曾無不有若復知此明來暗謝暗至明銷自知二相自相陵滅傾奪而汝見性於明暗中非有時暫無也如是則在明暗中俱名能見云何無明時名為不見耶是故阿難汝今當知至無得疲怠妙菩提路冠注此結破見精顯妙覺性而責勉之也承上云汝今既知見明見暗俱得名見亦當知此見明之時而此見精非是因明所有見暗之時而此見精非是因暗所有見空見塞之時而此見精非是因空塞所有然明暗空塞四義若無此見精終不成就蓋明不自成明義假見精以成明義以至塞不自成塞義假見精以成塞義然此見精縱能成就四義而復能超然於四義之外猶與藏識中識精元明等無差別雖屬不變真如尚帶一分無明與妙覺性唯一間耳故曰汝復應知此見精當見明見暗見空見塞之時而此見精雖不雜於四相亦非是真見而真見猶離此見精其見精尚不能及其真見遂責之曰夫此能成就四義而逈然超脫於明暗空塞之外者尚非真見汝等云何復說妙覺明性是因緣性同彼自然及和合相耶更勉勵曰汝等聲聞根性狹劣心粗無識即此見精尚不能知況能即見精而通達清淨實相乎吾今既已極口誨汝汝當深思惟忖猛力勇進疾捨見精直取妙覺明性無得因循懈怠於妙菩提路而中途止息也和合相者即阿難前問曰云何合因緣性是也舊說局溺舊聞曰狹得少為足曰劣乏甄別之智曰無識即萬法而不染曰清淨即萬相而無相曰實相若見諸相非相亦名實相向後三科七大皆斯義也見見之時等第一見字實指見精第二見字虗看猶云用此見而見也若說以真見見見精是兩箇矣此中唯一離字不甚合理至下文世尊亦自說為愚者之言諸有智者不應說此也阿難白佛言世尊如佛世尊至悲淚頂禮承受聖旨冠注此述疑請示也意謂如世尊前來為我等輩說見精非因緣自然非和合不和合心猶未開尚不知此見精云何俱非今更聞此見精雖能見彼四相而不屬四相猶非真見益令我等重增迷悶夫和合等雖未明了尚可少待至於見見非見伏願世尊廣大慈心施大慧目開導指示令我等輩心開意朗頓釋迷悶而得覺心明淨庶不疲於菩提路而通達清淨實相也和合與不和合者因世尊言及和合相故蓋前云無非不非等亦有此義施大慧目當指佛言猶云施佛之慧目開我之覺心也爾時世尊憐愍阿難至諸有漏者獲菩提果冠注此將說覺心明淨而先責其疑滯也爾時下至妙修行路經家敘佛意愍其未悟而將欲開發也陀羅尼云總持總一切法持無量義即上文實相覺心及後文中三如來藏性皆是也三摩提妙修行路即後文自五陰以至修道分完皆是也佛將演斯義先責多聞意謂我今欲為汝等開妙修行路使汝從此而獲三如來藏性奈汝於奢摩他微密觀照猶未了然故我先將斯義為汝分別開示亦令未來諸有漏者得依此奢摩他微密觀照獲菩提果也微密即觀體也指真心實相言而三如來藏性具足其中十地見之如隔羅縠故曰微唯佛與佛始能究盡故曰密奢摩他與觀照攝盡三觀義然非有出入能所之定相乃一心本具之楞嚴大定也有漏依此尚獲菩提無漏不待言而可知矣阿難一切衆生輪回世間至二者衆生同分妄見此衆生對下文圓滿菩提言當總指凡夫二乘輪回當總指二種生死顛倒亦有認物為己迷己為物二義然總起於藏識中根本惑當字皆去聲言其迅速也猶云一念殺心生當下即羅叉現形矣一念嗔心生當下即惡蟒現形矣凡入諸趣不離當下豈必待此生因謝始感來生之果耶故不言隨處隨業而言當處當業也大都本經以楞嚴大定為正宗所以證菩提不離當下輪生死亦不離當下如仰掌覆掌然若至向後廣明七趣又不在此論也夫二種妄見同中有別而別中有同若謂一真法體則十法界依正二報以至一色一香唯我一真如性此外無毫法可得若謂隨緣而現妄境即一世界中差別無量矣況盡法界之差別則盡地微塵莫能極其數量然總不出二種妄見蓋同生娑婆世界豈非同業感招其中各各國土各各差別各各受用又係別業所感乃至同生一國豈非同業感招而一國中自有四方中邊苦樂之境千差萬別又屬別業自感以此推之一郡一邑一家一室盡未離乎苦樂二果其果報生於同別二種妄業而妄業本乎一心故盡法界之同別妄境現於真心如目中之赤眚燈上之毛輪耳故雖說二種只重別業但要阿難等知其根身器界皆是妙覺明心隨緣妄現之赤眚然只須見眚則非病矣如云知幻即離離幻即覺也冠注此標二種妄見也上既許說微密觀照此復標二種妄見意謂微密觀照者即達妄想無性是也故一切衆生輪回於二種生死不成正覺特為於自妙覺真性妄為色空及與見聞而不知此見及緣唯一真心隨緣現起如目中之赤眚耳是以妄見雖多大約不出二種顛倒或認物為己或迷己為物總是背覺合塵分別習氣謂之根本惑故曰見妄當此妄惑即發生妄業當此妄業即感妄果而惑業苦三不出二種妄見云何二見一者別業二者同分是也云何名為別業妄見至何況分別非燈非見是故當知下雙結法喻以顯達妄即真也見眚非病者猶云曉得是眚就不為病如云知幻即離也以終不應言下十六字釋成上見眚非病一句其意自明矣如第二月下是除換法喻意蓋初以第二月喻見精單攝見分次以第二月喻見與見緣統攝見相二分皆是廣指法界而言也此除前法喻會歸一赤眚而取一赤眚喻見與見緣亦統攝見相二分乃自遠而近就一人身中發明真性也此下復以一人例同一國以一國例同大千世界亦乃自近而遠即根身器界發明真性也所謂遠取諸物近取諸身無非一真如實際也諸有智者貫至非燈非見止正明前云見非是見見猶離見者是對愚者之言智者則不必矣智者應上十方如來諸大菩薩等冠注此以喻發明別業妄見也以好目喻正智燈喻真理赤眚喻妄見該盡見分圓影喻妄境該盡相分又曰五色重疊者以喻五塵統攝根身器界也蓋以正智照真境而境智一如絶諸能所如好眼見燈本無五色圓影一念隨緣成見相二分則根境妄分如目眚見五色毛輪矣故假圓影辨妄無體併顯妄不離真意謂五色圓影本非即燈即見亦不離燈離見若謂圓影即燈而有則無眚人何不同見者喻如諸佛菩薩以正智觀之見與見緣并所想相如虗空華本無所有而此圓影唯眚之觀者喻一切衆生以妄心分別諸相分境認為實有遂起因緣自然之見若此圓影即見而有此見已成圓影而能見圓影者復是何物喻如智體真心既成相分塵境而能見塵境者復是何物當知相分塵境雖是真如隨緣變現而不變真如本來不動若此圓影離燈而有則合傍觀屏帳几筵有圓影出喻如此相分塵境若離真理而別有則如水外之波有是理乎若此圓影離見別有應非眼矚云何眚人目見圓影者喻如相分塵境若離正智真心而有則心外有法亦非衆生見分所緣之境是故結顯云色實在燈又非燈自成影乃見病為影者喻如相分塵境元自真理現起但獨境不生多因能緣之見分心故顯所緣之相分境也故以法喻合明曰燈上圓影固是目中赤眚所成即能緣妄境之妄見亦是妙覺心中之眚妄若彼凡愚不見眚者則妄生分別謂此圓影為是燈是見為離燈離見若夫智人既能見眚則雖有此眚亦不為病如云知幻即離矣故曰終不應言是燈是見是且不肯言何況復於是中更言非燈非見耶故前指見與見緣如第二月非真月體亦非水中月影何以故涅目所成故彼愚者不知則妄生分別謂是月形耶謂非月形耶諸有智者不應說此揑目根元是月形非月形喻如見與見緣在凡愚妄生分別指此見精等謂離真見耶謂非真見耶若諸佛菩薩自住三摩地中此見及緣元是菩提妙淨明體自不說言是真見非真見矣今此圓影亦復如是諸有智者既知目眚所成今欲名何者是燈是見是且不肯言何況更說非燈非見耶此亦如是下乃回文耳云何名為同分妄見至本所不見亦復不聞冠注此明同分妄見也此惟舉須彌南面所有之一洲也海水指七金山外鹹水海也平陸即無水之地洲即水環之地一大餘小數滿三千正中一大洲大國凡有二千三百其大洲之外餘有小洲在諸海中其洲中或居三兩百國或一十二十乃至五十國者其中最小一洲秪居兩國其一國中共有惡業感招共覩不祥所謂暈適珮玦妖氣環匝於日月曰暈薄蝕日月曰適災氣近日如珮玦之狀皆日月之災象也星芒遍指曰彗芒氣四出曰孛橫去曰飛下注曰流此皆星辰之災象也災氣夾日曰負耳映日曰虹霓此皆陰陽之災象也是諸惡象但此國衆生同業所招故能同見若本洲中彼國衆生本無同業故不見不聞也此下進退合明處雖約見相二分皆妄如燈上圓影要以能見攝六根所見攝六塵了根塵皆妄即是真性不可局溺法相宗微細分柝大都本經以一切事究竟堅固為主勿得執彼濫此破碎本旨觀後文淪生死證妙常唯是六根則可知矣阿難吾今為汝以此二事至性非眚者故不名見冠注此下正明進退也意謂二喻既明即當以法合上同分之喻今且復進別業之喻暫退同分之法故曰進退也即進之曰如彼衆生別業妄見矚燈光中所現圓影雖似前境終彼見者目眚所成牒前色實在燈見病為影謂雖有而非實也眚即見勞非色所造牒前影見俱眚然見眚者終無無見咎牒前見眚非病遂例明曰如汝今日以目觀見指見分攝六根山河國土及諸衆生指相分攝六塵皆是無始真見一念妄動而成藏識故現此見相二分故曰見病所成見與見緣似現前境本非實有即如目中有眚妄見圓影也何以知其然謂元是自己本覺妙心又因一念隨緣頓起妄明遂有能緣之見及所緣之境即如好眼被勞而生眚則見燈上有圓影出故曰能緣所緣總名為眚然見眚者終無見咎若覺了能緣之見即眚則所緣之境即非眚矣若覺了所緣之境是眚則能緣之見即不墮眚中矣何以故若從微密真心發起觀照豈非始覺乎以此覺而照得能見者是眚非實則始覺即合乎本覺明心而凡所覺之緣自然非眚斯由心真而境亦真矣若從微密真心發起觀照即名始覺以此覺而照得所覺之境是眚非實則始覺亦合乎本覺而本覺自不墮於眚妄之中矣此實是真見見一切法而法法全真豈同見精見明暗空塞雖不雜而未真耶下指前過而責之曰以彼見精望此真見尚落一層云何復執四義所成離塵無體之覺聞知見名為真見則是以水中月影為天上真月謬之甚矣是故汝今見我三十二相及汝根身器界并諸十類衆生於中分染分淨執內執外認能認所皆是妄見即如目中有眚妄見圓影而復以見聞覺知為真見又非見眚之人也或曰真見無非是見何故不可復名覺聞知見豈知妄見之上有真精而真精之上有真性蓋此真見即真性而真性本非是眚故不可名為覺聞知見若名覺聞知見則是真見之眚亦如病目見圓影而真見反晦昧矣此處到底是三層知見指妄見若水中月影真精指見精若第二月性指真見若天上之真月也阿難如彼衆生同分妄見至清淨本心本覺常住和合即因緣義不和合即自然義前云見精不及真見者猶未滅此生死因故上文覺見即眚至此實見見約阿難一人以微密觀照復還本覺此約十方法界衆生以微密觀照復還本覺也圓滿菩提指根本智不生滅性指真如理境智一如始本不二清淨本心約用言本覺常住約體言然亦不出二轉依號也冠注此合明也以一人例一國以一國例大千不出一眚妄耳意謂將前一國人同見種種災祥例彼一病目人所見圓影復將一病目人例同一國互相合明彼一人獨見圓影者乃勞目中眚妄所生此衆人同見不祥者乃見業中瘴惡所起二者所見雖則不一俱是無始顛倒分別見妄所生此見妄即前見妄指根本惑也豈獨此二者同一見妄所生以此擴充普例則南閻浮提三千洲中所有國土同此見妄所生南洲諸土既同其餘三洲諸土亦同四大部洲既同則釋迦化境亦同百億日月既同則十方諸佛所有諸有漏國土及諸衆生皆同一見妄耳夫見妄依真性而起有漏迷無漏而成故曰同是覺湛明性無漏妙心初因一念隨緣黏湛發妄則於一精明分成六和合遂有見聞覺知為六根如目中之赤眚亦有虗妄病緣之六塵如燈上之毛輪根境逢緣妄識生則妄認四大五陰為身相六塵緣影為心相當處發業當業輪轉故於因緣和合時妄見有生於因緣別離時妄見有死若能回光返照斷盡前六識中粗惑不墮分段生死則遠離諸和合緣矣更斷俱生細惑不墮變易生死則遠離不和合矣若復滅除藏識中二種生死之種子即能轉八識成四智故圓滿菩提獲根本智契不生滅性證如如理則永絶輪回完復清淨本心本覺常住矣阿難汝雖先悟本覺妙明至及諸群塞亦復如是冠注此破和合也因阿難前云為我宣說因緣自然和合不和合心猶未開而更聞見見非見重增悶迷世尊即與發明見非是見已竟若因緣自然先已破除唯非和合非不和合尚未開示故不待更問而示之曰汝雖先悟本覺妙明性非因緣非自然性而猶未明覺元非和合非不和合若謂覺性定屬和合不能離一切法則同諸幻法永為生滅若謂覺性定不和合不能即一切法則棄諸幻法於覺性之外故非和合非不和合也復以前塵審定阿難曰汝但悟覺性非因緣自然而猶以世間妄想諸和合性而自疑惑以為能證菩提之本覺妙心亦同世間妄想待前塵和合而起者則汝今者妙淨見精現對明暗通塞而當與誰和耶若謂見精與明和者且汝舉目見明適當明相現前之時從何處雜和汝之見精耶若見精與明相未雜和時雖非歷歷可指容可辨別所謂和者見即如水明即如土若水土既和則水失其清土失其礙而和成泥相矣今見與明兩相雜和見先其見明是其明而和成之狀復何形像耶或曰見明之時明相現前明中自有見精而見中亦有明相此即其雜和之像也縱許明中有見秪謂之明而見則失矣故破之曰若非見者云何見明然則見精且無雜何形像縱許見中有明秪謂之見而明則失矣故破之曰若即見者云何見又見見然則明相且無雜何形像或轉計曰見雖入明中見未嘗失而與明相一樣圓滿明雖入見中明未嘗失而與見精一樣圓滿故破之曰必見性圓滿則無地非見何處容得下明而說與明和耶若明相圓滿則無地非明何處容得下見而說與見和耶故雙結上文云既見與明各各圓滿是見不容明而明不容見則見必異於明而明必異於見故曰和明非義若見雜於明中失了見之性而明雜於見中失了明之字此則互相雜失其明相見性而已故曰和明亦非義也彼暗通塞例此可知矣又汝見精若與明暗通塞相附合者必如蓋合函兩不相乖亦不相離若此見精必與明合至於暗時明相已滅此見自隨明滅定不復與暗合若不合暗必不能見暗云何又能見暗若謂雖則見暗而實不與暗合猶與明合者則見的既不合而合的必不見則與明合時應不見明既不見明云何與明合時了然知其是明而不是暗耶今此見精既能見明仍能見暗定知合明非義彼暗通塞例此可知矣此中不言覺性而猶言見精者正顯文雖在斯義猶在前元是二種妄見以前未了公案止為速明見非是見等意故將此意暫停至此下文亦然阿難白佛言世尊如我思惟至及諸群塞亦復如是冠注此破不和合也覺性遍滿於真俗二諦若約實際理中纖塵不立故非和合若約今世門頭一法不捨故非不和合所以般若云若見諸相非相即見如來古德亦云若見諸相非相不見如來又云若見諸相非相即見眉毛眼上阿難不達斯旨故聞世尊斥其以世間妄想諸和合性而自疑證菩提之心和合起者更辨破其和合則復以思惟心執妙覺元與根塵識法不和合故世尊復審定阿難曰汝此妙見精若與諸塵相非和合者今於明暗通塞中不與誰和耶若此妙淨見精不與明和則見精與明相各有邊涯際畔汝且諦觀二者界限明止何處見止何處見既不與明連自何為界明既不與見連自何為界若謂明邊必無見者則明與見各有疆場各不相及若見不到明邊自不知其明相所在既不知明相所在云何與明分其界畔而言其不與明和耶彼暗通塞例此可知又妙見精與諸塵相非和合者今對明暗通塞不與誰合耶若此見精不與明合則見性與明相兩相乖戾不能角立如耳根與明相了不相觸若耳聽明逈不相涉見精既如耳根則此見精且不知其明相所在云何甄別明白而知其不合耶若不能甄明而妄言見精不與明合者甚不合理也彼暗通塞例此可知阿難所說之覺元指真性緣指能緣之六根塵指六塵及心念慮統指前六識心因世尊斥其以世間妄想諸和合性而疑能證菩提之心和合起者故復疑此覺性必離此而別有者即如離波求水也阿難汝猶未明一切浮塵至迷悟生死了無所得冠注此總明三科之大意也前所云大陀羅尼諸三摩提妙修行路者自此始也承上云汝等雖悟妙覺明性非因緣自然非和合不和合則唯知根身器界屬因緣和合為虗妄不實而不知身器之所以稱幻化相者依如來藏性而起也故曰汝猶未明一切浮根色塵等法皆如陽焰空華眚妄毛輪當處出生隨處滅盡所謂初生即有滅難為愚者說然言幻妄者特稱名指相而已其性真為妙覺明體可見根身器界本無實體唯衆生妙覺明心為實體耳汝等若能如是而知之乃至陰處界入實本無生蓋為父母與己業識因緣合會故妄見有生為己業力隨其修短之限而分離故妄見有滅殊不能知生從何來滅從何去又豈知生滅去來皆幻妄稱相本無實性而所以能現乎此者本是如來藏性也其性也隨萬有而不變不遷故曰常住其用也處迷途而無障無昏故曰妙明本體不動而妙用周圓體用一如則妙萬物而至神性一切而不異故曰不動周圓妙真如性若能親證此境則於性真常中求其去來迷悟生死了無所得悟尚不有豈容因緣和合生滅去來於其間哉所謂涅槃生死等空華矣阿難云何五陰本如來藏至色陰當知亦復如是譬如有人下標真立體其人無故下從真起妄下文若空來者下辨妄不實是故下了妄即真後文倣此然此處色陰獨指一身不同他處凡根身器界有質礙者皆為色陰即此一切非相惟帶言之亦不必重若局溺法相宗統指十一色法則向後五根六塵皆成贅語若更謂合色開心合心開色皆好事者之所為非本經正意也人當泛言若單指衆生則上一人字說不通冠注此總徵起而釋成五陰皆幻妄稱相其性本真也五陰者色受想行識也陰亦云蘊取積聚蓋覆二義謂積聚有為蓋覆真性也意謂五陰皆屬有為乃世間生滅之法云何名為本如來藏妙真如性耶故設喻以明之首舉色陰曰譬如有人此人泛言清淨目喻正智睛明空喻真理逈無所有喻理智一如其人無故不動目睛喻真心隨緣妄動而成藏識瞪以發勞喻見分妄心則於虗空別見狂華喻相分妄色單指色身復有一切狂亂非相總指身外色塵也阿難是諸狂華非從空來至本非因緣非自然性冠注此假空華以明色陰即如來藏性也意謂勞目所見之空華非從空來非從目出蓋此色陰非如如理非不動智乃妄動而後見也故曰若此狂華從空來者既從空來還從空入若此華相既有出入則此虗空亦有內外既有內外則非虗空若非虗空便有實體實則自不容其華相起滅猶如阿難既有實體更不容一阿難於中往來何謂狂華生於空耶若不生於空豈生於目耶若此狂華從目出者既從目而出還應從目而入若從目出則此狂華屬人所生當合有見若有見者出既為空中之華旋宜見能生之眼若無見者出則既能翳空旋則當能翳眼蓋出既翳空又見華時目應無翳當言清明眼見空中華云何反言翳眼見空華耶旋當翳眼當言翳眼見晴空云何見晴空者反號清明眼耶若知此狂華二處皆無則妄本無因即當知其色陰本無生滅但虗妄稱相其性乃非因緣非自然本如來藏妙真如性也阿難譬如有人手足宴安至本非因緣非自然性冠注此假喻以明受陰即如來藏性也領納曰受若分而言之為前五識合而言之總為受陰然必以前五根對前五塵發起前五識能領納違順離合之境方為受陰故曰譬如有人手足宴安百骸調適忽如忘生性無違順者即如一念未動時尚不知有身安知有根境既無根境受自何生其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相即如一念動時根境相偶有違順離合之不同而於中妄生諸識故曰受陰如是下文辨澀滑冷熱之幻觸不從空生不從掌出以顯其受陰虗妄也若謂此幻觸從空來者空無分別決無選擇既能觸掌亦當觸身豈有揀擇而獨觸其掌乎既不從空來豈從掌出若謂此幻觸從掌出者獨掌亦能出掌未合時何無澀滑冷熱諸相而必待掌合而後出耶不特此也若使定從掌出掌合時既知其出掌離時亦知其入若必有出入則其連掌之臂腕骨髓之中應亦知其入時蹤跡何故不知若必於臂腕骨髓之中實有能覺之心知其出入則是自有一物身中往來無時不觸何必待掌合而後知其出始名為觸耶若知此幻觸二處皆無則妄本無因即當知其受陰本無生滅但虗妄稱相其性乃非因緣非自然本如來藏妙真如性也澀與滑冷與熱含違順二義掌有離合二義總顯受陰因此而起但托幻觸以辨受陰虗妄是本旨若援法相宗強配別意則謬甚矣阿難譬如有人談說酢梅至本非因緣非自然性冠注此假喻以明想陰即如來藏性也分別緣慮曰想即第六意識亦名融通妄想故曰譬如有人談說酢梅口中水出思踏懸崖足心酸澀者即如一念妄動而想陰生焉下文惟假水與酸澀辨想陰之虗妄即此因酢說而所有之水不從梅生不從口入若謂此水從梅生者梅應自談何待人有酢說而復口中水出梅無酢說則此水必不從梅生若此水從口所入則聞酸說者自應是口何須更待耳聞酢說而後口中水出口未聞其酢說則此水必不從口入若獨耳聞酢說故有水者此水何不從耳中出而反從口出者何耶又此酸澀不從崖生不從足入若崖生者崖合自思何待人思若因足入足應自思何待心思若獨心思此酸澀者何不生於心中而反生於足中耶若知此水與酸澀二處皆無則妄本無因即當知此想陰本無生滅但幻妄稱相其性非因緣非自然乃如來藏妙真如性也阿難譬如暴流波浪相續至本非因緣非自然性冠注此假喻以明行陰即如來藏性也遷流曰行即第七末那識所謂恆審思量我相隨亦云習氣成暴流此暗以空喻真如水喻藏識非空不能容水非水不能成流故曰譬如暴流波浪相續前際後際不相踰越者即如真心一念妄動而成藏識心海復為境風鼓動心海而成末那則有微細生住異滅念念不停其行陰之狀如此下文唯假暴流以辨行陰之虗妄即斯暴流之性不因空生不因水有亦非水性非離空水者謂空以寂然為性水以澄靜為性而暴流以遷流不停為性即如真心以無生滅為性藏識以湛不搖動為性而行陰以念念生滅為性然離真心與藏識外亦無行陰可得若謂此暴流性因空而有則諸十方虗空成無盡流世界俱受淪溺今此虗空無盡暴流有盡則知非因空有即如真如寂然無盡行陰遷流有盡若此暴流性因水而有則此流性應非是水性何以故水性屬能有流性屬所有當如因樹有果而現見能有之樹及所有之果判然可辨若此暴流之性即水之性是水當定以濁流為性於澄清時則應非水之體性矣即七八二識乃互相現起非定有一性亦非定有二性也若此流性離於空水則空非有外水外無流又非離於空水也即如離真心藏識外自無行陰可得矣若知此暴流非生於空水亦不離於空水則妄本無因即當知此行陰本無生滅但幻妄稱相其性非因緣非自然乃如來藏妙真如性也第一第二第四性字約動靜辨第三性應非水之性字約能所辨也阿難譬如有人取頻伽瓶至本非因緣非自然性已上總名五陰元無生滅但幻妄稱相其性本真故以空華喻明色陰已即托華相而辨破之以澀滑冷熱之幻觸喻明受陰已即托幻觸而辨破之以口中之水相足心之酸相喻明想陰已即托水相澀相而辨破之以暴流之相喻明行陰已即托流相而辨破之是前四陰無甚差殊唯斯識陰自取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國喻義始完及至辨破則瓶與人等俱置之而獨辨瓶中之空無去來之所無出入之迹無餘缺之據足見前四陰雖不無真性而妄想熾然唯後識陰雖不無妄而真性不變故於前四陰獨辨妄相無因令知妄體本空則真性可待於後識陰唯辨真性無所從來亦無所去用涉迷悟之鄉而曾無出入體遍聖凡之質而本無餘缺令知真空不變則妄習自亡是滅妄歸真以真除妄之辨不可不知者也冠注此假喻以明識陰即如來藏性也此即受熏持種之藏識乃一切衆生捨生趣生去後來先作主公者蓋為真如有隨緣不變二義無明有成事體空二義真如隨緣即為成事無明而無明體空即為不變真如非定一體非定二體則真妄和合以成藏識者不出此二種而已故曰譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國者人喻善惡業力瓶喻成事無明瓶中之空喻無明中有不變真如斯總喻真妄和合而成藏識塞其兩孔者即如真如未隨緣時則具根本後得二智既隨緣成識即閉塞二智而反成二障矣千里遠行用餉他國者即如識被業牽輪回三界無處不往識陰之狀如此而已下文不言人瓶獨言瓶中之空無去來相故曰瓶中之空非彼方來非此方入若瓶中之空自彼方持來則本瓶中既貯空去則於本瓶地應少此一瓶之空於彼地曾未少此一瓶之空則定非彼方持來若瓶中之空必自此方入者有入即有出則開孔倒瓶應見空出今縱開孔倒瓶不見空出則定非此方所入以瓶中之空無去來之相不變真如雖在衆生業識中曾無生滅去來之相以人擎瓶千里遠行用向他國喻如去後來先輪回諸趣者惟是無明業力而已然此瓶中之空與外廣大無盡之空本無有二曾無隔礙亦無餘缺若脫人之手打碎此瓶則渾然一廣大無盡之空即如一切衆生斷除業力翻破無明則與十方諸佛所證真空妙理敵體無二寧有佛生之差別乎若知瓶中之空曾無去來瓶外之空曾無餘缺則知真性本無生滅去來而生滅去來者乃業力無明所謂和合妄生和合妄死耳即此當知識陰本無生滅但幻妄稱相其性非因緣非自然本如來藏妙真如性也
